// ====================================================================
// PDF INTERNO — Visual, pra mandar no grupo (sem logos formais)
// ====================================================================
function gerarPDFInterno(data, turnoFocus) {
  // Tornando a função à prova de falhas: se o botão não enviou o turno, ela mesma descobre qual tela está aberta
  const focus = turnoFocus || (typeof DIARIO_TURNO_ATIVO !== 'undefined' ? DIARIO_TURNO_ATIVO : null);

  const fromSheet = (STATE.rdodiario || []).find(r => {
    const rd = String(r['Data']);
    return rd === data || (parseISODate(rd) && parseISODate(rd).toISOString().split('T')[0] === data);
  });

  let d;
  if (typeof DIARIO_V4 !== 'undefined' && DIARIO_V4 && DIARIO_V4.data === data) {
    const v4 = DIARIO_V4;
    d = {
      data: data,
      tem_turno_noturno: (v4.diurno.preenchido && v4.noturno.preenchido) ? true : false,
      apontador_diurno: v4.diurno.apontador || '',
      apontador_noturno: v4.noturno.apontador || '',
      clima_manha: v4.clima_manha, clima_tarde: v4.clima_tarde, clima_noite: v4.clima_noite,
      visitas: [v4.diurno.visitas, v4.noturno.visitas].filter(x=>x).join(' / ') || '',
      ocorrencias: [v4.diurno.ocorrencias, v4.noturno.ocorrencias].filter(x=>x).join(' / ') || '',
      observacoes_gerais: [v4.diurno.observacoes, v4.noturno.observacoes].filter(x=>x).join(' / ') || '',
      efetivo_diurno: v4.diurno.efetivo || {},
      efetivo_noturno: v4.noturno.efetivo || {},
      equipamentos_diurno: v4.diurno.equipamentos || {},
      equipamentos_noturno: v4.noturno.equipamentos || {},
      customIndireto_diurno: v4.diurno.customIndireto || [],
      customIndireto_noturno: v4.noturno.customIndireto || [],
      customDireto_diurno: v4.diurno.customDireto || [],
      customDireto_noturno: v4.noturno.customDireto || [],
      customEquip_diurno: v4.diurno.customEquip || [],
      customEquip_noturno: v4.noturno.customEquip || []
    };
  } else if (fromSheet) {
    let efetJson = {}, equipJson = {};
    try { efetJson = JSON.parse(fromSheet['Efetivo_JSON'] || '{}'); } catch(e) {}
    try { equipJson = JSON.parse(fromSheet['Equipamentos_JSON'] || '{}'); } catch(e) {}
    d = {
      data: data,
      tem_turno_noturno: (fromSheet['Apontador_Diurno'] && fromSheet['Apontador_Noturno']) ? true : false,
      apontador_diurno: fromSheet['Apontador_Diurno'] || '',
      apontador_noturno: fromSheet['Apontador_Noturno'] || '',
      clima_manha: fromSheet['Clima_Manha'] || '',
      clima_tarde: fromSheet['Clima_Tarde'] || '',
      clima_noite: fromSheet['Clima_Noite'] || '',
      visitas: fromSheet['Visitas'] || '',
      ocorrencias: fromSheet['Ocorrencias'] || '',
      observacoes_gerais: fromSheet['Observacoes_Gerais'] || '',
      efetivo_diurno: efetJson.padrao_diurno || {},
      efetivo_noturno: efetJson.padrao_noturno || {},
      equipamentos_diurno: equipJson.padrao_diurno || {},
      equipamentos_noturno: equipJson.padrao_noturno || {},
      customIndireto_diurno: efetJson.customIndireto_diurno || [],
      customIndireto_noturno: efetJson.customIndireto_noturno || [],
      customDireto_diurno: efetJson.customDireto_diurno || [],
      customDireto_noturno: efetJson.customDireto_noturno || [],
      customEquip_diurno: equipJson.custom_diurno || [],
      customEquip_noturno: equipJson.custom_noturno || []
    };
  } else {
    d = null;
  }

  if (!d) { toast('Não encontrei o RDO Diário pra gerar PDF', 'error'); return; }

  // --- LÓGICA DE ISOLAMENTO DO TURNO ---
  if (focus === 'diurno') {
    d.tem_turno_noturno = false;
    d.apontador_noturno = '';
    d.efetivo_noturno = {};
    d.equipamentos_noturno = {};
    d.customIndireto_noturno = [];
    d.customDireto_noturno = [];
    d.customEquip_noturno = [];
    if (typeof DIARIO_V4 !== 'undefined' && DIARIO_V4 && DIARIO_V4.data === data) {
      d.visitas = DIARIO_V4.diurno.visitas || '';
      d.ocorrencias = DIARIO_V4.diurno.ocorrencias || '';
      d.observacoes_gerais = DIARIO_V4.diurno.observacoes || '';
    }
  } else if (focus === 'noturno') {
    d.tem_turno_noturno = false;
    d.apontador_diurno = '';
    d.efetivo_diurno = {};
    d.equipamentos_diurno = {};
    d.customIndireto_diurno = [];
    d.customDireto_diurno = [];
    d.customEquip_diurno = [];
    if (typeof DIARIO_V4 !== 'undefined' && DIARIO_V4 && DIARIO_V4.data === data) {
      d.visitas = DIARIO_V4.noturno.visitas || '';
      d.ocorrencias = DIARIO_V4.noturno.ocorrencias || '';
      d.observacoes_gerais = DIARIO_V4.noturno.observacoes || '';
    }
  }

  // Filtro robusto que ignora letras maiúsculas/minúsculas e espaços em branco
  let servicosDiurnos = STATE.rdoavanco.filter(r => {
    const rd = parseISODate(r['Data']);
    if (!rd) return false;
    const t = String(r['Turno'] || 'Diurno').trim().toLowerCase();
    return fmtData(rd) === fmtData(data) && t !== 'noturno';
  });
  
  let servicosNoturnos = STATE.rdoavanco.filter(r => {
    const rd = parseISODate(r['Data']);
    if (!rd) return false;
    const t = String(r['Turno'] || '').trim().toLowerCase();
    return fmtData(rd) === fmtData(data) && t === 'noturno';
  });

  if (focus === 'diurno') servicosNoturnos = [];
  if (focus === 'noturno') servicosDiurnos = [];
  // ------------------------------------

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const PW = 210, PH = 297, ML = 12, TW = 186;

  const TERRACOTA = [201, 114, 64];
  const TERRA_DARK = [122, 65, 36];
  const NAVY = [26, 22, 18];
  const VERDE = [70, 142, 87];
  const AMARELO = [212, 168, 16];
  const AZUL = [50, 100, 150];
  const CINZA = [120, 117, 112];
  const CINZA_BG = [245, 243, 239];

  function sf(sz, st, col) {
    doc.setFontSize(sz);
    doc.setFont('helvetica', st || 'normal');
    doc.setTextColor(...(col || [0, 0, 0]));
  }
  function rect(x, y, w, h, fl, sk) {
    if (fl) { doc.setFillColor(...fl); doc.rect(x, y, w, h, sk ? 'FD' : 'F'); }
    if (sk && !fl) { doc.setDrawColor(...sk); doc.rect(x, y, w, h, 'S'); }
  }
  function tx(t, x, y, opt) { doc.text(String(t || ''), x, y, opt || {}); }

  const dataObj = parseISODate(data);
  const diaSem = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][dataObj.getDay()];
  const dataFmt = fmtData(data);

  let y = 0;

  // CABEÇALHO IMPACTANTE
  rect(0, 0, PW, 32, NAVY);
  rect(0, 32, PW, 4, TERRACOTA);

  sf(20, 'bold', [255, 255, 255]);
  tx('RELATÓRIO DIÁRIO', ML, 13);
  sf(10, 'normal', [255, 255, 255]);
  doc.setTextColor(255, 200, 150);
  tx('Av. Senador Teotônio Vilela · Consórcio Arvek + Gestor', ML, 19);

  sf(8, 'normal', [180, 175, 168]);
  tx(diaSem.toUpperCase() + ' · ' + dataFmt, ML, 27);

  let tipoTxt = d.tem_turno_noturno ? 'DIURNO + NOTURNO' : 'DIURNO';
  if (focus) tipoTxt = focus.toUpperCase();
  
  rect(PW - ML - 50, 8, 50, 18, TERRACOTA);
  sf(7, 'bold', [255, 255, 255]);
  tx('TURNO', PW - ML - 25, 13, { align: 'center' });
  sf(11, 'bold', [255, 255, 255]);
  tx(tipoTxt, PW - ML - 25, 21, { align: 'center' });

  y = 42;

  // RESUMO DO DIA
  const totalServicos = servicosDiurnos.length + servicosNoturnos.length;

  let totalEfetivo = 0;
  Object.values(d.efetivo_diurno || {}).forEach(v => totalEfetivo += parseInt(v) || 0);
  Object.values(d.efetivo_noturno || {}).forEach(v => totalEfetivo += parseInt(v) || 0);
  (d.customIndireto_diurno || []).forEach(f => totalEfetivo += parseInt(f.qtd) || 0);
  (d.customIndireto_noturno || []).forEach(f => totalEfetivo += parseInt(f.qtd) || 0);
  (d.customDireto_diurno || []).forEach(f => totalEfetivo += parseInt(f.qtd) || 0);
  (d.customDireto_noturno || []).forEach(f => totalEfetivo += parseInt(f.qtd) || 0);

  let totalEquip = 0;
  Object.values(d.equipamentos_diurno || {}).forEach(v => totalEquip += parseInt(v) || 0);
  Object.values(d.equipamentos_noturno || {}).forEach(v => totalEquip += parseInt(v) || 0);
  (d.customEquip_diurno || []).forEach(e => totalEquip += parseInt(e.qtd) || 0);
  (d.customEquip_noturno || []).forEach(e => totalEquip += parseInt(e.qtd) || 0);

  const estacasTrabalhadas = new Set();
  [...servicosDiurnos, ...servicosNoturnos].forEach(s => {
    const m = (s['Local_Estaca'] || '').match(/E?\d+(\.\d+)?/g);
    if (m) m.forEach(e => estacasTrabalhadas.add(e));
  });

  const kw = (TW - 12) / 4;
  const kpis = [
    { label: 'SERVIÇOS', valor: totalServicos, sub: 'executados', cor: TERRACOTA },
    { label: 'EFETIVO', valor: totalEfetivo, sub: 'pessoas', cor: AZUL },
    { label: 'EQUIPAMENTOS', valor: totalEquip, sub: 'no canteiro', cor: VERDE },
    { label: 'ESTACAS', valor: estacasTrabalhadas.size, sub: 'trabalhadas', cor: AMARELO },
  ];
  kpis.forEach((k, i) => {
    const x = ML + i * (kw + 4);
    rect(x, y, kw, 22, [255, 255, 255], CINZA);
    rect(x, y, kw, 2, k.cor); 
    sf(7, 'bold', CINZA);
    tx(k.label, x + 3, y + 7);
    sf(18, 'bold', NAVY);
    tx(String(k.valor), x + 3, y + 16);
    sf(7, 'normal', CINZA);
    tx(k.sub, x + 3, y + 20);
  });
  y += 28;

  // CLIMA visual
  rect(ML, y, TW, 14, CINZA_BG);
  sf(8, 'bold', NAVY);
  tx('CONDIÇÕES CLIMÁTICAS', ML + 4, y + 5);
  sf(9, 'normal', [40, 40, 40]);
  const climas = [
    { label: 'Manhã', val: d.clima_manha || '—' },
    { label: 'Tarde', val: d.clima_tarde || '—' },
    { label: 'Noite', val: d.clima_noite || '—' },
  ];
  climas.forEach((c, i) => {
    const x = ML + 6 + i * (TW / 3);
    sf(7, 'normal', CINZA);
    tx(c.label.toUpperCase(), x, y + 11);
    sf(10, 'bold', NAVY);
    tx(c.val, x + 16, y + 11);
  });
  y += 18;

  // SERVIÇOS POR TURNO
  function renderServicosTurno(turnoNome, servicos, corTurno) {
    if (servicos.length === 0) return;
    
    rect(ML, y, TW, 8, corTurno);
    sf(10, 'bold', [255, 255, 255]);
    tx(turnoNome.toUpperCase() + '  ·  ' + servicos.length + ' serviço' + (servicos.length>1?'s':''), ML + 4, y + 5.5);
    y += 8;
    
    sf(6.5, 'bold', CINZA);
    rect(ML, y, TW, 6, CINZA_BG);
    tx('FRENTE / PACOTE', ML + 3, y + 4);
    tx('LOCAL / ESTACA', ML + 75, y + 4);
    tx('QTD', ML + 130, y + 4, { align: 'right' });
    tx('UN', ML + 138, y + 4);
    tx('EQUIPE', ML + 152, y + 4);
    y += 6;
    
    servicos.forEach((s, i) => {
      const bg = i % 2 === 0 ? null : [252, 250, 246];
      if (bg) rect(ML, y, TW, 5, bg);
      
      const pacote = (STATE && STATE.pacotes) ? STATE.pacotes.find(pp => pp['ID'] === s['Pacote_ID']) : null;
      const frente = pacote ? (pacote['Frente'] || '') : '';
      
      sf(7, 'bold', NAVY);
      tx((frente ? frente + ' · ' : '') + (s['Pacote_Nome'] || ''), ML + 3, y + 3.5);
      sf(7, 'normal', [50, 50, 50]);
      tx(s['Local_Estaca'] || '', ML + 75, y + 3.5);
      sf(7, 'bold', TERRA_DARK);
      tx(parseFloat(s['Quantidade']||0).toLocaleString('pt-BR'), ML + 130, y + 3.5, { align: 'right' });
      sf(7, 'normal', CINZA);
      tx(s['Unidade'] || '', ML + 138, y + 3.5);
      tx(s['Equipe'] || s['Subcontratado'] || '', ML + 152, y + 3.5);
      y += 5;
    });
    y += 3;
  }
  
  if (servicosDiurnos.length > 0) renderServicosTurno('SERVIÇOS DIURNOS', servicosDiurnos, AMARELO);
  if (servicosNoturnos.length > 0) renderServicosTurno('SERVIÇOS NOTURNOS', servicosNoturnos, AZUL);
  
  if (totalServicos === 0) {
    rect(ML, y, TW, 14, [253, 246, 230]);
    sf(9, 'italic', [140, 90, 30]);
    tx('Nenhum serviço lançado pra este turno.', ML + 4, y + 9);
    y += 18;
  }

  // EFETIVO DETALHADO
  if (y < PH - 60) {
    rect(ML, y, TW, 8, NAVY);
    sf(10, 'bold', [255, 255, 255]);
    tx('EFETIVO  ·  ' + totalEfetivo + ' pessoa' + (totalEfetivo>1?'s':'') + ' no canteiro', ML + 4, y + 5.5);
    y += 8;
    
    const colW = (TW - 4) / 2;
    let yIni = y;
    
    function renderEfetivoCol(titulo, categorias, customListDiu, customListNot, tipo, x) {
      let cy = yIni;
      sf(7, 'bold', tipo === 'DIRETO' ? AZUL : AMARELO);
      tx(titulo, x + 3, cy + 4);
      cy += 6;
      
      let total = 0;
      const linhas = [];
      categorias.forEach(c => {
        const diu = parseInt(d.efetivo_diurno[c.key]) || 0;
        const not = parseInt(d.efetivo_noturno[c.key]) || 0;
        if (diu + not > 0) {
          linhas.push({ label: c.label, diu, not });
          total += diu + not;
        }
      });
      
      const mapCustom = {};
      customListDiu.forEach(f => { if(f.label) mapCustom[f.label] = { diu: parseInt(f.qtd)||0, not: 0 }; });
      customListNot.forEach(f => {
        if(f.label) {
          if(!mapCustom[f.label]) mapCustom[f.label] = { diu: 0, not: 0 };
          mapCustom[f.label].not = parseInt(f.qtd)||0;
        }
      });
      
      Object.keys(mapCustom).forEach(k => {
         const diu = mapCustom[k].diu;
         const not = mapCustom[k].not;
         if (diu + not > 0) {
            linhas.push({ label: k + ' ✱', diu, not });
            total += diu + not;
         }
      });
      
      if (linhas.length === 0) {
        sf(7, 'italic', CINZA);
        tx('—', x + 3, cy + 3);
        cy += 5;
      } else {
        linhas.forEach((l, i) => {
          if (i % 2 === 0) rect(x, cy, colW, 4.2, [248, 246, 242]);
          sf(7, 'normal', [40, 40, 40]);
          tx(l.label, x + 3, cy + 3);
          sf(7, 'bold', NAVY);
          if (d.tem_turno_noturno) {
            tx(String(l.diu), x + colW - 24, cy + 3, { align: 'right' });
            tx(String(l.not), x + colW - 12, cy + 3, { align: 'right' });
            tx(String(l.diu + l.not), x + colW - 3, cy + 3, { align: 'right' });
          } else {
            tx(String(l.diu + l.not), x + colW - 3, cy + 3, { align: 'right' });
          }
          cy += 4.2;
        });
      }
      cy += 1;
      rect(x, cy, colW, 4, [240, 235, 226]);
      sf(7, 'bold', TERRA_DARK);
      tx('TOTAL ' + titulo, x + 3, cy + 3);
      tx(String(total), x + colW - 3, cy + 3, { align: 'right' });
      cy += 5;
      return cy;
    }
    
    const yFimDir = renderEfetivoCol('DIRETO', CATEGORIAS_DIRETO, d.customDireto_diurno, d.customDireto_noturno, 'DIRETO', ML);
    const yFimInd = renderEfetivoCol('INDIRETO', CATEGORIAS_INDIRETO, d.customIndireto_diurno, d.customIndireto_noturno, 'INDIRETO', ML + colW + 4);
    y = Math.max(yFimDir, yFimInd) + 3;
  }

  // EQUIPAMENTOS
  if (totalEquip > 0 && y < PH - 50) {
    rect(ML, y, TW, 8, NAVY);
    sf(10, 'bold', [255, 255, 255]);
    tx('EQUIPAMENTOS  ·  ' + totalEquip + ' no canteiro', ML + 4, y + 5.5);
    y += 8;
    
    const equipsAtivos = [];
    CATEGORIAS_EQUIP_PADRAO.forEach(eq => {
      const diu = parseInt(d.equipamentos_diurno[eq.key]) || 0;
      const not = parseInt(d.equipamentos_noturno[eq.key]) || 0;
      if (diu + not > 0) equipsAtivos.push({ label: eq.label, qtd: diu + not });
    });
    
    const mapCustomEq = {};
    d.customEquip_diurno.forEach(f => { if(f.label) mapCustomEq[f.label] = { diu: parseInt(f.qtd)||0, not: 0 }; });
    d.customEquip_noturno.forEach(f => {
        if(f.label) {
            if(!mapCustomEq[f.label]) mapCustomEq[f.label] = { diu: 0, not: 0 };
            mapCustomEq[f.label].not = parseInt(f.qtd)||0;
        }
    });
    Object.keys(mapCustomEq).forEach(k => {
         const diu = mapCustomEq[k].diu;
         const not = mapCustomEq[k].not;
         if (diu + not > 0) equipsAtivos.push({ label: k + ' ✱', qtd: diu + not });
    });
    
    const colsEq = 3;
    const eqW = TW / colsEq;
    equipsAtivos.forEach((eq, i) => {
      const col = i % colsEq;
      const row = Math.floor(i / colsEq);
      const ex = ML + col * eqW;
      const ey = y + row * 5;
      if (row % 2 === 0) rect(ex, ey, eqW, 5, [248, 246, 242]);
      sf(7, 'normal', [40, 40, 40]);
      tx(eq.label, ex + 3, ey + 3.5);
      sf(8, 'bold', TERRACOTA);
      tx(String(eq.qtd), ex + eqW - 4, ey + 3.5, { align: 'right' });
    });
    y += Math.ceil(equipsAtivos.length / colsEq) * 5 + 4;
  }

  // OBSERVAÇÕES
  const temObs = d.visitas || d.ocorrencias || d.observacoes_gerais;
  if (temObs && y < PH - 35) {
    rect(ML, y, TW, 6, [240, 235, 226]);
    sf(8, 'bold', TERRA_DARK);
    tx('OBSERVAÇÕES', ML + 3, y + 4);
    y += 6;
    
    sf(8, 'normal', [40, 40, 40]);
    if (d.visitas) {
      sf(7, 'bold', NAVY); tx('Visitas:', ML + 3, y + 3);
      sf(7, 'normal', [40, 40, 40]);
      const ll = doc.splitTextToSize(d.visitas, TW - 24);
      doc.text(ll.slice(0, 2), ML + 18, y + 3);
      y += ll.length * 3.5 + 1;
    }
    if (d.ocorrencias) {
      sf(7, 'bold', NAVY); tx('Ocorr.:', ML + 3, y + 3);
      sf(7, 'normal', [40, 40, 40]);
      const ll = doc.splitTextToSize(d.ocorrencias, TW - 22);
      doc.text(ll.slice(0, 2), ML + 16, y + 3);
      y += ll.length * 3.5 + 1;
    }
    if (d.observacoes_gerais) {
      sf(7, 'bold', NAVY); tx('Geral:', ML + 3, y + 3);
      sf(7, 'normal', [40, 40, 40]);
      const ll = doc.splitTextToSize(d.observacoes_gerais, TW - 18);
      doc.text(ll.slice(0, 3), ML + 14, y + 3);
      y += ll.length * 3.5 + 1;
    }
  }

  // RODAPÉ COM NOME ESPECÍFICO DO APONTADOR
  let rodapeTxt = 'Apontador Diurno: ' + (d.apontador_diurno || '—') + (d.apontador_noturno ? '  ·  Noturno: ' + d.apontador_noturno : '');
  if (focus === 'diurno') rodapeTxt = 'Apontador Diurno: ' + (d.apontador_diurno || '—');
  if (focus === 'noturno') rodapeTxt = 'Apontador Noturno: ' + (d.apontador_noturno || '—');

  rect(0, PH - 14, PW, 14, NAVY);
  sf(8, 'bold', [255, 255, 255]);
  tx('CONSÓRCIO ARVEK + GESTOR', ML, PH - 8);
  sf(7, 'normal', [180, 175, 168]);
  tx(rodapeTxt, ML, PH - 4);
  
  sf(7, 'normal', [180, 175, 168]);
  tx('Gerado em ' + new Date().toLocaleString('pt-BR'), PW - ML, PH - 4, { align: 'right' });

  // Nomeia o arquivo de acordo com o turno para não sobrepor se salvarem ambos
  let fname = 'RDO_INTERNO_' + data.replace(/-/g, '_');
  if (focus) fname += '_' + focus.toUpperCase();
  fname += '.pdf';
  doc.save(fname);
  toast('PDF Interno gerado: ' + fname, 'success');
}
