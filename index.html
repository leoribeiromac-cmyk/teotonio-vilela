// PDF DO RDO DIÁRIO — LAYOUT OFICIAL (jsPDF)
// ====================================================================
function gerarPDFDiario(data) {
  // Buscar dados do RDO Diário (preferir Sheets, senão usar DIARIO_V3)
  const fromSheet = (STATE.rdodiario || []).find(r => {
    const rd = String(r['Data']);
    return rd === data || (parseISODate(rd) && parseISODate(rd).toISOString().split('T')[0] === data);
  });
  
  const d = fromSheet ? sheetRowToDiarioV3(fromSheet) : (DIARIO_V3 && DIARIO_V3.data === data ? DIARIO_V3 : null);
  if (!d) { toast('Não encontrei o RDO Diário pra gerar PDF', 'error'); return; }
  
  // Filtrar serviços executados nesse dia
  const servicosDiurnos = STATE.rdoavanco.filter(r => {
    const rd = parseISODate(r['Data']);
    if (!rd) return false;
    return rd.toISOString().split('T')[0] === data && (r['Turno']||'Diurno') === 'Diurno';
  });
  const servicosNoturnos = STATE.rdoavanco.filter(r => {
    const rd = parseISODate(r['Data']);
    if (!rd) return false;
    return rd.toISOString().split('T')[0] === data && r['Turno'] === 'Noturno';
  });
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  
  // Constantes de layout (replicando o antigo)
  const PW = 210, PH = 297, ML = 8, MT = 5, TW = 194;
  
  // Paleta (igual ao antigo)
  const NAV = [30, 58, 95];
  const LB = [210, 225, 242];
  const LG = [249, 249, 249];
  const W = [255, 255, 255];
  const RED = [192, 50, 45];
  const YB = [255, 253, 215];
  const DG = [80, 80, 80];
  const BD = [165, 165, 165];
  
  // Primitivos
  function sf(sz, st, col) {
    doc.setFontSize(sz);
    doc.setFont('helvetica', st || 'normal');
    doc.setTextColor(...(col || [0, 0, 0]));
  }
  function rf(x, y, w, h, fl, sk, lw) {
    doc.setLineWidth(lw || 0.15);
    if (fl && sk) { doc.setFillColor(...fl); doc.setDrawColor(...sk); doc.rect(x, y, w, h, 'FD'); }
    else if (fl) { doc.setFillColor(...fl); doc.rect(x, y, w, h, 'F'); }
    else if (sk) { doc.setDrawColor(...sk); doc.rect(x, y, w, h, 'S'); }
  }
  function ln(x1, y1, x2, y2, c, lw) {
    doc.setDrawColor(...(c || [180, 180, 180]));
    doc.setLineWidth(lw || 0.15);
    doc.line(x1, y1, x2, y2);
  }
  function tx(t, x, y, opt) {
    doc.text(String(t || ''), x, y, opt || {});
  }
  
  // Datas formatadas
  const df = new Date(data + 'T12:00:00').toLocaleDateString('pt-BR');
  const dd = new Date(data + 'T12:00:00');
  const diaSemanaIdx = [6, 0, 1, 2, 3, 4, 5][dd.getDay()]; // S T Q Q S S D (Seg=0 ... Dom=6)
  
  let y = MT;
  
  // ══════════════════════════════════════════
  // 1. CABEÇALHO — 3 logos + título (22mm)
  // ══════════════════════════════════════════
  rf(ML, y, TW, 22, W, NAV, 0.5);
  try { doc.addImage('data:image/png;base64,' + RDO_LOGO_L1, 'PNG', ML + 1, y + 1, 20, 20); } catch(e) {}
  try { doc.addImage('data:image/png;base64,' + RDO_LOGO_L2, 'PNG', ML + 22, y + 1, 24, 20); } catch(e) {}
  try { doc.addImage('data:image/png;base64,' + RDO_LOGO_L3, 'PNG', ML + TW - 28, y + 1, 26, 20); } catch(e) {}
  
  const cxL = ML + 47, cxR = ML + TW - 29, cxW = cxR - cxL, cxMid = cxL + cxW / 2;
  sf(9.5, 'bold', NAV);
  const tituloRDO = d.tem_turno_noturno ? 'RELATÓRIO DIÁRIO DE OBRA — DIURNO + NOTURNO' : 'RELATÓRIO DIÁRIO DE OBRA — DIURNO';
  tx(tituloRDO, cxMid, y + 7.5, { align: 'center' });
  sf(6.5, 'normal', DG);
  tx('Consórcio Viário Teotônio Vilela  |  Duplicação Viária — Av. Sen. Teotônio Vilela, SP', cxMid, y + 13, { align: 'center' });
  sf(4.5, 'normal', DG);
  const respTx = 'Início: 09/05/2024  |  Prazo: 669 dias  |  Resp: Roberto V. França (2620250486954) / Paulo E. Façanha (2620250483859) / Adriano L. Pedroso (2620251795809)';
  const respLines = doc.splitTextToSize(respTx, cxW - 2);
  doc.text(respLines.slice(0, 2), cxMid, y + 17.5, { align: 'center' });
  y += 22;
  
  // ══════════════════════════════════════════
  // 2. OBJETO (10mm)
  // ══════════════════════════════════════════
  rf(ML, y, TW, 10, LB, BD);
  sf(5, 'bold', NAV); tx('OBJETO', ML + 2, y + 3.5);
  sf(5, 'normal', [0, 0, 0]);
  const obj = 'CONTRATAÇÃO DE EMPRESA OU CONSÓRCIO DE EMPRESAS ESPECIALIZADAS EM ENGENHARIA PARA A EXECUÇÃO DE OBRAS E SERVIÇOS DE DUPLICAÇÃO VIÁRIA DA AVENIDA SENADOR TEOTÔNIO VILELA, NO TRECHO COM INÍCIO PRÓXIMO A RUA JOSÉ NICOLAU DE LIMA ATÉ AS PROXIMIDADES DA RUA SATÉLITE ARIEL, NA REGIÃO SUL DA CIDADE DE SÃO PAULO';
  const objL = doc.splitTextToSize(obj, TW - 4);
  doc.text(objL.slice(0, 2), ML + 2, y + 6.5);
  y += 10;
  
  // ══════════════════════════════════════════
  // 3. LOCAL / DATA / Nº / PRAZO (12mm = 2×6)
  // ══════════════════════════════════════════
  // Calcular Nº do RDO baseado no ID
  const nrRDO = (fromSheet && fromSheet['ID']) ? String(fromSheet['ID']).replace(/^D0*/, '') || '1' : '—';
  const H3 = 6;
  
  // Linha 1 — cabeçalhos
  rf(ML, y, TW * 0.55, H3, LB, BD); sf(5, 'bold', NAV); tx('LOCAL', ML + 2, y + H3 * 0.72);
  rf(ML + TW * 0.55, y, TW * 0.22, H3, LB, BD); sf(5, 'bold', NAV); tx('DATA', ML + TW * 0.55 + TW * 0.11, y + H3 * 0.72, { align: 'center' });
  rf(ML + TW * 0.77, y, TW * 0.12, H3, LB, BD); sf(5, 'bold', NAV); tx('NÚMERO', ML + TW * 0.77 + TW * 0.06, y + H3 * 0.72, { align: 'center' });
  rf(ML + TW * 0.89, y, TW * 0.11, H3, LB, BD); sf(5, 'bold', NAV); tx('PRAZO(dias)', ML + TW * 0.89 + TW * 0.055, y + H3 * 0.72, { align: 'center' });
  y += H3;
  
  // Linha 2 — valores
  rf(ML, y, TW * 0.55, H3, W, BD); sf(5.5, 'normal', [0, 0, 0]);
  tx('Av. Sen. Teotônio Vilela (Rua José Nicolau — Rua Satélite Ariel)', ML + 2, y + H3 * 0.72);
  rf(ML + TW * 0.55, y, TW * 0.22, H3, W, BD); sf(7, 'bold', NAV); tx(df, ML + TW * 0.55 + TW * 0.11, y + H3 * 0.72, { align: 'center' });
  rf(ML + TW * 0.77, y, TW * 0.12, H3, W, BD); sf(7, 'bold', NAV); tx(nrRDO, ML + TW * 0.77 + TW * 0.06, y + H3 * 0.72, { align: 'center' });
  rf(ML + TW * 0.89, y, TW * 0.11, H3, W, BD); sf(6, 'bold', NAV); tx('669', ML + TW * 0.89 + TW * 0.055, y + H3 * 0.72, { align: 'center' });
  y += H3;
  
  // ══════════════════════════════════════════
  // 4. DIA / JORNADA / CLIMA (10mm = 2×5)
  // ══════════════════════════════════════════
  const JH = 5;
  const dCW = TW * 0.038, jW = TW * 0.25, cW = TW - 7 * dCW - jW;
  const jcw = jW / 4, ccw = cW / 4;
  
  // Cabeçalho
  rf(ML, y, 7 * dCW, JH, LB, BD); sf(5, 'bold', NAV); tx('DIA DA SEMANA', ML + 7 * dCW / 2, y + JH * 0.72, { align: 'center' });
  rf(ML + 7 * dCW, y, jW, JH, LB, BD); sf(5, 'bold', NAV); tx('JORNADA', ML + 7 * dCW + jW / 2, y + JH * 0.72, { align: 'center' });
  rf(ML + 7 * dCW + jW, y, cW, JH, LB, BD); sf(5, 'bold', NAV); tx('CONDIÇÕES CLIMÁTICAS', ML + 7 * dCW + jW + cW / 2, y + JH * 0.72, { align: 'center' });
  y += JH;
  
  // Valores - Dia da semana
  ['S', 'T', 'Q', 'Q', 'S', 'S', 'D'].forEach((dl, i) => {
    const on = i === diaSemanaIdx;
    rf(ML + i * dCW, y, dCW, JH, on ? NAV : W, BD);
    sf(6, on ? 'bold' : 'normal', on ? W : [0, 0, 0]);
    tx(dl, ML + (i + 0.5) * dCW, y + JH * 0.72, { align: 'center' });
  });
  
  // Jornada (vazio - fica genérico)
  ['Início', '', 'Térm.', ''].forEach((lbl, i) => {
    rf(ML + 7 * dCW + i * jcw, y, jcw, JH, W, BD);
    sf(5, 'bold', NAV); tx(lbl, ML + 7 * dCW + (i + 0.5) * jcw, y + 2, { align: 'center' });
  });
  
  // Clima — usa o clima_manha do RDO Diário como referência principal
  const climaPrincipal = (d.clima_manha || 'Bom').toLowerCase();
  let climaKey = 'bom';
  if (climaPrincipal.includes('chuv')) climaKey = 'chu';
  else if (climaPrincipal.includes('garoa') || climaPrincipal.includes('encober')) climaKey = 'reg';
  
  ['Bom', 'Regular', 'Chuva', ''].forEach((lbl, i) => {
    const cKey = ['bom', 'reg', 'chu', ''][i];
    const on = cKey && cKey === climaKey;
    rf(ML + 7 * dCW + jW + i * ccw, y, ccw, JH, on ? [235, 245, 255] : W, BD);
    sf(5, 'bold', on ? NAV : DG);
    tx(lbl, ML + 7 * dCW + jW + (i + 0.5) * ccw, y + 2, { align: 'center' });
    if (on) { sf(7, 'bold', NAV); tx('✓', ML + 7 * dCW + jW + (i + 0.5) * ccw, y + JH * 0.78, { align: 'center' }); }
  });
  y += JH;
  
  // Chuva extra (se aplicável)
  if (climaKey === 'chu') {
    rf(ML, y, TW, 4, [255, 248, 220], [200, 150, 0]);
    sf(5.5, 'bold', [140, 80, 0]); tx('Paralização/Chuva: ', ML + 2, y + 2.8);
    sf(5.5, 'normal', [0, 0, 0]);
    const chuTxt = `Manhã: ${d.clima_manha}  |  Tarde: ${d.clima_tarde}  |  Noite: ${d.clima_noite}`;
    tx(chuTxt, ML + 30, y + 2.8);
    y += 4;
  }
  
  // ══════════════════════════════════════════
  // 5. TABELA EFETIVO
  // ══════════════════════════════════════════
  rf(ML, y, TW, 5, NAV); sf(6.5, 'bold', W); tx('EFETIVO — CONSÓRCIO VIÁRIO TEOTÔNIO VILELA', ML + 2, y + 3.3); y += 5;
  
  // Colunas
  const CD = 45, CN = 8.5, CT = 10, CO = TW - CD - 4 * CN - CT;
  const EH = 3.1;
  
  // Cabeçalho 1
  rf(ML, y, CD, EH * 1.5, LB, BD); sf(5, 'bold', NAV); tx('DESCRIÇÃO', ML + 2, y + EH);
  rf(ML + CD, y, CN * 2, EH * 1.5, LB, BD); sf(5, 'bold', NAV); tx('DIRETO', ML + CD + CN, y + EH, { align: 'center' });
  rf(ML + CD + CN * 2, y, CN * 2, EH * 1.5, LB, BD); sf(5, 'bold', NAV); tx('INDIRETO', ML + CD + CN * 3, y + EH, { align: 'center' });
  rf(ML + CD + CN * 4, y, CT, EH * 1.5, LB, BD); sf(5, 'bold', NAV); tx('TOT.', ML + CD + CN * 4 + CT / 2, y + EH, { align: 'center' });
  rf(ML + CD + CN * 4 + CT, y, CO, EH * 1.5, LB, BD); sf(5, 'bold', NAV); tx('COMENTÁRIOS / ATIVIDADES', ML + CD + CN * 4 + CT + 2, y + EH);
  y += EH * 1.5;
  
  // Cabeçalho 2
  rf(ML, y, CD, EH, LB, BD);
  ['Cons.', 'Contr.', 'Cons.', 'Contr.'].forEach((l, i) => {
    rf(ML + CD + i * CN, y, CN, EH, LB, BD); sf(4.5, 'bold', NAV);
    tx(l, ML + CD + (i + 0.5) * CN, y + EH * 0.72, { align: 'center' });
  });
  rf(ML + CD + 4 * CN, y, CT, EH, LB, BD);
  rf(ML + CD + 4 * CN + CT, y, CO, EH, LB, BD);
  y += EH;
  
  // Mapeamento das nossas categorias para a tabela do RDO antigo
  // No antigo, "Direto" = Cons.+Contr. e "Indireto" = Cons.+Contr.
  // Vamos: Direto Cons. = Diurno; Direto Contr. = Noturno; Indireto = (zero por enquanto)
  // Para nossas 7 categorias, mostrar separadas e indicar Diurno como "Cons." e Noturno como "Contr."
  const categorias = [
    { key: 'servente', label: 'Servente' },
    { key: 'pedreiro', label: 'Pedreiro' },
    { key: 'armador', label: 'Armador' },
    { key: 'carpinteiro', label: 'Carpinteiro' },
    { key: 'opmaquina', label: 'Op. Máquina' },
    { key: 'sinaleiro', label: 'Sinaleiro' },
    { key: 'encarregado', label: 'Encarregado' },
  ];
  
  // Pegar serviços para preencher coluna de comentários
  const servicosTodos = [...servicosDiurnos, ...servicosNoturnos];
  let svcIdx = 0;
  
  let tcd = 0, tci = 0, ttd = 0, tti = 0;
  categorias.forEach((cat, i) => {
    const cd = parseInt(d[cat.key + '_diurno']) || 0;
    const ti = parseInt(d[cat.key + '_noturno']) || 0;
    const ci = 0; // indireto cons. (sem mapping direto)
    const td = 0; // indireto contr.
    const tot = cd + ci + td + ti;
    tcd += cd; tci += ci; ttd += td; tti += ti;
    
    const bg = i % 2 === 0 ? W : LG;
    rf(ML, y, CD, EH, bg, BD); sf(5, 'normal', [0, 0, 0]); tx(cat.label, ML + 1.5, y + EH * 0.72);
    [cd, ci, td, ti].forEach((v, j) => {
      rf(ML + CD + j * CN, y, CN, EH, bg, BD);
      if (v > 0) { sf(5.5, 'bold', NAV); tx(String(v), ML + CD + (j + 0.5) * CN, y + EH * 0.72, { align: 'center' }); }
    });
    rf(ML + CD + 4 * CN, y, CT, EH, tot > 0 ? [220, 235, 255] : bg, BD);
    if (tot > 0) { sf(6, 'bold', NAV); tx(String(tot), ML + CD + 4 * CN + CT / 2, y + EH * 0.72, { align: 'center' }); }
    rf(ML + CD + 4 * CN + CT, y, CO, EH, bg, BD);
    
    // Inserir nome do serviço executado (sem quantidade!)
    if (svcIdx < servicosTodos.length) {
      const s = servicosTodos[svcIdx];
      const pacote = STATE.pacotes.find(pp => pp['ID'] === s['Pacote_ID']);
      const frente = pacote ? (pacote['Frente'] || '') : '';
      const linhaServ = `${frente ? frente + ' · ' : ''}${s['Pacote_Nome'] || ''} (${s['Local_Estaca'] || '-'})`;
      sf(4.5, 'normal', [30, 30, 30]);
      const sl = doc.splitTextToSize(linhaServ, CO - 2);
      tx(sl[0], ML + CD + 4 * CN + CT + 1.2, y + EH * 0.72);
      svcIdx++;
    }
    y += EH;
  });
  
  // Total efetivo
  const gtV = tcd + tci + ttd + tti;
  const TEH = 4;
  rf(ML, y, CD, TEH, NAV); sf(5.5, 'bold', W); tx('TOTAL EFETIVO', ML + 2, y + TEH * 0.68);
  [tcd, tci, ttd, tti].forEach((v, j) => {
    rf(ML + CD + j * CN, y, CN, TEH, NAV); sf(6, 'bold', W);
    tx(String(v), ML + CD + (j + 0.5) * CN, y + TEH * 0.68, { align: 'center' });
  });
  rf(ML + CD + 4 * CN, y, CT, TEH, RED); sf(7, 'bold', W);
  tx(String(gtV), ML + CD + 4 * CN + CT / 2, y + TEH * 0.68, { align: 'center' });
  rf(ML + CD + 4 * CN + CT, y, CO, TEH, NAV);
  y += TEH + 1;
  
  // ══════════════════════════════════════════
  // 6. EQUIPAMENTOS
  // ══════════════════════════════════════════
  rf(ML, y, TW, 5, NAV); sf(6.5, 'bold', W); tx('EQUIPAMENTOS PESADOS E LEVES', ML + 2, y + 3.3); y += 5;
  
  rf(ML, y, CD, EH, LB, BD); sf(5, 'bold', NAV); tx('DESCRIÇÃO', ML + 2, y + EH * 0.72);
  ['Cons.', 'Contr.', '', ''].forEach((l, i) => {
    rf(ML + CD + i * CN, y, CN, EH, LB, BD); sf(4.5, 'bold', NAV);
    tx(l, ML + CD + (i + 0.5) * CN, y + EH * 0.72, { align: 'center' });
  });
  rf(ML + CD + 4 * CN, y, CT, EH, LB, BD); sf(5, 'bold', NAV);
  tx('TOT.', ML + CD + 4 * CN + CT / 2, y + EH * 0.72, { align: 'center' });
  rf(ML + CD + 4 * CN + CT, y, CO, EH, LB, BD); sf(5, 'bold', NAV);
  tx('OBSERVAÇÕES CVTV', ML + CD + 4 * CN + CT + 2, y + EH * 0.72);
  y += EH;
  
  const equipamentos = [
    { key: 'retroescav', label: 'Retroescavadeira' },
    { key: 'caminhao', label: 'Caminhão Basculante' },
    { key: 'rolo', label: 'Rolo Compactador' },
    { key: 'compactador_placa', label: 'Compactador Placa' },
    { key: 'vibroacabadora', label: 'Vibroacabadora' },
    { key: 'espargidor', label: 'Espargidor' },
    { key: 'pa_carregadeira', label: 'Pá Carregadeira' },
    { key: 'escavadeira', label: 'Escavadeira Hidráulica' },
  ];
  
  equipamentos.forEach((eq, i) => {
    const ec = parseInt(d[eq.key]) || 0;
    const et = 0; // contratada
    const tot = ec + et;
    const bg = i % 2 === 0 ? W : LG;
    rf(ML, y, CD, EH, bg, BD); sf(5, 'normal', [0, 0, 0]); tx(eq.label, ML + 1.5, y + EH * 0.72);
    [ec, et, 0, 0].forEach((v, j) => {
      rf(ML + CD + j * CN, y, CN, EH, bg, BD);
      if (v > 0) { sf(5.5, 'bold', NAV); tx(String(v), ML + CD + (j + 0.5) * CN, y + EH * 0.72, { align: 'center' }); }
    });
    rf(ML + CD + 4 * CN, y, CT, EH, tot > 0 ? [220, 235, 255] : bg, BD);
    if (tot > 0) { sf(6, 'bold', NAV); tx(String(tot), ML + CD + 4 * CN + CT / 2, y + EH * 0.72, { align: 'center' }); }
    rf(ML + CD + 4 * CN + CT, y, CO, EH, bg, BD);
    y += EH;
  });
  y += 1;
  
  // ══════════════════════════════════════════
  // 7. OBSERVAÇÕES (lado a lado)
  // ══════════════════════════════════════════
  rf(ML, y, TW, 4.5, NAV); sf(6.5, 'bold', W); tx('OBSERVAÇÕES GERAIS', ML + 2, y + 3); y += 4.5;
  
  const hw = (TW - 3) / 2;
  rf(ML, y, hw, 3.5, LB, BD); sf(4.5, 'bold', NAV); tx('OBSERVAÇÕES CVTV', ML + 2, y + 2.5);
  rf(ML + hw + 3, y, hw, 3.5, LB, BD); sf(4.5, 'bold', NAV); tx('CLIENTE / FISCALIZAÇÃO', ML + hw + 5, y + 2.5);
  y += 3.5;
  
  const obsCVTV = [d.observacoes_gerais, d.ocorrencias].filter(x => x && x.trim()).join(' · ') || '—';
  const obsCli = d.visitas || '—';
  const cvL = doc.splitTextToSize(obsCVTV, hw - 3);
  const clL = doc.splitTextToSize(obsCli, hw - 3);
  const obsH = Math.max(Math.min(cvL.length, 3), Math.min(clL.length, 3)) * 3.2 + 3;
  rf(ML, y, hw, obsH, YB, [190, 170, 0]); sf(5.5, 'normal', [0, 0, 0]); doc.text(cvL.slice(0, 3), ML + 2, y + 3);
  rf(ML + hw + 3, y, hw, obsH, [240, 255, 242], [0, 140, 70]); sf(5.5, 'normal', [0, 0, 0]); doc.text(clL.slice(0, 3), ML + hw + 5, y + 3);
  y += obsH + 1;
  
  // ══════════════════════════════════════════
  // 8. ASSINATURAS (14mm)
  // ══════════════════════════════════════════
  rf(ML, y, TW, 4, NAV); sf(6, 'bold', W); tx('ASSINATURAS', ML + 2, y + 2.8); y += 4;
  const sw = (TW - 4) / 2;
  rf(ML, y, sw, 14, W, BD);
  sf(5, 'bold', DG); tx('ENGENHEIRO CONSÓRCIO TEOTÔNIO VILELA', ML + 2, y + 4);
  ln(ML + 3, y + 10.5, ML + sw - 3, y + 10.5, [120, 120, 120], 0.3);
  sf(5, 'normal', DG); tx(df, ML + sw / 2, y + 13, { align: 'center' });
  rf(ML + sw + 4, y, sw, 14, W, BD);
  sf(5, 'bold', DG); tx('CLIENTE / FISCALIZAÇÃO (SP OBRAS)', ML + sw + 6, y + 4);
  ln(ML + sw + 7, y + 10.5, ML + 2 * sw + 1, y + 10.5, [120, 120, 120], 0.3);
  sf(5, 'normal', DG); tx(df, ML + sw + 4 + sw / 2, y + 13, { align: 'center' });
  y += 14;
  
  // ══════════════════════════════════════════
  // 9. RODAPÉ
  // ══════════════════════════════════════════
  const fy = PH - 8;
  ln(ML, fy - 1, ML + TW, fy - 1, NAV, 0.4);
  sf(5, 'normal', DG);
  tx('Consórcio Viário Teotônio Vilela  |  RDO Nº ' + nrRDO + '  |  Data: ' + df, PW / 2, fy + 2, { align: 'center' });
  tx('Av. Senador Teotônio Vilela, São Paulo – SP  |  Duplicação Viária', PW / 2, fy + 5.5, { align: 'center' });
  
  // Salvar
  const fname = 'RDO_' + data.replace(/-/g, '_') + '_N' + nrRDO + '.pdf';
  doc.save(fname);
  toast('PDF gerado: ' + fname, 'success');
}


// ====================================================================
// PDF INTERNO — Visual, pra mandar no grupo (sem logos formais)
// ====================================================================
function gerarPDFInterno(data) {
  const fromSheet = (STATE.rdodiario || []).find(r => {
    const rd = String(r['Data']);
    return rd === data || (parseISODate(rd) && parseISODate(rd).toISOString().split('T')[0] === data);
  });
  
  const d = fromSheet ? sheetRowToDiarioV3(fromSheet) : (DIARIO_V3 && DIARIO_V3.data === data ? DIARIO_V3 : null);
  if (!d) { toast('Não encontrei o RDO Diário', 'error'); return; }
  
  const servicosDiurnos = STATE.rdoavanco.filter(r => {
    const rd = parseISODate(r['Data']);
    if (!rd) return false;
    return rd.toISOString().split('T')[0] === data && (r['Turno']||'Diurno') === 'Diurno';
  });
  const servicosNoturnos = STATE.rdoavanco.filter(r => {
    const rd = parseISODate(r['Data']);
    if (!rd) return false;
    return rd.toISOString().split('T')[0] === data && r['Turno'] === 'Noturno';
  });
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const PW = 210, PH = 297, ML = 12, TW = 186;
  
  // Paleta visual do interno (terra/terracota - mais vibrante)
  const TERRACOTA = [201, 114, 64];
  const TERRA_DARK = [122, 65, 36];
  const NAVY = [26, 22, 18];
  const VERDE = [70, 142, 87];
  const AMARELO = [212, 168, 16];
  const AZUL = [50, 100, 150];
  const CINZA = [120, 117, 112];
  const CINZA_BG = [245, 243, 239];
  
  function sf(sz, st, col) {
    doc.setFontSize(sz);
    doc.setFont('helvetica', st || 'normal');
    doc.setTextColor(...(col || [0, 0, 0]));
  }
  function rect(x, y, w, h, fl, sk) {
    if (fl) { doc.setFillColor(...fl); doc.rect(x, y, w, h, sk ? 'FD' : 'F'); }
    if (sk && !fl) { doc.setDrawColor(...sk); doc.rect(x, y, w, h, 'S'); }
  }
  function tx(t, x, y, opt) { doc.text(String(t || ''), x, y, opt || {}); }
  
  const dataObj = new Date(data + 'T12:00:00');
  const diaSem = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][dataObj.getDay()];
  const dataFmt = dataObj.toLocaleDateString('pt-BR');
  
  let y = 0;
  
  // ═══════════════════════════════════════════════════
  // CABEÇALHO IMPACTANTE (estilo "produto")
  // ═══════════════════════════════════════════════════
  rect(0, 0, PW, 32, NAVY);
  rect(0, 32, PW, 4, TERRACOTA);
  
  sf(20, 'bold', [255, 255, 255]);
  tx('RELATÓRIO DIÁRIO', ML, 13);
  sf(10, 'normal', [255, 255, 255]);
  doc.setTextColor(255, 200, 150);
  tx('Av. Senador Teotônio Vilela · Consórcio Arvek + Gestor', ML, 19);
  
  sf(8, 'normal', [180, 175, 168]);
  tx(diaSem.toUpperCase() + ' · ' + dataFmt, ML, 27);
  
  // Badge dia/noite à direita
  const tipoTxt = d.tem_turno_noturno ? 'DIURNO + NOTURNO' : 'DIURNO';
  rect(PW - ML - 50, 8, 50, 18, TERRACOTA);
  sf(7, 'bold', [255, 255, 255]);
  tx('TURNO', PW - ML - 25, 13, { align: 'center' });
  sf(11, 'bold', [255, 255, 255]);
  tx(tipoTxt, PW - ML - 25, 21, { align: 'center' });
  
  y = 42;
  
  // ═══════════════════════════════════════════════════
  // RESUMO DO DIA (metrics tipo dashboard)
  // ═══════════════════════════════════════════════════
  const totalServicos = servicosDiurnos.length + servicosNoturnos.length;
  
  // Calcular efetivo total
  let totalEfetivo = 0;
  Object.values(d.efetivo || {}).forEach(v => totalEfetivo += parseInt(v) || 0);
  d.customIndireto.forEach(f => {
    totalEfetivo += (parseInt(f.diurno) || 0) + (parseInt(f.noturno) || 0);
  });
  d.customDireto.forEach(f => {
    totalEfetivo += (parseInt(f.diurno) || 0) + (parseInt(f.noturno) || 0);
  });
  
  // Calcular equipamentos total
  let totalEquip = 0;
  Object.values(d.equipamentos || {}).forEach(v => totalEquip += parseInt(v) || 0);
  d.customEquip.forEach(e => totalEquip += parseInt(e.qtd) || 0);
  
  // Estacas trabalhadas
  const estacasTrabalhadas = new Set();
  [...servicosDiurnos, ...servicosNoturnos].forEach(s => {
    const m = (s['Local_Estaca'] || '').match(/E?\d+(\.\d+)?/g);
    if (m) m.forEach(e => estacasTrabalhadas.add(e));
  });
  
  // Layout 4 KPIs lado a lado
  const kw = (TW - 12) / 4;
  const kpis = [
    { label: 'SERVIÇOS', valor: totalServicos, sub: 'executados', cor: TERRACOTA },
    { label: 'EFETIVO', valor: totalEfetivo, sub: 'pessoas', cor: AZUL },
    { label: 'EQUIPAMENTOS', valor: totalEquip, sub: 'no canteiro', cor: VERDE },
    { label: 'ESTACAS', valor: estacasTrabalhadas.size, sub: 'trabalhadas', cor: AMARELO },
  ];
  kpis.forEach((k, i) => {
    const x = ML + i * (kw + 4);
    rect(x, y, kw, 22, [255, 255, 255], CINZA);
    rect(x, y, kw, 2, k.cor); // barra colorida no topo
    sf(7, 'bold', CINZA);
    tx(k.label, x + 3, y + 7);
    sf(18, 'bold', NAVY);
    tx(String(k.valor), x + 3, y + 16);
    sf(7, 'normal', CINZA);
    tx(k.sub, x + 3, y + 20);
  });
  y += 28;
  
  // ═══════════════════════════════════════════════════
  // CLIMA visual
  // ═══════════════════════════════════════════════════
  rect(ML, y, TW, 14, CINZA_BG);
  sf(8, 'bold', NAVY);
  tx('CONDIÇÕES CLIMÁTICAS', ML + 4, y + 5);
  sf(9, 'normal', [40, 40, 40]);
  const climas = [
    { label: 'Manhã', val: d.clima_manha || '—' },
    { label: 'Tarde', val: d.clima_tarde || '—' },
    { label: 'Noite', val: d.clima_noite || '—' },
  ];
  climas.forEach((c, i) => {
    const x = ML + 6 + i * (TW / 3);
    sf(7, 'normal', CINZA);
    tx(c.label.toUpperCase(), x, y + 11);
    sf(10, 'bold', NAVY);
    tx(c.val, x + 16, y + 11);
  });
  y += 18;
  
  // ═══════════════════════════════════════════════════
  // SERVIÇOS POR TURNO
  // ═══════════════════════════════════════════════════
  function renderServicosTurno(turnoNome, servicos, corTurno) {
    if (servicos.length === 0) return;
    
    rect(ML, y, TW, 8, corTurno);
    sf(10, 'bold', [255, 255, 255]);
    tx(turnoNome.toUpperCase() + '  ·  ' + servicos.length + ' serviço' + (servicos.length>1?'s':''), ML + 4, y + 5.5);
    y += 8;
    
    // Header tabela
    sf(6.5, 'bold', CINZA);
    rect(ML, y, TW, 6, CINZA_BG);
    tx('FRENTE / PACOTE', ML + 3, y + 4);
    tx('LOCAL / ESTACA', ML + 75, y + 4);
    tx('QTD', ML + 130, y + 4, { align: 'right' });
    tx('UN', ML + 138, y + 4);
    tx('EQUIPE', ML + 152, y + 4);
    y += 6;
    
    servicos.forEach((s, i) => {
      const bg = i % 2 === 0 ? null : [252, 250, 246];
      if (bg) rect(ML, y, TW, 5, bg);
      
      const pacote = STATE.pacotes.find(pp => pp['ID'] === s['Pacote_ID']);
      const frente = pacote ? (pacote['Frente'] || '') : '';
      
      sf(7, 'bold', NAVY);
      tx((frente ? frente + ' · ' : '') + (s['Pacote_Nome'] || ''), ML + 3, y + 3.5);
      sf(7, 'normal', [50, 50, 50]);
      tx(s['Local_Estaca'] || '', ML + 75, y + 3.5);
      sf(7, 'bold', TERRA_DARK);
      tx(fmtNum(num(s['Quantidade'])), ML + 130, y + 3.5, { align: 'right' });
      sf(7, 'normal', CINZA);
      tx(s['Unidade'] || '', ML + 138, y + 3.5);
      tx(s['Equipe'] || s['Subcontratado'] || '', ML + 152, y + 3.5);
      y += 5;
    });
    y += 3;
  }
  
  if (servicosDiurnos.length > 0) renderServicosTurno('SERVIÇOS DIURNOS', servicosDiurnos, AMARELO);
  if (servicosNoturnos.length > 0) renderServicosTurno('SERVIÇOS NOTURNOS', servicosNoturnos, AZUL);
  
  if (totalServicos === 0) {
    rect(ML, y, TW, 14, [253, 246, 230]);
    sf(9, 'italic', [140, 90, 30]);
    tx('Nenhum serviço lançado pra esta data.', ML + 4, y + 9);
    y += 18;
  }
  
  // ═══════════════════════════════════════════════════
  // EFETIVO DETALHADO (categorias com pessoas)
  // ═══════════════════════════════════════════════════
  if (y < PH - 60) {
    rect(ML, y, TW, 8, NAVY);
    sf(10, 'bold', [255, 255, 255]);
    tx('EFETIVO  ·  ' + totalEfetivo + ' pessoa' + (totalEfetivo>1?'s':'') + ' no canteiro', ML + 4, y + 5.5);
    y += 8;
    
    // Direto + Indireto em duas colunas
    const colW = (TW - 4) / 2;
    let yIni = y;
    
    function renderEfetivoCol(titulo, categorias, customList, tipo, x) {
      let cy = yIni;
      sf(7, 'bold', tipo === 'DIRETO' ? AZUL : AMARELO);
      tx(titulo, x + 3, cy + 4);
      cy += 6;
      
      let total = 0;
      const linhas = [];
      categorias.forEach(c => {
        const diu = parseInt(d.efetivo[c.key + '_diurno']) || 0;
        const not = parseInt(d.efetivo[c.key + '_noturno']) || 0;
        if (diu + not > 0) {
          linhas.push({ label: c.label, diu, not });
          total += diu + not;
        }
      });
      customList.forEach(f => {
        const diu = parseInt(f.diurno) || 0;
        const not = parseInt(f.noturno) || 0;
        if (f.label && (diu + not) > 0) {
          linhas.push({ label: f.label + ' ✱', diu, not });
          total += diu + not;
        }
      });
      
      if (linhas.length === 0) {
        sf(7, 'italic', CINZA);
        tx('—', x + 3, cy + 3);
        cy += 5;
      } else {
        linhas.forEach((l, i) => {
          if (i % 2 === 0) rect(x, cy, colW, 4.2, [248, 246, 242]);
          sf(7, 'normal', [40, 40, 40]);
          tx(l.label, x + 3, cy + 3);
          sf(7, 'bold', NAVY);
          if (d.tem_turno_noturno) {
            tx(String(l.diu), x + colW - 24, cy + 3, { align: 'right' });
            tx(String(l.not), x + colW - 12, cy + 3, { align: 'right' });
            tx(String(l.diu + l.not), x + colW - 3, cy + 3, { align: 'right' });
          } else {
            tx(String(l.diu + l.not), x + colW - 3, cy + 3, { align: 'right' });
          }
          cy += 4.2;
        });
      }
      cy += 1;
      // Subtotal
      rect(x, cy, colW, 4, [240, 235, 226]);
      sf(7, 'bold', TERRA_DARK);
      tx('TOTAL ' + titulo, x + 3, cy + 3);
      tx(String(total), x + colW - 3, cy + 3, { align: 'right' });
      cy += 5;
      return cy;
    }
    
    const yFimDir = renderEfetivoCol('DIRETO', CATEGORIAS_DIRETO, d.customDireto, 'DIRETO', ML);
    const yFimInd = renderEfetivoCol('INDIRETO', CATEGORIAS_INDIRETO, d.customIndireto, 'INDIRETO', ML + colW + 4);
    y = Math.max(yFimDir, yFimInd) + 3;
  }
  
  // ═══════════════════════════════════════════════════
  // EQUIPAMENTOS (compacto)
  // ═══════════════════════════════════════════════════
  if (totalEquip > 0 && y < PH - 50) {
    rect(ML, y, TW, 8, NAVY);
    sf(10, 'bold', [255, 255, 255]);
    tx('EQUIPAMENTOS  ·  ' + totalEquip + ' no canteiro', ML + 4, y + 5.5);
    y += 8;
    
    // Grid 4 colunas
    const equipsAtivos = [];
    CATEGORIAS_EQUIP_PADRAO.forEach(eq => {
      const v = parseInt(d.equipamentos[eq.key]) || 0;
      if (v > 0) equipsAtivos.push({ label: eq.label, qtd: v });
    });
    d.customEquip.forEach(eq => {
      const v = parseInt(eq.qtd) || 0;
      if (eq.label && v > 0) equipsAtivos.push({ label: eq.label + ' ✱', qtd: v });
    });
    
    const colsEq = 3;
    const eqW = TW / colsEq;
    equipsAtivos.forEach((eq, i) => {
      const col = i % colsEq;
      const row = Math.floor(i / colsEq);
      const ex = ML + col * eqW;
      const ey = y + row * 5;
      if (row % 2 === 0) rect(ex, ey, eqW, 5, [248, 246, 242]);
      sf(7, 'normal', [40, 40, 40]);
      tx(eq.label, ex + 3, ey + 3.5);
      sf(8, 'bold', TERRACOTA);
      tx(String(eq.qtd), ex + eqW - 4, ey + 3.5, { align: 'right' });
    });
    y += Math.ceil(equipsAtivos.length / colsEq) * 5 + 4;
  }
  
  // ═══════════════════════════════════════════════════
  // OBSERVAÇÕES
  // ═══════════════════════════════════════════════════
  const temObs = d.visitas || d.ocorrencias || d.observacoes_gerais;
  if (temObs && y < PH - 35) {
    rect(ML, y, TW, 6, [240, 235, 226]);
    sf(8, 'bold', TERRA_DARK);
    tx('OBSERVAÇÕES', ML + 3, y + 4);
    y += 6;
    
    sf(8, 'normal', [40, 40, 40]);
    if (d.visitas) {
      sf(7, 'bold', NAVY); tx('Visitas:', ML + 3, y + 3);
      sf(7, 'normal', [40, 40, 40]);
      const ll = doc.splitTextToSize(d.visitas, TW - 24);
      doc.text(ll.slice(0, 2), ML + 18, y + 3);
      y += ll.length * 3.5 + 1;
    }
    if (d.ocorrencias) {
      sf(7, 'bold', NAVY); tx('Ocorr.:', ML + 3, y + 3);
      sf(7, 'normal', [40, 40, 40]);
      const ll = doc.splitTextToSize(d.ocorrencias, TW - 22);
      doc.text(ll.slice(0, 2), ML + 16, y + 3);
      y += ll.length * 3.5 + 1;
    }
    if (d.observacoes_gerais) {
      sf(7, 'bold', NAVY); tx('Geral:', ML + 3, y + 3);
      sf(7, 'normal', [40, 40, 40]);
      const ll = doc.splitTextToSize(d.observacoes_gerais, TW - 18);
      doc.text(ll.slice(0, 3), ML + 14, y + 3);
      y += ll.length * 3.5 + 1;
    }
  }
  
  // ═══════════════════════════════════════════════════
  // RODAPÉ
  // ═══════════════════════════════════════════════════
  rect(0, PH - 14, PW, 14, NAVY);
  sf(8, 'bold', [255, 255, 255]);
  tx('CONSÓRCIO ARVEK + GESTOR', ML, PH - 8);
  sf(7, 'normal', [180, 175, 168]);
  tx('Apontador Diurno: ' + (d.apontador_diurno || '—') + (d.apontador_noturno ? '  ·  Noturno: ' + d.apontador_noturno : ''), ML, PH - 4);
  
  sf(7, 'normal', [180, 175, 168]);
  tx('Gerado em ' + new Date().toLocaleString('pt-BR'), PW - ML, PH - 4, { align: 'right' });
  
  // Salvar
  const fname = 'RDO_INTERNO_' + data.replace(/-/g, '_') + '.pdf';
  doc.save(fname);
  toast('PDF Interno gerado: ' + fname, 'success');
}


function sheetRowToDiario(r) {
  const d = {
    data: parseISODate(r['Data']) ? parseISODate(r['Data']).toISOString().split('T')[0] : String(r['Data']),
    encarregado: r['Encarregado']||'',
    apontador: r['Apontador']||'',
    clima_manha: r['Clima_Manha']||'',
    clima_tarde: r['Clima_Tarde']||'',
    clima_noite: r['Clima_Noite']||'',
    tem_turno_noturno: r['Tem_Turno_Noturno'] === 'Sim',
    visitas: r['Visitas']||'',
    ocorrencias: r['Ocorrencias']||'',
    observacoes_gerais: r['Observacoes_Gerais']||'',
  };
  CATEGORIAS_MO.forEach(c => {
    const colDiu = Object.keys(r).find(k => k.toLowerCase().includes(c.key.toLowerCase()) && k.toLowerCase().includes('diurno'));
    const colNot = Object.keys(r).find(k => k.toLowerCase().includes(c.key.toLowerCase()) && k.toLowerCase().includes('noturno'));
    d[c.key + '_diurno'] = colDiu ? (r[colDiu]||'') : '';
    d[c.key + '_noturno'] = colNot ? (r[colNot]||'') : '';
  });
  CATEGORIAS_EQUIP.forEach(c => {
    const col = Object.keys(r).find(k => k.toLowerCase().replace(/_/g,'') === c.key.toLowerCase().replace(/_/g,''));
    d[c.key] = col ? (r[col]||'') : '';
  });
  return d;
}

window.setTurnoNoturno = setTurnoNoturnoV3;

// ====================================================================
// GRÁFICOS (Chart.js)
// ====================================================================
let chartCurvaS = null;

function montarGraficos() {
  // Curva S
  const cv = document.getElementById('curvaS');
  if (cv) {
    if (chartCurvaS) { try { chartCurvaS.destroy(); } catch(e){} chartCurvaS = null; }
    
    const av = calcularAvancoPorPacote();
    const totalEstim = Object.values(av).filter(a => a.pacote['Status'] !== 'Histórico')
      .reduce((s,a) => s + a.qtdEstimada, 0);
    
    // Acumular por dia
    const rdosPorDia = {};
    STATE.rdoavanco.forEach(r => {
      const d = parseISODate(r['Data']);
      if (!d) return;
      const dStr = d.toISOString().split('T')[0];
      const pid = r['Pacote_ID'];
      const pacote = STATE.pacotes.find(p => p['ID'] === pid);
      if (!pacote) return;
      const qtdEstimP = num(pacote['Qtd Estimada']);
      if (qtdEstimP <= 0) return;
      const contrib = num(r['Quantidade']) / qtdEstimP * qtdEstimP / totalEstim;
      // Equivalente a: cada % de avanço de um pacote contribui proporcionalmente ao seu peso
      const contribPct = totalEstim > 0 ? num(r['Quantidade']) / totalEstim : 0;
      rdosPorDia[dStr] = (rdosPorDia[dStr] || 0) + contribPct;
    });
    
    const dias = Object.keys(rdosPorDia).sort();
    let acc = 0;
    const pontos = dias.map(d => {
      acc += rdosPorDia[d];
      return { x: d, y: acc * 100 };
    });
    
    if (pontos.length > 0) {
      chartCurvaS = new Chart(cv, {
        type: 'line',
        data: {
          datasets: [{
            label: 'Avanço acumulado real (%)',
            data: pontos,
            borderColor: 'oklch(0.45 0.14 240)',
            backgroundColor: 'oklch(0.45 0.14 240 / 0.1)',
            tension: 0.2,
            fill: true,
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: 'oklch(0.45 0.14 240)',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              type: 'time',
              time: { unit: 'day', displayFormats: { day: 'dd/MM' } },
              grid: { display: false },
              ticks: { font: { size: 10 } }
            },
            y: {
              beginAtZero: true,
              ticks: { font: { size: 10 }, callback: v => v.toFixed(1) + '%' },
              grid: { color: '#eee' }
            }
          }
        }
      });
    }
  }
}
