<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Teotônio Vilela — Controle Integrado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f5;
  --surface:#ffffff;
  --surface-2:#fafaf8;
  --border:#e8e6e2;
  --border-strong:#d4d1cb;
  --text:#1a1815;
  --text-2:#3a3530;
  --muted:#7a7670;
  --muted-2:#a09b94;
  
  --pri:oklch(0.45 0.14 240);     /* azul profundo - primário */
  --pri-l:oklch(0.96 0.02 240);
  --pri-d:oklch(0.38 0.14 240);
  
  --acc:oklch(0.62 0.18 38);       /* terracota - acento */
  --acc-l:oklch(0.96 0.04 38);
  --acc-d:oklch(0.48 0.18 38);
  
  --grn:oklch(0.62 0.16 150);
  --grn-l:oklch(0.95 0.04 150);
  --blu:oklch(0.58 0.18 250);
  --blu-l:oklch(0.95 0.04 250);
  --ylw:oklch(0.75 0.16 85);
  --ylw-l:oklch(0.97 0.04 85);
  --ylw-d:oklch(0.55 0.16 85);
  --red:oklch(0.58 0.2 20);
  --red-l:oklch(0.96 0.04 20);
  
  --r:10px;
  --r-sm:6px;
  --r-lg:14px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 8px rgba(0,0,0,.04);
  --sh-md:0 4px 12px rgba(0,0,0,.08);
  --sh-lg:0 12px 32px rgba(0,0,0,.12);
}

html,body{
  height:100%;
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  font-feature-settings:'ss01','ss02','cv11';
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',monospace}

#root{height:100%;display:flex;flex-direction:column}

/* ===================== LAYOUT ===================== */
.app{display:flex;height:100vh;min-height:0;overflow:hidden}

.sidebar{
  width:236px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:18px 0;
  z-index:10;
  transition:transform .3s cubic-bezier(.2,0,0,1);
}
.sidebar-logo{padding:0 22px 22px}
.badge-obra{
  display:inline-block;
  background:linear-gradient(135deg,var(--acc) 0%,var(--acc-d) 100%);
  color:#fff;font-size:9px;font-weight:700;letter-spacing:.1em;
  padding:3px 8px;border-radius:4px;margin-bottom:8px;
}
.sidebar-logo h1{font-size:14px;font-weight:700;letter-spacing:-.01em;line-height:1.25}
.sidebar-logo p{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}

.nav-group{padding:14px 0 6px}
.nav-label{
  font-size:10px;font-weight:600;letter-spacing:.1em;
  color:var(--muted-2);padding:0 22px 6px;text-transform:uppercase;
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:9px 13px;margin:1px 10px;
  border-radius:7px;cursor:pointer;
  color:var(--muted);font-size:13px;font-weight:500;
  transition:all .12s;white-space:nowrap;user-select:none;
  position:relative;
}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--pri-l);color:var(--pri);font-weight:600}
.nav-item.active::before{
  content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);
  width:3px;height:18px;background:var(--pri);border-radius:0 2px 2px 0;
}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-counter{
  background:var(--border);color:var(--text-2);
  font-size:10px;font-weight:600;
  padding:1px 7px;border-radius:10px;margin-left:auto;
}
.nav-item.active .nav-counter{background:var(--pri);color:#fff}
.nav-divider{border:none;border-top:1px solid var(--border);margin:14px 22px}

.sync-block{padding:0 22px;margin-top:auto}
.sync-row{display:flex;align-items:center;gap:8px;padding:10px 0}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:.3s}
.sync-dot.ok{background:var(--grn);box-shadow:0 0 0 3px oklch(0.62 0.16 150 / .15)}
.sync-dot.loading{background:var(--ylw);animation:pulse 1.2s infinite}
.sync-dot.error{background:var(--red)}
.sync-dot.offline{background:var(--muted-2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.sync-text{font-size:11px;color:var(--muted);line-height:1.35}
.sync-text strong{color:var(--text);font-weight:600}
.btn-refresh{
  width:100%;padding:8px 10px;
  background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:7px;font-size:11px;font-weight:600;letter-spacing:.04em;
  cursor:pointer;transition:.15s;font-family:inherit;
}
.btn-refresh:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-l)}

.mobile-menu-btn{display:none}
.sidebar-overlay{display:none}

/* ===================== MAIN ===================== */
.main{flex:1;overflow-y:auto;min-width:0;display:flex;flex-direction:column;background:var(--bg)}

.topbar{
  padding:16px 28px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:14px;position:sticky;top:0;z-index:5;
}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:-.01em;line-height:1.2}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:2px}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:7px;
  font-size:13px;font-weight:500;cursor:pointer;
  border:none;transition:all .15s;font-family:inherit;
  white-space:nowrap;
}
.btn-primary{background:var(--pri);color:#fff}
.btn-primary:hover{background:var(--pri-d);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg);border-color:var(--border-strong)}
.btn-ghost{background:transparent;color:var(--muted);border:none;padding:8px 10px}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-acc{background:var(--acc);color:#fff}
.btn-acc:hover{background:var(--acc-d);transform:translateY(-1px)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-lg{padding:11px 20px;font-size:14px}

.page{flex:1;padding:24px 28px;display:flex;flex-direction:column;gap:18px;max-width:1600px;width:100%;margin:0 auto}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.card-header{
  padding:16px 22px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.card-title{font-size:13px;font-weight:600;letter-spacing:.01em;text-transform:uppercase}
.card-title-sub{font-size:11px;color:var(--muted);font-weight:400;margin-top:2px;text-transform:none;letter-spacing:0}
.card-body{padding:18px 22px}
.card-body.compact{padding:12px 18px}
.card-body.flush{padding:0}

/* ===================== KPI ===================== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 18px;display:flex;flex-direction:column;gap:6px;
  transition:.15s;
}
.kpi-card:hover{border-color:var(--border-strong);box-shadow:var(--sh)}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--muted);text-transform:uppercase}
.kpi-value{font-size:28px;font-weight:700;letter-spacing:-.025em;line-height:1.05;font-feature-settings:'tnum'}
.kpi-sub{font-size:11px;color:var(--muted)}
.kpi-trend{font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.kpi-trend.up{color:var(--grn)}
.kpi-trend.warn{color:var(--ylw-d)}
.kpi-trend.down{color:var(--red)}
.kpi-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.kpi-bar{height:100%;border-radius:2px;transition:width .6s ease}

/* Special hero KPI */
.kpi-hero{
  grid-column:span 2;
  background:linear-gradient(135deg,oklch(0.18 0.04 240) 0%,oklch(0.28 0.06 240) 100%);
  color:#fff;border:none;
}
.kpi-hero .kpi-label{color:rgba(255,255,255,.7)}
.kpi-hero .kpi-value{font-size:38px}
.kpi-hero .kpi-sub{color:rgba(255,255,255,.65)}
@media(max-width:600px){.kpi-hero{grid-column:span 1}}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:900px){
  .grid-2{grid-template-columns:1fr}
  .grid-3{grid-template-columns:1fr}
}

/* ===================== TABLE ===================== */
table.t{width:100%;border-collapse:collapse;font-size:13px}
table.t th{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  color:var(--muted);padding:10px 14px;text-align:left;
  border-bottom:1px solid var(--border);background:var(--surface-2);
  position:sticky;top:0;
}
table.t td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px}
table.t tr:last-child td{border-bottom:none}
table.t tr:hover td{background:var(--bg)}
table.t tr.summary td{background:var(--pri-l);font-weight:600;color:var(--pri);font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:8px 14px}
.t-num{font-variant-numeric:tabular-nums;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px}
.t-mono{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}

/* ===================== PILLS / TAGS ===================== */
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.01em}
.pill-grn{background:var(--grn-l);color:var(--grn)}
.pill-ylw{background:var(--ylw-l);color:var(--ylw-d)}
.pill-red{background:var(--red-l);color:var(--red)}
.pill-blu{background:var(--blu-l);color:var(--blu)}
.pill-acc{background:var(--acc-l);color:var(--acc-d)}
.pill-pri{background:var(--pri-l);color:var(--pri)}

/* Frente tags */
.f-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.02em;text-transform:uppercase}
.f-Drenagem{background:#dceefb;color:#1a5276}
.f-Demoli, .f-demolicao{background:#fadbd8;color:#922b21}
.f-Via{background:#fdebd0;color:#935116}
.f-Pav{background:#d6dbdf;color:#2c3e50}
.f-Vala{background:#fcf3cf;color:#7d6608}
.f-Sinaliza{background:#d5f5e3;color:#196f3d}

.prog-bar-wrap{width:100%;min-width:60px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.prog-bar{height:100%;border-radius:3px;transition:width .6s ease}
.prog-bar.zero{background:var(--muted-2)}
.prog-bar.parcial{background:var(--ylw)}
.prog-bar.completo{background:var(--grn)}
.prog-bar.atrasado{background:var(--red)}

/* ===================== HEATMAP ===================== */
.heatmap-wrap{overflow-x:auto;padding-bottom:8px}
.heatmap{display:grid;gap:2px;font-size:9px;font-family:'JetBrains Mono',monospace}
.hm-cell{
  min-height:22px;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;cursor:default;transition:.15s;
}
.hm-cell:hover{transform:scale(1.15);z-index:2;box-shadow:var(--sh-md)}
.hm-row-label{
  font-size:10px;font-weight:600;color:var(--muted);
  padding:0 8px 0 4px;display:flex;align-items:center;justify-content:flex-end;
  white-space:nowrap;
}
.hm-col-label{
  font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;
  text-align:center;padding:2px 0;
  writing-mode:vertical-rl;transform:rotate(180deg);
}

/* ===================== FORM ===================== */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.form-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--muted);text-transform:uppercase}
.field input,.field select,.field textarea{
  padding:9px 12px;border:1px solid var(--border);border-radius:7px;
  font-size:14px;background:var(--surface);font-family:inherit;color:var(--text);
  transition:.15s;width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-l);
}
.field input.invalid,.field select.invalid{border-color:var(--red)}
.field-error{font-size:11px;color:var(--red);font-weight:500}
.field-hint{font-size:11px;color:var(--muted);margin-top:-2px}

.btn-toggle-group{display:flex;gap:0;border:1px solid var(--border);border-radius:7px;overflow:hidden;width:fit-content}
.btn-toggle{
  padding:7px 14px;background:transparent;border:none;font-size:13px;
  font-family:inherit;color:var(--muted);cursor:pointer;font-weight:500;
  border-right:1px solid var(--border);transition:.15s;
}
.btn-toggle:last-child{border-right:none}
.btn-toggle.active{background:var(--pri);color:#fff;font-weight:600}
.btn-toggle:hover:not(.active){background:var(--bg);color:var(--text)}

.servico-row{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;margin-bottom:10px;
  position:relative;
}
.servico-row .row-num{
  position:absolute;top:-8px;left:14px;
  background:var(--pri);color:#fff;font-size:10px;font-weight:700;letter-spacing:.05em;
  padding:2px 8px;border-radius:10px;
}
.servico-row .btn-remove{
  position:absolute;top:10px;right:10px;
  background:transparent;border:none;color:var(--muted);cursor:pointer;
  font-size:18px;padding:2px 8px;border-radius:4px;
}
.servico-row .btn-remove:hover{background:var(--red-l);color:var(--red)}
.btn-add-servico{
  width:100%;padding:11px;
  background:transparent;border:1.5px dashed var(--border-strong);
  border-radius:var(--r);font-size:13px;font-weight:500;color:var(--muted);
  cursor:pointer;font-family:inherit;transition:.15s;
}
.btn-add-servico:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-l)}

/* ===================== TOAST ===================== */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  background:var(--surface);border:1px solid var(--border);
  padding:12px 18px;border-radius:var(--r);box-shadow:var(--sh-lg);
  font-size:13px;display:flex;align-items:center;gap:10px;
  pointer-events:auto;animation:slideIn .25s cubic-bezier(.2,0,0,1);
  max-width:420px;
}
.toast.success{border-left:4px solid var(--grn)}
.toast.error{border-left:4px solid var(--red)}
.toast.info{border-left:4px solid var(--blu)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===================== EMPTY / LOADING ===================== */
.empty{padding:60px 20px;text-align:center;color:var(--muted)}
.empty-icon{font-size:42px;margin-bottom:12px;opacity:.5}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.empty-sub{font-size:12px;color:var(--muted);max-width:380px;margin:0 auto}

.loading{padding:80px 20px;text-align:center}
.spinner{
  display:inline-block;width:32px;height:32px;
  border:3px solid var(--border);border-top-color:var(--pri);
  border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===================== MOBILE ===================== */
@media(max-width:768px){
  .mobile-menu-btn{
    display:flex;align-items:center;justify-content:center;
    background:transparent;border:none;color:var(--text);
    font-size:22px;cursor:pointer;padding:6px 10px;
    margin-right:-4px;
  }
  .sidebar{
    position:fixed;left:0;top:0;height:100%;
    transform:translateX(-100%);box-shadow:var(--sh-lg);
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{
    display:block;position:fixed;inset:0;
    background:rgba(0,0,0,.4);z-index:9;
    opacity:0;pointer-events:none;transition:.25s;
  }
  .sidebar-overlay.open{opacity:1;pointer-events:auto}
  .page{padding:14px}
  .topbar{padding:12px 16px}
  .topbar-title{font-size:15px}
  .card-body{padding:14px 16px}
  .kpi-card{padding:14px}
  .kpi-value{font-size:22px}
  .kpi-hero .kpi-value{font-size:30px}
}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ====================================================================
// CONFIGURAÇÃO
// ====================================================================
const CONFIG = {
  // CSVs publicados (leitura)
  csv: {
    cronograma:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKuciB3Z6aSfdpRc07-MRXnemqpuMRCfbh80HVfLaO0GLihxTZhMKQz7Vlqc1TOaIhRkTX7k_RLmzl/pub?gid=565093066&single=true&output=csv',
    pacotes:       'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKuciB3Z6aSfdpRc07-MRXnemqpuMRCfbh80HVfLaO0GLihxTZhMKQz7Vlqc1TOaIhRkTX7k_RLmzl/pub?gid=386002450&single=true&output=csv',
    coeficientes:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKuciB3Z6aSfdpRc07-MRXnemqpuMRCfbh80HVfLaO0GLihxTZhMKQz7Vlqc1TOaIhRkTX7k_RLmzl/pub?gid=1962881430&single=true&output=csv',
    rdoavanco:     'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKuciB3Z6aSfdpRc07-MRXnemqpuMRCfbh80HVfLaO0GLihxTZhMKQz7Vlqc1TOaIhRkTX7k_RLmzl/pub?gid=1906961773&single=true&output=csv',
    rdodiario:     'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKuciB3Z6aSfdpRc07-MRXnemqpuMRCfbh80HVfLaO0GLihxTZhMKQz7Vlqc1TOaIhRkTX7k_RLmzl/pub?gid=1032075331&single=true&output=csv',
  },
  // Apps Script (escrita) - JSONP
  appsScript: 'https://script.google.com/macros/s/AKfycbwy7vPSA4KFUxxHpZqEsSlwdkTT9L44LbLV9TdhjNks4JNGHZpgF2PTPBXxezYNuS68/exec',
  
  // Estacas reais (corrigidas pelo Leonardo)
  estacasCB: { ini: 99, fim: 141, label: 'Centro→Bairro' },
  estacasBC: { ini: 201, fim: 244, label: 'Bairro→Centro' },
  
  // Refresh automático (5 min)
  refreshMs: 5 * 60 * 1000,
  
  // localStorage keys
  ls: {
    rdoDraft: 'teotonio_rdo_draft_v1',
    apontador: 'teotonio_apontador_v1',
  }
};

// ====================================================================
// UTILITIES
// ====================================================================
function parseCSV(text) {
  const lines = [];
  let current = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { current.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i+1] === '\n') i++;
        current.push(field); field = '';
        if (current.some(x => x.length > 0)) lines.push(current);
        current = [];
      } else field += c;
    }
  }
  if (field.length > 0 || current.length > 0) {
    current.push(field);
    if (current.some(x => x.length > 0)) lines.push(current);
  }
  if (lines.length === 0) return [];
  const headers = lines[0].map(h => h.trim());
  return lines.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = (row[i] || '').trim());
    return obj;
  });
}

async function fetchCSV(url) {
  const res = await fetch(url + '&t=' + Date.now());
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return parseCSV(await res.text());
}

// JSONP request para Apps Script (evita CORS)
function jsonp(url, params) {
  return new Promise((resolve, reject) => {
    const cb = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout (15s)'));
    }, 15000);
    
    function cleanup() {
      delete window[cb];
      const s = document.getElementById(cb);
      if (s) s.remove();
      clearTimeout(timeout);
    }
    
    window[cb] = (data) => {
      cleanup();
      resolve(data);
    };
    
    const qs = Object.entries({...params, callback: cb})
      .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
      .join('&');
    
    const script = document.createElement('script');
    script.id = cb;
    script.src = url + '?' + qs;
    script.onerror = () => {
      cleanup();
      reject(new Error('Falha de rede ou Apps Script offline'));
    };
    document.body.appendChild(script);
  });
}

function num(s) {
  if (s === null || s === undefined || s === '') return 0;
  const cleaned = String(s).replace(/\./g, '').replace(',', '.');
  const v = parseFloat(cleaned);
  return isNaN(v) ? parseFloat(s) || 0 : v;
}

function fmtData(iso) {
  if (!iso) return '';
  let d;
  if (iso instanceof Date) d = iso;
  else if (String(iso).includes('/')) {
    const p = String(iso).split('/');
    d = new Date(`${p[2].slice(0,4)}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`);
  } else d = new Date(iso);
  if (isNaN(d)) return String(iso);
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getFullYear()).slice(2);
}

function parseISODate(s) {
  if (!s) return null;
  if (String(s).includes('/')) {
    const p = String(s).split('/');
    return new Date(`${p[2].slice(0,4)}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`);
  }
  return new Date(s);
}

function fmtNum(n, decimals = 2) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  return n.toLocaleString('pt-BR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtPct(n) {
  return (n * 100).toFixed(1).replace('.', ',') + '%';
}

function frenteSlug(f) {
  const s = (f || '').toString().trim();
  if (s.startsWith('Drenagem')) return 'Drenagem';
  if (s.startsWith('Demoli')) return 'Demoli';
  if (s.startsWith('Pav')) return 'Pav';
  if (s.startsWith('Vala')) return 'Vala';
  if (s.startsWith('Sinaliza')) return 'Sinaliza';
  if (s.startsWith('Via')) return 'Via';
  return 'default';
}

// ====================================================================
function calcularAvancoPorPacote() {
  const m = {};
  STATE.pacotes.forEach(p => {
    const id = p['ID'];
    if (!id) return;
    m[id] = {
      pacote: p,
      qtdEstimada: num(p['Qtd Estimada']),
      qtdExecutada: 0,
      lancamentos: 0,
      ultimaData: null,
      porEstaca: {},  // { 'E105': qtd, 'E106': qtd, ... }
    };
  });
  STATE.rdoavanco.forEach(r => {
    const pid = r['Pacote_ID'] || r['Pacote_id'];
    if (!pid || !m[pid]) return;
    const q = num(r['Quantidade']);
    m[pid].qtdExecutada += q;
    m[pid].lancamentos++;
    const d = parseISODate(r['Data']);
    if (d && (!m[pid].ultimaData || d > m[pid].ultimaData)) m[pid].ultimaData = d;
    
    // Mapeamento estaca → quantidade
    const est = (r['Local_Estaca'] || '').toUpperCase().match(/E?\d{2,3}/g);
    if (est) {
      const qPorEstaca = q / est.length;
      est.forEach(e => {
        const ek = e.replace(/^E/, 'E') === 'E' ? 'E' + e.replace(/^E/, '').padStart(3, '0') : (e.startsWith('E') ? e : 'E' + e);
        m[pid].porEstaca[ek] = (m[pid].porEstaca[ek] || 0) + qPorEstaca;
      });
    }
  });
  Object.values(m).forEach(a => {
    a.pct = a.qtdEstimada > 0 ? Math.min(a.qtdExecutada / a.qtdEstimada, 1.0) : 0;
    a.pctRaw = a.qtdEstimada > 0 ? a.qtdExecutada / a.qtdEstimada : 0;
  });
  return m;
}

function calcularConsumoItens(avanco) {
  const out = {};
  Object.values(avanco).forEach(a => {
    if (a.qtdExecutada <= 0) return;
    const pid = a.pacote['ID'];
    const coefs = STATE.coeficientes.filter(c => (c['Pacote ID'] || c['Pacote_ID']) === pid);
    coefs.forEach(c => {
      const item = c['Item Contratual'];
      if (!item) return;
      const desc = c['Descrição Item'] || '';
      const coef = num(c['Coef']);
      const consumo = a.qtdExecutada * coef;
      if (!out[item]) {
        out[item] = {
          item, descricao: desc,
          unidadeItem: c['Unid Item'] || '',
          consumido: 0, pacotes: []
        };
      }
      out[item].consumido += consumo;
      out[item].pacotes.push(`${a.pacote['Pacote']} × ${coef}`);
    });
  });
  return out;
}

function listarEstacas() {
  const out = [];
  for (let i = CONFIG.estacasCB.ini; i <= CONFIG.estacasCB.fim; i++) {
    out.push({ id: 'E' + i, num: i, sentido: 'CB' });
  }
  for (let i = CONFIG.estacasBC.ini; i <= CONFIG.estacasBC.fim; i++) {
    out.push({ id: 'E' + i, num: i, sentido: 'BC' });
  }
  return out;
}

  // % físico ponderado pela qtd estimada (peso real, não média simples)
  const totalEstim = pacotes.reduce((s,a) => s + a.qtdEstimada, 0);
  const pctPond = totalEstim > 0 ?
    pacotes.reduce((s,a) => s + a.pct * a.qtdEstimada, 0) / totalEstim : 0;

function renderHeatmap(av) {
  const estacas = listarEstacas();
  // pegar pacotes que têm pelo menos 1 lançamento ou todos os ativos
  const pacotesAtivos = Object.values(av).filter(a => a.pacote && a.pacote['Status'] !== 'Histórico')
    .filter(a => a.qtdExecutada > 0 || true) // mostra todos pra dar mapa contextual
    .slice(0, 15); // limitar pra não poluir
  
  if (pacotesAtivos.length === 0) {
    return '<div class="empty"><div class="empty-icon">▦</div><div class="empty-title">Mapa vazio</div><div class="empty-sub">Lance RDOs com estaca preenchida pra ver o mapa se construir</div></div>';
  }
  
  // Estaca máxima por pacote pra normalizar cor
  const maxPorPac = {};
  pacotesAtivos.forEach(a => {
    maxPorPac[a.pacote['ID']] = Math.max(0, ...Object.values(a.porEstaca));
  });
  
  // Quebrar em 2 grupos: CB (99-141) e BC (201-244)
  const cb = estacas.filter(e => e.sentido === 'CB');
  const bc = estacas.filter(e => e.sentido === 'BC');
  
  function blocoHeatmap(lista, label) {
    if (lista.length === 0) return '';
    const colTemplate = `200px repeat(${lista.length}, minmax(28px, 1fr))`;
    return `
      <div style="margin-bottom:18px">
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">${label}</div>
        <div class="heatmap" style="grid-template-columns:${colTemplate}">
          <div class="hm-row-label" style="visibility:hidden">.</div>
          ${lista.map(e => `<div class="hm-col-label">${e.id}</div>`).join('')}
          ${pacotesAtivos.map(a => {
            const max = maxPorPac[a.pacote['ID']] || 1;
            return `
              <div class="hm-row-label">${a.pacote['Pacote']}</div>
              ${lista.map(e => {
                const v = a.porEstaca[e.id] || 0;
                const intensity = max > 0 ? Math.min(v / max, 1) : 0;
                const bg = v > 0 ?
                  `background:oklch(${0.95 - intensity * 0.45} 0.18 38)` :
                  `background:var(--bg)`;
                const color = intensity > 0.5 ? '#fff' : 'var(--muted)';
                const title = `${e.id} · ${a.pacote['Pacote']}: ${fmtNum(v, 1)} ${a.pacote['Unidade Física']||''}`;
                return `<div class="hm-cell" style="${bg};color:${color}" title="${title}">${v > 0 ? fmtNum(v, 0) : ''}</div>`;
              }).join('')}
            `;
          }).join('')}
        </div>
      </div>
    `;
  }
  
  return `
    <div class="heatmap-wrap">
      ${blocoHeatmap(cb, `Sentido Centro→Bairro · E${CONFIG.estacasCB.ini}–E${CONFIG.estacasCB.fim}`)}
      ${blocoHeatmap(bc, `Sentido Bairro→Centro · E${CONFIG.estacasBC.ini}–E${CONFIG.estacasBC.fim}`)}
    </div>
  `;
}

function renderCronoMes(tarefas) {
  const [y, m] = CRONO_MES.split('-').map(Number);
  const ini = new Date(y, m-1, 1);
  const fim = new Date(y, m, 0, 23, 59);
  const dias = fim.getDate();
  const ativas = tarefas.filter(t => t.ini <= fim && t.fim >= ini && !t.resumo)
    .sort((a, b) => {
      const ea = a.edt.split('.').map(Number), eb = b.edt.split('.').map(Number);
      for (let i = 0; i < Math.max(ea.length, eb.length); i++) {
        const da = ea[i]||0, db = eb[i]||0;
        if (da !== db) return da - db;
      }
      return 0;
    });
  
  const mesesDisp = ['2026-04','2026-05','2026-06','2026-07','2026-08','2026-09'];
  const mesNomes = {'2026-04':'Abril/26','2026-05':'Maio/26','2026-06':'Junho/26','2026-07':'Julho/26','2026-08':'Agosto/26','2026-09':'Setembro/26'};
  
  return `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Tarefas ativas no mês</div>
          <div class="card-title-sub">${ativas.length} serviços previstos</div>
        </div>
        <div class="btn-toggle-group">
          ${mesesDisp.map(mz => `<button class="btn-toggle ${CRONO_MES===mz?'active':''}" onclick="setCronoMes('${mz}')">${mesNomes[mz]}</button>`).join('')}
        </div>
      </div>
      <div class="card-body flush" style="overflow-x:auto">
        <table class="t" style="min-width:900px">
          <thead><tr>
            <th>EDT</th><th>Serviço</th><th>Início</th><th>Término</th>
            <th style="width:130px">% Plan.</th><th style="min-width:280px">Linha do tempo do mês</th>
          </tr></thead>
          <tbody>
            ${ativas.map(t => {
              const tIni = t.ini < ini ? ini : t.ini;
              const tFim = t.fim > fim ? fim : t.fim;
              const left = ((tIni.getDate()-1)/dias)*100;
              const width = ((tFim.getDate()-tIni.getDate()+1)/dias)*100;
              return `
                <tr>
                  <td class="t-mono">${t.edt}</td>
                  <td style="padding-left:${14 + Math.min(t.nivel,4)*12}px">${t.nome}</td>
                  <td style="font-size:12px">${fmtData(t.ini)}</td>
                  <td style="font-size:12px">${fmtData(t.fim)}</td>
                  <td>
                    <div style="display:flex;align-items:center;gap:6px">
                      <div class="prog-bar-wrap" style="width:60px"><div class="prog-bar ${t.pct >= 0.999 ? 'completo' : t.pct > 0 ? 'parcial' : 'zero'}" style="width:${t.pct*100}%"></div></div>
                      <span class="t-num" style="font-size:11px;min-width:36px">${fmtPct(t.pct)}</span>
                    </div>
                  </td>
                  <td>
                    <div style="position:relative;height:22px;background:var(--bg);border-radius:4px;overflow:hidden">
                      <div style="position:absolute;left:${left}%;width:${width}%;top:3px;height:16px;background:var(--pri);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:600">${width > 12 ? tIni.getDate()+'-'+tFim.getDate() : ''}</div>
                    </div>
                  </td>
                </tr>
              `;
            }).join('')}
            ${ativas.length === 0 ? '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">Nenhuma tarefa nesse mês.</td></tr>' : ''}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderCronoFases(tarefas) {
  // Agrupar por nível 1 (FASE 0, FASE 1, ...) baseado no EDT
  const fases = {};
  tarefas.forEach(t => {
    const edtParts = t.edt.split('.');
    const root = edtParts[0];  // pega o "1.X.Y" → "1"
    if (!fases[root]) {
      fases[root] = { tarefas: [], nome: '', resumoTopo: null };
    }
    if (t.nivel === 2 && edtParts.length === 1) {
      // É a tarefa de nível superior (resumo da fase)
      fases[root].nome = t.nome;
      fases[root].resumoTopo = t;
    } else {
      fases[root].tarefas.push(t);
    }
  });
  
  // Procurar nomes pelos resumos
  tarefas.forEach(t => {
    if (t.resumo && t.nivel <= 2) {
      const root = t.edt.split('.')[0];
      if (fases[root] && !fases[root].nome) fases[root].nome = t.nome;
    }
  });
  
  return `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Cronograma por fase</div>
          <div class="card-title-sub">Estrutura hierárquica do Project · % planejado</div>
        </div>
      </div>
      <div class="card-body">
        ${Object.entries(fases)
          .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
          .map(([rid, f]) => {
            const sub = f.tarefas.filter(t => !t.resumo).slice(0, 80);
            const pctMedio = sub.length > 0 ? sub.reduce((s,t)=>s+t.pct, 0)/sub.length : 0;
            const inis = sub.map(t=>t.ini).filter(Boolean);
            const fims = sub.map(t=>t.fim).filter(Boolean);
            const dataIni = inis.length ? new Date(Math.min(...inis)) : null;
            const dataFim = fims.length ? new Date(Math.max(...fims)) : null;
            return `
              <div style="margin-bottom:18px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
                <div style="padding:14px 18px;background:var(--surface-2);display:flex;justify-content:space-between;align-items:center;cursor:pointer;flex-wrap:wrap;gap:10px" onclick="document.getElementById('fase-${rid}').classList.toggle('hidden')">
                  <div>
                    <div style="font-size:14px;font-weight:600">FASE ${rid}: ${f.nome || '(sem título)'}</div>
                    <div style="font-size:11px;color:var(--muted);margin-top:2px">
                      ${dataIni ? fmtData(dataIni) : '—'} → ${dataFim ? fmtData(dataFim) : '—'}
                      · ${sub.length} sub-tarefa${sub.length>1?'s':''}
                    </div>
                  </div>
                  <div style="display:flex;align-items:center;gap:10px">
                    <div class="prog-bar-wrap" style="width:120px"><div class="prog-bar ${pctMedio >= 0.999 ? 'completo' : pctMedio > 0 ? 'parcial' : 'zero'}" style="width:${pctMedio*100}%"></div></div>
                    <span class="t-num" style="font-weight:600;min-width:48px">${fmtPct(pctMedio)}</span>
                    <span style="color:var(--muted);font-size:14px">▾</span>
                  </div>
                </div>
                <div id="fase-${rid}" class="hidden" style="padding:14px 18px">
                  <table class="t">
                    <tbody>
                      ${sub.slice(0, 30).map(t => `
                        <tr>
                          <td class="t-mono" style="width:80px">${t.edt}</td>
                          <td>${t.nome}</td>
                          <td style="font-size:12px;color:var(--muted)">${fmtData(t.ini)} → ${fmtData(t.fim)}</td>
                          <td style="width:140px">
                            <div style="display:flex;align-items:center;gap:6px">
                              <div class="prog-bar-wrap" style="width:60px"><div class="prog-bar ${t.pct >= 0.999 ? 'completo' : t.pct > 0 ? 'parcial' : 'zero'}" style="width:${t.pct*100}%"></div></div>
                              <span class="t-num" style="font-size:11px">${fmtPct(t.pct)}</span>
                            </div>
                          </td>
                        </tr>
                      `).join('')}
                      ${sub.length > 30 ? `<tr><td colspan="4" style="text-align:center;color:var(--muted);font-size:11px">+ ${sub.length - 30} tarefas adicionais</td></tr>` : ''}
                    </tbody>
                  </table>
                </div>
              </div>
            `;
          }).join('')}
      </div>
    </div>
    <style>.hidden{display:none}</style>
  `;
}

function loadDraft() {
  try {
    const raw = localStorage.getItem(CONFIG.ls.rdoDraft);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveDraft(draft) {
  try { localStorage.setItem(CONFIG.ls.rdoDraft, JSON.stringify(draft)); } catch(e) {}
}

function clearDraft() {
  try { localStorage.removeItem(CONFIG.ls.rdoDraft); } catch(e) {}
}

function defaultDraft() {
  const apontador = localStorage.getItem(CONFIG.ls.apontador) || '';
  return {
    data: new Date().toISOString().split('T')[0],
    turno: 'Diurno',
    sentido: 'CB',
    estacaIni: '',
    estacaFim: '',
    apontador,
    observacaoGeral: '',
    servicos: [
      { frente: '', pacoteId: '', quantidade: '', equipe: '', observacao: '' }
    ]
  };
}

function renderRDO() {
  if (!STATE.draft) STATE.draft = loadDraft() || defaultDraft();
  const d = STATE.draft;
  
  const estacasCB = []; for (let i = CONFIG.estacasCB.ini; i <= CONFIG.estacasCB.fim; i++) estacasCB.push('E' + i);
  const estacasBC = []; for (let i = CONFIG.estacasBC.ini; i <= CONFIG.estacasBC.fim; i++) estacasBC.push('E' + i);
  const estacasUsar = d.sentido === 'CB' ? estacasCB : estacasBC;
  
  const frentes = [...new Set(STATE.pacotes
    .filter(p => p['Status'] !== 'Histórico' && p['Frente'])
    .map(p => p['Frente']))].sort();
  
  const temRascunho = !!loadDraft();

function renderServicoRow(s, idx, frentes) {
  // Pacotes filtrados pela frente selecionada
  const pacotesDaFrente = s.frente ? 
    STATE.pacotes.filter(p => p['Frente'] === s.frente && p['Status'] !== 'Histórico') :
    [];
  const pacoteSelecionado = STATE.pacotes.find(p => p['ID'] === s.pacoteId);
  const unidade = pacoteSelecionado ? (pacoteSelecionado['Unidade Física'] || '') : '';
  
  return `
    <div class="servico-row" data-idx="${idx}">
      <span class="row-num">SERVIÇO ${idx + 1}</span>
      ${idx > 0 ? `<button class="btn-remove" onclick="removerServico(${idx})" title="Remover">×</button>` : ''}
      <div class="form-grid" style="margin-top:6px">
        <div class="field">
          <label>Frente</label>
          <select data-svc="${idx}" data-field="frente">
            <option value="">— escolher —</option>
            ${frentes.map(f => `<option ${s.frente===f?'selected':''}>${f}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Pacote / Serviço</label>
          <select data-svc="${idx}" data-field="pacoteId" ${!s.frente ? 'disabled' : ''}>
            <option value="">${s.frente ? '— escolher pacote —' : '↑ escolha frente primeiro'}</option>
            ${pacotesDaFrente.map(p => `<option value="${p['ID']}" ${s.pacoteId===p['ID']?'selected':''}>${p['Pacote']} (${p['Unidade Física']||''})</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Quantidade ${unidade ? `(${unidade})` : ''}</label>
          <input type="number" data-svc="${idx}" data-field="quantidade" value="${s.quantidade}" placeholder="0" step="0.01" min="0">
        </div>
        <div class="field">
          <label>Equipe / Subcontratado</label>
          <input type="text" data-svc="${idx}" data-field="equipe" value="${s.equipe}" placeholder="ex: Sena Obras">
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>Observação do serviço (opcional)</label>
          <input type="text" data-svc="${idx}" data-field="observacao" value="${s.observacao}" placeholder="ex: Continuar amanhã">
        </div>
      </div>
    </div>
  `;
}

function attachRDOForm() {
  // Bind inputs do cabeçalho
  document.querySelectorAll('[data-draft]').forEach(el => {
    el.oninput = el.onchange = () => {
      STATE.draft[el.dataset.draft] = el.value;
      if (el.dataset.draft === 'apontador') {
        try { localStorage.setItem(CONFIG.ls.apontador, el.value); } catch(e) {}
      }
      saveDraft(STATE.draft);
    };
  });
  
  // Bind inputs dos serviços (delegação)
  document.getElementById('servicosList').addEventListener('input', svcInputHandler);
  document.getElementById('servicosList').addEventListener('change', svcInputHandler);
}

function svcInputHandler(ev) {
  const el = ev.target;
  if (!el.dataset.svc) return;
  const idx = parseInt(el.dataset.svc);
  const field = el.dataset.field;
  STATE.draft.servicos[idx][field] = el.value;
  
  // Se mudou frente, limpa pacote e re-renderiza só essa linha
  if (field === 'frente') {
    STATE.draft.servicos[idx].pacoteId = '';
    rerenderServicoRow(idx);
  }
  // Se mudou pacote, atualiza unidade exibida (re-render simples)
  if (field === 'pacoteId') {
    rerenderServicoRow(idx);
  }
  saveDraft(STATE.draft);
}

function rerenderServicoRow(idx) {
  const frentes = [...new Set(STATE.pacotes
    .filter(p => p['Status'] !== 'Histórico' && p['Frente'])
    .map(p => p['Frente']))].sort();
  const html = renderServicoRow(STATE.draft.servicos[idx], idx, frentes);
  const old = document.querySelector(`.servico-row[data-idx="${idx}"]`);
  if (old) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    old.replaceWith(tmp.firstElementChild);
  }
}

function setSentido(s) {
  STATE.draft.sentido = s;
  STATE.draft.estacaIni = '';
  STATE.draft.estacaFim = '';
  saveDraft(STATE.draft);
  render();
}

function setTurno(t) {
  STATE.draft.turno = t;
  saveDraft(STATE.draft);
  render();
}

function adicionarServico() {
  STATE.draft.servicos.push({
    frente: '', pacoteId: '', quantidade: '', equipe: '', observacao: ''
  });
  saveDraft(STATE.draft);
  render();
}

function removerServico(idx) {
  STATE.draft.servicos.splice(idx, 1);
  if (STATE.draft.servicos.length === 0) {
    STATE.draft.servicos.push({ frente: '', pacoteId: '', quantidade: '', equipe: '', observacao: '' });
  }
  saveDraft(STATE.draft);
  render();
}

function resetDraft() {
  if (!confirm('Limpar todos os dados desse RDO? Não tem como desfazer.')) return;
  clearDraft();
  STATE.draft = defaultDraft();
  render();
}

function validarRDO(d) {
  const erros = [];
  if (!d.data) erros.push('Data é obrigatória');
  if (!d.apontador.trim()) erros.push('Apontador é obrigatório');
  
  const servicosValidos = d.servicos.filter(s => s.pacoteId && num(s.quantidade) > 0);
  if (servicosValidos.length === 0) {
    erros.push('Adicione pelo menos 1 serviço com pacote e quantidade > 0');
  }
  return erros;
}

async function salvarRDO() {
  const d = STATE.draft;
  const erros = validarRDO(d);
  if (erros.length > 0) {
    toast(erros.join(' · '), 'error', 5000);
    return;
  }
  
  const btn = document.getElementById('btnSalvarRDO');
  const btnTxtOriginal = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ Salvando…';
  
  // Construir local_estaca a partir de início/fim
  let localEstaca = '';
  if (d.estacaIni && d.estacaFim) localEstaca = `${d.estacaIni} a ${d.estacaFim}`;
  else if (d.estacaIni) localEstaca = d.estacaIni;
  
  // Montar batch
  const batch = d.servicos
    .filter(s => s.pacoteId && num(s.quantidade) > 0)
    .map(s => {
      const p = STATE.pacotes.find(pp => pp['ID'] === s.pacoteId);
      const obsCompleta = [d.observacaoGeral, s.observacao].filter(x => x && x.trim()).join(' · ');
      return {
        data: d.data,
        turno: d.turno || 'Diurno',
        pacote_id: s.pacoteId,
        pacote_nome: p ? p['Pacote'] : '',
        quantidade: num(s.quantidade),
        unidade: p ? (p['Unidade Física']||'') : '',
        local_estaca: localEstaca,
        equipe: s.equipe,
        subcontratado: s.equipe,
        efetivo_total: 0,
        equipamentos: '',
        clima: '',
        paralisado_motivo: '',
        foto_link: '',
        observacao: obsCompleta,
        apontador: d.apontador
      };
    });
  
  try {
    const result = await jsonp(CONFIG.appsScript, {
      action: 'addBatchRDO',
      batch: JSON.stringify(batch)
    });
    
    if (!result.ok) throw new Error(result.error || 'Erro desconhecido');
    
    toast(`✓ ${batch.length} serviço${batch.length>1?'s':''} salvo${batch.length>1?'s':''} (${d.turno})`, 'success', 4000);
    
    clearDraft();
    STATE.draft = {
      ...defaultDraft(),
      apontador: d.apontador,
      sentido: d.sentido,
      turno: d.turno,
    };
    
    // Forçar refresh dos dados (vai aparecer em ~5min depois da republicação)
    setTimeout(() => carregarTudo(), 800);
    
    // Voltar pra tela executiva
    HISTORICO_TAB = 'servicos';
    setTimeout(() => navigate('historico'), 600);
    
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = btnTxtOriginal;
    toast('Falha ao salvar: ' + e.message, 'error', 6000);
  }
}

function resetDiarioDraft() {
  if (!confirm('Limpar todos os dados deste RDO Diário?')) return;
  clearDiarioDraft();
  DIARIO_STATE = defaultDiarioDraft();
  render();
}

function carregarRDODiarioExistente(data) {
  const r = (STATE.rdodiario||[]).find(x => {
    const rd = String(x['Data']);
    return rd === data || (parseISODate(rd) && parseISODate(rd).toISOString().split('T')[0] === data);
  });
  if (!r) { toast('RDO existente não encontrado', 'error'); return; }
  
  DIARIO_STATE = {
    data: data,
    encarregado: r['Encarregado']||'',
    apontador: r['Apontador']||'',
    clima_manha: r['Clima_Manha']||'Bom',
    clima_tarde: r['Clima_Tarde']||'Bom',
    clima_noite: r['Clima_Noite']||'Bom',
    tem_turno_noturno: r['Tem_Turno_Noturno'] === 'Sim',
    visitas: r['Visitas']||'',
    ocorrencias: r['Ocorrencias']||'',
    observacoes_gerais: r['Observacoes_Gerais']||'',
  };
  // Mapear MO
  CATEGORIAS_MO.forEach(c => {
    const sheetKey = c.key.charAt(0).toUpperCase() + c.key.slice(1);
    // Heurística pra encontrar a coluna
    const colDiurno = Object.keys(r).find(k => k.toLowerCase().includes(c.key.toLowerCase()) && k.toLowerCase().includes('diurno'));
    const colNoturno = Object.keys(r).find(k => k.toLowerCase().includes(c.key.toLowerCase()) && k.toLowerCase().includes('noturno'));
    DIARIO_STATE[c.key + '_diurno'] = colDiurno ? (r[colDiurno]||'') : '';
    DIARIO_STATE[c.key + '_noturno'] = colNoturno ? (r[colNoturno]||'') : '';
  });
  // Mapear equipamentos
  CATEGORIAS_EQUIP.forEach(c => {
    const col = Object.keys(r).find(k => k.toLowerCase().replace(/_/g,'') === c.key.toLowerCase().replace(/_/g,''));
    DIARIO_STATE[c.key] = col ? (r[col]||'') : '';
  });
  
  saveDiarioDraft(DIARIO_STATE);
  toast('Dados existentes carregados', 'info');
  render();
}

async function salvarRDODiario() {
  const d = DIARIO_STATE;
  if (!d.data) { toast('Data obrigatória', 'error'); return; }
  if (!d.apontador.trim()) { toast('Apontador obrigatório', 'error'); return; }
  
  const btn = document.getElementById('btnSalvarDiario');
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ Salvando…';
  
  // Verifica se já existe pra usar update
  const existe = (STATE.rdodiario || []).some(r => {
    const rd = String(r['Data']);
    return rd === d.data || (parseISODate(rd) && parseISODate(rd).toISOString().split('T')[0] === d.data);
  });
  
  const params = {
    action: existe ? 'updateRDODiario' : 'addRDODiario',
    data: d.data,
    encarregado: d.encarregado || '',
    apontador: d.apontador || '',
    clima_manha: d.clima_manha || '',
    clima_tarde: d.clima_tarde || '',
    clima_noite: d.clima_noite || '',
    visitas: d.visitas || '',
    ocorrencias: d.ocorrencias || '',
    observacoes_gerais: d.observacoes_gerais || '',
    tem_turno_noturno: d.tem_turno_noturno ? 'true' : 'false',
  };
  CATEGORIAS_MO.forEach(c => {
    params[c.key + '_diurno'] = d[c.key + '_diurno'] || '0';
    params[c.key + '_noturno'] = d[c.key + '_noturno'] || '0';
  });
  CATEGORIAS_EQUIP.forEach(c => {
    params[c.key] = d[c.key] || '0';
  });
  
  try {
    const result = await jsonp(CONFIG.appsScript, params);
    if (!result.ok) throw new Error(result.error || 'Erro');
    toast(`✓ RDO Diário ${result.updated ? 'atualizado' : 'salvo'}`, 'success', 4000);
    setTimeout(() => carregarTudo(), 800);
    btn.disabled = false;
    btn.innerHTML = original;
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = original;
    toast('Falha: ' + e.message, 'error', 6000);
  }
}

function gerarPDFDiario(data) {
  // Buscar dados do RDO Diário (preferir Sheets, senão usar DIARIO_STATE)
  const fromSheet = (STATE.rdodiario || []).find(r => {
    const rd = String(r['Data']);
    return rd === data || (parseISODate(rd) && parseISODate(rd).toISOString().split('T')[0] === data);
  });
  
  const d = fromSheet ? sheetRowToDiario(fromSheet) : (DIARIO_STATE && DIARIO_STATE.data === data ? DIARIO_STATE : null);
  if (!d) { toast('Não encontrei o RDO Diário pra gerar PDF', 'error'); return; }
  
  // Filtrar serviços executados nesse dia
  const servicosDiurnos = STATE.rdoavanco.filter(r => {
    const rd = parseISODate(r['Data']);
    if (!rd) return false;
    return rd.toISOString().split('T')[0] === data && (r['Turno']||'Diurno') === 'Diurno';
  });
  const servicosNoturnos = STATE.rdoavanco.filter(r => {
    const rd = parseISODate(r['Data']);
    if (!rd) return false;
    return rd.toISOString().split('T')[0] === data && r['Turno'] === 'Noturno';
  });
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 12;
  let y = margin;
  
  // === CABEÇALHO ===
  doc.setFillColor(10, 61, 98);
  doc.rect(0, 0, pageW, 22, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text('RELATÓRIO DIÁRIO DE OBRA - RDO', margin, 9);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'normal');
  doc.text('Av. Senador Teotônio Vilela · Consórcio Arvek + Gestor', margin, 14);
  doc.text(`Data: ${fmtData(d.data)}`, margin, 19);
  
  // ID e número
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  const idText = (fromSheet && fromSheet['ID']) || 'D????';
  doc.text(idText, pageW - margin - 20, 9);
  doc.setFontSize(7);
  doc.setFont('helvetica', 'normal');
  doc.text(d.tem_turno_noturno ? 'Diurno + Noturno' : 'Diurno', pageW - margin - 20, 14);
  
  doc.setTextColor(0, 0, 0);
  y = 27;
  
  // === IDENTIFICAÇÃO ===
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.setFillColor(240, 240, 240);
  doc.rect(margin, y, pageW - 2*margin, 5, 'F');
  doc.text('IDENTIFICAÇÃO', margin + 2, y + 3.5);
  y += 7;
  
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.text(`Encarregado:`, margin, y);
  doc.setFont('helvetica', 'bold');
  doc.text(d.encarregado || '—', margin + 22, y);
  doc.setFont('helvetica', 'normal');
  doc.text(`Apontador:`, margin + 95, y);
  doc.setFont('helvetica', 'bold');
  doc.text(d.apontador || '—', margin + 115, y);
  y += 6;
  
  // === CLIMA ===
  doc.setFont('helvetica', 'bold');
  doc.setFillColor(240, 240, 240);
  doc.rect(margin, y, pageW - 2*margin, 5, 'F');
  doc.text('CLIMA', margin + 2, y + 3.5);
  y += 7;
  
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  const colW = (pageW - 2*margin) / 3;
  doc.text(`Manhã: `, margin, y);
  doc.setFont('helvetica', 'bold');
  doc.text(d.clima_manha || '—', margin + 14, y);
  doc.setFont('helvetica', 'normal');
  doc.text(`Tarde: `, margin + colW, y);
  doc.setFont('helvetica', 'bold');
  doc.text(d.clima_tarde || '—', margin + colW + 12, y);
  doc.setFont('helvetica', 'normal');
  doc.text(`Noite: `, margin + 2*colW, y);
  doc.setFont('helvetica', 'bold');
  doc.text(d.clima_noite || '—', margin + 2*colW + 12, y);
  y += 6;
  
  // === EFETIVO ===
  doc.setFont('helvetica', 'bold');
  doc.setFillColor(240, 240, 240);
  doc.rect(margin, y, pageW - 2*margin, 5, 'F');
  doc.text('EFETIVO', margin + 2, y + 3.5);
  y += 6;
  
  // Tabela efetivo
  const efetivoHead = d.tem_turno_noturno ? 
    [['Categoria', 'Diurno', 'Noturno', 'Total']] :
    [['Categoria', 'Quantidade']];
  
  const efetivoBody = CATEGORIAS_MO.map(c => {
    const diu = parseInt(d[c.key + '_diurno']) || 0;
    const not = parseInt(d[c.key + '_noturno']) || 0;
    return d.tem_turno_noturno ?
      [c.label, String(diu || ''), String(not || ''), String(diu + not || '')] :
      [c.label, String(diu || '—')];
  });
  
  // Linha de total
  const totalDiu = CATEGORIAS_MO.reduce((s, c) => s + (parseInt(d[c.key + '_diurno']) || 0), 0);
  const totalNot = CATEGORIAS_MO.reduce((s, c) => s + (parseInt(d[c.key + '_noturno']) || 0), 0);
  if (d.tem_turno_noturno) {
    efetivoBody.push(['TOTAL', String(totalDiu), String(totalNot), String(totalDiu + totalNot)]);
  } else {
    efetivoBody.push(['TOTAL', String(totalDiu)]);
  }
  
  doc.autoTable({
    startY: y,
    head: efetivoHead,
    body: efetivoBody,
    margin: { left: margin, right: margin },
    theme: 'grid',
    styles: { fontSize: 8, cellPadding: 1.5 },
    headStyles: { fillColor: [10, 61, 98], textColor: 255, fontStyle: 'bold' },
    didParseCell: function(data) {
      if (data.row.index === efetivoBody.length - 1) {
        data.cell.styles.fillColor = [240, 240, 240];
        data.cell.styles.fontStyle = 'bold';
      }
    }
  });
  y = doc.lastAutoTable.finalY + 4;
  
  // === EQUIPAMENTOS ===
  doc.setFont('helvetica', 'bold');
  doc.setFillColor(240, 240, 240);
  doc.rect(margin, y, pageW - 2*margin, 5, 'F');
  doc.text('EQUIPAMENTOS', margin + 2, y + 3.5);
  y += 6;
  
  const equipBody = CATEGORIAS_EQUIP
    .map(c => [c.label, String(parseInt(d[c.key]) || '—')])
    .filter(row => row[1] !== '—');
  
  if (equipBody.length === 0) {
    equipBody.push(['Nenhum equipamento registrado', '']);
  }
  
  doc.autoTable({
    startY: y,
    head: [['Equipamento', 'Quantidade']],
    body: equipBody,
    margin: { left: margin, right: margin },
    theme: 'grid',
    styles: { fontSize: 8, cellPadding: 1.5 },
    headStyles: { fillColor: [10, 61, 98], textColor: 255, fontStyle: 'bold' },
    columnStyles: { 1: { halign: 'center', cellWidth: 30 } }
  });
  y = doc.lastAutoTable.finalY + 4;
  
  // === SERVIÇOS DIURNOS ===
  if (servicosDiurnos.length > 0) {
    doc.setFont('helvetica', 'bold');
    doc.setFillColor(240, 240, 240);
    doc.rect(margin, y, pageW - 2*margin, 5, 'F');
    doc.text(`SERVIÇOS EXECUTADOS · DIURNO (${servicosDiurnos.length})`, margin + 2, y + 3.5);
    y += 6;
    
    doc.autoTable({
      startY: y,
      head: [['Frente / Pacote', 'Local / Estaca', 'Equipe']],
      body: servicosDiurnos.map(s => {
        const p = STATE.pacotes.find(pp => pp['ID'] === s['Pacote_ID']);
        const frente = p ? (p['Frente']||'') : '';
        return [
          `${frente ? frente + ' · ' : ''}${s['Pacote_Nome']||''}`,
          s['Local_Estaca']||'',
          s['Equipe']||s['Subcontratado']||'',
        ];
      }),
      margin: { left: margin, right: margin },
      theme: 'grid',
      styles: { fontSize: 8, cellPadding: 1.5 },
      headStyles: { fillColor: [10, 61, 98], textColor: 255, fontStyle: 'bold' },
    });
    y = doc.lastAutoTable.finalY + 4;
  }
  
  // === SERVIÇOS NOTURNOS ===
  if (servicosNoturnos.length > 0) {
    doc.setFont('helvetica', 'bold');
    doc.setFillColor(240, 240, 240);
    doc.rect(margin, y, pageW - 2*margin, 5, 'F');
    doc.text(`SERVIÇOS EXECUTADOS · NOTURNO (${servicosNoturnos.length})`, margin + 2, y + 3.5);
    y += 6;
    
    doc.autoTable({
      startY: y,
      head: [['Frente / Pacote', 'Local / Estaca', 'Equipe']],
      body: servicosNoturnos.map(s => {
        const p = STATE.pacotes.find(pp => pp['ID'] === s['Pacote_ID']);
        const frente = p ? (p['Frente']||'') : '';
        return [
          `${frente ? frente + ' · ' : ''}${s['Pacote_Nome']||''}`,
          s['Local_Estaca']||'',
          s['Equipe']||s['Subcontratado']||'',
        ];
      }),
      margin: { left: margin, right: margin },
      theme: 'grid',
      styles: { fontSize: 8, cellPadding: 1.5 },
      headStyles: { fillColor: [40, 50, 90], textColor: 255, fontStyle: 'bold' },
    });
    y = doc.lastAutoTable.finalY + 4;
  }
  
  if (servicosDiurnos.length === 0 && servicosNoturnos.length === 0) {
    doc.setFont('helvetica', 'italic');
    doc.setFontSize(9);
    doc.setTextColor(120, 120, 120);
    doc.text('Nenhum serviço lançado para esta data.', margin, y + 4);
    doc.setTextColor(0, 0, 0);
    y += 10;
  }
  
  // === OBSERVAÇÕES (se couber na página) ===
  if (y < pageH - 50 && (d.visitas || d.ocorrencias || d.observacoes_gerais)) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setFillColor(240, 240, 240);
    doc.rect(margin, y, pageW - 2*margin, 5, 'F');
    doc.text('OBSERVAÇÕES', margin + 2, y + 3.5);
    y += 7;
    
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    if (d.visitas) {
      doc.setFont('helvetica', 'bold');
      doc.text('Visitas: ', margin, y);
      doc.setFont('helvetica', 'normal');
      const lines = doc.splitTextToSize(d.visitas, pageW - 2*margin - 18);
      doc.text(lines, margin + 14, y);
      y += lines.length * 4 + 1;
    }
    if (d.ocorrencias) {
      doc.setFont('helvetica', 'bold');
      doc.text('Ocorrências: ', margin, y);
      doc.setFont('helvetica', 'normal');
      const lines = doc.splitTextToSize(d.ocorrencias, pageW - 2*margin - 22);
      doc.text(lines, margin + 18, y);
      y += lines.length * 4 + 1;
    }
    if (d.observacoes_gerais) {
      doc.setFont('helvetica', 'bold');
      doc.text('Gerais: ', margin, y);
      doc.setFont('helvetica', 'normal');
      const lines = doc.splitTextToSize(d.observacoes_gerais, pageW - 2*margin - 14);
      doc.text(lines, margin + 11, y);
      y += lines.length * 4 + 1;
    }
  }
  
  // === RODAPÉ COM ASSINATURAS ===
  const yAssinaturas = pageH - 30;
  doc.setDrawColor(150, 150, 150);
  doc.line(margin, yAssinaturas, margin + 70, yAssinaturas);
  doc.line(pageW - margin - 70, yAssinaturas, pageW - margin, yAssinaturas);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'normal');
  doc.text(`Encarregado: ${d.encarregado || ''}`, margin, yAssinaturas + 4);
  doc.text(`Apontador: ${d.apontador || ''}`, pageW - margin - 70, yAssinaturas + 4);
  
  doc.setFontSize(7);
  doc.setTextColor(150, 150, 150);
  doc.text(`Gerado em ${new Date().toLocaleString('pt-BR')} · Sistema Teotônio Vilela`, pageW/2, pageH - 6, { align: 'center' });
  
  // Salvar
  const filename = `RDO_${d.data.replace(/-/g,'')}_TeotonioVilela.pdf`;
  doc.save(filename);
  toast('PDF gerado: ' + filename, 'success');
}

function sheetRowToDiario(r) {
  const d = {
    data: parseISODate(r['Data']) ? parseISODate(r['Data']).toISOString().split('T')[0] : String(r['Data']),
    encarregado: r['Encarregado']||'',
    apontador: r['Apontador']||'',
    clima_manha: r['Clima_Manha']||'',
    clima_tarde: r['Clima_Tarde']||'',
    clima_noite: r['Clima_Noite']||'',
    tem_turno_noturno: r['Tem_Turno_Noturno'] === 'Sim',
    visitas: r['Visitas']||'',
    ocorrencias: r['Ocorrencias']||'',
    observacoes_gerais: r['Observacoes_Gerais']||'',
  };
  CATEGORIAS_MO.forEach(c => {
    const colDiu = Object.keys(r).find(k => k.toLowerCase().includes(c.key.toLowerCase()) && k.toLowerCase().includes('diurno'));
    const colNot = Object.keys(r).find(k => k.toLowerCase().includes(c.key.toLowerCase()) && k.toLowerCase().includes('noturno'));
    d[c.key + '_diurno'] = colDiu ? (r[colDiu]||'') : '';
    d[c.key + '_noturno'] = colNot ? (r[colNot]||'') : '';
  });
  CATEGORIAS_EQUIP.forEach(c => {
    const col = Object.keys(r).find(k => k.toLowerCase().replace(/_/g,'') === c.key.toLowerCase().replace(/_/g,''));
    d[c.key] = col ? (r[col]||'') : '';
  });
  return d;
}

// GRÁFICOS (Chart.js)
// ====================================================================
let chartCurvaS = null;

function montarGraficos() {
  // Curva S
  const cv = document.getElementById('curvaS');
  if (cv) {
    if (chartCurvaS) { try { chartCurvaS.destroy(); } catch(e){} chartCurvaS = null; }
    
    const av = calcularAvancoPorPacote();
    const totalEstim = Object.values(av).filter(a => a.pacote['Status'] !== 'Histórico')
      .reduce((s,a) => s + a.qtdEstimada, 0);
    
    // Acumular por dia
    const rdosPorDia = {};
    STATE.rdoavanco.forEach(r => {
      const d = parseISODate(r['Data']);
      if (!d) return;
      const dStr = d.toISOString().split('T')[0];
      const pid = r['Pacote_ID'];
      const pacote = STATE.pacotes.find(p => p['ID'] === pid);
      if (!pacote) return;
      const qtdEstimP = num(pacote['Qtd Estimada']);
      if (qtdEstimP <= 0) return;
      const contrib = num(r['Quantidade']) / qtdEstimP * qtdEstimP / totalEstim;
      // Equivalente a: cada % de avanço de um pacote contribui proporcionalmente ao seu peso
      const contribPct = totalEstim > 0 ? num(r['Quantidade']) / totalEstim : 0;
      rdosPorDia[dStr] = (rdosPorDia[dStr] || 0) + contribPct;
    });
    
    const dias = Object.keys(rdosPorDia).sort();
    let acc = 0;
    const pontos = dias.map(d => {
      acc += rdosPorDia[d];
      return { x: d, y: acc * 100 };
    });
    
    if (pontos.length > 0) {
      chartCurvaS = new Chart(cv, {
        type: 'line',
        data: {
          datasets: [{
            label: 'Avanço acumulado real (%)',
            data: pontos,
            borderColor: 'oklch(0.45 0.14 240)',
            backgroundColor: 'oklch(0.45 0.14 240 / 0.1)',
            tension: 0.2,
            fill: true,
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: 'oklch(0.45 0.14 240)',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              type: 'time',
              time: { unit: 'day', displayFormats: { day: 'dd/MM' } },
              grid: { display: false },
              ticks: { font: { size: 10 } }
            },
            y: {
              beginAtZero: true,
              ticks: { font: { size: 10 }, callback: v => v.toFixed(1) + '%' },
              grid: { color: '#eee' }
            }
          }
        }
      });
    }
  }
}
