// ====================================================================
// VIEW: EXECUTIVO COM FILTROS E INTERATIVIDADE
// ====================================================================
function renderExecutivo() {
  const todasFrentes = [...new Set(STATE.pacotes.map(p => getCSVField(p, 'Frente')).filter(Boolean))].sort();
  const todosMesesSet = new Set();
  STATE.rdoavanco.forEach(r => {
    const d = parseISODate(getCSVField(r, 'Data'));
    if(d) {
      const m = (d.getMonth() + 1).toString().padStart(2, '0');
      const y = d.getFullYear();
      todosMesesSet.add(`${y}-${m}`);
    }
  });
  const todosMeses = [...todosMesesSet].sort().reverse();
  
  let pacotesAtivos = STATE.pacotes.filter(p => getCSVField(p, 'Status') !== 'Histórico' && getCSVField(p, 'ID'));
  let rdosAtivos = STATE.rdoavanco;

  if (STATE.filtros.frente) {
    pacotesAtivos = pacotesAtivos.filter(p => getCSVField(p, 'Frente') === STATE.filtros.frente);
    const pacotesIds = pacotesAtivos.map(p => getCSVField(p, 'ID'));
    rdosAtivos = rdosAtivos.filter(r => pacotesIds.includes(getCSVField(r, 'Pacote_ID') || getCSVField(r, 'Pacote_id')));
  }

  let LabelPeriodo = 'GERAL';
  if (STATE.filtros.mes) {
    rdosAtivos = rdosAtivos.filter(r => {
      const d = parseISODate(getCSVField(r, 'Data'));
      if(!d) return false;
      const m = (d.getMonth() + 1).toString().padStart(2, '0');
      const y = d.getFullYear();
      return `${y}-${m}` === STATE.filtros.mes;
    });
    const [y, m] = STATE.filtros.mes.split('-');
    const nomeMes = new Date(y, parseInt(m)-1, 1).toLocaleString('pt-BR', {month:'short'}).toUpperCase();
    LabelPeriodo = `${nomeMes}/${y}`;
  }

  const av = calcularAvancoPorPacote(rdosAtivos, pacotesAtivos);
  const pacotesFiltrados = Object.values(av).filter(a => a.pacote);
  
  const totalPac = pacotesFiltrados.length;
  const iniciados = pacotesFiltrados.filter(a => a.qtdExecutada > 0).length;
  const concluidos = pacotesFiltrados.filter(a => a.pct >= 0.999).length;
  const totalRDOs = rdosAtivos.length;
  
  pacotesFiltrados.forEach(a => {
    const pid = getCSVField(a.pacote, 'ID');
    const prod = PRODUTIVIDADE_PADRAO[pid] || 1;
    a.diasEstimados = prod > 0 ? a.qtdEstimada / prod : 0;
    a.diasExecutados = a.pct * a.diasEstimados;
  });

  const totalDiasEstimados = pacotesFiltrados.reduce((s,a) => s + a.diasEstimados, 0);
  const pctPond = totalDiasEstimados > 0 ? pacotesFiltrados.reduce((s,a) => s + a.diasExecutados, 0) / totalDiasEstimados : 0;
  
  const porFrente = {};
  pacotesFiltrados.forEach(a => {
    const f = getCSVField(a.pacote, 'Frente') || 'Outros';
    if (!porFrente[f]) porFrente[f] = { items: [], totalDiasEstim: 0, totalDiasExec: 0 };
    porFrente[f].items.push(a);
    porFrente[f].totalDiasEstim += a.diasEstimados;
    porFrente[f].totalDiasExec += a.diasExecutados;
  });
  Object.values(porFrente).forEach(f => {
    f.pctPond = f.totalDiasEstim > 0 ? f.totalDiasExec / f.totalDiasEstim : 0;
  });
  
  const ativosOrdenados = pacotesFiltrados
    .filter(a => a.qtdExecutada > 0)
    .sort((a,b) => (b.ultimaData || 0) - (a.ultimaData || 0))
    .slice(0, 8);
  
  const rdosOrdenados = [...rdosAtivos]
    .map(r => ({ data: parseISODate(getCSVField(r, 'Data')), pid: getCSVField(r, 'Pacote_ID'), qtd: num(getCSVField(r, 'Quantidade')) }))
    .filter(r => r.data && r.pid)
    .sort((a,b) => a.data - b.data);
  
  STATE.dashData = {
     totalDiasEstimados, pacotesAtivos, rdosAtivos
  };

  // ====== Métricas executivas V2 ======
  const metrics = calcExecMetrics(rdosAtivos, pacotesAtivos, totalDiasEstimados);
  const fa      = calcFrentesAnalise(rdosAtivos, pacotesAtivos, totalDiasEstimados);
  const baseline = calcCurvaPrevista(pacotesAtivos, totalDiasEstimados);
  const todayHoje = new Date(); todayHoje.setHours(0,0,0,0);
  const todayPlanned = pctAteDia(baseline.cum, baseline.sortedDays, ymd(todayHoje));
  const gap = pctPond - todayPlanned;
  const narrativa = gerarNarrativaSemana(metrics, fa, totalPac, iniciados);
  STATE.dashData.metrics = metrics;
  STATE.dashData.fa = fa;
  STATE.dashData.baseline = baseline;
  STATE.dashData.todayPlanned = todayPlanned;
  STATE.dashData.gap = gap;
  STATE.dashData.totalPac = totalPac;
  STATE.dashData.iniciados = iniciados;

  const periodoTag = STATE.filtros.mes || STATE.filtros.frente ? LabelPeriodo : 'GERAL';
  const frenteTag  = STATE.filtros.frente ? STATE.filtros.frente : '';
  const cls7  = metrics.delta7d  > 0.0001 ? 'up' : metrics.delta7d  < -0.0001 ? 'down' : 'flat';
  const cls30 = metrics.delta30d > 0.0001 ? 'up' : metrics.delta30d < -0.0001 ? 'down' : 'flat';
  const arr7  = metrics.delta7d  > 0.0001 ? '↑' : metrics.delta7d  < -0.0001 ? '↓' : '→';
  const arr30 = metrics.delta30d > 0.0001 ? '↑' : metrics.delta30d < -0.0001 ? '↓' : '→';
  // Gap (situação vs cronograma) — magnitude + direção, sem sinal "−"
  const gapAbs    = Math.abs(gap * 100);
  const statusCls = gap < -0.001 ? 'behind' : gap > 0.001 ? 'ahead' : 'ontrack';
  const statusArr = gap < -0.001 ? '▼' : gap > 0.001 ? '▲' : '●';
  const statusText = gap < -0.001 ? 'atrás do cronograma' : gap > 0.001 ? 'à frente do cronograma' : 'no prazo';
  const frentesParadas = fa.atencao.length;
  const totalFrentesNoFiltro = fa.total;
  const ultimoRDO = rdosOrdenados.length > 0 ? rdosOrdenados[rdosOrdenados.length - 1].data : null;
  const diasDesdeUltimo = ultimoRDO ? Math.floor((todayHoje - ultimoRDO) / 86400000) : null;

  return `
    <div class="filter-bar stagger-item">
      <span style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em">Filtros:</span>
      <select onchange="atualizarFiltro('mes', this.value)">
        <option value="">Todos os meses</option>
        ${todosMeses.map(m => {
           const d = new Date(m + '-01T12:00:00');
           const label = d.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
           return `<option value="${m}" ${STATE.filtros.mes === m ? 'selected' : ''}>${label.charAt(0).toUpperCase() + label.slice(1)}</option>`;
        }).join('')}
      </select>
      <select onchange="atualizarFiltro('frente', this.value)">
        <option value="">Todas as frentes</option>
        ${todasFrentes.map(f => `<option value="${f}" ${STATE.filtros.frente === f ? 'selected' : ''}>Frente: ${f}</option>`).join('')}
      </select>
      ${(STATE.filtros.mes || STATE.filtros.frente) ? 
        `<div class="filter-clear" onclick="limparFiltros()">Limpar Filtros ✕</div>` : ''}
    </div>

    <!-- ============ HERO EXECUTIVO ============ -->
    <div class="exec-hero stagger-item" style="animation-delay:.04s">
      <div class="hero-main">
        <div>
          <span class="hero-label">Avanço Ponderado · escopo em dias-equivalentes</span>
          <span class="hero-period">${periodoTag}${frenteTag ? ' · ' + frenteTag : ''}</span>
        </div>
        <div class="hero-value-row">
          <div class="hero-value">${(pctPond*100).toFixed(1).replace('.', ',')}<span class="pp">%</span></div>
          <div class="hero-gap">
            <div class="hero-gap-title">Status vs Cronograma</div>
            <div class="hero-gap-num ${statusCls}">${statusArr} ${gapAbs.toFixed(1).replace('.', ',')}<span style="font-size:0.45em;color:rgba(255,255,255,0.4);font-weight:600;letter-spacing:0;margin-left:2px"> p.p.</span></div>
            <div class="hero-gap-direction ${statusCls}">${statusText}</div>
            <div class="hero-gap-lbl">meta do cronograma: <strong style="color:rgba(255,255,255,0.75)">${(todayPlanned*100).toFixed(1).replace('.', ',')}%</strong> até hoje</div>
          </div>
          <div class="hero-deltas">
            <div class="hero-delta-title">Avanço ganho no período</div>
            <div class="hero-delta ${cls7}">
              <span class="hero-delta-arr">${arr7}</span>
              <span class="hero-delta-num">${fmtPctDelta(metrics.delta7d)}</span>
              <span class="hero-delta-lbl">últimos 7 dias</span>
            </div>
            <div class="hero-delta ${cls30}">
              <span class="hero-delta-arr">${arr30}</span>
              <span class="hero-delta-num">${fmtPctDelta(metrics.delta30d)}</span>
              <span class="hero-delta-lbl">últimos 30 dias</span>
            </div>
          </div>
        </div>
        <div class="hero-spark">
          <span class="hero-spark-label">Avanço acumulado · últimos 30 dias</span>
          <canvas id="heroSpark" height="50"></canvas>
        </div>
      </div>
      <div class="hero-side">
        <div class="hero-narrative">
          <div class="narrative-label">Leitura da semana</div>
          <div class="narrative-text">${narrativa}</div>
        </div>
        <div class="hero-ia loading" id="heroIA">
          <span class="hero-ia-icon">✨</span>
          <div class="hero-ia-body">
            <span class="hero-ia-label">Recomendação IA</span>
            <span class="hero-ia-text">Analisando indicadores executivos…</span>
          </div>
          <button class="hero-ia-refresh" onclick="abrirConfigIA()" title="Configurar chave da IA" style="margin-right:4px;">⚙</button>
          <button class="hero-ia-refresh" onclick="refreshIA()" title="Gerar nova recomendação">↻</button>
        </div>
        <div class="hero-ritmo-ctrl">
          <span class="hero-ritmo-lbl">Base do ritmo</span>
          ${[7,14,30].map(n => `<button type="button" class="hero-ritmo-btn${STATE.execRitmo.janela===n?' on':''}" onclick="setExecRitmoJanela(${n})">${n}d</button>`).join('')}
          <button type="button" class="hero-ritmo-btn${STATE.execRitmo.diasUteis?' on':''}" onclick="toggleExecDiasUteis()" title="Considerar apenas dias úteis (exclui domingos)">${STATE.execRitmo.diasUteis?'☑':'☐'} dias úteis</button>
        </div>
        <div class="hero-stats">
          <div>
            <div class="hero-stat-num">${(metrics.velocity*100).toFixed(2).replace('.', ',')}<span class="small"> p.p./dia${metrics.diasUteis?' útil':''}</span></div>
            <div class="hero-stat-lbl">${metrics.diasUteis ? `Velocidade · ${metrics.janela}d · por dia útil` : `Velocidade · média ${metrics.janela}d`}</div>
          </div>
          <div>
            <div class="hero-stat-num" style="font-size:18px">${metrics.dataPrevista ? fmtData(metrics.dataPrevista) : '—'}</div>
            <div class="hero-stat-lbl">Término no ritmo atual${metrics.daysToComplete!==null?` · ${metrics.daysToComplete} dia${metrics.daysToComplete>1?'s':''}`:''}</div>
            ${metrics.diasVsPrazo!=null ? `<div class="hero-stat-prazo ${metrics.diasVsPrazo>0?'over':metrics.diasVsPrazo<0?'under':'on'}">${metrics.diasVsPrazo>0?`+${metrics.diasVsPrazo}d além do prazo`:metrics.diasVsPrazo<0?`${Math.abs(metrics.diasVsPrazo)}d de folga`:'no limite do prazo'}</div>` : ''}
          </div>
        </div>
      </div>
    </div>

    <!-- ============ KPIs SECUNDÁRIOS ============ -->
    <div class="exec-kpi-grid">
      <div class="exec-kpi stagger-item" style="animation-delay:.08s">
        <div class="exec-kpi-lbl">Pacotes em execução</div>
        <div class="exec-kpi-val">${iniciados}<span class="unit">de ${totalPac}</span></div>
        <div class="exec-kpi-sub"><strong>${concluidos}</strong> concluído${concluidos!==1?'s':''} · ${totalPac - iniciados} ainda não iniciados</div>
      </div>
      <div class="exec-kpi stagger-item" style="animation-delay:.12s">
        <div class="exec-kpi-lbl">RDOs no período</div>
        <div class="exec-kpi-val">${totalRDOs}</div>
        <div class="exec-kpi-sub"><strong>${metrics.rdos7d}</strong> nos últimos 7 dias · <strong>${metrics.rdos30d}</strong> em 30 dias</div>
      </div>
      <div class="exec-kpi stagger-item" style="animation-delay:.16s">
        <div class="exec-kpi-lbl">Frentes em risco ${frentesParadas > 0 ? '<span class="badge-mini">'+frentesParadas+'</span>' : ''}</div>
        <div class="exec-kpi-val">${frentesParadas}<span class="unit">de ${totalFrentesNoFiltro}</span></div>
        <div class="exec-kpi-sub">${frentesParadas === 0 ? 'Todas as frentes com lançamentos recentes' : 'Sem RDOs há mais de 7 dias'}</div>
      </div>
      <div class="exec-kpi stagger-item" style="animation-delay:.20s">
        <div class="exec-kpi-lbl">Último lançamento</div>
        <div class="exec-kpi-val">${ultimoRDO ? fmtData(ultimoRDO) : '—'}</div>
        <div class="exec-kpi-sub">${diasDesdeUltimo === null ? 'Nenhum RDO no filtro' : diasDesdeUltimo === 0 ? '<strong>hoje</strong>' : diasDesdeUltimo === 1 ? '<strong>ontem</strong>' : 'há <strong>'+diasDesdeUltimo+' dias</strong>'}</div>
      </div>
    </div>

    <!-- ============ VISUALIZAÇÃO 3D DO TRECHO ============ -->
    ${renderAvenida3D(rdosAtivos, pacotesAtivos)}

    <!-- ============ CALENDÁRIO 90D ============ -->
    ${renderCalendarioHeatmap(rdosAtivos)}

    <!-- ============ CURVA S + DESTAQUES ============ -->
    <div class="exec-row-21">
      <div class="card stagger-item" style="animation-delay:.24s">
        <div class="card-header">
          <div>
            <div class="card-title-lg">Curva S — Realizado vs. Previsto</div>
            <div class="card-title-sub">Acumulado ponderado · realizado · cronograma · projeção · prazo</div>
          </div>
          <div class="curva-horizonte">
            ${[['obra','Obra toda'],['12m','12 meses'],['3m','3 meses']].map(([h,lbl]) => `<button type="button" class="curva-hz-btn${STATE.curvaHorizonte===h?' on':''}" onclick="setCurvaHorizonte('${h}')">${lbl}</button>`).join('')}
          </div>
        </div>
        <div class="card-body">
          ${rdosOrdenados.length > 0 ? `
            <div style="position:relative;height:260px"><canvas id="curvaS"></canvas></div>
          ` : '<div class="empty"><div class="empty-icon">◷</div><div class="empty-title">Sem dados no filtro</div><div class="empty-sub">Altere o filtro de mês ou frente.</div></div>'}
        </div>
      </div>

      <div class="card stagger-item" style="animation-delay:.28s">
        <div class="card-header">
          <div>
            <div class="card-title-lg">Destaques & Atenção</div>
            <div class="card-title-sub">Top 3 esta semana</div>
          </div>
        </div>
        <div class="card-body" style="padding-top:8px">
          <div class="exec-list-section"><span class="dot up"></span>Avançaram nos últimos 7 dias</div>
          <div class="exec-list">
            ${fa.destaques.length > 0 ? fa.destaques.map((d, i) => `
              <div class="exec-list-item">
                <div class="exec-list-rank">${i+1}</div>
                <div class="exec-list-body">
                  <div class="exec-list-name">${d.frente}</div>
                  <div class="exec-list-meta">Última atividade: ${fmtData(d.ultData)}</div>
                </div>
                <div class="exec-list-val up">+${(d.valor*100).toFixed(2).replace('.', ',')} p.p.</div>
              </div>
            `).join('') : '<div class="exec-list-empty">Nenhuma frente avançou nos últimos 7 dias</div>'}
          </div>
          <div class="exec-list-section"><span class="dot warn"></span>Merecem atenção</div>
          <div class="exec-list">
            ${fa.atencao.length > 0 ? fa.atencao.map((a, i) => `
              <div class="exec-list-item">
                <div class="exec-list-rank">${i+1}</div>
                <div class="exec-list-body">
                  <div class="exec-list-name">${a.frente}</div>
                  <div class="exec-list-meta">${a.dias === null ? 'Nunca recebeu RDO' : 'Última: ' + fmtData(a.ultData)}${a.pacotes ? ' · ' + a.pacotes + ' pacote' + (a.pacotes>1?'s':'') : ''}</div>
                </div>
                <div class="exec-list-val warn">${a.dias === null ? '— d' : a.dias + ' d'}</div>
              </div>
            `).join('') : '<div class="exec-list-empty">Todas as frentes com atividade recente ✓</div>'}
          </div>
        </div>
      </div>
    </div>

    <div class="section-title stagger-item" style="animation-delay:.2s; font-size:18px; font-weight:800; margin: 24px 0 16px; color: var(--text);">Infraestrutura & Avanço Físico</div>
    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px;">
       ${Object.entries(porFrente).sort((a,b) => b[1].pctPond - a[1].pctPond).map(([f, d], i) => {

function montarGraficos() {
  if (STATE.currentPage !== 'executivo') return;
  if (!STATE.dashData) return;

  // Dispara recomendação IA (cacheada 6h) — independente do gráfico
  if (STATE.dashData.metrics) {
    const { metrics, fa, totalPac, iniciados, gap } = STATE.dashData;
    setTimeout(() => carregarRecomendacaoIA(metrics, fa, totalPac || 0, iniciados || 0, gap || 0, false), 200);
  }

  // ===== SPARKLINE no hero (cumulativo últimos 30 dias) =====
  const sparkEl = document.getElementById('heroSpark');
  if (sparkEl && STATE.dashData.metrics) {
    if (window.heroSparkChart) window.heroSparkChart.destroy();
    const pts = STATE.dashData.metrics.sparkPts;
    const labels = pts.map(p => p.date);
    const data = pts.map(p => +(p.value * 100).toFixed(3));
    window.heroSparkChart = new Chart(sparkEl, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data,
          borderColor: 'oklch(0.75 0.16 38)',
          backgroundColor: (ctx) => {
            const c = ctx.chart.ctx;
            const grad = c.createLinearGradient(0, 0, 0, 80);
            grad.addColorStop(0, 'oklch(0.75 0.16 38 / 0.35)');
            grad.addColorStop(1, 'oklch(0.75 0.16 38 / 0.00)');
            return grad;
          },
          borderWidth: 2, fill: true, tension: 0.35,
          pointRadius: 0, pointHoverRadius: 4,
          pointHoverBackgroundColor: '#fff',
          pointHoverBorderColor: 'oklch(0.75 0.16 38)',
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 700, easing: 'easeOutQuart' },
        layout: { padding: 0 },
        scales: { y: { display: false, beginAtZero: false }, x: { display: false } },
        plugins: {
          legend: { display: false },
          tooltip: {
            mode: 'index', intersect: false,
            backgroundColor: 'rgba(15,12,8,0.95)', titleColor: '#fff',
            bodyColor: 'rgba(255,255,255,0.85)', borderColor: 'rgba(255,255,255,0.15)',
            borderWidth: 1, padding: 8, titleFont:{size:10, weight:'700'}, bodyFont:{size:11},
            callbacks: {
              title: (items) => {
                const d = parseISODate(items[0].label);
                return d ? d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short' }) : items[0].label;
              },
              label: (ctx) => 'Acumulado: ' + ctx.parsed.y.toFixed(2).replace('.', ',') + '%',
            }
          }
        }
      }
    });
  }

  // ===== CURVA S — Realizado + Previsto (cronograma) + HOJE =====
  const ctx = document.getElementById('curvaS');
  if (!ctx) return;
  if (window.meuGraficoCurvaS) window.meuGraficoCurvaS.destroy();

  const totalDiasObra = STATE.dashData.totalDiasEstimados;
  if (totalDiasObra === 0) return;

  const metrics = STATE.dashData.metrics;
  const sortedDays = metrics.sortedDays;
  const cumulative = metrics.cumulative;
  if (sortedDays.length === 0) return;

  const primeiroRDO = parseISODate(sortedDays[0]);
  const ultimoRDO   = parseISODate(sortedDays[sortedDays.length - 1]);
  const today = new Date(); today.setHours(0,0,0,0);

  // Data prevista de término (para a linha de projeção e para esticar o eixo)
  const dataProj = (metrics.dataPrevista && metrics.dataPrevista > today) ? metrics.dataPrevista : null;
  const atualPct = +(metrics.current * 100).toFixed(3);

  let inicio, fim;
  if (STATE.filtros.mes) {
    const [y, m] = STATE.filtros.mes.split('-');
    inicio = new Date(parseInt(y), parseInt(m) - 1, 1);
    fim    = new Date(parseInt(y), parseInt(m),     0);
  } else {
    const hz = STATE.curvaHorizonte || 'obra';
    if (hz === '3m' || hz === '12m') {
      // Foco no realizado recente — do passado escolhido até hoje
      const diasJanela = hz === '3m' ? 92 : 365;
      inicio = new Date(today.getTime() - diasJanela * 86400000);
      fim    = ultimoRDO > today ? new Date(ultimoRDO.getTime()) : new Date(today.getTime());
    } else {
      // Obra toda — do início do projeto até o ponto mais distante (prazo do contrato / projeção)
      inicio = primeiroRDO < PROJETO_INICIO ? primeiroRDO : PROJETO_INICIO;
      fim    = ultimoRDO > today ? new Date(ultimoRDO.getTime()) : new Date(today.getTime());
      if (PROJETO_FIM > fim) fim = new Date(PROJETO_FIM.getTime());
      if (dataProj && dataProj > fim) fim = new Date(dataProj.getTime());
    }
  }

  const realizado = [];
  const previsto = [];
  const projecao = [];
  const labels = [];
  const diaMs = 86400000;
  const totalProjMs = PROJETO_FIM - PROJETO_INICIO;
  const projTotalMs = dataProj ? (dataProj - today) : 0;

  for (let t = inicio.getTime(); t <= fim.getTime(); t += diaMs) {
    const d = new Date(t);
    const dStr = ymd(d);
    labels.push(dStr);
    const rVal = pctAteDia(cumulative, sortedDays, dStr);
    realizado.push(d <= today ? +(rVal * 100).toFixed(3) : null);
    const baseline = STATE.dashData.baseline;
    if (baseline && baseline.sortedDays.length > 0) {
      const pVal = pctAteDia(baseline.cum, baseline.sortedDays, dStr);
      previsto.push(+(pVal * 100).toFixed(3));
    } else {
      const frac = Math.max(0, Math.min(1, (d - PROJETO_INICIO) / totalProjMs));
      previsto.push(+(frac * 100).toFixed(3));
    }
    // Projeção: reta de (hoje, % atual) até (data prevista, 100%)
    if (dataProj && projTotalMs > 0 && d >= today && d <= dataProj) {
      const fp = (d - today) / projTotalMs;
      projecao.push(+(atualPct + fp * (100 - atualPct)).toFixed(3));
    } else {
      projecao.push(null);
    }
  }

  const todayIdx = labels.findIndex(l => l === ymd(today));
  const linhaHojePlugin = {
    id: 'linhaHoje',
    afterDraw(chart) {
      if (todayIdx < 0) return;
      const xScale = chart.scales.x;
      const yScale = chart.scales.y;
      if (!xScale || !yScale) return;
      const x = xScale.getPixelForValue(todayIdx);
      const ctx = chart.ctx;
      ctx.save();
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = 'oklch(0.58 0.2 20)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x, yScale.top);
      ctx.lineTo(x, yScale.bottom);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'oklch(0.58 0.2 20)';
      ctx.font = '700 9px JetBrains Mono, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('HOJE', x, yScale.top - 4);
      ctx.restore();
    }
  };

  const prazoIdx = labels.findIndex(l => l === ymd(PROJETO_FIM));
  const linhaPrazoPlugin = {
    id: 'linhaPrazo',
    afterDraw(chart) {
      if (prazoIdx < 0) return;
      const xScale = chart.scales.x;
      const yScale = chart.scales.y;
      if (!xScale || !yScale) return;
      const x = xScale.getPixelForValue(prazoIdx);
      const c = chart.ctx;
      c.save();
      c.setLineDash([2, 3]);
      c.strokeStyle = 'oklch(0.55 0.18 280)';
      c.lineWidth = 1.5;
      c.beginPath();
      c.moveTo(x, yScale.top);
      c.lineTo(x, yScale.bottom);
      c.stroke();
      c.setLineDash([]);
      c.fillStyle = 'oklch(0.55 0.18 280)';
      c.font = '700 9px JetBrains Mono, monospace';
      c.textAlign = 'center';
      c.fillText('PRAZO', x, yScale.top - 4);
      c.restore();
    }
  };

  window.meuGraficoCurvaS = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Realizado',
          data: realizado,
          borderColor: 'oklch(0.62 0.18 38)',
          backgroundColor: (c) => {
            const g = c.chart.ctx.createLinearGradient(0, 0, 0, 260);
            g.addColorStop(0, 'oklch(0.62 0.18 38 / 0.25)');
            g.addColorStop(1, 'oklch(0.62 0.18 38 / 0.00)');
            return g;
          },
          borderWidth: 2.5, fill: true, tension: 0.25,
          pointRadius: 0, pointHoverRadius: 5,
          pointHoverBackgroundColor: '#fff',
          pointHoverBorderColor: 'oklch(0.48 0.18 38)',
          pointHoverBorderWidth: 2,
          spanGaps: false, order: 1,
        },
        {
          label: 'Previsto (cronograma)',
          data: previsto,
          borderColor: 'oklch(0.65 0.02 60)',
          backgroundColor: 'transparent',
          borderWidth: 1.5, borderDash: [6, 5],
          fill: false, tension: 0,
          pointRadius: 0, pointHoverRadius: 4,
          pointHoverBackgroundColor: '#fff',
          pointHoverBorderColor: 'oklch(0.45 0.02 60)',
          order: 2,
        },
        {
          label: 'Projeção (ritmo atual)',
          data: projecao,
          borderColor: 'oklch(0.62 0.18 38)',
          backgroundColor: 'transparent',
          borderWidth: 2, borderDash: [2, 3],
          fill: false, tension: 0,
          pointRadius: 0, pointHoverRadius: 4,
          pointHoverBackgroundColor: '#fff',
          pointHoverBorderColor: 'oklch(0.48 0.18 38)',
          spanGaps: true, order: 0,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 800, easing: 'easeOutQuart' },
      interaction: { mode: 'index', intersect: false },
      scales: {
        y: {
          beginAtZero: true, max: 100,
          ticks: { callback: v => v + '%', font: { size: 10, family: 'JetBrains Mono, monospace' }, color: 'oklch(0.55 0.02 60)' },
          grid: { color: 'rgba(20,15,10,0.05)' },
          border: { display: false },
        },
        x: {
          ticks: {
            font: { size: 10, family: 'JetBrains Mono, monospace' },
            color: 'oklch(0.55 0.02 60)',
            maxRotation: 0, autoSkip: true, maxTicksLimit: 8,
            callback: function(val) {
              const d = parseISODate(this.getLabelForValue(val));
              if (!d) return '';
              return d.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
            }
          },
          grid: { display: false },
          border: { color: 'var(--border)' },
        }
      },
      plugins: {
        legend: {
          display: true, position: 'top', align: 'center',
          labels: { usePointStyle: true, pointStyle: 'line', boxWidth: 24, font: { size: 11, family: 'JetBrains Mono, monospace' }, color: 'oklch(0.45 0.02 60)', padding: 14 },
        },
        tooltip: {
          backgroundColor: 'rgba(15,12,8,0.95)', titleColor: '#fff',
          bodyColor: 'rgba(255,255,255,0.85)', borderColor: 'rgba(255,255,255,0.15)',
          borderWidth: 1, padding: 10, titleFont:{size:11, weight:'700'}, bodyFont:{size:12},
          callbacks: {
            title: (items) => {
              const d = parseISODate(items[0].label);
              return d ? d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' }) : items[0].label;
            },
            label: (c) => c.dataset.label + ': ' + (c.parsed.y === null ? '—' : c.parsed.y.toFixed(2).replace('.', ',') + '%'),
          }
        }
      }
    },
    plugins: [linhaHojePlugin, linhaPrazoPlugin]
  });
}

            ${Object.entries(porFrente).map(([f, lista]) => `

              ${lista.map(a => `
                <tr>
                  <td><strong>${getCSVField(a.pacote, 'Pacote')||''}</strong></td>
                  <td><span class="t-mono">${getCSVField(a.pacote, 'Unidade Física')||''}</span></td>
                  <td class="t-num">${fmtNum(a.qtdExecutada)}</td>
                  <td class="t-num" style="color:var(--muted)">${fmtNum(a.qtdEstimada, 0)}</td>

                </tr>
              `).join('')}

function renderHeatmap(av) {
  const estacas = listarEstacas();
  const pacotesAtivos = Object.values(av).filter(a => a.pacote && getCSVField(a.pacote, 'Status') !== 'Histórico')
    .filter(a => a.qtdExecutada > 0 || true).slice(0, 15); 
  
  if (pacotesAtivos.length === 0) {
    return '<div class="empty"><div class="empty-icon">▦</div><div class="empty-title">Mapa vazio</div><div class="empty-sub">Lance RDOs com estaca preenchida pra ver o mapa se construir</div></div>';
  }
  
  const maxPorPac = {};
  pacotesAtivos.forEach(a => {
    maxPorPac[getCSVField(a.pacote, 'ID')] = Math.max(0, ...Object.values(a.porEstaca));
  });
  
  const cb = estacas.filter(e => e.sentido === 'CB');
  const bc = estacas.filter(e => e.sentido === 'BC');
  
  function blocoHeatmap(lista, label) {
    if (lista.length === 0) return '';
    const colTemplate = `200px repeat(${lista.length}, minmax(28px, 1fr))`;
    return `
      <div style="margin-bottom:18px">
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">${label}</div>
        <div class="heatmap" style="grid-template-columns:${colTemplate}">
          <div class="hm-row-label" style="visibility:hidden">.</div>
          ${lista.map(e => `<div class="hm-col-label">${e.id}</div>`).join('')}
          ${pacotesAtivos.map(a => {
            const max = maxPorPac[getCSVField(a.pacote, 'ID')] || 1;
            return `
              <div class="hm-row-label">${getCSVField(a.pacote, 'Pacote')}</div>
              ${lista.map(e => {
                const v = a.porEstaca[e.id] || 0;
                const intensity = max > 0 ? Math.min(v / max, 1) : 0;
                const bg = v > 0 ?
                  `background:oklch(${0.95 - intensity * 0.45} 0.18 38)` :
                  `background:var(--bg)`;
                const color = intensity > 0.5 ? '#fff' : 'var(--muted)';
                const title = `${e.id} · ${getCSVField(a.pacote, 'Pacote')}: ${fmtNum(v, 1)} ${getCSVField(a.pacote, 'Unidade Física')||''}`;
                return `<div class="hm-cell" style="${bg};color:${color}" title="${title}">${v > 0 ? fmtNum(v, 0) : ''}</div>`;
              }).join('')}
            `;
          }).join('')}
        </div>
      </div>
    `;
  }
  
  return `
    <div class="heatmap-wrap">
      ${blocoHeatmap(cb, `Sentido Centro→Bairro · E${CONFIG.estacasCB.ini}–E${CONFIG.estacasCB.fim}`)}
      ${blocoHeatmap(bc, `Sentido Bairro→Centro · E${CONFIG.estacasBC.ini}–E${CONFIG.estacasBC.fim}`)}
    </div>
  `;
}

// VIEW: GANTT COM PREDECESSORAS
// ====================================================================
let GANTT_DADOS = null;
let CRONOGRAMA_ABA = 'gantt';

function loadGanttDados() {
  if (GANTT_DADOS) return GANTT_DADOS;
  try {
    const raw = localStorage.getItem('teotonio_gantt_v1');
    if (raw) GANTT_DADOS = JSON.parse(raw);
    else GANTT_DADOS = { dataInicio: getLocalISODate(new Date()), pacotes: {} };
  } catch(e) { GANTT_DADOS = { dataInicio: getLocalISODate(new Date()), pacotes: {} }; }
  return GANTT_DADOS;
}

function salvarGanttDados() {
  try { localStorage.setItem('teotonio_gantt_v1', JSON.stringify(GANTT_DADOS)); } catch(e) {}
}

function addWorkingDays(date, days) {
  let d = new Date(date.getTime());
  let added = 0;
  const total = Math.ceil(Math.max(0, days));
  while (added < total) {
    d.setDate(d.getDate() + 1);
    if (d.getDay() !== 0) added++;
  }
  return d;
}

function calcularGantt() {
  loadGanttDados();
  const av = calcularAvancoPorPacote();
  const pacotesAtivos = STATE.pacotes.filter(p => getCSVField(p, 'Status') !== 'Histórico' && getCSVField(p, 'ID'));
  const dataInicioProj = parseISODate(GANTT_DADOS.dataInicio) || new Date();
  const gDados = GANTT_DADOS.pacotes || {};

  const nodes = {};
  pacotesAtivos.forEach(p => {
    const pid = getCSVField(p, 'ID');
    const g = gDados[pid] || {};
    const avP = av[pid];
    const qtdTotal = num(getCSVField(p, 'Qtd Estimada'));
    const qtdExec = avP ? avP.qtdExecutada : 0;
    const saldo = Math.max(0, qtdTotal - qtdExec);
    const pct = avP ? avP.pct : 0;
    const prodOverride = g.prod ? parseFloat(g.prod) : null;
    const prodPadrao = PRODUTIVIDADE_PADRAO[pid] || 1;
    const prod = (prodOverride && prodOverride > 0) ? prodOverride : prodPadrao;
    const predecessores = (g.predecessores || []).filter(id => pacotesAtivos.some(p2 => getCSVField(p2, 'ID') === id));
    nodes[pid] = { pacote: p, pid, pct, saldo, duracao: prod > 0 ? Math.ceil(saldo / prod) : 0, predecessores, dataInicio: null, dataFim: null };
  });

  // Kahn's topological sort
  const inDeg = {};
  Object.keys(nodes).forEach(id => { inDeg[id] = 0; });
  Object.values(nodes).forEach(n => {
    n.predecessores.forEach(pid => { if (nodes[pid]) inDeg[n.pid] = (inDeg[n.pid] || 0) + 1; });
  });
  const queue = Object.keys(nodes).filter(id => (inDeg[id] || 0) === 0);
  const sorted = [];
  while (queue.length > 0) {
    const id = queue.shift();
    sorted.push(id);
    Object.values(nodes).forEach(n => {
      if (n.predecessores.includes(id)) {
        inDeg[n.pid]--;
        if (inDeg[n.pid] === 0) queue.push(n.pid);
      }
    });
  }
  Object.keys(nodes).forEach(id => { if (!sorted.includes(id)) sorted.push(id); });

  sorted.forEach(pid => {
    const n = nodes[pid];
    const g = gDados[pid] || {};

    if (g.dataProjetada && g.dataInicioProject) {
      // Use Project-imported dates directly
      n.dataInicio = parseISODate(g.dataInicioProject);
      n.dataFim    = g.dataFimProject ? parseISODate(g.dataFimProject) : n.dataInicio;
      if (n.dataInicio && n.dataFim) {
        n.duracao = Math.max(1, Math.round((n.dataFim - n.dataInicio) / 86400000));
      }
      n.fromProject = true;
    } else {
      // Calculate from predecessors + productivity
      let inicio = new Date(dataInicioProj.getTime());
      n.predecessores.forEach(predId => {
        const pred = nodes[predId];
        if (pred && pred.dataFim && pred.dataFim > inicio) inicio = new Date(pred.dataFim.getTime());
      });
      n.dataInicio = inicio;
      n.dataFim = n.duracao > 0 ? addWorkingDays(inicio, n.duracao) : new Date(inicio.getTime());
    }

    // Segments override: each segment has its own date range and location
    if (g.segmentos && g.segmentos.length) {
      const parsed = g.segmentos
        .filter(s => s.dataInicio || s.dataFim)
        .map(s => ({
          ...s,
          dataInicio: s.dataInicio ? parseISODate(s.dataInicio) : null,
          dataFim:    s.dataFim    ? parseISODate(s.dataFim)    : null,
        }));
      if (parsed.length) {
        n.segmentos = parsed;
        const inicios = parsed.map(s => s.dataInicio).filter(Boolean);
        const fins    = parsed.map(s => s.dataFim).filter(Boolean);
        if (inicios.length) n.dataInicio = new Date(Math.min(...inicios.map(d => d.getTime())));
        if (fins.length)    n.dataFim    = new Date(Math.max(...fins.map(d => d.getTime())));
        if (n.dataInicio && n.dataFim) n.duracao = Math.max(1, Math.round((n.dataFim - n.dataInicio) / 86400000));
        n.fromSegmentos = true;
      }
    }
  });

  return { nodes, dataInicioProj, sorted };
}

function renderGanttHTML() {
  loadGanttDados();
  const { nodes, dataInicioProj, sorted } = calcularGantt();
  const hoje = new Date(); hoje.setHours(0,0,0,0);

  // Timeline: start = dataInicioProj (user-defined), end = at least Dec 2026
  const tlStart = new Date(dataInicioProj.getFullYear(), dataInicioProj.getMonth(), 1);

  const minEnd = new Date(2026, 11, 31); // Dec 31 2026 minimum
  let maxData = minEnd;
  Object.values(nodes).forEach(n => { if (n.dataFim && n.dataFim > maxData) maxData = n.dataFim; });
  maxData = new Date(maxData.getFullYear(), maxData.getMonth() + 1, 1); // snap to next month start

  const totalMs = Math.max(maxData - tlStart, 1);
  const pctPos  = d => Math.max(0, Math.min(100, (d - tlStart) / totalMs * 100));
  const pctWid  = (d1, d2) => Math.max(0.4, (d2 - d1) / totalMs * 100);

  // Month grid headers
  const meses = [];
  let cur = new Date(tlStart.getFullYear(), tlStart.getMonth(), 1);
  while (cur <= maxData) {
    const left = pctPos(cur);
    const nxt = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
    const w = Math.min(100 - left, (nxt - cur) / totalMs * 100);
    meses.push({ label: cur.toLocaleString('pt-BR', {month:'short', year:'2-digit'}).toUpperCase(), left, width: w });
    cur = nxt;
  }
  const hojeLeft = pctPos(hoje);
  const hojeOk = hojeLeft >= 0 && hojeLeft <= 100;

  const frenteCores = { 'Dren':'#1565C0','Demo':'#c62828','Pavi':'#546E7A','Vala':'#F9A825','Sina':'#2E7D32','Via ':'#E65100' };
  function corFrente(f) {
    const slug = (f||'').substring(0,4);
    return frenteCores[slug] || '#616161';
  }

  // Group by frente preserving sort order
  const porFrente = {};
  sorted.forEach(pid => {
    const n = nodes[pid];
    const f = getCSVField(n.pacote, 'Frente') || 'Outros';
    if (!porFrente[f]) porFrente[f] = [];
    porFrente[f].push(n);
  });

  const dataInicioStr = GANTT_DADOS.dataInicio || getLocalISODate(new Date());
  let rows = '';

  const gridLines = meses.map(m => `<div class="gantt-grid-line" style="left:${m.left.toFixed(2)}%"></div>`).join('');

  Object.entries(porFrente).forEach(([frente, items]) => {
    const cor = corFrente(frente);
    rows += `<div class="gantt-frente-header" style="--frente-cor:${cor}"><div>${frente}</div><div></div></div>`;
    items.forEach(n => {
      const nome = getCSVField(n.pacote, 'Pacote') || n.pid;
      const unid = getCSVField(n.pacote, 'Unidade Física') || '';
      const g = (GANTT_DADOS.pacotes || {})[n.pid] || {};
      const predStr = (g.predecessores || []).join(', ') || '—';
      let barHtml = gridLines;
      let pill = '';

      if (n.pct >= 1) {
        pill = '<span class="gantt-pill" style="background:#2E7D32;color:#fff">✓ Concluído</span>';
      } else if (n.duracao === 0) {
        pill = '<span class="gantt-pill" style="background:#9E9E9E;color:#fff">Sem dados</span>';
      } else if (n.segmentos && n.segmentos.length) {
        // Each trecho gets its own gantt-bar-area stacked in a flex column — no manual top calculations
        const segs = n.segmentos.filter(s => s.dataInicio).slice().sort((a, b) => a.dataInicio - b.dataInicio);
        let segAreasHtml = '';
        segs.forEach((seg, i) => {
          const dFim = seg.dataFim || seg.dataInicio;
          const localStr = seg.estacaIni && seg.estacaFim
            ? `${seg.estacaIni}→${seg.estacaFim} (${seg.sentido||'CB'})`
            : seg.estacaIni ? `${seg.estacaIni} (${seg.sentido||'CB'})` : '';
          const titleAttr = [localStr, fmtData(seg.dataInicio) + ' → ' + fmtData(dFim)].filter(Boolean).join(' · ');
          let areaHtml = gridLines;
          if (seg.dataInicio && !(dFim <= tlStart || seg.dataInicio >= maxData)) {
            const visStart = seg.dataInicio < tlStart ? tlStart : seg.dataInicio;
            const visEnd   = dFim > maxData ? maxData : dFim;
            const sLeft = (visStart - tlStart) / totalMs * 100;
            const sW    = Math.max(0.6, (visEnd - visStart) / totalMs * 100);
            const atrasadoSeg = dFim < hoje && n.pct < 0.99;
            areaHtml += `<div class="gantt-bar${atrasadoSeg?' gantt-bar-atrasado':''}"
              title="${titleAttr}"
              style="height:24px;left:${sLeft.toFixed(2)}%;width:${sW.toFixed(2)}%;background:${cor}25;border:1.5px solid ${cor}">
              <div class="gantt-bar-progress" style="width:${(n.pct*100).toFixed(1)}%;background:${cor}bb"></div>
              <span class="gantt-bar-label" style="font-size:9px;overflow:hidden;white-space:nowrap">${localStr}</span>
            </div>`;
          }
          if (hojeOk) areaHtml += `<div class="gantt-hoje" style="left:${hojeLeft.toFixed(2)}%"></div>`;
          const bdr = i < segs.length - 1 ? 'border-bottom:1px solid rgba(0,0,0,0.07)' : '';
          segAreasHtml += `<div class="gantt-bar-area" style="min-height:36px;${bdr}">${areaHtml}</div>`;
        });
        n._multiAreaHtml = segAreasHtml;
        const nSeg = n.segmentos.length;
        pill = `<span class="gantt-pill" style="background:#5C4033;color:#fff;font-size:9px">📍 ${nSeg} trecho${nSeg>1?'s':''}</span>`;
        if (n.pct > 0 && n.pct < 0.99) pill += '<span class="gantt-pill" style="background:#1565C0;color:#fff">Em curso</span>';
      } else {
        const left = pctPos(n.dataInicio);
        const w = pctWid(n.dataInicio, n.dataFim);
        const progW = n.pct * 100;
        const atrasado = n.dataFim < hoje && n.pct < 0.99;
        const emCurso = n.pct > 0 && n.pct < 0.99;
        barHtml += `<div class="gantt-bar ${atrasado ? 'gantt-bar-atrasado' : ''}"
          style="left:${left.toFixed(2)}%;width:${w.toFixed(2)}%;background:${cor}25;border:1.5px solid ${cor}">
          <div class="gantt-bar-progress" style="width:${progW.toFixed(1)}%;background:${cor}bb"></div>
          <span class="gantt-bar-label">${n.pct > 0.04 ? fmtPct(n.pct) : ''}</span>
        </div>`;
        if (atrasado) pill = '<span class="gantt-pill" style="background:#c62828;color:#fff">⚠ Atrasado</span>';
        else if (emCurso) pill = '<span class="gantt-pill" style="background:#1565C0;color:#fff">Em curso</span>';
      }
      if (hojeOk) barHtml += `<div class="gantt-hoje" style="left:${hojeLeft.toFixed(2)}%"></div>`;

      const ini = n.dataInicio ? fmtData(n.dataInicio) : '—';
      const fim = n.dataFim ? fmtData(n.dataFim) : '—';
      const projectBadge = n.fromProject
        ? '<span class="gantt-pill" style="background:#5C4033;color:#fff;font-size:9px">📐 Project</span>'
        : '';

      const barCell = n._multiAreaHtml
        ? `<div style="display:flex;flex-direction:column">${n._multiAreaHtml}</div>`
        : `<div class="gantt-bar-area">${barHtml}</div>`;
      rows += `<div class="gantt-row" data-pid="${n.pid}">
        <div class="gantt-label-cell">
          <div class="gantt-label-nome" title="${nome}">${nome}</div>
          <div class="gantt-label-meta">
            ${pill}${projectBadge}
            <span class="gantt-label-datas">${ini} → ${fim} · ${n.duracao}d</span>
          </div>
          <div class="gantt-label-pred">
            <span style="color:var(--muted);font-size:10px">Pred: ${predStr}</span>
            <button class="gantt-edit-btn" onclick="ganttEditarPacote('${n.pid}')" title="Editar predecessoras, produtividade e trechos">✏</button>
            ${n.fromProject ? `<button class="gantt-edit-btn" onclick="ganttLimparDatasProject('${n.pid}')" title="Remover datas do Project" style="color:#c62828">✕</button>` : ''}
            ${n.fromSegmentos ? `<button class="gantt-edit-btn" onclick="ganttLimparSegmentos('${n.pid}')" title="Remover trechos" style="color:#c62828">✕ trechos</button>` : ''}
          </div>
        </div>
        ${barCell}
      </div>`;
    });
  });

  const headerMeses = meses.map(m =>
    `<div class="gantt-mes" style="left:${m.left.toFixed(2)}%;width:${m.width.toFixed(2)}%">${m.label}</div>`
  ).join('');

  return `
    <div class="card stagger-item">
      <div class="card-header">
        <div>
          <div class="card-title">📊 Gantt com Predecessoras</div>
          <div class="card-title-sub">Clique em ✏ para definir predecessoras e produtividade de cada pacote</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:6px;font-size:12px">
            <label style="color:var(--muted);font-weight:600;white-space:nowrap">Início do projeto:</label>
            <input type="date" value="${dataInicioStr}"
              style="padding:4px 8px;font-size:12px;border:1px solid var(--border);border-radius:4px"
              onchange="ganttSetDataInicio(this.value)">
          </div>
          <button class="btn btn-outline btn-sm" onclick="ganttAbrirImportProject()" title="Importar datas e serviços do Excel exportado pelo MS Project">📥 Importar Project</button>
          <button class="btn btn-outline btn-sm" onclick="ganttExportarPDF()">⬇ PDF</button>
        </div>
      </div>
      <div id="gantt-edit-panel" style="display:none;padding:12px 16px;background:var(--bg-2);border-bottom:1px solid var(--border)"></div>
      <div class="card-body" style="padding:0;overflow:hidden">
        <div class="gantt-wrap">
          <div class="gantt-grid">
            <div class="gantt-labels-header">Pacote</div>
            <div class="gantt-timeline-header">
              ${headerMeses}
              ${hojeOk ? `<div class="gantt-hoje-header" style="left:${hojeLeft.toFixed(2)}%">Hoje</div>` : ''}
            </div>
          </div>
          <div class="gantt-body">${rows}</div>
        </div>
      </div>
    </div>`;
}

  loadGanttDados();
  GANTT_DADOS.dataInicio = val;
  salvarGanttDados();
  transitionTo(render);
};

window.ganttEditarPacote = function(pid) {
  const panel = document.getElementById('gantt-edit-panel');
  if (!panel) return;
  loadGanttDados();
  const g = (GANTT_DADOS.pacotes || {})[pid] || {};
  const predStr = (g.predecessores || []).join(', ');
  const prod = g.prod || '';
  const prodPadrao = PRODUTIVIDADE_PADRAO[pid] || '';
  const p = STATE.pacotes.find(pp => getCSVField(pp, 'ID') === pid);
  const nome = p ? getCSVField(p, 'Pacote') : pid;
  const unid = p ? (getCSVField(p, 'Unidade Física') || '') : '';
  const segmentos = g.segmentos || [];

  if (panel.dataset.pid === pid && panel.style.display !== 'none') {
    panel.style.display = 'none'; panel.dataset.pid = ''; return;
  }
  panel.dataset.pid = pid;
  panel.style.display = 'block';

  function buildEstOpts(list, sel) {
    return list.map(e => `<option${sel===e?' selected':''}>${e}</option>`).join('');
  }
  function buildSegRow(seg) {
    const sentido = seg.sentido || 'CB';
    const estList = sentido === 'CB'
      ? (()=>{ const a=[]; for(let i=CONFIG.estacasCB.ini;i<=CONFIG.estacasCB.fim;i++) a.push('E'+i); return a; })()
      : (()=>{ const a=[]; for(let i=CONFIG.estacasBC.ini;i<=CONFIG.estacasBC.fim;i++) a.push('E'+i); return a; })();
    return `<tr>
      <td><input type="date" class="seg-ini" value="${seg.dataInicio||''}" style="font-size:12px;padding:3px 5px;border:1px solid var(--border);border-radius:3px"></td>
      <td><input type="date" class="seg-fim" value="${seg.dataFim||''}" style="font-size:12px;padding:3px 5px;border:1px solid var(--border);border-radius:3px"></td>
      <td><select class="seg-sentido" onchange="ganttSegSentidoChange(this)" style="font-size:12px;padding:3px 4px;border:1px solid var(--border);border-radius:3px">
        <option value="CB"${sentido==='CB'?' selected':''}>CB</option>
        <option value="BC"${sentido==='BC'?' selected':''}>BC</option>
      </select></td>
      <td><select class="seg-estaca-ini" style="font-size:12px;padding:3px 4px;border:1px solid var(--border);border-radius:3px">${buildEstOpts(estList,seg.estacaIni)}</select></td>
      <td><select class="seg-estaca-fim" style="font-size:12px;padding:3px 4px;border:1px solid var(--border);border-radius:3px">${buildEstOpts(estList,seg.estacaFim)}</select></td>
      <td><button onclick="ganttRemoveSegmento(this)" title="Remover trecho" style="background:none;border:none;color:#c62828;cursor:pointer;font-size:14px;padding:2px 6px">✕</button></td>
    </tr>`;
  }
  const segRows = segmentos.map(s => buildSegRow(s)).join('');

  panel.innerHTML = `
    <div>
      <div style="display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:12px">
        <div style="flex:1;min-width:220px">
          <div style="font-weight:700;font-size:13px;margin-bottom:8px">${nome}</div>
          <label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px">PREDECESSORAS (IDs separados por vírgula — ex: P01, P03)</label>
          <input id="gantt-pred-input" type="text" value="${predStr}" placeholder="ex: P01, P03"
            style="width:100%;padding:6px 8px;font-size:13px;border:1px solid var(--border);border-radius:4px;box-sizing:border-box">
        </div>
        <div style="min-width:160px">
          <label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px">PRODUTIVIDADE/DIA (${unid}/dia)</label>
          <input id="gantt-prod-input" type="number" min="0" value="${prod}" placeholder="${prodPadrao ? 'Padrão: '+prodPadrao : 'Livre'}"
            style="width:100%;padding:6px 8px;font-size:13px;border:1px solid var(--border);border-radius:4px;box-sizing:border-box">
        </div>
        <div style="display:flex;gap:8px;align-items:flex-end;padding-bottom:2px;margin-top:auto">
          <button class="btn btn-primary btn-sm" onclick="ganttSalvarEdicao('${pid}')">Salvar</button>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('gantt-edit-panel').style.display='none'">Cancelar</button>
        </div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <label style="font-size:11px;font-weight:600;color:var(--muted)">TRECHOS DE EXECUÇÃO — local onde cada etapa acontece (datas independentes por trecho)</label>
          <button class="btn btn-outline btn-sm" onclick="ganttAddSegmento()">+ Adicionar trecho</button>
        </div>
        <div style="overflow-x:auto">
          <table class="t" style="min-width:580px">
            <thead><tr><th>Início</th><th>Término</th><th>Sentido</th><th>Estaca Ini</th><th>Estaca Fim</th><th style="width:32px"></th></tr></thead>
            <tbody id="gantt-seg-tbody">${segRows}</tbody>
          </table>
          ${!segmentos.length ? '<div style="text-align:center;padding:8px 0;font-size:12px;color:var(--muted)">Nenhum trecho cadastrado — clique em "+ Adicionar trecho" para definir onde o serviço executa</div>' : ''}
        </div>
      </div>
    </div>`;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
};

window.ganttAddSegmento = function() {
  const tbody = document.getElementById('gantt-seg-tbody');
  if (!tbody) return;
  const estOpts = (()=>{ const a=[]; for(let i=CONFIG.estacasCB.ini;i<=CONFIG.estacasCB.fim;i++) a.push('E'+i); return a; })()
    .map(e=>`<option>${e}</option>`).join('');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="date" class="seg-ini" style="font-size:12px;padding:3px 5px;border:1px solid var(--border);border-radius:3px"></td>
    <td><input type="date" class="seg-fim" style="font-size:12px;padding:3px 5px;border:1px solid var(--border);border-radius:3px"></td>
    <td><select class="seg-sentido" onchange="ganttSegSentidoChange(this)" style="font-size:12px;padding:3px 4px;border:1px solid var(--border);border-radius:3px">
      <option value="CB">CB</option><option value="BC">BC</option>
    </select></td>
    <td><select class="seg-estaca-ini" style="font-size:12px;padding:3px 4px;border:1px solid var(--border);border-radius:3px">${estOpts}</select></td>
    <td><select class="seg-estaca-fim" style="font-size:12px;padding:3px 4px;border:1px solid var(--border);border-radius:3px">${estOpts}</select></td>
    <td><button onclick="ganttRemoveSegmento(this)" title="Remover trecho" style="background:none;border:none;color:#c62828;cursor:pointer;font-size:14px;padding:2px 6px">✕</button></td>`;
  tbody.appendChild(tr);
};

window.ganttSegSentidoChange = function(sel) {
  const tr = sel.closest('tr');
  if (!tr) return;
  const sentido = sel.value;
  const list = sentido === 'BC'
    ? (()=>{ const a=[]; for(let i=CONFIG.estacasBC.ini;i<=CONFIG.estacasBC.fim;i++) a.push('E'+i); return a; })()
    : (()=>{ const a=[]; for(let i=CONFIG.estacasCB.ini;i<=CONFIG.estacasCB.fim;i++) a.push('E'+i); return a; })();
  const opts = list.map(e=>`<option>${e}</option>`).join('');
  tr.querySelector('.seg-estaca-ini').innerHTML = opts;
  tr.querySelector('.seg-estaca-fim').innerHTML = opts;
};

window.ganttRemoveSegmento = function(btn) {
  const tr = btn.closest('tr');
  if (tr) tr.remove();
};

window.ganttSalvarEdicao = function(pid) {
  loadGanttDados();
  if (!GANTT_DADOS.pacotes) GANTT_DADOS.pacotes = {};
  const predInput = document.getElementById('gantt-pred-input');
  const prodInput = document.getElementById('gantt-prod-input');
  if (!predInput || !prodInput) return;
  const predecessores = predInput.value.trim()
    ? predInput.value.split(',').map(s => s.trim().toUpperCase()).filter(Boolean)
    : [];

  const segmentos = [];
  const tbody = document.getElementById('gantt-seg-tbody');
  if (tbody) {
    tbody.querySelectorAll('tr').forEach(tr => {
      const ini       = tr.querySelector('.seg-ini')?.value || '';
      const fim       = tr.querySelector('.seg-fim')?.value || '';
      const sentido   = tr.querySelector('.seg-sentido')?.value || 'CB';
      const estacaIni = tr.querySelector('.seg-estaca-ini')?.value || '';
      const estacaFim = tr.querySelector('.seg-estaca-fim')?.value || '';
      if (ini || fim || estacaIni) segmentos.push({ dataInicio: ini, dataFim: fim, sentido, estacaIni, estacaFim });
    });
  }

  const existing = GANTT_DADOS.pacotes[pid] || {};
  GANTT_DADOS.pacotes[pid] = Object.assign({}, existing, {
    predecessores,
    prod: prodInput.value.trim(),
  });
  if (segmentos.length) GANTT_DADOS.pacotes[pid].segmentos = segmentos;
  else delete GANTT_DADOS.pacotes[pid].segmentos;

  salvarGanttDados();
  const panel = document.getElementById('gantt-edit-panel');
  if (panel) { panel.style.display = 'none'; panel.dataset.pid = ''; }
  transitionTo(render);
  toast('Cronograma atualizado', 'success');
};

window.ganttExportarPDF = function() {
  try {
    loadGanttDados();
    const { nodes, sorted } = calcularGantt();
    const hoje = new Date();
    const doc = new jspdf.jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    doc.setFont('helvetica', 'bold'); doc.setFontSize(13);
    doc.text('Cronograma Gantt — Av. Senador Teotônio Vilela', 14, 16);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8);
    doc.text('Gerado em ' + fmtData(hoje), 14, 22);
    const cols = ['Pacote', 'Frente', 'Predecessoras', 'Início', 'Término', 'Dur. (dias)', '% Concl.'];
    const rows = sorted.map(pid => {
      const n = nodes[pid];
      const g = (GANTT_DADOS.pacotes || {})[pid] || {};
      return [
        getCSVField(n.pacote, 'Pacote') || pid,
        getCSVField(n.pacote, 'Frente') || '',
        (g.predecessores || []).join(', ') || '—',
        n.dataInicio ? fmtData(n.dataInicio) : '—',
        n.dataFim ? fmtData(n.dataFim) : '—',
        String(n.duracao || '—'),
        fmtPct(n.pct)
      ];
    });
    doc.autoTable({
      head: [cols], body: rows, startY: 26,
      styles: { fontSize: 8, cellPadding: 2 },
      headStyles: { fillColor: [26, 22, 18], textColor: 255, fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [245, 243, 239] },
      margin: { left: 14, right: 14 }
    });
    doc.save('Gantt_TeotônioVilela_' + getLocalISODate(hoje) + '.pdf');
    toast('PDF do Gantt gerado!', 'success');
  } catch(e) { toast('Erro ao gerar PDF: ' + e.message, 'error'); }
};

  transitionTo(render);
};

window.ganttAbrirImportProject = function() {
  if (typeof XLSX === 'undefined') {
    toast('Biblioteca de Excel não carregada. Verifique a internet.', 'error', 5000);
    return;
  }
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.xlsx,.xls';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    toast('Lendo arquivo…', 'info', 2000);
    const reader = new FileReader();
    reader.onload = function(ev) {
      try { ganttProcessarExcel(ev.target.result); }
      catch(err) { toast('Erro ao ler arquivo: ' + err.message, 'error', 6000); }
    };
    reader.readAsArrayBuffer(file);
  };
  input.click();
};

function ganttProcessarExcel(buffer) {
  const wb = XLSX.read(buffer, { type: 'array' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

  if (!rows.length) { toast('Arquivo vazio ou sem dados reconhecidos.', 'error'); return; }

  // Detect column names (case-insensitive)
  const firstRow = rows[0];
  function findKey(obj, candidates) {
    const keys = Object.keys(obj).map(k => k.trim());
    for (const c of candidates) {
      const found = keys.find(k => k.toLowerCase() === c.toLowerCase());
      if (found) return found;
    }
    return null;
  }
  const kNivel   = findKey(firstRow, ['Nivel','Nível','Level']);
  const kNome    = findKey(firstRow, ['Nome','Name','Task Name']);
  const kInicio  = findKey(firstRow, ['Inicio','Início','Start']);
  const kTermino = findKey(firstRow, ['Termino','Término','Finish']);
  const kEdt     = findKey(firstRow, ['EDT','WBS']);
  const kId      = findKey(firstRow, ['ID','Id']);

  if (!kNivel || !kNome || !kInicio) {
    toast('Colunas não encontradas. Certifique-se de usar o arquivo exportado do Project.', 'error', 6000);
    return;
  }

  // Collect nivel=2 names (quadra/section labels)
  const quadraNames = {};
  rows.forEach(r => {
    const nivel = parseFloat(r[kNivel]);
    const edt   = String(r[kEdt] || '').trim();
    const nome  = String(r[kNome] || '').trim();
    if (nivel === 2 && edt && nome) quadraNames[edt] = nome;
  });

  // Collect nivel=3 tasks (service group summaries)
  const nivel3 = rows
    .filter(r => {
      const n = parseFloat(r[kNivel]);
      return n >= 3 && n < 4 && String(r[kNome] || '').trim() && String(r[kInicio] || '').trim();
    })
    .map(r => {
      const edt = String(r[kEdt] || '').trim();
      const parentEdt = edt.split('.').slice(0, 2).join('.');
      return {
        id:      String(r[kId] || '').trim(),
        edt,
        nome:    String(r[kNome] || '').trim(),
        inicio:  String(r[kInicio] || '').trim(),
        termino: String(r[kTermino] || '').trim(),
        quadra:  quadraNames[parentEdt] || ('Seção ' + parentEdt),
      };
    })
    .filter(t => t.inicio);

  if (!nivel3.length) {
    toast('Nenhuma tarefa de nível 3 encontrada no arquivo.', 'error'); return;
  }

  window._IMPORT_DATA = nivel3;
  ganttMostrarMapeamento(nivel3);
}

function ganttMostrarMapeamento(nivel3) {
  const pacotes = STATE.pacotes
    .filter(p => getCSVField(p, 'ID'))
    .sort((a, b) => String(getCSVField(a,'ID')).localeCompare(String(getCSVField(b,'ID'))));

  const pacoteOpts = '<option value="">— não mapear —</option>' +
    pacotes.map(p => {
      const pid  = getCSVField(p, 'ID');
      const nome = getCSVField(p, 'Pacote') || '';
      return `<option value="${pid}">${pid} — ${nome}</option>`;
    }).join('');

  // Pre-select based on keyword match between task name and package name/frente
  function autoMatch(taskNome) {
    const tn = taskNome.toLowerCase();
    for (const p of pacotes) {
      const pn = (getCSVField(p,'Pacote') + ' ' + getCSVField(p,'Frente')).toLowerCase();
      // Simple keyword overlap
      const words = tn.split(/\s+/).filter(w => w.length > 3);
      if (words.some(w => pn.includes(w))) return getCSVField(p, 'ID');
    }
    return '';
  }

  const tRows = nivel3.map((t, i) => {
    const auto = autoMatch(t.nome);
    const opts = pacoteOpts.replace(`value="${auto}"`, `value="${auto}" selected`);
    return `<tr>
      <td style="font-size:11px;color:var(--muted);white-space:nowrap">${t.quadra.substring(0,30)}</td>
      <td style="font-weight:600;font-size:12px">${t.nome}</td>
      <td class="t-mono" style="font-size:11px;white-space:nowrap">${t.inicio}</td>
      <td class="t-mono" style="font-size:11px;white-space:nowrap">${t.termino || '—'}</td>
      <td><select data-idx="${i}" style="font-size:11px;padding:3px 5px;border:1px solid var(--border);border-radius:3px;width:100%;min-width:180px">${opts}</select></td>
    </tr>`;
  }).join('');

  const panel = document.getElementById('gantt-edit-panel');
  if (!panel) { toast('Abra o Cronograma → aba Gantt primeiro.', 'info'); return; }
  panel.style.display = 'block';
  panel.dataset.pid = '';
  panel.innerHTML = `
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-weight:700;font-size:13px">Mapeamento: Tarefas do Project → Pacotes</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Selecione qual pacote do sistema corresponde a cada tarefa do Project. Datas serão importadas automaticamente.</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="ganttAplicarMapeamento()">✓ Aplicar datas ao Gantt</button>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('gantt-edit-panel').style.display='none'">Cancelar</button>
        </div>
      </div>
      <div style="max-height:380px;overflow-y:auto;border:1px solid var(--border);border-radius:6px">
        <table class="t">
          <thead style="position:sticky;top:0;z-index:1">
            <tr><th>Seção (Project)</th><th>Tipo de Serviço</th><th>Início</th><th>Término</th><th style="min-width:200px">Pacote do Sistema</th></tr>
          </thead>

window.ganttAplicarMapeamento = function() {
  const nivel3 = window._IMPORT_DATA;
  if (!nivel3) { toast('Nenhum dado importado.', 'error'); return; }
  loadGanttDados();
  if (!GANTT_DADOS.pacotes) GANTT_DADOS.pacotes = {};

  const selects = document.querySelectorAll('#gantt-edit-panel select[data-idx]');
  // Aggregate dates per package (min start, max end)
  const mapa = {};
  selects.forEach(sel => {
    const pid = sel.value; if (!pid) return;
    const t = nivel3[parseInt(sel.dataset.idx)];
    if (!t || !t.inicio) return;
    const ini = parseISODate(t.inicio);
    const fim = t.termino ? parseISODate(t.termino) : null;
    if (!ini || isNaN(ini.getTime())) return;
    if (!mapa[pid]) mapa[pid] = { inicio: ini, termino: fim };
    else {
      if (ini < mapa[pid].inicio) mapa[pid].inicio = ini;
      if (fim && (!mapa[pid].termino || fim > mapa[pid].termino)) mapa[pid].termino = fim;
    }
  });

  let count = 0;
  Object.entries(mapa).forEach(([pid, datas]) => {
    if (!GANTT_DADOS.pacotes[pid]) GANTT_DADOS.pacotes[pid] = { predecessores: [] };
    GANTT_DADOS.pacotes[pid].dataProjetada    = true;
    GANTT_DADOS.pacotes[pid].dataInicioProject = getLocalISODate(datas.inicio);
    GANTT_DADOS.pacotes[pid].dataFimProject    = datas.termino ? getLocalISODate(datas.termino) : null;
    count++;
  });

  // Set project start to earliest imported date
  const inicios = Object.values(mapa).map(d => d.inicio).filter(Boolean);
  if (inicios.length) {
    const min = new Date(Math.min(...inicios.map(d => d.getTime())));
    GANTT_DADOS.dataInicio = getLocalISODate(min);
  }

  salvarGanttDados();
  const panel = document.getElementById('gantt-edit-panel');
  if (panel) panel.style.display = 'none';
  window._IMPORT_DATA = null;
  toast(`${count} pacote${count !== 1 ? 's' : ''} atualizado${count !== 1 ? 's' : ''} com datas do Project!`, 'success', 4000);
  transitionTo(render);
};

let PLAN_DADOS = null;

function loadPlanDados() {
  if (PLAN_DADOS) return PLAN_DADOS;
  try {
    const raw = localStorage.getItem('teotonio_plan_reverso_v1');
    if (raw) PLAN_DADOS = JSON.parse(raw);
    else PLAN_DADOS = {};
  } catch(e) { PLAN_DADOS = {}; }
  return PLAN_DADOS;
}

function salvarPlanDados() {
  try { localStorage.setItem('teotonio_plan_reverso_v1', JSON.stringify(PLAN_DADOS)); } catch(e) {}
}

window.atualizarPlan = function(pacoteId, campo, valor) {
  if (!PLAN_DADOS) loadPlanDados();
  if (!PLAN_DADOS[pacoteId]) PLAN_DADOS[pacoteId] = { prod: '', dataFim: '' };
  PLAN_DADOS[pacoteId][campo] = valor;
  salvarPlanDados();
  transitionTo(render);
};

function calcularDataInicioReversa(dataFimStr, diasDuracao) {
  if (!dataFimStr || diasDuracao <= 0) return null;
  const dataFim = parseISODate(dataFimStr);
  if (!dataFim || isNaN(dataFim)) return null;

  let d = new Date(dataFim.getTime());
  let diasRestantes = Math.ceil(diasDuracao) - 1; 
  if (diasRestantes < 0) diasRestantes = 0;

  while (diasRestantes > 0) {
    d.setDate(d.getDate() - 1);
    if (d.getDay() !== 0) {
      diasRestantes--;
    }
  }
  return d;
}

function renderCronograma() {
  return `

      <button class="btn-toggle ${CRONOGRAMA_ABA==='gantt'?'active':''}" onclick="setCronogramaAba('gantt')">

    ${CRONOGRAMA_ABA === 'gantt' ? renderGanttHTML() : renderCronogramaReverso()}

function renderCronogramaReverso() {
  loadPlanDados();
  const av = calcularAvancoPorPacote();
  const pacotesAtivos = STATE.pacotes.filter(p => getCSVField(p, 'Status') !== 'Histórico' && getCSVField(p, 'ID'));
  
  const porFrente = {};
  pacotesAtivos.forEach(p => {
    const f = getCSVField(p, 'Frente') || 'Outros';
    if (!porFrente[f]) porFrente[f] = [];
    porFrente[f].push(p);
  });

  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  let html = '<div class="card stagger-item"><div class="card-header"><div><div class="card-title">Motor de Planejamento Reverso</div><div class="card-title-sub">Defina o término alvo. O sistema calcula quando iniciar o SALDO RESTANTE usando a produtividade padrão (ou a que você digitar).</div></div></div><div class="card-body flush" style="overflow-x:auto"><table class="t" style="min-width: 900px;"><thead><tr><th style="width: 25%">Pacote / Serviço</th><th class="t-num" style="text-align: right; width: 10%">Saldo a Executar</th><th style="width: 15%">Término Alvo</th><th style="width: 15%">Produtividade/dia</th><th class="t-num" style="text-align: center; width: 10%">Duração (Saldo)</th><th style="width: 25%">Data Início Necessária</th></tr></thead><tbody>';

  Object.entries(porFrente).forEach(([frente, pacotes]) => {
    html += '<tr class="summary"><td colspan="6">' + frente + '</td></tr>';
    
    pacotes.forEach(p => {
      const pid = getCSVField(p, 'ID');
      const plan = PLAN_DADOS[pid] || {};
      
      const prodPadrao = PRODUTIVIDADE_PADRAO[pid] || '';
      const prodAtual = (plan.prod !== undefined && plan.prod !== '') ? plan.prod : prodPadrao;
      const dataFimAtual = plan.dataFim || '';
      
      const avancoPacote = av[pid];
      const qtdTotal = num(getCSVField(p, 'Qtd Estimada'));
      const qtdExecutada = avancoPacote ? avancoPacote.qtdExecutada : 0;
      const saldo = Math.max(0, qtdTotal - qtdExecutada); 
      const unid = getCSVField(p, 'Unidade Física') || '';
      
      let duracaoDias = 0;
      let dataInicioStr = '<span style="color:var(--muted)">Aguardando dados...</span>';
      let alertClass = '';

      if (saldo === 0) {
           dataInicioStr = '<span style="color:var(--grn); font-weight:bold;">100% Concluído</span>';
      } else if (prodAtual > 0 && dataFimAtual) {
        duracaoDias = saldo / prodAtual;
        const dataInicio = calcularDataInicioReversa(dataFimAtual, duracaoDias);
        
        if (dataInicio) {
          const strFormatada = fmtData(dataInicio);
          if (dataInicio < hoje) {
            alertClass = 'color: var(--red); font-weight: bold;';
            dataInicioStr = '⚠️ ' + strFormatada + ' (Atrasado!)';
          } else {
            alertClass = 'color: var(--blu); font-weight: bold;';
            dataInicioStr = '📅 ' + strFormatada;
          }
        }
      }

      html += '<tr><td><strong>' + getCSVField(p, 'Pacote') + '</strong>';
      html += '<div style="font-size: 10px; color: var(--muted); margin-top: 2px;">Total: ' + fmtNum(qtdTotal) + ' | Executado: ' + fmtNum(qtdExecutada) + '</div></td>';
      
      const corSaldo = saldo > 0 ? 'var(--text)' : 'var(--grn)';
      html += '<td class="t-num" style="color: ' + corSaldo + '; font-weight: 600; text-align: right;">' + fmtNum(saldo) + ' ' + unid + '</td>';
      
      if (saldo > 0) {
        html += '<td><input type="date" style="padding: 4px 8px; font-size: 12px; border: 1px solid var(--border); border-radius: 4px;" value="' + dataFimAtual + '" onchange="atualizarPlan(\'' + pid + '\', \'dataFim\', this.value)"></td>';
        
        const placeHolderTxt = prodPadrao ? 'Padrão: ' + prodPadrao : 'Livre';
        const valProd = plan.prod !== undefined ? plan.prod : '';
        html += '<td><div style="display:flex; align-items:center; gap: 4px;">';
        html += '<input type="number" style="width: 70px; padding: 4px 8px; font-size: 12px; border: 1px solid var(--border); border-radius: 4px;" placeholder="' + placeHolderTxt + '" value="' + valProd + '" onkeyup="if(event.key===\'Enter\') atualizarPlan(\'' + pid + '\', \'prod\', this.value)" onblur="atualizarPlan(\'' + pid + '\', \'prod\', this.value)">';
        html += '<span style="font-size: 11px; color: var(--muted);">' + unid + '/dia</span></div></td>';
      } else {
        html += '<td>—</td><td>—</td>';
      }
      
      html += '<td class="t-num" style="text-align: center;">' + (duracaoDias > 0 ? Math.ceil(duracaoDias) + ' dias' : '—') + '</td>';
      html += '<td style="font-size: 13px; ' + alertClass + '">' + dataInicioStr + '</td></tr>';
    });
  });

  html += '</tbody></table></div></div>';
  return html;
}

    const moreText = rdos.length > 100 ? `<tr><td colspan="9" style="text-align:center;color:var(--muted);font-size:11px;padding:14px">Mostrando 100 mais recentes de ${rdos.length}</td></tr>` : '';

    bodyContent = `
      <table class="t">
        <thead><tr>
          <th>ID</th><th>Data</th><th>Turno</th><th>Pacote</th>
          <th class="t-num" style="text-align:right">Qtd</th>
          <th>Estaca</th><th>Equipe</th><th>Apontador</th><th></th>
        </tr></thead>
        <tbody>
          ${tableRows}
          ${moreText}
        </tbody>
      </table>
    `;
  }
  
  return `
    <div class="card stagger-item" style="animation-delay: .1s">
      <div class="card-header">
        <div>
          <div class="card-title">Serviços lançados</div>
          <div class="card-title-sub">Cada linha = 1 pacote executado · alimenta avanço físico e medição</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${rdos.length > 0 ? `<button class="btn btn-outline btn-sm" onclick="exportarHistoricoCSV()">⬇ CSV</button>` : ''}

        </div>
      </div>
      <div class="card-body flush">
        ${bodyContent}
      </div>
    </div>
  `;
}

window.exportarHistoricoCSV = function() {
  const rdos = [...STATE.rdoavanco].reverse();
  const header = ['ID','Data','Turno','Pacote','Quantidade','Unidade','Estaca','Equipe','Apontador'];
  const rows = rdos.map(r => [
    getCSVField(r,'ID')||'',
    fmtData(getCSVField(r,'Data')),
    getCSVField(r,'Turno')||'',
    getCSVField(r,'Pacote_Nome')||'',
    fmtNum(num(getCSVField(r,'Quantidade'))),
    getCSVField(r,'Unidade')||'',
    getCSVField(r,'Local_Estaca')||'',
    getCSVField(r,'Equipe')||getCSVField(r,'Subcontratado')||'',
    getCSVField(r,'Apontador')||''
  ].map(v => `"${String(v).replace(/"/g,'""')}"`));
  const csv = [header.join(';'), ...rows.map(r => r.join(';'))].join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'Historico_Servicos.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('CSV exportado com sucesso!', 'success');
};

window.histSalvarEdicao = async function(idx) {
  const rdos = [...STATE.rdoavanco].reverse();
  const r = rdos[idx];
  const id = getCSVField(r, 'ID');
  if (!id) { toast('ID do lançamento não encontrado', 'error'); return; }

  const data      = (document.getElementById(`hedit-data-${idx}`)?.value || '').trim();
  const turno     = document.getElementById(`hedit-turno-${idx}`)?.value || 'Diurno';
  const pacoteId  = document.getElementById(`hedit-pacote-${idx}`)?.value || '';
  const qtd       = parseFloat(document.getElementById(`hedit-qtd-${idx}`)?.value) || 0;
  const sentido   = document.getElementById(`hedit-sentido-${idx}`)?.value || 'CB';
  const estIni    = (document.getElementById(`hedit-estini-${idx}`)?.value || '').trim();
  const estFim    = (document.getElementById(`hedit-estfim-${idx}`)?.value || '').trim();
  const equipe    = (document.getElementById(`hedit-equipe-${idx}`)?.value || '').trim();
  const apontador = (document.getElementById(`hedit-apontador-${idx}`)?.value || '').trim();
  const obs       = (document.getElementById(`hedit-obs-${idx}`)?.value || '').trim();

  if (!data) { toast('Informe a data', 'error'); return; }

  let localEstaca = '';
  if (estIni && estFim) localEstaca = `${estIni} a ${estFim} (${sentido})`;
  else if (estIni) localEstaca = `${estIni} (${sentido})`;

  const p = STATE.pacotes.find(pp => getCSVField(pp, 'ID') === pacoteId);
  const pacoteNome = p ? getCSVField(p, 'Pacote') : getCSVField(r, 'Pacote_Nome');
  const unidade    = p ? (getCSVField(p, 'Unidade Física') || '') : (getCSVField(r, 'Unidade') || '');

  const payload = { id, data, turno, pacote_id: pacoteId, pacote_nome: pacoteNome, quantidade: qtd, unidade, local_estaca: localEstaca, equipe, subcontratado: equipe, apontador, observacao: obs };

  const btn = document.getElementById(`hedit-btn-${idx}`);
  if (btn) { btn.disabled = true; btn.innerHTML = '⏳'; }

  try {
    const result = await jsonp(CONFIG.appsScript, { action: 'updateRDO', payload: JSON.stringify(payload) }, 0);
    if (!result.ok) throw new Error(result.error || 'Erro desconhecido');
    toast('✓ Lançamento atualizado', 'success');
    histCancelarEdicao(idx);
    setTimeout(() => carregarTudo(), 800);
  } catch(e) {
    if (btn) { btn.disabled = false; btn.innerHTML = 'Salvar'; }
    toast('Falha ao atualizar: ' + e.message, 'error', 6000);
  }
};

window.histDeletarServico = async function(idx) {
  const rdos = [...STATE.rdoavanco].reverse();
  const r = rdos[idx];
  const id = getCSVField(r, 'ID');
  if (!id) { toast('ID do lançamento não encontrado', 'error'); return; }

  const pacote = getCSVField(r, 'Pacote_Nome') || getCSVField(r, 'Pacote_ID') || '';
  const data   = fmtData(getCSVField(r, 'Data'));
  if (!confirm(`Apagar este lançamento?\n\n${data} · ${pacote}\n\nEsta ação não pode ser desfeita.`)) return;

  const antes = STATE.rdoavanco.length;
  try {
    const result = await jsonp(CONFIG.appsScript, { action: 'deleteRDO', id }, 0);
    if (!result.ok) throw new Error(result.error || 'Erro desconhecido');

    // Remoção otimista: tira da tela na hora, sem esperar o CSV publicado
    // (que é cacheado pelo Google e demora minutos para atualizar).
    STATE.rdoavanco = STATE.rdoavanco.filter(x => String(getCSVField(x,'ID')).trim() !== String(id).trim());
    render();
    toast('✓ Lançamento apagado', 'success');

    // Reconcilia com o servidor e detecta backend que insere em vez de apagar.
    await verificarBackendNaoCriou(antes, 1, 'apagar');
  } catch(e) {
    toast('Falha ao apagar: ' + e.message, 'error', 6000);
  }
};

// Recarrega do servidor e confere se o nº de serviços DIMINUIU como esperado.
// Se aumentou, o handler deleteRDO do Apps Script está inserindo linhas em vez
// de apagar (case 'deleteRDO' ausente no doGet → cai no default que grava).
async function verificarBackendNaoCriou(antes, esperadoRemovido, contexto) {
  await new Promise(r => setTimeout(r, 4000)); // dá tempo do CSV publicado atualizar
  await carregarTudo();
  const depois = STATE.rdoavanco.length;
  if (depois > antes) {
    toast(
      '⚠️ ATENÇÃO: o servidor CRIOU ' + (depois - antes) + ' linha(s) em vez de apagar.\n' +
      'O Apps Script está sem o tratamento de "deleteRDO" no doGet. ' +
      'Cole o arquivo Code.gs atualizado e republique o app.',
      'error', 0
    );
    return false;
  }
  return true;
}

window.apagarDuplicatasRDO = async function() {
  // Conta as duplicatas localmente só para avisar o usuário do volume.
  const rdos = [...STATE.rdoavanco];
  const vistas = new Set();
  let qtdDup = 0;
  rdos.forEach(r => {
    const chave = [
      String(getCSVField(r,'Data')        || '').trim(),
      String(getCSVField(r,'Turno')       || '').trim().toLowerCase(),
      String(getCSVField(r,'Pacote_ID')   || getCSVField(r,'Pacote_id') || '').trim().toLowerCase(),
      String(getCSVField(r,'Quantidade')  || '').trim(),
      String(getCSVField(r,'Apontador')   || '').trim().toLowerCase(),
      String(getCSVField(r,'Local_Estaca')|| '').trim().toLowerCase(),
    ].join('|');
    if (vistas.has(chave)) qtdDup++; else vistas.add(chave);
  });

  // Se há fila pendente, ela está reenviando e RECRIANDO duplicatas.
  // Não adianta limpar sem antes esvaziar a fila.
  const naFila = outboxLer().length;
  if (naFila > 0) {
    if (confirm(`⚠️ Há ${naFila} lançamento(s) na fila de envio que estão sendo reenviados e RECRIANDO duplicatas.\n\nPrecisa descartar a fila ANTES de limpar.\n\nDescartar a fila agora?`)) {
      outboxGravar([]);
      atualizarIndicadorOutbox();
      toast('Fila descartada. Agora clique em "Apagar duplicatas" de novo.', 'info', 6000);
    }
    return;
  }

  if (qtdDup === 0) {
    toast('Nenhuma duplicata encontrada no histórico atual.', 'info');
    return;
  }

  if (!confirm(`Foram encontradas ~${qtdDup} linha(s) duplicada(s).\n\nA limpeza roda no servidor (faz backup automático antes) e apaga todas de uma vez.\n\nApagar agora?`)) return;

  const btn = document.querySelector('[onclick="apagarDuplicatasRDO()"]');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Limpando no servidor…'; }

  try {
    // Uma única chamada limpa milhares de linhas no servidor (com backup).
    const result = await jsonp(CONFIG.appsScript, { action: 'limparDuplicados' }, 0, 0, null);
    if (!result.ok) throw new Error(result.error || 'erro');
    toast(`✓ ${result.removidas} duplicata(s) removida(s) de ${result.total}. Backup: ${result.backup||'criado'}.`, 'success', 7000);
    // Espera o CSV publicado atualizar e recarrega.
    setTimeout(() => carregarTudo(), 4000);
  } catch(e) {
    const extra = /Ação desconhecida/i.test(e.message)
      ? ' — republique o Code.gs atualizado no Apps Script (Nova versão).'
      : '';
    toast('Falha ao limpar: ' + e.message + extra, 'error', 0);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '🗑 Apagar duplicatas'; }
  }
};
