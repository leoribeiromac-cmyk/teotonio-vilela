function gerarPDFsEmLote() {
  const datas = [...SELECTED_RDO_DATAS].sort();
  if (datas.length === 0) { toast('Selecione ao menos um RDO', 'error'); return; }

  // Bloqueia a exportação se alguma data selecionada tem duplicata SEM oficial
  // definido — assim duplicatas não resolvidas não passam despercebidas.
  const naoResolvidas = datas.filter(d => rdosDaData(d).length > 1 && !getOficialRDO(d));
  if (naoResolvidas.length) {
    const lista = naoResolvidas.map(d =>
      `• ${fmtData(d)} — IDs em conflito: ${rdosDaData(d).map(r => getCSVField(r,'ID')).join(', ')}`
    ).join('<br>');
    toast(`⛔ Exportação bloqueada: ${naoResolvidas.length} data(s) com duplicata não resolvida. Defina o RDO oficial (ou exclua o errado) antes de exportar:<br>${lista}`, 'error', 0);
    if (naoResolvidas.length === 1) resolverDuplicata(naoResolvidas[0]);
    return;
  }

  toast(`Gerando ${datas.length} PDF${datas.length > 1 ? 's' : ''}… aguarde`, 'info', datas.length * 1000 + 1000);
  datas.forEach((data, i) => setTimeout(() => gerarPDFDiario(data), i * 900));
}

// ====================================================================
// RDO DIÁRIO — visualizar, resolver duplicatas e escolher o oficial
// ====================================================================

// Todos os registros de RDO Diário de uma data (ISO 'YYYY-MM-DD').
function rdosDaData(data) {
  return (STATE.rdodiario || []).filter(r => {
    const rd = parseISODate(getCSVField(r, 'Data'));
    return rd && getLocalISODate(rd) === data;
  });
}

// Serviços (RDO_Avanco) lançados numa data.
function servicosDaData(data) {
  return (STATE.rdoavanco || []).filter(r => {
    const rd = parseISODate(getCSVField(r, 'Data'));
    return rd && getLocalISODate(rd) === data;
  });
}

// Meses ('YYYY-MM') com qualquer dado (diário OU serviço lançado).
function mesesComDados() {
  const s = new Set();
  const add = arr => (arr || []).forEach(r => {
    const d = parseISODate(getCSVField(r, 'Data'));
    if (d && !isNaN(d)) s.add(getLocalISODate(d).slice(0, 7));
  });
  add(STATE.rdodiario);
  add(STATE.rdoavanco);
  return [...s];
}

// "RDO oficial" da data: escolha do usuário (só no navegador, não mexe na
// planilha). Usado para decidir qual relatório exportar quando há duplicata.
function getOficiaisRDO() {
  try { return JSON.parse(localStorage.getItem(CONFIG.ls.oficialRDO) || '{}'); } catch (e) { return {}; }
}
function getOficialRDO(data) { return getOficiaisRDO()[data] || ''; }
function setOficialRDO(data, id) {
  const o = getOficiaisRDO();
  if (id) o[data] = String(id); else delete o[data];
  try { localStorage.setItem(CONFIG.ls.oficialRDO, JSON.stringify(o)); } catch (e) {}
}

function toggleSabadoUtil() {

  render();
}

// Resumo legível de um registro de RDO Diário.
function resumoRDO(r) {
  return {
    id: getCSVField(r, 'ID') || '',
    encarregado: getCSVField(r, 'Encarregado') || '—',
    apontadorD: getCSVField(r, 'Apontador_Diurno') || getCSVField(r, 'Apontador') || '—',
    apontadorN: getCSVField(r, 'Apontador_Noturno') || '—',
    climaM: getCSVField(r, 'Clima_Manha') || '—',
    climaT: getCSVField(r, 'Clima_Tarde') || '—',
    climaN: getCSVField(r, 'Clima_Noite') || '—',
    hasNot: !!(getCSVField(r, 'Apontador_Noturno') || String(getCSVField(r, 'Tem_Turno_Noturno')).toLowerCase() === 'true' || getCSVField(r, 'Tem_Turno_Noturno') === 'Sim'),
    visitas: getCSVField(r, 'Visitas') || '',
    ocorrencias: getCSVField(r, 'Ocorrencias') || '',
    obs: getCSVField(r, 'Observacoes_Gerais') || ''
  };
}

// Efetivo detalhado (categoria → qtd) por turno, a partir do Efetivo_JSON.
function efetivoDetalhe(r) {
  let ef = {};
  try { ef = JSON.parse(getCSVField(r, 'Efetivo_JSON') || getCSVField(r, 'efetivo_json') || '{}'); } catch (e) {}
  const linhas = (padrao, direto, indireto) => {
    const out = [];
    Object.entries(padrao || {}).forEach(([k, v]) => { if (parseInt(v) > 0) out.push([k, parseInt(v)]); });
    (direto || []).concat(indireto || []).forEach(c => {
      const q = parseInt(c && c.qtd) || 0;
      if (q > 0) out.push([(c && (c.nome || c.label || c.cat)) || 'Outro', q]);
    });
    return out;
  };
  return {
    diurno: linhas(ef.padrao_diurno, ef.customDireto_diurno, ef.customIndireto_diurno),
    noturno: linhas(ef.padrao_noturno, ef.customDireto_noturno, ef.customIndireto_noturno)
  };
}

      <button class="btn btn-primary btn-sm" onclick="gerarPDFDiario('${data}')">📄 Gerar PDF</button>
    </div>
  `);
}

// (5) RESOLVER DUPLICATA — mostra os RDOs da data lado a lado para escolher o
// oficial ou excluir o errado.
function resolverDuplicata(data) {
  const lista = rdosDaData(data);
  if (lista.length < 2) { toast('Não há duplicata nesta data.', 'info'); fecharModalRDO(); return; }
  const oficialId = getOficialRDO(data);
  const soma = arr => arr.reduce((a, [, v]) => a + v, 0);
  const efTxt = arr => arr.length ? arr.map(([k, v]) => `${k}: <strong>${v}</strong>`).join(' · ') : '—';
  const cards = lista.map(r => {
    const s = resumoRDO(r);
    const det = efetivoDetalhe(r);
    const ehOf = oficialId && String(s.id).trim() === String(oficialId).trim();
    return `
      <div style="flex:1;min-width:250px;border:2px solid ${ehOf ? 'var(--grn)' : 'var(--border)'};border-radius:var(--r);padding:14px;background:${ehOf ? 'var(--grn-l)' : 'var(--bg)'}">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:8px">
          <span class="t-mono" style="font-size:12px;font-weight:700">${s.id || '(sem ID)'}</span>
          ${ehOf ? '<span class="pill pill-grn">★ oficial</span>' : ''}
        </div>
        <div style="font-size:12px;line-height:1.7">
          <div><span style="color:var(--muted)">Encarregado:</span> ${s.encarregado}</div>
          <div><span style="color:var(--muted)">Apontador (D):</span> ${s.apontadorD}</div>
          <div><span style="color:var(--muted)">Apontador (N):</span> ${s.apontadorN}</div>
          <div><span style="color:var(--muted)">Clima:</span> ${s.climaM} · ${s.climaT} · ${s.climaN}</div>
          <div><span style="color:var(--muted)">Noturno:</span> ${s.hasNot ? 'Sim' : 'Não'}</div>
          <div style="margin-top:4px"><span style="color:var(--muted)">Efetivo diurno (${soma(det.diurno)}):</span> ${efTxt(det.diurno)}</div>
          <div><span style="color:var(--muted)">Efetivo noturno (${soma(det.noturno)}):</span> ${efTxt(det.noturno)}</div>
        </div>
        <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">
          <button class="btn btn-sm btn-outline" onclick="visualizarRDO('${s.id}')">👁 Ver completo</button>
          ${ehOf ? '' : `<button class="btn btn-sm btn-primary" onclick="definirOficial('${data}','${s.id}')">✓ Definir como oficial</button>`}
          <button class="btn btn-sm" onclick="excluirRDODiario('${data}','${s.id}')" style="background:var(--red);color:#fff;border:none">🗑 Excluir</button>
        </div>
      </div>`;
  }).join('');
  abrirModalRDO(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <h2 style="font-size:17px;font-weight:700;margin:0">⚖ Resolver duplicata — ${fmtData(data)}</h2>
      <button class="btn btn-sm btn-outline" onclick="fecharModalRDO()">Fechar</button>
    </div>
    <p style="font-size:13px;color:var(--muted);margin:4px 0 14px;line-height:1.6">
      Há <strong>${lista.length}</strong> RDOs nesta data. Escolha o <strong>oficial</strong> (usado na exportação) ou exclua o errado.
      <span style="color:var(--red);font-weight:600">⚠ Excluir altera a planilha de produção (RDO_Diario) e não pode ser desfeito.</span>
    </p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:stretch">${cards}</div>
  `);
}

// (4) Define qual RDO é o oficial da data (só no navegador).
function definirOficial(data, id) {
  setOficialRDO(data, id);
  toast('✓ RDO oficial definido para ' + fmtData(data), 'success');
  render();
  resolverDuplicata(data);
}

// (5) EXCLUIR um RDO Diário (altera a planilha de produção). Requer o backend
// 'deleteRDODiario' no Code.gs republicado no Apps Script.
// A confirmação é IN-PAGE (modal no DOM) em vez de window.confirm(), que
// bloqueia automação de navegador e não combina com o estilo do app.
function excluirRDODiario(data, id) {
  if (!id) { toast('ID não informado', 'error'); return; }
  abrirModalRDO(`
    <div style="max-width:480px">
      <h2 style="font-size:17px;font-weight:700;margin:0 0 10px">🗑 Excluir RDO Diário</h2>
      <p style="font-size:13px;line-height:1.6;margin:0 0 8px">
        Confirma a exclusão do RDO <strong>${id}</strong> de <strong>${fmtData(data)}</strong>?
      </p>
      <p style="font-size:13px;color:var(--red);font-weight:600;margin:0 0 18px">
        ⚠ Esta ação ALTERA a planilha de produção (RDO_Diario) e NÃO pode ser desfeita.
      </p>
      <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
        <button class="btn btn-sm btn-outline" onclick="resolverDuplicata('${data}')">Cancelar</button>
        <button class="btn btn-sm" id="btnConfirmaExclui" onclick="executarExclusaoRDODiario('${data}','${id}')" style="background:var(--red);color:#fff;border:none">Excluir definitivamente</button>
      </div>
    </div>
  `);
}

async function executarExclusaoRDODiario(data, id) {
  const btn = document.getElementById('btnConfirmaExclui');
  if (btn) { btn.disabled = true; btn.textContent = 'Excluindo…'; }
  try {
    const result = await jsonp(CONFIG.appsScript, { action: 'deleteRDODiario', id, data }, 0);
    if (!result.ok) {
      if (/Ação desconhecida/i.test(result.error || '')) {
        toast('O backend ainda não tem "deleteRDODiario". Cole o Code.gs atualizado no Apps Script e republique (Nova versão).', 'error', 0);
        if (btn) { btn.disabled = false; btn.textContent = 'Excluir definitivamente'; }
        return;
      }
      console.log('deleteRDODiario falhou:', result);
      if (result.idsVistos) console.log('IDs reais na aba RDO_Diario:', result.idsVistos);
      throw new Error(result.error || 'Erro desconhecido');
    }
    // Remoção otimista (o CSV publicado demora a atualizar).
    STATE.rdodiario = (STATE.rdodiario || []).filter(x => String(getCSVField(x, 'ID')).trim() !== String(id).trim());
    if (String(getOficialRDO(data)).trim() === String(id).trim()) setOficialRDO(data, '');
    toast('✓ RDO Diário ' + id + ' excluído', 'success');
    render();
    if (rdosDaData(data).length > 1) resolverDuplicata(data); else fecharModalRDO();
  } catch (e) {
    toast('Falha ao excluir: ' + e.message, 'error', 6000);
    if (btn) { btn.disabled = false; btn.textContent = 'Excluir definitivamente'; }
  }
}

function renderHistoricoDiarios() {
  SELECTED_RDO_DATAS = new Set();
  const diarios = [...(STATE.rdodiario||[])].reverse();

  // Conta RDOs por data: data com >1 relatório = duplicata a verificar.
  const contagemPorData = {};
  const datasSet = new Set();
  diarios.forEach(r => {
    const dO = parseISODate(getCSVField(r, 'Data'));
    const ds = dO ? getLocalISODate(dO) : String(getCSVField(r, 'Data') || '');
    if (!ds) return;
    contagemPorData[ds] = (contagemPorData[ds] || 0) + 1;
    datasSet.add(ds);
  });
  const datasDuplicadas = Object.keys(contagemPorData).filter(d => contagemPorData[d] > 1).sort();
  // Avalia TODOS os meses com dados (diário OU serviços) — ou o mês filtrado —
  // em vez de só os meses que já têm RDO Diário.
  const mesesAvaliar = STATE.filtros.mes ? [STATE.filtros.mes] : mesesComDados();
  const faltantes = diasUteisSemRDO(datasSet, mesesAvaliar);

  // Banners de aviso (tarefas: verificar duplicatas / dia útil sem lançamento).
  let avisosHtml = '';
  if (datasDuplicadas.length) {
    const naoResolvidas = datasDuplicadas.filter(d => !getOficialRDO(d)).length;
    const chips = datasDuplicadas.map(d => {
      const ok = !!getOficialRDO(d);
      return `<button class="btn btn-sm btn-outline" onclick="resolverDuplicata('${d}')" style="margin:4px 4px 0 0;white-space:nowrap">${ok ? '✓' : '⚖'} ${fmtData(d)} (${contagemPorData[d]}×)${ok ? ' — resolvido' : ' — resolver'}</button>`;
    }).join('');
    avisosHtml += `
      <div style="margin:0 0 12px;padding:10px 14px;border-radius:var(--r-sm);background:var(--red-l);border:1px solid var(--red);font-size:13px">
        <strong style="color:var(--red)">⚠ ${datasDuplicadas.length} data(s) com mais de um RDO${naoResolvidas ? ` (${naoResolvidas} sem oficial definido)` : ''}.</strong>
        Defina o RDO <em>oficial</em> de cada data (ou exclua o errado) antes de exportar — a exportação em lote fica <strong>bloqueada</strong> enquanto houver duplicata não resolvida.
        <div style="margin-top:4px">${chips}</div>
      </div>`;
  }
  if (faltantes.length) {
    const regra = sabadoEhUtil() ? 'seg–sáb' : 'seg–sex';
    const linhas = faltantes.map(f =>
      `<div style="margin-top:4px"><strong>${nomeMesAno(f.mes)}:</strong> ${f.dias.map(fmtData).join(' · ')}</div>`
    ).join('');
    avisosHtml += `
      <div style="margin:0 0 12px;padding:10px 14px;border-radius:var(--r-sm);background:var(--ylw-l);border:1px solid var(--ylw-d);font-size:13px">
        <strong style="color:var(--ylw-d)">📌 Dias úteis sem RDO</strong>
        <span style="font-size:12px;color:var(--muted)">(${regra}, exceto feriados nacionais; mês corrente só até hoje)</span>
        ${linhas}
      </div>`;
  }

  let bodyContent = '';
  if (diarios.length === 0) {
    bodyContent = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Nenhum RDO Diário ainda</div><br><button class="btn btn-primary" onclick="navigate(\'rdodiario\')">+ Criar primeiro RDO Diário</button></div>';
  } else {
    const tableRows = diarios.map(r => {
      let total = 0;
      try {
         const ef = JSON.parse(getCSVField(r, 'Efetivo_JSON') || '{}');
         const diu = ef.padrao_diurno || {};
         const not = ef.padrao_noturno || {};
         Object.values(diu).forEach(v => total += parseInt(v) || 0);
         Object.values(not).forEach(v => total += parseInt(v) || 0);
         (ef.customDireto_diurno || []).forEach(v => total += parseInt(v.qtd) || 0);
         (ef.customIndireto_diurno || []).forEach(v => total += parseInt(v.qtd) || 0);
         (ef.customDireto_noturno || []).forEach(v => total += parseInt(v.qtd) || 0);
         (ef.customIndireto_noturno || []).forEach(v => total += parseInt(v.qtd) || 0);
      } catch(e) {
         const cats = ['Servente','Pedreiro','Armador','Carpinteiro','OpMaquina','Sinaleiro','Encarregado'];
         cats.forEach(c => {
           total += parseInt(getCSVField(r, c+'_Diurno')) || 0;
           total += parseInt(getCSVField(r, c+'_Noturno')) || 0;
         });
      }

      const climaResumo = [getCSVField(r, 'Clima_Manha'), getCSVField(r, 'Clima_Tarde'), getCSVField(r, 'Clima_Noite')].filter(Boolean).join(' · ');
      const hasNoturno = getCSVField(r, 'Apontador_Noturno') || String(getCSVField(r, 'Tem_Turno_Noturno')).toLowerCase() === 'true' || getCSVField(r, 'Tem_Turno_Noturno') === 'Sim';

      const dObj = parseISODate(getCSVField(r, 'Data'));
      const dStr = dObj ? getLocalISODate(dObj) : getCSVField(r, 'Data');
      const dup = contagemPorData[dStr] > 1;
      const rid = getCSVField(r, 'ID') || '';
      const ehOficial = dup && getOficialRDO(dStr) && String(getOficialRDO(dStr)).trim() === String(rid).trim();

      return `
        <tr${dup ? ' style="background:var(--red-l)"' : ''}>
          <td style="width:32px;text-align:center"><input type="checkbox" class="rdo-check" data-data="${dStr}" onchange="toggleRDOSelect('${dStr}', this)" style="width:16px;height:16px;cursor:pointer"></td>
          <td class="t-mono">${rid}</td>
          <td>${fmtData(getCSVField(r, 'Data'))}${dup ? ` <span class="pill pill-red" title="Há ${contagemPorData[dStr]} RDOs nesta data — resolva qual é o oficial">⚠ ${contagemPorData[dStr]}×</span>` : ''}${ehOficial ? ' <span class="pill pill-grn" title="RDO oficial desta data">★ oficial</span>' : ''}</td>
          <td style="font-size:12px">${getCSVField(r, 'Encarregado')||''}</td>
          <td style="font-size:12px">${getCSVField(r, 'Apontador_Diurno') || getCSVField(r, 'Apontador') || ''}</td>
          <td style="font-size:11px;color:var(--muted)">${climaResumo}</td>
          <td class="t-num">${total}</td>
          <td>${hasNoturno ?'<span class="pill pill-blu">Sim</span>':'<span class="pill pill-ylw">Não</span>'}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-sm btn-outline" onclick="visualizarRDO('${rid}')" title="Visualizar (não baixa arquivo)">👁</button>
            ${dup ? `<button class="btn btn-sm" onclick="resolverDuplicata('${dStr}')" title="Resolver duplicata" style="margin-left:2px;background:var(--red);color:#fff;border:none">⚖</button>` : ''}
            <button class="btn btn-sm btn-primary" onclick="gerarPDFDiario('${dStr}')" title="Gerar PDF (baixa arquivo)" style="margin-left:2px">📄</button>
          </td>
        </tr>
      `;
    }).join('');

    bodyContent = `
      <table class="t">
        <thead><tr>
          <th style="width:32px;text-align:center"><input type="checkbox" id="cbTodos" onchange="toggleTodosRDOs(this)" title="Selecionar todos" style="width:16px;height:16px;cursor:pointer"></th>
          <th>ID</th><th>Data</th><th>Encarregado</th><th>Apontador</th>
          <th>Clima</th>
          <th class="t-num" style="text-align:right">Efetivo</th>
          <th>Noturno?</th>
          <th></th>
        </tr></thead>
        <tbody>
          ${tableRows}
        </tbody>
      </table>
    `;
  }

  return `
    <div class="card stagger-item" style="animation-delay: .1s">
      <div class="card-header">
        <div>
          <div class="card-title">RDOs Diários</div>
          <div class="card-title-sub">👁 visualiza sem baixar · 📄 gera o PDF · selecione vários para lote</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="btn btn-sm btn-outline" onclick="toggleSabadoUtil()" title="Conta sábado como dia útil no alerta de dias sem RDO" style="white-space:nowrap">${sabadoEhUtil()?'☑':'☐'} Sábado útil</button>
          <button id="btnLotePDF" class="btn btn-primary" onclick="gerarPDFsEmLote()" disabled style="white-space:nowrap">📄 Gerar PDFs em Lote</button>
        </div>
      </div>
      ${avisosHtml ? `<div style="padding:14px 16px 0">${avisosHtml}</div>` : ''}
      <div class="card-body flush">
        ${bodyContent}
      </div>
    </div>
  `;
}

// VIEW: LANÇAR RDO (mobile-first, grava direto via Apps Script)

function loadDraft() {
  try {
    const raw = localStorage.getItem(CONFIG.ls.rdoDraft);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveDraft(draft) {
  try { localStorage.setItem(CONFIG.ls.rdoDraft, JSON.stringify({...draft, _savedAt: Date.now()})); } catch(e) {}
}

function clearDraft() {
  try { localStorage.removeItem(CONFIG.ls.rdoDraft); } catch(e) {}
}

function defaultDraft() {
  const apontador = localStorage.getItem(CONFIG.ls.apontador) || '';
  return {
    data: getLocalISODate(new Date()),
    turno: 'Diurno',
    apontador,
    observacaoGeral: '',
    servicos: [
      { frente: '', pacoteId: '', sentido: 'CB', estacaIni: '', estacaFim: '', quantidade: '', equipe: '', observacao: '' }
    ],
    outrosServicos: []
  };
}

function renderRDO() {
  if (!STATE.draft) STATE.draft = loadDraft() || defaultDraft();
  const d = STATE.draft;
  
  const estacasCB = []; for (let i = CONFIG.estacasCB.ini; i <= CONFIG.estacasCB.fim; i++) estacasCB.push('E' + i);
  const estacasBC = []; for (let i = CONFIG.estacasBC.ini; i <= CONFIG.estacasBC.fim; i++) estacasBC.push('E' + i);
  const estacasUsar = d.sentido === 'CB' ? estacasCB : estacasBC;
  
  const frentes = [...new Set(STATE.pacotes
    .filter(p => getCSVField(p, 'Status') !== 'Histórico' && getCSVField(p, 'Frente'))
    .map(p => getCSVField(p, 'Frente')))].sort();
  
  const draftSalvo = loadDraft();
  const temRascunho = !!draftSalvo;
  const draftHora = draftSalvo && draftSalvo._savedAt
    ? new Date(draftSalvo._savedAt).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})
    : null;

  // Banner "já lancei hoje?" — conta lançamentos do dia + pendentes na fila offline
  const hojeISO = getLocalISODate(new Date());

    const rd = parseISODate(getCSVField(r, 'Data'));

function renderServicoRow(s, idx, frentes) {
  const pacotesDaFrente = s.frente ? 
    STATE.pacotes.filter(p => getCSVField(p, 'Frente') === s.frente && getCSVField(p, 'Status') !== 'Histórico') :
    [];
  const pacoteSelecionado = STATE.pacotes.find(p => getCSVField(p, 'ID') === s.pacoteId);
  const unidade = pacoteSelecionado ? (getCSVField(pacoteSelecionado, 'Unidade Física') || '') : '';
  
  const sentido = s.sentido || 'CB';
  const estacasCB = []; for (let i = CONFIG.estacasCB.ini; i <= CONFIG.estacasCB.fim; i++) estacasCB.push('E' + i);
  const estacasBC = []; for (let i = CONFIG.estacasBC.ini; i <= CONFIG.estacasBC.fim; i++) estacasBC.push('E' + i);
  const estacasUsar = sentido === 'CB' ? estacasCB : estacasBC;
  
  return `
    <div class="servico-row" data-idx="${idx}">
      <span class="row-num">SERVIÇO ${idx + 1}</span>
      ${idx > 0 ? `<button class="btn-remove" onclick="removerServico(${idx})" title="Remover">×</button>` : ''}
      <div class="form-grid" style="margin-top:6px">
        <div class="field">
          <label>Frente</label>
          <select data-svc="${idx}" data-field="frente">
            <option value="">— escolher —</option>
            ${frentes.map(f => `<option ${s.frente===f?'selected':''}>${f}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Pacote / Serviço</label>
          <select data-svc="${idx}" data-field="pacoteId" ${!s.frente ? 'disabled' : ''}>
            <option value="">${s.frente ? '— escolher pacote —' : '↑ escolha frente primeiro'}</option>
            ${pacotesDaFrente.map(p => `<option value="${getCSVField(p, 'ID')}" ${s.pacoteId===getCSVField(p, 'ID')?'selected':''}>${getCSVField(p, 'Pacote')} (${getCSVField(p, 'Unidade Física')||''})</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Sentido da via</label>
          <select data-svc="${idx}" data-field="sentido">
            <option value="CB" ${sentido==='CB'?'selected':''}>Centro→Bairro (E${CONFIG.estacasCB.ini}–E${CONFIG.estacasCB.fim})</option>
            <option value="BC" ${sentido==='BC'?'selected':''}>Bairro→Centro (E${CONFIG.estacasBC.ini}–E${CONFIG.estacasBC.fim})</option>
          </select>
        </div>
        <div class="field">
          <label>Estaca início</label>
          <select data-svc="${idx}" data-field="estacaIni">
            <option value="">— início —</option>
            ${estacasUsar.map(e => `<option ${s.estacaIni===e?'selected':''}>${e}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Estaca fim</label>
          <select data-svc="${idx}" data-field="estacaFim">
            <option value="">— fim —</option>
            ${estacasUsar.map(e => `<option ${s.estacaFim===e?'selected':''}>${e}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Quantidade ${unidade ? `(${unidade})` : ''}</label>
          <input type="number" data-svc="${idx}" data-field="quantidade" value="${s.quantidade}" placeholder="0" step="0.01" min="0">
        </div>
        <div class="field">
          <label>Equipe / Subcontratado</label>
          <input type="text" data-svc="${idx}" data-field="equipe" value="${s.equipe}" placeholder="ex: Sena Obras">
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>Observação do serviço (opcional)</label>
          <input type="text" data-svc="${idx}" data-field="observacao" value="${s.observacao}" placeholder="ex: Continuar amanhã">
        </div>
      </div>
    </div>
  `;
}

function renderOutroServicoRow(o, idx) {

function attachRDOForm() {
  document.querySelectorAll('[data-draft]').forEach(el => {
    el.oninput = el.onchange = () => {
      STATE.draft[el.dataset.draft] = el.value;
      if (el.dataset.draft === 'apontador') {
        try { localStorage.setItem(CONFIG.ls.apontador, el.value); } catch(e) {}
      }
      saveDraft(STATE.draft);
    };
  });
  
  document.getElementById('servicosList').addEventListener('input', svcInputHandler);
  document.getElementById('servicosList').addEventListener('change', svcInputHandler);

  const outrosList = document.getElementById('outrosServicosList');
  if (outrosList) {
    outrosList.addEventListener('input', outrosInputHandler);
    outrosList.addEventListener('change', outrosInputHandler);
  }
}

function svcInputHandler(ev) {
  const el = ev.target;
  if (!el.dataset.svc) return;
  const idx = parseInt(el.dataset.svc);
  const field = el.dataset.field;
  STATE.draft.servicos[idx][field] = el.value;
  
  if (field === 'frente') {
    STATE.draft.servicos[idx].pacoteId = '';
    rerenderServicoRow(idx);
  }
  if (field === 'pacoteId') {
    rerenderServicoRow(idx);
  }
  if (field === 'sentido') {
    STATE.draft.servicos[idx].estacaIni = '';
    STATE.draft.servicos[idx].estacaFim = '';
    rerenderServicoRow(idx);
  }
  saveDraft(STATE.draft);
}

function rerenderServicoRow(idx) {
  const frentes = [...new Set(STATE.pacotes
    .filter(p => getCSVField(p, 'Status') !== 'Histórico' && getCSVField(p, 'Frente'))
    .map(p => getCSVField(p, 'Frente')))].sort();
  const html = renderServicoRow(STATE.draft.servicos[idx], idx, frentes);
  const old = document.querySelector(`.servico-row[data-idx="${idx}"]`);
  if (old) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    old.replaceWith(tmp.firstElementChild);
  }
}

function setTurno(t) {
  STATE.draft.turno = t;
  saveDraft(STATE.draft);
  transitionTo(render);
}

function adicionarServico() {
  const ultimo = STATE.draft.servicos[STATE.draft.servicos.length - 1];
  STATE.draft.servicos.push({
    frente: '', pacoteId: '',
    sentido: ultimo ? ultimo.sentido : 'CB',
    estacaIni: '', estacaFim: '',
    quantidade: '', equipe: '', observacao: ''
  });
  saveDraft(STATE.draft);
  transitionTo(render);
}

function removerServico(idx) {
  STATE.draft.servicos.splice(idx, 1);
  if (STATE.draft.servicos.length === 0) {
    STATE.draft.servicos.push({ frente: '', pacoteId: '', quantidade: '', equipe: '', observacao: '' });
  }
  saveDraft(STATE.draft);
  transitionTo(render);
}

function outrosInputHandler(ev) {
  const el = ev.target;
  if (el.dataset.outro === undefined) return;
  const idx = parseInt(el.dataset.outro);
  const field = el.dataset.field;
  if (!STATE.draft.outrosServicos) STATE.draft.outrosServicos = [];
  if (!STATE.draft.outrosServicos[idx]) STATE.draft.outrosServicos[idx] = {};
  STATE.draft.outrosServicos[idx][field] = el.value;
  saveDraft(STATE.draft);
}

function adicionarOutroServico() {
  if (!STATE.draft.outrosServicos) STATE.draft.outrosServicos = [];
  STATE.draft.outrosServicos.push({ descricao: '', equipe: '', local: '' });
  saveDraft(STATE.draft);
  transitionTo(render);
}

function removerOutroServico(idx) {
  if (!STATE.draft.outrosServicos) return;
  STATE.draft.outrosServicos.splice(idx, 1);
  saveDraft(STATE.draft);
  transitionTo(render);
}

function resetDraft() {
  if (!confirm('Limpar todos os dados desse RDO? Não tem como desfazer.')) return;
  clearDraft();
  STATE.draft = defaultDraft();
  transitionTo(render);
}

function validarRDO(d) {
  const erros = [];
  if (!d.data) erros.push('Data é obrigatória');
  if (!d.apontador.trim()) erros.push('Apontador é obrigatório');

  const servicosValidos = d.servicos.filter(s => s.pacoteId && num(s.quantidade) > 0);
  const outrosValidos = (d.outrosServicos || []).filter(o => o.descricao && o.descricao.trim());

  if (servicosValidos.length === 0 && outrosValidos.length === 0) {
    erros.push('Adicione pelo menos 1 serviço com pacote e quantidade > 0, ou 1 outro serviço descrito');
    return erros;
  }
  for (let i = 0; i < d.servicos.length; i++) {
    const s = d.servicos[i];
    if (s.pacoteId && num(s.quantidade) > 0) {
      if (!s.estacaIni || !s.estacaFim) {
        erros.push(`Serviço ${i+1}: estaca início e fim obrigatórias`);
        break;
      }
    }
  }
  return erros;
}

// Pinta de vermelho os campos com problema e rola a tela até o primeiro.
function destacarCamposRDO(d) {
  document.querySelectorAll('.campo-invalido').forEach(el => el.classList.remove('campo-invalido'));
  let primeiro = null;
  const marcar = (sel) => {
    const el = document.querySelector(sel);
    if (el) { el.classList.add('campo-invalido'); if (!primeiro) primeiro = el; }
  };
  if (!d.data) marcar('[data-draft="data"]');
  if (!d.apontador || !d.apontador.trim()) marcar('[data-draft="apontador"]');
  for (let i = 0; i < d.servicos.length; i++) {
    const s = d.servicos[i];
    if (s.pacoteId && num(s.quantidade) > 0 && (!s.estacaIni || !s.estacaFim)) {
      if (!s.estacaIni) marcar(`[data-svc="${i}"][data-field="estacaIni"]`);
      if (!s.estacaFim) marcar(`[data-svc="${i}"][data-field="estacaFim"]`);
    }
  }
  if (primeiro) primeiro.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function salvarRDO() {
  const d = STATE.draft;
  const erros = validarRDO(d);
  if (erros.length > 0) {
    toast('Confira: ' + erros.join(' · '), 'error', 0);
    destacarCamposRDO(d);
    return;
  }
  
  const servicosValidos = d.servicos.filter(s => s.pacoteId && num(s.quantidade) > 0);
  const outrosValidos = (d.outrosServicos || []).filter(o => o.descricao && o.descricao.trim());

  const btn = document.getElementById('btnSalvarRDO');
  const btnTxtOriginal = btn.innerHTML;

  const batchPacotes = d.servicos
    .filter(s => s.pacoteId && num(s.quantidade) > 0)
    .map(s => {
      const p = STATE.pacotes.find(pp => getCSVField(pp, 'ID') === s.pacoteId);
      const obsCompleta = [d.observacaoGeral, s.observacao].filter(x => x && x.trim()).join(' · ');
      let localEstaca = '';
      if (s.estacaIni && s.estacaFim) localEstaca = `${s.estacaIni} a ${s.estacaFim} (${s.sentido||'CB'})`;
      else if (s.estacaIni) localEstaca = `${s.estacaIni} (${s.sentido||'CB'})`;
      return {
        data: d.data,
        turno: d.turno || 'Diurno',
        pacote_id: s.pacoteId,
        pacote_nome: p ? getCSVField(p, 'Pacote') : '',
        quantidade: num(s.quantidade),
        unidade: p ? (getCSVField(p, 'Unidade Física')||'') : '',
        local_estaca: localEstaca,
        equipe: s.equipe,
        subcontratado: s.equipe,
        efetivo_total: 0,
        equipamentos: '',
        clima: '',
        paralisado_motivo: '',
        foto_link: '',
        observacao: obsCompleta,
        apontador: d.apontador
      };
    });

  const batchOutros = outrosValidos.map(o => ({
    data: d.data,
    turno: d.turno || 'Diurno',
    pacote_id: 'OUTRO',
    pacote_nome: o.descricao.trim(),
    quantidade: 0,
    unidade: '',
    local_estaca: o.local ? o.local.trim() : '',
    equipe: o.equipe ? o.equipe.trim() : '',
    subcontratado: o.equipe ? o.equipe.trim() : '',
    efetivo_total: 0,
    equipamentos: '',
    clima: '',
    paralisado_motivo: '',
    foto_link: '',
    observacao: [d.observacaoGeral, 'Serviço avulso'].filter(x => x && x.trim()).join(' · '),
    apontador: d.apontador
  }));

  let batch = [...batchPacotes, ...batchOutros];

  // ANTI-DUPLICAÇÃO: não reenviar serviços idênticos que já existem no mesmo dia/turno.
  // Resolve o caso de re-salvar um rascunho "preso" num dia que já foi lançado.
  const normData = (v) => { const dt = parseISODate(v); return dt ? getLocalISODate(dt) : String(v||'').trim(); };
  const chaveServico = (o) => [
    normData(o.data),
    String(o.turno||'').trim().toLowerCase(),
    String(o.pacote_id||'').trim().toLowerCase(),
    String(o.pacote_nome||'').trim().toLowerCase(),
    String(num(o.quantidade)),
    String(o.local_estaca||'').trim().toLowerCase()
  ].join('|');
  const jaLancados = new Set((STATE.rdoavanco || []).map(r => [
    normData(getCSVField(r,'Data')),
    String(getCSVField(r,'Turno')||'').trim().toLowerCase(),
    String(getCSVField(r,'Pacote_ID') || getCSVField(r,'Pacote_id') || '').trim().toLowerCase(),
    String(getCSVField(r,'Pacote_Nome') || getCSVField(r,'Pacote') || '').trim().toLowerCase(),
    String(num(getCSVField(r,'Quantidade'))),
    String(getCSVField(r,'Local_Estaca')||'').trim().toLowerCase()
  ].join('|')));

  const batchNovos = batch.filter(o => !jaLancados.has(chaveServico(o)));
  const repetidos = batch.length - batchNovos.length;

  if (repetidos > 0 && batchNovos.length === 0) {
    if (confirm(`Todos os ${repetidos} serviço${repetidos>1?'s':''} deste rascunho JÁ estão lançados em ${d.data} (${d.turno}).\n\nNão há nada novo para enviar — é por isso que eles ficam reaparecendo.\n\nLimpar este rascunho agora para parar de reaparecer?`)) {
      limparFormularioRDO();
      transitionTo(render);
    }
    return;
  }

  const enviar = repetidos > 0 ? batchNovos : batch;
  let msgConfirm = `Confirmar envio de ${enviar.length} serviço${enviar.length!==1?'s':''}?\nData: ${d.data}  ·  Turno: ${d.turno}`;
  if (repetidos > 0) msgConfirm += `\n\n⚠️ ${repetidos} já estava${repetidos>1?'m':''} lançado${repetidos>1?'s':''} neste dia e NÃO ${repetidos>1?'serão':'será'} reenviado${repetidos>1?'s':''} (para não duplicar).`;
  if (!confirm(msgConfirm)) return;

  batch = enviar;
  const totalItens = batch.length;

  btn.disabled = true;
  btn.innerHTML = '⏳ Salvando…';

  const clientId = 'b_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  const reqParams = { action: 'addBatchRDO', batch: JSON.stringify(batch), clientId: clientId };
  const descricaoFila = `${totalItens} serviço${totalItens>1?'s':''} · ${d.turno} · ${d.data}`;

  function limparFormularioRDO() {
    clearDraft();
    STATE.draft = {
      ...defaultDraft(),
      apontador: d.apontador,
      sentido: d.sentido,
      turno: d.turno,
    };
  }

  // NÃO confiamos no navigator.onLine (dá "offline" falso mesmo com internet).
  // Tentamos enviar de verdade: se estiver mesmo sem rede, o JSONP falha em
  // milissegundos e caímos no catch, que guarda na fila. Sem falso "sem internet".
  try {
    const result = await jsonp(CONFIG.appsScript, reqParams, 0, 0, null);

    if (!result.ok) throw new Error(result.error || 'Erro desconhecido');

    toast(`✓ ${totalItens} item${totalItens>1?'s':''} salvo${totalItens>1?'s':''} (${d.turno})`, 'success', 4000);

    limparFormularioRDO();
    setTimeout(() => carregarTudo(), 1500);

    HISTORICO_TAB = 'servicos';
    setTimeout(() => navigate('historico'), 600);

  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = btnTxtOriginal;
    if (ehErroDeRede(e)) {
      outboxAdicionar({ kind: 'rdo', params: reqParams, descricao: descricaoFila });
      toast('Sem internet — RDO guardado no aparelho. Vai enviar sozinho quando o sinal voltar.', 'info', 0);
      limparFormularioRDO();
      transitionTo(render);
    } else {
      toast('Falha ao salvar: ' + e.message, 'error', 0);
    }
  }
}

function saveDiarioV4(d) {
  try { localStorage.setItem('teotonio_rdo_diario_v4_' + d.data, JSON.stringify(d)); } catch(e) {}
}

function clearDiarioV4(data) {
  try { localStorage.removeItem('teotonio_rdo_diario_v4_' + data); } catch(e) {}
}

function defaultDiarioV4(data) {
  return {
    data: data,
    clima_manha: 'Bom',
    clima_tarde: 'Bom',
    clima_noite: 'Bom',
    diurno: {
      apontador: '', efetivo: {}, equipamentos: {}, customIndireto: [], customDireto: [], customEquip: [],
      visitas: '', ocorrencias: '', observacoes: '', preenchido: false,
    },
    noturno: {
      apontador: '', efetivo: {}, equipamentos: {}, customIndireto: [], customDireto: [], customEquip: [],
      visitas: '', ocorrencias: '', observacoes: '', preenchido: false,
    },
  };
}

function carregarDiarioDaSheet(data) {
  const sheetRow = (STATE.rdodiario || []).find(r => {
    const rd = parseISODate(getCSVField(r, 'Data'));
    return rd && getLocalISODate(rd) === data;
  });
  if (!sheetRow) return null;
  
  let efetivoJson = {};
  let equipJson = {};
  const rawEfetivo = getCSVField(sheetRow, 'Efetivo_JSON') || getCSVField(sheetRow, 'efetivo_json') || '{}';
  const rawEquip = getCSVField(sheetRow, 'Equipamentos_JSON') || getCSVField(sheetRow, 'equipamentos_json') || '{}';
  try { efetivoJson = JSON.parse(rawEfetivo); } catch(e) {}
  try { equipJson = JSON.parse(rawEquip); } catch(e) {}
  
  const d = defaultDiarioV4(data);
  d.clima_manha = getCSVField(sheetRow, 'Clima_Manha') || getCSVField(sheetRow, 'clima_manha') || 'Bom';
  d.clima_tarde = getCSVField(sheetRow, 'Clima_Tarde') || getCSVField(sheetRow, 'clima_tarde') || 'Bom';
  d.clima_noite = getCSVField(sheetRow, 'Clima_Noite') || getCSVField(sheetRow, 'clima_noite') || 'Bom';
  
  // Mesclar com localStorage: preferir efetivo do localStorage quando tem mais dados
  const localSaved = loadDiarioV4(data);

  d.diurno.apontador = getCSVField(sheetRow, 'Apontador_Diurno') || getCSVField(sheetRow, 'apontador_diurno') || '';
  const localEfDiu = (localSaved && localSaved.diurno && localSaved.diurno.efetivo) || {};
  d.diurno.efetivo = { ...(efetivoJson.padrao_diurno || {}), ...localEfDiu };
  d.diurno.equipamentos = equipJson.padrao_diurno || {};
  d.diurno.customIndireto = efetivoJson.customIndireto_diurno || [];
  d.diurno.customDireto = efetivoJson.customDireto_diurno || [];
  d.diurno.customEquip = equipJson.custom_diurno || [];
  d.diurno.visitas = getCSVField(sheetRow, 'Visitas_Diurno') || getCSVField(sheetRow, 'visitas_diurno') || getCSVField(sheetRow, 'Visitas') || getCSVField(sheetRow, 'visitas') || '';
  d.diurno.ocorrencias = getCSVField(sheetRow, 'Ocorrencias_Diurno') || getCSVField(sheetRow, 'ocorrencias_diurno') || getCSVField(sheetRow, 'Ocorrencias') || getCSVField(sheetRow, 'ocorrencias') || '';
  d.diurno.observacoes = getCSVField(sheetRow, 'Obs_Diurno') || getCSVField(sheetRow, 'obs_diurno') || getCSVField(sheetRow, 'Observacoes_Gerais') || getCSVField(sheetRow, 'observacoes_gerais') || '';
  d.diurno.preenchido = !!d.diurno.apontador;

  d.noturno.apontador = getCSVField(sheetRow, 'Apontador_Noturno') || getCSVField(sheetRow, 'apontador_noturno') || '';
  const localEfNot = (localSaved && localSaved.noturno && localSaved.noturno.efetivo) || {};
  d.noturno.efetivo = { ...(efetivoJson.padrao_noturno || {}), ...localEfNot };
  d.noturno.equipamentos = equipJson.padrao_noturno || {};
  d.noturno.customIndireto = efetivoJson.customIndireto_noturno || [];
  d.noturno.customDireto = efetivoJson.customDireto_noturno || [];
  d.noturno.customEquip = equipJson.custom_noturno || [];
  d.noturno.visitas = getCSVField(sheetRow, 'Visitas_Noturno') || getCSVField(sheetRow, 'visitas_noturno') || '';
  d.noturno.ocorrencias = getCSVField(sheetRow, 'Ocorrencias_Noturno') || getCSVField(sheetRow, 'ocorrencias_noturno') || '';
  d.noturno.observacoes = getCSVField(sheetRow, 'Obs_Noturno') || getCSVField(sheetRow, 'obs_noturno') || '';
  d.noturno.preenchido = !!d.noturno.apontador;
  
  return d;
}

function attachRDODiarioV4Form() {
  const dataInput = document.querySelector('[data-diario4-data]');
  if (dataInput) {
    dataInput.onchange = () => {
      const novaData = dataInput.value;
      DIARIO_V4 = carregarDiarioDaSheet(novaData) || loadDiarioV4(novaData) || defaultDiarioV4(novaData);
      transitionTo(render);
    };
  }
  
  if (!DIARIO_TURNO_ATIVO) return;
  const t = DIARIO_TURNO_ATIVO;
  const td = DIARIO_V4[t];
  
  document.querySelectorAll('[data-diario4]').forEach(el => {
    el.oninput = el.onchange = () => {
      td[el.dataset.diario4] = el.value;
      saveDiarioV4(DIARIO_V4);
    };
  });
  
  document.querySelectorAll('[data-diario4-clima]').forEach(el => {
    el.onchange = () => {
      DIARIO_V4[el.dataset.diario4Clima] = el.value;
      saveDiarioV4(DIARIO_V4);
    };
  });
  
  document.querySelectorAll('[data-efet4]').forEach(el => {
    el.oninput = () => {
      td.efetivo[el.dataset.efet4] = el.value;
      saveDiarioV4(DIARIO_V4);
    };
  });
  
  document.querySelectorAll('[data-equip4]').forEach(el => {
    el.oninput = () => {
      td.equipamentos[el.dataset.equip4] = el.value;
      saveDiarioV4(DIARIO_V4);
    };
  });
  
  document.querySelectorAll('[data-equipcustom4]').forEach(el => {
    el.oninput = () => {
      const idx = parseInt(el.dataset.equipcustom4);
      td.customEquip[idx].qtd = el.value;
      saveDiarioV4(DIARIO_V4);
    };
  });
  
  document.querySelectorAll('[data-customfun4]').forEach(el => {
    el.oninput = () => {
      const [prefix, idx, field] = el.dataset.customfun4.split('|');
      const list = prefix === 'indireto' ? td.customIndireto : td.customDireto;
      list[parseInt(idx)][field] = el.value;
      saveDiarioV4(DIARIO_V4);
    };
  });
}

function selecionarTurnoV4(turno) {
  DIARIO_TURNO_ATIVO = turno;
  transitionTo(render);
}

function voltarSeletorTurnoV4() {
  DIARIO_TURNO_ATIVO = null;
  transitionTo(render);
}

function resetTurnoV4() {
  if (!confirm('Limpar todos os dados do turno ' + DIARIO_TURNO_ATIVO.toUpperCase() + '?')) return;
  DIARIO_V4[DIARIO_TURNO_ATIVO] = defaultDiarioV4(DIARIO_V4.data)[DIARIO_TURNO_ATIVO];
  saveDiarioV4(DIARIO_V4);
  transitionTo(render);
}

function adicionarFuncaoCustomV4(prefix) {
  const td = DIARIO_V4[DIARIO_TURNO_ATIVO];
  const list = prefix === 'indireto' ? td.customIndireto : td.customDireto;
  list.push({ label: '', qtd: '' });
  saveDiarioV4(DIARIO_V4);
  transitionTo(render);
}

function removerFuncaoCustomV4(prefix, idx) {
  const td = DIARIO_V4[DIARIO_TURNO_ATIVO];
  const list = prefix === 'indireto' ? td.customIndireto : td.customDireto;
  list.splice(idx, 1);
  saveDiarioV4(DIARIO_V4);
  transitionTo(render);
}

function adicionarEquipCustomV4() {
  const label = prompt('Nome do equipamento personalizado:');
  if (!label || !label.trim()) return;
  DIARIO_V4[DIARIO_TURNO_ATIVO].customEquip.push({ label: label.trim(), qtd: '' });
  saveDiarioV4(DIARIO_V4);
  transitionTo(render);
}

function removerEquipCustomV4(idx) {
  DIARIO_V4[DIARIO_TURNO_ATIVO].customEquip.splice(idx, 1);
  saveDiarioV4(DIARIO_V4);
  transitionTo(render);
}

async function salvarDiarioV4() {
  const d = DIARIO_V4;
  const t = DIARIO_TURNO_ATIVO;
  const td = d[t];
  
  if (!td.apontador || !td.apontador.trim()) {
    toast('Apontador obrigatório pra salvar', 'error', 0); return;
  }
  
  const btn = document.getElementById('btnSalvarDiarioV4');
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ Salvando…';
  
  td.preenchido = true;
  saveDiarioV4(d);
  
  const existe = (STATE.rdodiario || []).some(r => {
    const rd = parseISODate(getCSVField(r, 'Data'));
    return rd && getLocalISODate(rd) === d.data;
  });
  
  const efetivoJSON = {
    padrao_diurno: d.diurno.efetivo || {},
    padrao_noturno: d.noturno.efetivo || {},
    customIndireto_diurno: (d.diurno.customIndireto || []).filter(f => f.label && f.label.trim()),
    customDireto_diurno: (d.diurno.customDireto || []).filter(f => f.label && f.label.trim()),
    customIndireto_noturno: (d.noturno.customIndireto || []).filter(f => f.label && f.label.trim()),
    customDireto_noturno: (d.noturno.customDireto || []).filter(f => f.label && f.label.trim()),
  };
  const equipJSON = {
    padrao_diurno: d.diurno.equipamentos || {},
    padrao_noturno: d.noturno.equipamentos || {},
    custom_diurno: (d.diurno.customEquip || []).filter(e => e.label && e.label.trim()),
    custom_noturno: (d.noturno.customEquip || []).filter(e => e.label && e.label.trim()),
  };
  
  const params = {
    action: existe ? 'updateRDODiario' : 'addRDODiario',
    data: d.data,
    apontador_diurno: d.diurno.apontador || '',
    apontador_noturno: d.noturno.apontador || '',
    encarregado: '', 
    clima_manha: d.clima_manha || '',
    clima_tarde: d.clima_tarde || '',
    clima_noite: d.clima_noite || '',
    visitas: [d.diurno.visitas, d.noturno.visitas].filter(x=>x).join(' / ') || '',
    ocorrencias: [d.diurno.ocorrencias, d.noturno.ocorrencias].filter(x=>x).join(' / ') || '',
    observacoes_gerais: [d.diurno.observacoes, d.noturno.observacoes].filter(x=>x).join(' / ') || '',
    tem_turno_noturno: d.noturno.preenchido ? 'true' : 'false',
    efetivo_json: JSON.stringify(efetivoJSON),
    equipamentos_json: JSON.stringify(equipJSON),
  };
  
  const descricaoFila = `RDO Diário · turno ${t} · ${d.data}`;

  // NÃO confiamos no navigator.onLine: tentamos enviar de verdade e só caímos
  // na fila se a rede realmente falhar (no catch). Evita falso "sem internet".
  try {
    const result = await jsonp(CONFIG.appsScript, params, 0, 0, null);
    if (!result.ok) throw new Error(result.error || 'Erro');
    toast(`✓ Turno ${t.toUpperCase()} salvo`, 'success', 4000);
    setTimeout(() => carregarTudo(), 1500);
    btn.disabled = false;
    btn.innerHTML = original;
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = original;
    if (ehErroDeRede(e)) {
      outboxAdicionar({ kind: 'diario', params: params, descricao: descricaoFila });
      toast('Sem internet — turno guardado no aparelho. Vai enviar sozinho quando o sinal voltar.', 'info', 0);
    } else {
      toast('Falha: ' + e.message, 'error', 0);
    }
  }
}

function gerarPDFDiario(data) {
  const daData = rdosDaData(data);
  const oficialId = getOficialRDO(data);
  let fromSheet = daData[0];
  if (oficialId) {
    const of = daData.find(r => String(getCSVField(r, 'ID')).trim() === String(oficialId).trim());
    if (of) fromSheet = of;
  }
  // Mais de um RDO na mesma data: deixa explícito quais IDs conflitam e qual
  // está sendo usado (o oficial, se definido; senão o primeiro).
  if (daData.length > 1) {
    const ids = daData.map(r => getCSVField(r, 'ID')).join(', ');
    const usando = getCSVField(fromSheet, 'ID') || '(primeiro)';
    toast(`Atenção: ${daData.length} RDOs em ${fmtData(data)} (IDs: ${ids}). Gerando o ${oficialId ? 'oficial' : 'primeiro'}: ${usando}.`, oficialId ? 'info' : 'error', oficialId ? 6000 : 8000);
  }

  let d;
  if (typeof DIARIO_V4 !== 'undefined' && DIARIO_V4 && DIARIO_V4.data === data) {
    const v4 = DIARIO_V4;
    d = {
      data: data,
      sheetId: fromSheet ? getCSVField(fromSheet, 'ID') : '',
      apontador_diurno: v4.diurno.apontador || '',
      apontador_noturno: v4.noturno.apontador || '',
      clima_manha: v4.clima_manha, clima_tarde: v4.clima_tarde, clima_noite: v4.clima_noite,
      visitas: [v4.diurno.visitas, v4.noturno.visitas].filter(x=>x).join(' / ') || '',
      ocorrencias: [v4.diurno.ocorrencias, v4.noturno.ocorrencias].filter(x=>x).join(' / ') || '',
      observacoes_gerais: [v4.diurno.observacoes, v4.noturno.observacoes].filter(x=>x).join(' / ') || '',
      efetivo_diurno: v4.diurno.efetivo || {},
      efetivo_noturno: v4.noturno.efetivo || {},
      equipamentos_diurno: v4.diurno.equipamentos || {},
      equipamentos_noturno: v4.noturno.equipamentos || {},
      customIndireto_diurno: v4.diurno.customIndireto || [],
      customIndireto_noturno: v4.noturno.customIndireto || [],
      customDireto_diurno: v4.diurno.customDireto || [],
      customDireto_noturno: v4.noturno.customDireto || [],
      customEquip_diurno: v4.diurno.customEquip || [],
      customEquip_noturno: v4.noturno.customEquip || [],
    };
  } else if (fromSheet) {
    let efetJson = {}, equipJson = {};
    const rawEfetivo = getCSVField(fromSheet, 'Efetivo_JSON') || getCSVField(fromSheet, 'efetivo_json') || '{}';
    const rawEquip = getCSVField(fromSheet, 'Equipamentos_JSON') || getCSVField(fromSheet, 'equipamentos_json') || '{}';
    try { efetJson = JSON.parse(rawEfetivo); } catch(e) {}
    try { equipJson = JSON.parse(rawEquip); } catch(e) {}

    // Une planilha + localStorage: um valor presente em QUALQUER fonte aparece.
    // localStorage (edições mais recentes do aparelho) sobrescreve a planilha
    // chave-a-chave, mas nunca apaga chaves que só existem na planilha.
    const localDiario = loadDiarioV4(data);
    const localEfDiu = (localDiario && localDiario.diurno && localDiario.diurno.efetivo) || {};
    const localEfNot = (localDiario && localDiario.noturno && localDiario.noturno.efetivo) || {};
    const efetivoDiurno = { ...(efetJson.padrao_diurno || {}), ...localEfDiu };
    const efetivoNoturno = { ...(efetJson.padrao_noturno || {}), ...localEfNot };

    d = {
      data: data,
      sheetId: getCSVField(fromSheet, 'ID'),
      apontador_diurno: getCSVField(fromSheet, 'Apontador_Diurno') || getCSVField(fromSheet, 'apontador_diurno') || '',
      apontador_noturno: getCSVField(fromSheet, 'Apontador_Noturno') || getCSVField(fromSheet, 'apontador_noturno') || '',
      clima_manha: getCSVField(fromSheet, 'Clima_Manha') || getCSVField(fromSheet, 'clima_manha') || '',
      clima_tarde: getCSVField(fromSheet, 'Clima_Tarde') || getCSVField(fromSheet, 'clima_tarde') || '',
      clima_noite: getCSVField(fromSheet, 'Clima_Noite') || getCSVField(fromSheet, 'clima_noite') || '',
      visitas: getCSVField(fromSheet, 'Visitas') || getCSVField(fromSheet, 'visitas') || '',
      ocorrencias: getCSVField(fromSheet, 'Ocorrencias') || getCSVField(fromSheet, 'ocorrencias') || '',
      observacoes_gerais: getCSVField(fromSheet, 'Observacoes_Gerais') || getCSVField(fromSheet, 'observacoes_gerais') || '',
      efetivo_diurno: efetivoDiurno,
      efetivo_noturno: efetivoNoturno,
      equipamentos_diurno: equipJson.padrao_diurno || {},
      equipamentos_noturno: equipJson.padrao_noturno || {},
      customIndireto_diurno: efetJson.customIndireto_diurno || [],
      customIndireto_noturno: efetJson.customIndireto_noturno || [],
      customDireto_diurno: efetJson.customDireto_diurno || [],
      customDireto_noturno: efetJson.customDireto_noturno || [],
      customEquip_diurno: equipJson.custom_diurno || [],
      customEquip_noturno: equipJson.custom_noturno || [],
    };
  } else {
    d = null;
  }
  if (!d) { toast('Não encontrei o RDO Diário pra gerar PDF', 'error'); return; }
  
  const servicosDiurnos = STATE.rdoavanco.filter(r => {
    const rd = parseISODate(getCSVField(r, 'Data'));
    if (!rd) return false;
    const t = String(getCSVField(r, 'Turno') || 'Diurno').trim().toLowerCase();
    return getLocalISODate(rd) === data && t !== 'noturno';
  });
  const servicosNoturnos = STATE.rdoavanco.filter(r => {
    const rd = parseISODate(getCSVField(r, 'Data'));
    if (!rd) return false;
    const t = String(getCSVField(r, 'Turno') || '').trim().toLowerCase();
    return getLocalISODate(rd) === data && t === 'noturno';
  });
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const PW = 210, PH = 297, ML = 8, MT = 5, TW = 194;
  
  const NAV = [30, 58, 95];

  const DG = [80, 80, 80];
  const BD = [165, 165, 165];
  const ORANGE = [212, 168, 16];
  const BLUE = [50, 100, 150];
  
  function sf(sz, st, col) {
    doc.setFontSize(sz);
    doc.setFont('helvetica', st || 'normal');
    doc.setTextColor(...(col || [0, 0, 0]));
  }
  function rf(x, y, w, h, fl, sk, lw) {
    doc.setLineWidth(lw || 0.15);
    if (fl && sk) { doc.setFillColor(...fl); doc.setDrawColor(...sk); doc.rect(x, y, w, h, 'FD'); }
    else if (fl) { doc.setFillColor(...fl); doc.rect(x, y, w, h, 'F'); }
    else if (sk) { doc.setDrawColor(...sk); doc.rect(x, y, w, h, 'S'); }
  }
  function ln(x1, y1, x2, y2, c, lw) {
    doc.setDrawColor(...(c || [180, 180, 180]));
    doc.setLineWidth(lw || 0.15);
    doc.line(x1, y1, x2, y2);
  }
  function tx(t, x, y, opt) { doc.text(String(t || ''), x, y, opt || {}); }
  
  const dd = parseISODate(data);
  const df = fmtData(data);
  const diaSemanaIdx = [6, 0, 1, 2, 3, 4, 5][dd.getDay()];
  
  let y = MT;
  
  rf(ML, y, TW, 22, W, NAV, 0.5);

  rf(ML + TW * 0.55, y, TW * 0.22, H3, LB, BD); sf(5, 'bold', NAV); tx('DATA', ML + TW * 0.55 + TW * 0.11, y + H3 * 0.72, { align: 'center' });
  rf(ML + TW * 0.77, y, TW * 0.12, H3, LB, BD); sf(5, 'bold', NAV); tx('NÚMERO', ML + TW * 0.77 + TW * 0.06, y + H3 * 0.72, { align: 'center' });
  rf(ML + TW * 0.89, y, TW * 0.11, H3, LB, BD); sf(5, 'bold', NAV); tx('PRAZO(dias)', ML + TW * 0.89 + TW * 0.055, y + H3 * 0.72, { align: 'center' });
  y += H3;
  rf(ML, y, TW * 0.55, H3, W, BD); sf(5.5, 'normal', [0, 0, 0]);
  tx('Av. Sen. Teotônio Vilela (Rua José Nicolau — Rua Satélite Ariel)', ML + 2, y + H3 * 0.72);
  rf(ML + TW * 0.55, y, TW * 0.22, H3, W, BD); sf(7, 'bold', NAV); tx(df, ML + TW * 0.55 + TW * 0.11, y + H3 * 0.72, { align: 'center' });
  rf(ML + TW * 0.77, y, TW * 0.12, H3, W, BD); sf(7, 'bold', NAV); tx(nrRDO, ML + TW * 0.77 + TW * 0.06, y + H3 * 0.72, { align: 'center' });
  rf(ML + TW * 0.89, y, TW * 0.11, H3, W, BD); sf(6, 'bold', NAV); tx('669', ML + TW * 0.89 + TW * 0.055, y + H3 * 0.72, { align: 'center' });
  y += H3;
  
  const JH = 5;
  const dCW = TW * 0.038, jW = TW * 0.25, cW = TW - 7 * dCW - jW;
  const jcw = jW / 4, ccw = cW / 4;
  
  rf(ML, y, 7 * dCW, JH, LB, BD); sf(5, 'bold', NAV); tx('DIA DA SEMANA', ML + 7 * dCW / 2, y + JH * 0.72, { align: 'center' });
  rf(ML + 7 * dCW, y, jW, JH, LB, BD); sf(5, 'bold', NAV); tx('JORNADA', ML + 7 * dCW + jW / 2, y + JH * 0.72, { align: 'center' });
  rf(ML + 7 * dCW + jW, y, cW, JH, LB, BD); sf(5, 'bold', NAV); tx('CONDIÇÕES CLIMÁTICAS', ML + 7 * dCW + jW + cW / 2, y + JH * 0.72, { align: 'center' });
  y += JH;
  ['S', 'T', 'Q', 'Q', 'S', 'S', 'D'].forEach((dl, i) => {
    const on = i === diaSemanaIdx;
    rf(ML + i * dCW, y, dCW, JH, on ? NAV : W, BD);
    sf(6, on ? 'bold' : 'normal', on ? W : [0, 0, 0]);
    tx(dl, ML + (i + 0.5) * dCW, y + JH * 0.72, { align: 'center' });
  });
  ['Início', '', 'Térm.', ''].forEach((lbl, i) => {
    rf(ML + 7 * dCW + i * jcw, y, jcw, JH, W, BD);
    sf(5, 'bold', NAV); tx(lbl, ML + 7 * dCW + (i + 0.5) * jcw, y + 2, { align: 'center' });
  });
  const climaPrincipal = (d.clima_manha || 'Bom').toLowerCase();
  let climaKey = 'bom';
  if (climaPrincipal.includes('chuv')) climaKey = 'chu';
  else if (climaPrincipal.includes('garoa') || climaPrincipal.includes('encober')) climaKey = 'reg';
  ['Bom', 'Regular', 'Chuva', ''].forEach((lbl, i) => {
    const cKey = ['bom', 'reg', 'chu', ''][i];
    const on = cKey && cKey === climaKey;
    rf(ML + 7 * dCW + jW + i * ccw, y, ccw, JH, on ? [235, 245, 255] : W, BD);
    sf(5, 'bold', on ? NAV : DG);
    tx(lbl, ML + 7 * dCW + jW + (i + 0.5) * ccw, y + 2, { align: 'center' });
    if (on) { sf(7, 'bold', NAV); tx('✓', ML + 7 * dCW + jW + (i + 0.5) * ccw, y + JH * 0.78, { align: 'center' }); }
  });
  y += JH + 2;
  
  // Layout em duas colunas: esq = efetivo + equip, dir = serviços
  const yTop = y;
  const LW = 112, GAP = 3, RW = TW - LW - GAP;  // 112 + 3 + 79 = 194mm
  const xL = ML, xR = ML + LW + GAP;

  // ════════════════════════════
  // COLUNA ESQUERDA — EFETIVO
  // ════════════════════════════
  rf(xL, y, LW, 6, NAV); sf(7.5, 'bold', W); tx('EFETIVO — Apontador Diurno: ' + (d.apontador_diurno || '—') + '  |  Noturno: ' + (d.apontador_noturno || '—'), xL + 2, y + 4); y += 6;

  const CN = 12, CT = 16, CD = LW - 4 * CN - CT;  // CD = 112-48-16 = 48mm
  const EH = 4.0;
  rf(xL, y, CD, EH * 1.5, LB, BD); sf(6.5, 'bold', NAV); tx('FUNÇÃO', xL + 2, y + EH * 1.1);
  rf(xL + CD, y, CN * 2, EH * 1.5, LB, BD); sf(6.5, 'bold', NAV); tx('DIURNO', xL + CD + CN, y + EH * 1.1, { align: 'center' });
  rf(xL + CD + CN * 2, y, CN * 2, EH * 1.5, LB, BD); sf(6.5, 'bold', NAV); tx('NOTURNO', xL + CD + CN * 3, y + EH * 1.1, { align: 'center' });
  rf(xL + CD + CN * 4, y, CT, EH * 1.5, LB, BD); sf(6.5, 'bold', NAV); tx('TOT.', xL + CD + CN * 4 + CT / 2, y + EH * 1.1, { align: 'center' });
  y += EH * 1.5;

  rf(xL, y, CD, EH, LB, BD);
  ['Dir.', 'Ind.', 'Dir.', 'Ind.'].forEach((l, i) => {
    rf(xL + CD + i * CN, y, CN, EH, LB, BD); sf(5.5, 'bold', NAV);
    tx(l, xL + CD + (i + 0.5) * CN, y + EH * 0.75, { align: 'center' });
  });
  rf(xL + CD + 4 * CN, y, CT, EH, LB, BD);
  y += EH;

  const todasCats = [
    ...CATEGORIAS_INDIRETO.map(c => ({...c, tipo: 'indireto'})),
    ...CATEGORIAS_DIRETO.map(c => ({...c, tipo: 'direto'})),
  ];

  let categorias = todasCats.filter(c => {
    const diu = parseInt(d.efetivo_diurno[c.key]) || 0;
    const not = parseInt(d.efetivo_noturno[c.key]) || 0;
    return (diu + not) > 0;
  });

  (d.customIndireto_diurno || []).forEach(f => {
    const diu = parseInt(f.qtd) || 0;
    if (f.label && diu > 0) categorias.push({ key: '__cid_' + f.label, label: f.label + ' ✱', tipo: 'indireto', _customDiu: diu, _customNot: 0 });
  });
  (d.customIndireto_noturno || []).forEach(f => {
    const not = parseInt(f.qtd) || 0;
    if (f.label && not > 0) {
      const exist = categorias.find(c => c.label === f.label + ' ✱');
      if (exist) exist._customNot = not;
      else categorias.push({ key: '__cin_' + f.label, label: f.label + ' ✱', tipo: 'indireto', _customDiu: 0, _customNot: not });
    }
  });
  (d.customDireto_diurno || []).forEach(f => {
    const diu = parseInt(f.qtd) || 0;
    if (f.label && diu > 0) categorias.push({ key: '__cdd_' + f.label, label: f.label + ' ✱', tipo: 'direto', _customDiu: diu, _customNot: 0 });
  });
  (d.customDireto_noturno || []).forEach(f => {
    const not = parseInt(f.qtd) || 0;
    if (f.label && not > 0) {
      const exist = categorias.find(c => c.label === f.label + ' ✱' && c.tipo === 'direto');
      if (exist) exist._customNot = not;
      else categorias.push({ key: '__cdn_' + f.label, label: f.label + ' ✱', tipo: 'direto', _customDiu: 0, _customNot: not });
    }
  });

  const MIN_POR_TIPO = 5;
  [{ tipo: 'indireto', lista: CATEGORIAS_INDIRETO }, { tipo: 'direto', lista: CATEGORIAS_DIRETO }].forEach(({ tipo, lista }) => {
    const atual = categorias.filter(c => c.tipo === tipo).length;
    if (atual < MIN_POR_TIPO) {
      const extras = lista.map(c => ({...c, tipo}))
        .filter(c => !categorias.some(ec => ec.key === c.key))
        .slice(0, MIN_POR_TIPO - atual);
      categorias = [...categorias, ...extras];
    }
  });

  let tcd = 0, tci = 0, ttd = 0, tti = 0;
  categorias.forEach((cat, i) => {
    let diu, not;
    if (cat._customDiu !== undefined) {
      diu = cat._customDiu; not = cat._customNot;
    } else {
      diu = parseInt(d.efetivo_diurno[cat.key]) || 0;
      not = parseInt(d.efetivo_noturno[cat.key]) || 0;
    }
    const cd = cat.tipo === 'direto' ? diu : 0;
    const ci = cat.tipo === 'indireto' ? diu : 0;
    const td = cat.tipo === 'direto' ? not : 0;
    const ti = cat.tipo === 'indireto' ? not : 0;
    const tot = cd + ci + td + ti;
    tcd += cd; tci += ci; ttd += td; tti += ti;

    const bg = i % 2 === 0 ? W : LG;
    rf(xL, y, CD, EH, bg, BD); sf(6, 'normal', [0, 0, 0]); tx(cat.label, xL + 1.5, y + EH * 0.75);
    [cd, ci, td, ti].forEach((v, j) => {
      rf(xL + CD + j * CN, y, CN, EH, bg, BD);
      if (v > 0) { sf(6.5, 'bold', NAV); tx(String(v), xL + CD + (j + 0.5) * CN, y + EH * 0.75, { align: 'center' }); }
    });
    rf(xL + CD + 4 * CN, y, CT, EH, tot > 0 ? [220, 235, 255] : bg, BD);
    if (tot > 0) { sf(7, 'bold', NAV); tx(String(tot), xL + CD + 4 * CN + CT / 2, y + EH * 0.75, { align: 'center' }); }
    y += EH;
  });

  const gtV = tcd + tci + ttd + tti;
  const TEH = 5;
  rf(xL, y, CD, TEH, NAV); sf(6.5, 'bold', W); tx('TOTAL EFETIVO', xL + 2, y + TEH * 0.7);
  [tcd, tci, ttd, tti].forEach((v, j) => {
    rf(xL + CD + j * CN, y, CN, TEH, NAV); sf(7, 'bold', W);
    tx(String(v), xL + CD + (j + 0.5) * CN, y + TEH * 0.7, { align: 'center' });
  });
  rf(xL + CD + 4 * CN, y, CT, TEH, RED); sf(8, 'bold', W);
  tx(String(gtV), xL + CD + 4 * CN + CT / 2, y + TEH * 0.7, { align: 'center' });
  y += TEH + 2;

  // ════════════════════════════
  // COLUNA ESQUERDA — EQUIPAMENTOS
  // ════════════════════════════
  rf(xL, y, LW, 6, NAV); sf(7.5, 'bold', W); tx('EQUIPAMENTOS', xL + 2, y + 4); y += 6;

  const EqCN = 20, EqCT = 20, EqCD = LW - EqCN * 2 - EqCT;  // EqCD = 112-40-20 = 52mm
  rf(xL, y, EqCD, EH * 1.5, LB, BD); sf(6.5, 'bold', NAV); tx('EQUIPAMENTO', xL + 2, y + EH * 1.1);
  rf(xL + EqCD, y, EqCN, EH * 1.5, LB, BD); sf(6.5, 'bold', NAV); tx('DIURNO', xL + EqCD + EqCN/2, y + EH * 1.1, { align: 'center' });
  rf(xL + EqCD + EqCN, y, EqCN, EH * 1.5, LB, BD); sf(6.5, 'bold', NAV); tx('NOTURNO', xL + EqCD + EqCN + EqCN/2, y + EH * 1.1, { align: 'center' });
  rf(xL + EqCD + EqCN*2, y, EqCT, EH * 1.5, LB, BD); sf(6.5, 'bold', NAV); tx('TOT.', xL + EqCD + EqCN*2 + EqCT/2, y + EH * 1.1, { align: 'center' });
  y += EH * 1.5;

  let equipamentos = CATEGORIAS_EQUIP_PADRAO.filter(eq => {
    const diu = parseInt(d.equipamentos_diurno[eq.key]) || 0;
    const not = parseInt(d.equipamentos_noturno[eq.key]) || 0;
    return (diu + not) > 0;
  });

  (d.customEquip_diurno || []).forEach(eq => {
    const diu = parseInt(eq.qtd) || 0;
    if (eq.label && diu > 0) equipamentos.push({ key: '__eqd_' + eq.label, label: eq.label + ' ✱', _customDiu: diu, _customNot: 0 });
  });
  (d.customEquip_noturno || []).forEach(eq => {
    const not = parseInt(eq.qtd) || 0;
    if (eq.label && not > 0) {
      const exist = equipamentos.find(e => e.label === eq.label + ' ✱');
      if (exist) exist._customNot = not;
      else equipamentos.push({ key: '__eqn_' + eq.label, label: eq.label + ' ✱', _customDiu: 0, _customNot: not });
    }
  });

  if (equipamentos.length < 6) {
    const placeholders = CATEGORIAS_EQUIP_PADRAO.filter(eq => !equipamentos.some(e => e.key === eq.key)).slice(0, 6 - equipamentos.length);
    equipamentos = [...equipamentos, ...placeholders];
  }
  equipamentos = equipamentos.slice(0, 8);

  let tEqDiu = 0, tEqNot = 0;
  equipamentos.forEach((eq, i) => {
    let diu, not;
    if (eq._customDiu !== undefined) { diu = eq._customDiu; not = eq._customNot; }
    else {
      diu = parseInt(d.equipamentos_diurno[eq.key]) || 0;
      not = parseInt(d.equipamentos_noturno[eq.key]) || 0;
    }
    const tot = diu + not;
    tEqDiu += diu; tEqNot += not;

    const bg = i % 2 === 0 ? W : LG;
    rf(xL, y, EqCD, EH, bg, BD); sf(6, 'normal', [0, 0, 0]); tx(eq.label, xL + 1.5, y + EH * 0.75);
    rf(xL + EqCD, y, EqCN, EH, bg, BD);
    if (diu > 0) { sf(6.5, 'bold', NAV); tx(String(diu), xL + EqCD + EqCN/2, y + EH * 0.75, { align: 'center' }); }
    rf(xL + EqCD + EqCN, y, EqCN, EH, bg, BD);
    if (not > 0) { sf(6.5, 'bold', NAV); tx(String(not), xL + EqCD + EqCN + EqCN/2, y + EH * 0.75, { align: 'center' }); }
    rf(xL + EqCD + EqCN*2, y, EqCT, EH, tot > 0 ? [220, 235, 255] : bg, BD);
    if (tot > 0) { sf(7, 'bold', NAV); tx(String(tot), xL + EqCD + EqCN*2 + EqCT/2, y + EH * 0.75, { align: 'center' }); }
    y += EH;
  });

  const tEqTotal = tEqDiu + tEqNot;
  rf(xL, y, EqCD, TEH, NAV); sf(6.5, 'bold', W); tx('TOTAL EQUIPAMENTOS', xL + 2, y + TEH * 0.7);
  rf(xL + EqCD, y, EqCN, TEH, NAV); sf(7, 'bold', W); tx(String(tEqDiu), xL + EqCD + EqCN/2, y + TEH * 0.7, { align: 'center' });
  rf(xL + EqCD + EqCN, y, EqCN, TEH, NAV); sf(7, 'bold', W); tx(String(tEqNot), xL + EqCD + EqCN + EqCN/2, y + TEH * 0.7, { align: 'center' });
  rf(xL + EqCD + EqCN*2, y, EqCT, TEH, RED); sf(8, 'bold', W); tx(String(tEqTotal), xL + EqCD + EqCN*2 + EqCT/2, y + TEH * 0.7, { align: 'center' });
  y += TEH + 2;

  const yLeft = y;  // fim da coluna esquerda

  // ════════════════════════════════════
  // COLUNA DIREITA — SERVIÇOS (desde yTop)
  // ════════════════════════════════════
  let yR = yTop;

  function renderServicosBlock(titulo, lista, corBlock) {
    const SH = 5;
    const wPac = RW * 0.60, wLoc = RW * 0.20, wEq = RW - wPac - wLoc;
    const xPac = xR, xLoc = xPac + wPac, xEq = xLoc + wLoc;

    if (yR + 6 + SH * 3 > PH - 18) { doc.addPage(); yR = MT; }
    rf(xR, yR, RW, 6, corBlock); sf(7, 'bold', W); tx(titulo, xR + 2, yR + 4); yR += 6;

    function cabServicos() {
      rf(xPac, yR, wPac, SH, LB, BD); sf(5.5, 'bold', NAV); tx('FRENTE / PACOTE', xPac + 2, yR + SH * 0.75);
      rf(xLoc, yR, wLoc, SH, LB, BD); sf(5.5, 'bold', NAV); tx('LOCAL', xLoc + 2, yR + SH * 0.75);
      rf(xEq, yR, wEq, SH, LB, BD); sf(5.5, 'bold', NAV); tx('EQUIPE', xEq + 2, yR + SH * 0.75);
      yR += SH;
    }
    cabServicos();

    if (lista.length === 0) {
      rf(xPac, yR, RW, SH, [253, 246, 230], BD);
      sf(6, 'italic', [140, 90, 30]);
      tx('— sem serviços —', xPac + RW / 2, yR + SH * 0.75, { align: 'center' });
      yR += SH;
    } else {
      lista.forEach((s, i) => {
        if (yR + SH > PH - 18) { doc.addPage(); yR = MT; cabServicos(); }
        const bg = i % 2 === 0 ? W : LG;
        const pacote = STATE.pacotes.find(pp => pp['ID'] === s['Pacote_ID']);
        const frente = pacote ? (pacote['Frente'] || '') : '';
        rf(xPac, yR, wPac, SH, bg, BD); sf(6, 'normal', [0, 0, 0]);
        const txtPacote = (frente ? frente + ' · ' : '') + (s['Pacote_Nome'] || '');
        const linhasPac = doc.splitTextToSize(txtPacote, wPac - 3);
        if (linhasPac.length === 1) tx(linhasPac[0], xPac + 2, yR + SH * 0.75);
        else { sf(5, 'normal', [0, 0, 0]); tx(linhasPac[0], xPac + 2, yR + SH * 0.45); tx(linhasPac[1] || '', xPac + 2, yR + SH * 0.85); }
        rf(xLoc, yR, wLoc, SH, bg, BD); sf(5.5, 'normal', [40, 40, 40]); tx(String(s['Local_Estaca'] || ''), xLoc + 2, yR + SH * 0.75);
        rf(xEq, yR, wEq, SH, bg, BD); sf(5.5, 'normal', [0, 0, 0]);
        const txtEq = String(s['Equipe'] || s['Subcontratado'] || '');
        const linhasEq = doc.splitTextToSize(txtEq, wEq - 3);
        tx(linhasEq[0] || '', xEq + 2, yR + SH * 0.75);
        yR += SH;
      });
    }
    yR += 3;
  }

  renderServicosBlock('SERVIÇOS DIURNOS', servicosDiurnos, ORANGE);
  renderServicosBlock('SERVIÇOS NOTURNOS', servicosNoturnos, BLUE);

  // Unifica y das duas colunas
  y = Math.max(yLeft, yR) + 2;

  // Observações compactas (1 linha se existirem)
  const obsCVTV = [d.observacoes_gerais, d.ocorrencias].filter(x => x && x.trim()).join(' · ');
  if (obsCVTV) {
    if (y + 8 > PH - 40) { doc.addPage(); y = MT; }
    rf(ML, y, TW, 6, [255, 255, 210], [180, 150, 0]);
    sf(6, 'bold', NAV); tx('OBS: ', ML + 2, y + 4);
    const obsL = doc.splitTextToSize(obsCVTV, TW - 14);
    sf(6, 'normal', [0, 0, 0]); tx(obsL[0] + (obsL.length > 1 ? '…' : ''), ML + 12, y + 4);
    y += 7;
  }

  // Assinaturas
  if (y + 21 > PH - 14) { doc.addPage(); y = MT; }
  rf(ML, y, TW, 5, NAV); sf(7, 'bold', W); tx('ASSINATURAS', ML + 2, y + 3.4); y += 5;
  const sw = (TW - 4) / 2;
  rf(ML, y, sw, 16, W, BD);
  sf(6, 'bold', DG); tx('ENGENHEIRO GESTOR ENGENHARIA', ML + 2, y + 5);
  ln(ML + 3, y + 12, ML + sw - 3, y + 12, [120, 120, 120], 0.3);
  sf(6, 'normal', DG); tx(df, ML + sw / 2, y + 14.5, { align: 'center' });
  rf(ML + sw + 4, y, sw, 16, W, BD);
  sf(6, 'bold', DG); tx('CLIENTE / FISCALIZAÇÃO (SP OBRAS)', ML + sw + 6, y + 5);
  ln(ML + sw + 7, y + 12, ML + 2 * sw + 1, y + 12, [120, 120, 120], 0.3);
  sf(6, 'normal', DG); tx(df, ML + sw + 4 + sw / 2, y + 14.5, { align: 'center' });
  y += 16;

  // Rodapé
  const fy = PH - 8;
  ln(ML, fy - 1, ML + TW, fy - 1, NAV, 0.4);
  sf(5.5, 'normal', DG);
  tx('Gestor Engenharia  |  RDO Nº ' + nrRDO + '  |  Data: ' + df, PW / 2, fy + 2, { align: 'center' });
  tx('Av. Senador Teotônio Vilela, São Paulo – SP  |  Duplicação Viária', PW / 2, fy + 5.5, { align: 'center' });
  
  const fname = 'RDO_' + data.replace(/-/g, '_') + '.pdf';
  doc.save(fname);
  toast('PDF gerado: ' + fname, 'success');
}

function gerarPDFInternoTurnoV4() {

    gerarPDFInterno(DIARIO_V4.data, DIARIO_TURNO_ATIVO);

    toast('PDF Interno indisponível', 'error');
  }
}

function gerarPDFDiarioV4(data) {
