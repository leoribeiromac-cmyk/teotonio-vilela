<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Sistema Teotônio Vilela — Controle Integrado</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  /* Tema Canteiro - paleta terra/terracota */
  --bg:#f5f3ef;
  --bg-2:#eeebe5;
  --surface:#ffffff;
  --surface-2:#fafaf7;
  --border:#e4e0d8;
  --border-strong:#ccc8bf;
  --text:#1a1712;
  --text-2:#3a3530;
  --muted:#7a7570;
  --muted-2:#a09b94;
  
  /* Sidebar dark */
  --sidebar-bg:#1a1612;
  --sidebar-text:rgba(255,255,255,0.65);
  --sidebar-active:#ffffff;
  --sidebar-active-bg:rgba(255,255,255,0.09);
  --sidebar-hover-bg:rgba(255,255,255,0.05);
  --sidebar-border:rgba(255,255,255,0.09);
  
  /* Primário (azul profundo) - usado em barras, gráficos */
  --pri:oklch(0.45 0.14 240);
  --pri-l:oklch(0.95 0.03 240);
  --pri-d:oklch(0.38 0.14 240);
  
  /* Acento (terracota) - principal CTA, badges, destaques */
  --acc:oklch(0.62 0.18 38);
  --acc-l:oklch(0.96 0.04 38);
  --acc-d:oklch(0.48 0.18 38);
  
  --grn:oklch(0.62 0.16 150);
  --grn-l:oklch(0.95 0.04 150);
  --blu:oklch(0.58 0.18 250);
  --blu-l:oklch(0.95 0.04 250);
  --ylw:oklch(0.75 0.16 85);
  --ylw-l:oklch(0.97 0.04 85);
  --ylw-d:oklch(0.55 0.16 85);
  --red:oklch(0.58 0.2 20);
  --red-l:oklch(0.96 0.04 20);
  
  --r:12px;
  --r-sm:6px;
  --r-lg:16px;
  --sh:0 1px 3px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.08);
  --sh-lg:0 16px 40px rgba(0,0,0,.14);
  
  --anim-speed:1;
  --kpi-size:42px;
}

@keyframes pageEnter {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes staggerIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes cellPop {
  0% { opacity: 0; transform: scale(0); }
  60% { opacity: 1; transform: scale(1.08); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes barGrow {
  from { width: 0; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.25; }
}

/* Transições suaves para navegação */
.page-transition {
  transition: opacity 0.25s ease-out, transform 0.25s ease-out;
}

.page-enter { animation: pageEnter calc(0.4s * var(--anim-speed)) cubic-bezier(0.2,0,0,1); }
.stagger-item { animation: staggerIn calc(0.4s * var(--anim-speed)) cubic-bezier(0.2,0,0,1) both; }

/* Filtros */
.filter-bar {
  display: flex; gap: 12px; margin-bottom: 18px; align-items: center;
  background: var(--surface); padding: 12px 18px; border-radius: var(--r); border: 1px solid var(--border);
  box-shadow: var(--sh);
}
.filter-bar select {
  padding: 8px 12px; border: 1px solid var(--border-strong); border-radius: var(--r-sm);
  background: var(--bg); font-family: inherit; font-size: 13px; font-weight: 500;
  color: var(--text); cursor: pointer; outline: none; transition: all .2s;
}
.filter-bar select:hover { border-color: var(--pri); }
.filter-bar select:focus { border-color: var(--pri); box-shadow: 0 0 0 3px var(--pri-l); }
.filter-active-tag {
  background: var(--pri-l); color: var(--pri); padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px;
}
.filter-clear { cursor: pointer; opacity: 0.6; transition: .2s; }
.filter-clear:hover { opacity: 1; color: var(--red); }

/* Interatividade nas frentes */
.frente-row {
  padding: 10px; border-radius: var(--r-sm); border: 1px solid transparent;
  transition: all 0.2s ease; cursor: pointer;
}
.frente-row:hover {
  background: var(--surface-2); border-color: var(--border-strong); transform: translateX(4px);
}
.frente-row.active {
  background: var(--pri-l); border-color: var(--pri);
}

html,body{
  height:100%;
  font-family:'Space Grotesk',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  font-feature-settings:'ss01','ss02','cv11';
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',monospace}

#root{height:100%;display:flex;flex-direction:column}

/* ===================== LAYOUT ===================== */
.app{display:flex;height:100vh;min-height:0;overflow:hidden}

.sidebar{
  width:240px;flex-shrink:0;
  background:var(--sidebar-bg);
  border-right:1px solid var(--sidebar-border);
  display:flex;flex-direction:column;
  z-index:10;
  transition:transform calc(.3s * var(--anim-speed)) cubic-bezier(.2,0,0,1);
}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--sidebar-border);}
.badge-obra{
  display:inline-block;
  background:var(--acc);
  color:#fff;font-size:9px;font-weight:700;letter-spacing:.1em;
  padding:3px 8px;border-radius:4px;margin-bottom:10px;text-transform:uppercase;
}
.sidebar-logo h1{font-size:13px;font-weight:700;color:var(--sidebar-active);line-height:1.3;letter-spacing:-.01em;}
.sidebar-logo p{font-size:11px;color:var(--sidebar-text);margin-top:2px;line-height:1.4;}

.nav-group{padding:14px 0 6px}
.nav-label{
  font-size:9px;font-weight:700;letter-spacing:.12em;
  color:var(--sidebar-text);opacity:.45;padding:0 20px 6px;text-transform:uppercase;
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:9px 14px;margin:1px 12px;
  border-radius:8px;cursor:pointer;
  color:var(--sidebar-text);font-size:13px;font-weight:500;
  transition:background calc(.12s*var(--anim-speed)),color calc(.12s*var(--anim-speed));
  white-space:nowrap;user-select:none;
  position:relative;
}
.nav-item:hover{background:var(--sidebar-hover-bg);color:var(--sidebar-active);}
.nav-item.active{background:var(--sidebar-active-bg);color:var(--sidebar-active);font-weight:700;}
.nav-item.active::before{
  content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;background:var(--acc);border-radius:0 3px 3px 0;
}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-counter{
  background:rgba(255,255,255,.1);color:var(--sidebar-text);
  font-size:10px;font-weight:700;
  padding:1px 7px;border-radius:10px;margin-left:auto;
  transition:background calc(.15s*var(--anim-speed));
}
.nav-item.active .nav-counter{background:var(--acc);color:#fff}
.nav-divider{border:none;border-top:1px solid var(--sidebar-border);margin:10px 20px}

.sync-block{padding:12px 16px 16px;margin-top:auto;border-top:1px solid var(--sidebar-border);}
.sync-row{display:flex;align-items:center;gap:8px;padding:8px 0}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:.3s}
.sync-dot.ok{background:var(--grn);box-shadow:0 0 0 3px oklch(0.62 0.16 150 / .15)}
.sync-dot.loading{background:var(--ylw);animation:pulse 1.2s infinite}
.sync-dot.error{background:var(--red)}
.sync-dot.offline{background:var(--muted-2)}
.sync-text{font-size:10px;color:var(--sidebar-text);opacity:.7;line-height:1.4;}
.sync-text strong{color:var(--sidebar-active);opacity:1;font-weight:600;}
.btn-refresh{
  width:100%;padding:7px 10px;
  background:rgba(255,255,255,.06);border:1px solid var(--sidebar-border);color:var(--sidebar-text);
  border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.04em;
  cursor:pointer;transition:all calc(.15s * var(--anim-speed));font-family:inherit;
}
.btn-refresh:hover{background:rgba(255,255,255,.12);color:var(--sidebar-active);}

.mobile-menu-btn{display:none}
.sidebar-overlay{display:none}

/* ===================== MAIN ===================== */
.main{flex:1;overflow-y:auto;min-width:0;display:flex;flex-direction:column;background:var(--bg)}

.topbar{
  padding:0 28px;height:60px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:14px;position:sticky;top:0;z-index:5;
}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:-.01em;line-height:1.2}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:2px}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:7px;
  font-size:13px;font-weight:500;cursor:pointer;
  border:none;transition:all .15s;font-family:inherit;
  white-space:nowrap;
}
.btn-primary{background:var(--pri);color:#fff}
.btn-primary:hover{background:var(--pri-d);transform:translateY(-1px);box-shadow:var(--sh)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg);border-color:var(--border-strong)}
.btn-ghost{background:transparent;color:var(--muted);border:none;padding:8px 10px}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-acc{background:var(--acc);color:#fff}
.btn-acc:hover{background:var(--acc-d);transform:translateY(-1px)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-lg{padding:11px 20px;font-size:14px}

.page{flex:1;padding:24px 28px;display:flex;flex-direction:column;gap:18px;max-width:1600px;width:100%;margin:0 auto}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden; transition: box-shadow 0.3s;}
.card:hover{box-shadow: var(--sh);}
.card-header{
  padding:16px 22px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.card-title{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.card-title-sub{font-size:12px;color:var(--muted);font-weight:400;margin-top:3px;text-transform:none;letter-spacing:0;color:var(--text);}
.card-body{padding:18px 22px}
.card-body.compact{padding:12px 18px}
.card-body.flush{padding:0}

/* ===================== KPI ===================== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}
.kpi-card{
  position:relative;overflow:hidden;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:18px 20px;display:flex;flex-direction:column;gap:6px; cursor: pointer;
  transition:transform calc(.2s*var(--anim-speed)),box-shadow calc(.2s*var(--anim-speed)),border-color calc(.2s*var(--anim-speed));
}
.kpi-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--pri),var(--pri-d));
  transform:scaleX(0);transform-origin:left;
  transition:transform calc(.4s * var(--anim-speed)) cubic-bezier(.2,0,0,1);
}
.kpi-card:hover{transform:translateY(-3px);box-shadow:var(--sh-md);border-color:var(--pri-l);}
.kpi-card:hover::after{transform:scaleX(1);}
.kpi-card.kpi-acc::after{background:linear-gradient(90deg,var(--acc),var(--acc-d));}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
.kpi-value{font-size:var(--kpi-size,42px);font-weight:700;letter-spacing:-.04em;line-height:1.05;font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace;color:var(--text);}
.kpi-value-small{font-size:.45em;color:var(--muted);font-weight:500;letter-spacing:0;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;}
.kpi-trend{font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.kpi-trend.up{color:var(--grn)}
.kpi-trend.warn{color:var(--ylw-d)}
.kpi-trend.down{color:var(--red)}
.kpi-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.kpi-bar{height:100%;border-radius:2px;transition:width .6s ease}

/* Special hero KPI */
.kpi-hero{
  grid-column:span 2;
  background:var(--sidebar-bg);
  color:#fff;border:none; cursor: default;
}
.kpi-hero:hover{transform:translateY(-3px);box-shadow:var(--sh-lg);}
.kpi-hero::after{background:linear-gradient(90deg,var(--acc),oklch(0.72 0.18 60));}
.kpi-hero .kpi-label{color:rgba(255,255,255,.5)}
.kpi-hero .kpi-value{color:#fff;font-size:calc(var(--kpi-size,42px) * 1.1);}
.kpi-hero .kpi-value-small{color:rgba(255,255,255,.5);}
.kpi-hero .kpi-sub{color:rgba(255,255,255,.65)}
@media(max-width:600px){.kpi-hero{grid-column:span 1}}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:900px){
  .grid-2{grid-template-columns:1fr}
  .grid-3{grid-template-columns:1fr}
}

/* ===================== TABLE ===================== */
table.t{width:100%;border-collapse:collapse;font-size:13px}
table.t th{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  color:var(--muted);padding:10px 14px;text-align:left;
  border-bottom:1px solid var(--border);background:var(--surface-2);
  position:sticky;top:0;
}
table.t td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px; transition: background 0.2s;}
table.t tr:last-child td{border-bottom:none}
table.t tr:hover td{background:var(--bg)}
table.t tr.summary td{background:var(--pri-l);font-weight:600;color:var(--pri);font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:8px 14px}
.t-num{font-variant-numeric:tabular-nums;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px}
.t-mono{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}

/* ===================== PILLS / TAGS ===================== */
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.01em}
.pill-grn{background:var(--grn-l);color:var(--grn)}
.pill-ylw{background:var(--ylw-l);color:var(--ylw-d)}
.pill-red{background:var(--red-l);color:var(--red)}
.pill-blu{background:var(--blu-l);color:var(--blu)}
.pill-acc{background:var(--acc-l);color:var(--acc-d)}
.pill-pri{background:var(--pri-l);color:var(--pri)}

/* Frente tags */
.f-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.02em;text-transform:uppercase}
.f-Drenagem{background:#dceefb;color:#1a5276}
.f-Demoli, .f-demolicao{background:#fadbd8;color:#922b21}
.f-Via{background:#fdebd0;color:#935116}
.f-Pav{background:#d6dbdf;color:#2c3e50}
.f-Vala{background:#fcf3cf;color:#7d6608}
.f-Sinaliza{background:#d5f5e3;color:#196f3d}

.prog-bar-wrap{width:100%;min-width:60px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.prog-bar{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1)}
.prog-bar.zero{background:var(--muted-2)}
.prog-bar.parcial{background:var(--ylw)}
.prog-bar.completo{background:var(--grn)}
.prog-bar.atrasado{background:var(--red)}

/* ===================== HEATMAP ===================== */
.heatmap-wrap{overflow-x:auto;padding-bottom:8px}
.heatmap{display:grid;gap:2px;font-size:9px;font-family:'JetBrains Mono',monospace}
.hm-cell{
  min-height:24px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;cursor:default;
  transition:transform calc(.15s * var(--anim-speed)),box-shadow calc(.15s * var(--anim-speed));
  animation:cellPop calc(.3s * var(--anim-speed)) cubic-bezier(.2,0,0,1) both;
}
.hm-cell:hover{transform:scale(1.2);z-index:2;box-shadow:var(--sh-md)}
.hm-row-label{
  font-size:10px;font-weight:600;color:var(--muted);
  padding:0 8px 0 4px;display:flex;align-items:center;justify-content:flex-end;
  white-space:nowrap;
}
.hm-col-label{
  font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;
  text-align:center;padding:2px 0;
  writing-mode:vertical-rl;transform:rotate(180deg);
}

/* ===================== FORM ===================== */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.form-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--muted);text-transform:uppercase}
.field input,.field select,.field textarea{
  padding:9px 12px;border:1px solid var(--border);border-radius:7px;
  font-size:14px;background:var(--surface);font-family:inherit;color:var(--text);
  transition:.15s;width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-l);
}
.field input.invalid,.field select.invalid{border-color:var(--red)}
.field-error{font-size:11px;color:var(--red);font-weight:500}
.field-hint{font-size:11px;color:var(--muted);margin-top:-2px}

.btn-toggle-group{display:flex;gap:0;border:1px solid var(--border);border-radius:7px;overflow:hidden;width:fit-content}
.btn-toggle{
  padding:7px 14px;background:transparent;border:none;font-size:13px;
  font-family:inherit;color:var(--muted);cursor:pointer;font-weight:500;
  border-right:1px solid var(--border);transition:.15s;
}
.btn-toggle:last-child{border-right:none}
.btn-toggle.active{background:var(--pri);color:#fff;font-weight:600}
.btn-toggle:hover:not(.active){background:var(--bg);color:var(--text)}

.servico-row{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;margin-bottom:10px;
  position:relative;
}
.servico-row .row-num{
  position:absolute;top:-8px;left:14px;
  background:var(--pri);color:#fff;font-size:10px;font-weight:700;letter-spacing:.05em;
  padding:2px 8px;border-radius:10px;
}
.servico-row .btn-remove{
  position:absolute;top:10px;right:10px;
  background:transparent;border:none;color:var(--muted);cursor:pointer;
  font-size:18px;padding:2px 8px;border-radius:4px;
}
.servico-row .btn-remove:hover{background:var(--red-l);color:var(--red)}
.btn-add-servico{
  width:100%;padding:11px;
  background:transparent;border:1.5px dashed var(--border-strong);
  border-radius:var(--r);font-size:13px;font-weight:500;color:var(--muted);
  cursor:pointer;font-family:inherit;transition:.15s;
}
.btn-add-servico:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-l)}

/* ===================== TOAST ===================== */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  background:var(--surface);border:1px solid var(--border);
  padding:12px 18px;border-radius:var(--r);box-shadow:var(--sh-lg);
  font-size:13px;display:flex;align-items:center;gap:10px;
  pointer-events:auto;animation:slideIn .25s cubic-bezier(.2,0,0,1);
  max-width:420px;
}
.toast.success{border-left:4px solid var(--grn)}
.toast.error{border-left:4px solid var(--red)}
.toast.info{border-left:4px solid var(--blu)}
.toast-fechar{cursor:pointer;font-weight:700;opacity:.45;padding:0 2px 0 6px;flex-shrink:0;font-size:15px}
.toast-fechar:hover{opacity:1}
#outboxIndicator{
  position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:1100;
  display:none;align-items:center;gap:8px;cursor:pointer;
  background:#1f2937;color:#fff;padding:10px 18px;border-radius:999px;
  box-shadow:0 4px 16px rgba(0,0,0,.28);font-size:13px;font-weight:600;
  max-width:92vw;animation:slideIn .25s cubic-bezier(.2,0,0,1);
}
#outboxIndicator:active{transform:translateX(-50%) scale(.97)}
.campo-invalido{border:2px solid var(--red)!important;background:var(--red-l)!important}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===================== EMPTY / LOADING ===================== */
.empty{padding:60px 20px;text-align:center;color:var(--muted)}
.empty-icon{font-size:42px;margin-bottom:12px;opacity:.5}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.empty-sub{font-size:12px;color:var(--muted);max-width:380px;margin:0 auto}

.loading{padding:80px 20px;text-align:center}
.spinner{
  display:inline-block;width:32px;height:32px;
  border:3px solid var(--border);border-top-color:var(--pri);
  border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===================== MOBILE ===================== */
@media(max-width:768px){
  .mobile-menu-btn{
    display:flex;align-items:center;justify-content:center;
    background:transparent;border:none;color:var(--text);
    font-size:22px;cursor:pointer;padding:6px 10px;
    margin-right:-4px;
  }
  .sidebar{
    position:fixed;left:0;top:0;height:100%;
    transform:translateX(-100%);box-shadow:var(--sh-lg);
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{
    display:block;position:fixed;inset:0;
    background:rgba(0,0,0,.4);z-index:9;
    opacity:0;pointer-events:none;transition:.25s;
  }
  .sidebar-overlay.open{opacity:1;pointer-events:auto}
  .page{padding:14px}
  .topbar{padding:12px 16px}
  .topbar-title{font-size:15px}
  .card-body{padding:14px 16px}
  .kpi-card{padding:14px}
  .kpi-value{font-size:22px}
  .kpi-hero .kpi-value{font-size:30px}
  .filter-bar{flex-direction: column; align-items: stretch;}
}

/* Botões para remover items custom */
.btn-remove-custom{
  position:absolute;top:0;right:-2px;
  width:20px;height:20px;border-radius:50%;
  background:transparent;border:none;color:var(--red);
  cursor:pointer;font-size:18px;font-weight:700;line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.btn-remove-custom:hover{background:var(--red);color:#fff;}

.btn-remove-custom-row{
  position:absolute;top:50%;right:6px;transform:translateY(-50%);
  width:18px;height:18px;border-radius:50%;
  background:transparent;border:none;color:var(--red);
  cursor:pointer;font-size:16px;font-weight:700;line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.btn-remove-custom-row:hover{background:var(--red);color:#fff;}

/* Botões grandes de seleção de turno (RDO Diário v4) */
.btn-turno-grande{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 18px;background:var(--surface);
  border:2px solid var(--border);border-radius:var(--r-lg);
  cursor:pointer;transition:all .2s;font-family:inherit;
  min-height:140px;text-align:center;
}
.btn-turno-grande:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:var(--sh-md)}
.btn-turno-icon{font-size:44px;line-height:1;margin-bottom:8px}
.btn-turno-titulo{font-size:18px;font-weight:700;letter-spacing:.04em;color:var(--text)}
.btn-turno-status{font-size:11px;color:var(--muted);margin-top:6px}
.btn-turno-status.preenchido{color:var(--grn);font-weight:600}
.btn-turno-grande.preenchido{border-color:var(--grn);background:linear-gradient(180deg, var(--grn-l) 0%, var(--surface) 50%)}
.btn-turno-diurno:hover{border-color:#d4a810;background:#fff8e1}
.btn-turno-noturno:hover{border-color:#326496;background:#e8f0f8}

/* Buttons & IA Styles */
.ai-content { line-height: 1.6; font-size: 14px; color: var(--text); }
.ai-content h3 { margin-top: 15px; margin-bottom: 10px; color: var(--pri); font-size: 16px; }
.ai-content p { margin-bottom: 10px; }
.ai-content ul { padding-left: 20px; margin-bottom: 15px; }
.ai-content li { margin-bottom: 5px; }
.ai-content strong { color: var(--text-2); font-weight: 700; }
.loader-spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--pri); border-radius: 50%; animation: spin 0.8s linear infinite; }

/* ===== GANTT ===== */
.gantt-wrap { overflow-x: auto; min-height: 160px; }
.gantt-grid { display: grid; grid-template-columns: 230px 1fr; border-bottom: 1px solid var(--border); background: var(--bg-2); }
.gantt-labels-header { padding: 8px 12px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; border-right: 1px solid var(--border); }
.gantt-timeline-header { position: relative; height: 32px; min-width: 600px; overflow: hidden; }
.gantt-mes { position: absolute; top: 0; height: 100%; display: flex; align-items: center; padding: 0 6px; font-size: 10px; font-weight: 700; color: var(--muted); border-right: 1px solid var(--border); box-sizing: border-box; overflow: hidden; }
.gantt-hoje-header { position: absolute; bottom: 2px; transform: translateX(-50%); font-size: 9px; font-weight: 700; color: #f44336; background: #fff0f0; padding: 1px 4px; border-radius: 3px; white-space: nowrap; pointer-events: none; }
.gantt-body { min-width: 830px; }
.gantt-frente-header { display: grid; grid-template-columns: 230px 1fr; background: var(--frente-cor, var(--pri)); color: #fff; font-size: 11px; font-weight: 700; padding: 5px 12px; text-transform: uppercase; letter-spacing: 0.05em; }
.gantt-row { display: grid; grid-template-columns: 230px 1fr; border-bottom: 1px solid var(--border); min-height: 56px; }
.gantt-row:hover { background: var(--bg-2); }
.gantt-label-cell { border-right: 1px solid var(--border); padding: 6px 10px; display: flex; flex-direction: column; justify-content: center; gap: 2px; overflow: hidden; }
.gantt-label-nome { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-label-meta { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.gantt-label-datas { font-size: 10px; color: var(--muted); }
.gantt-label-pred { display: flex; align-items: center; gap: 4px; }
.gantt-pill { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 10px; white-space: nowrap; }
.gantt-edit-btn { background: none; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; font-size: 10px; padding: 1px 5px; color: var(--muted); line-height: 1.4; }
.gantt-edit-btn:hover { background: var(--acc); color: #fff; border-color: var(--acc); }
.gantt-bar-area { position: relative; min-width: 600px; }
.gantt-bar { position: absolute; top: 50%; transform: translateY(-50%); height: 24px; border-radius: 4px; overflow: hidden; min-width: 4px; }
.gantt-bar-atrasado { border-width: 2px !important; box-shadow: 0 0 0 1px #f4433640; }
.gantt-bar-progress { position: absolute; left: 0; top: 0; height: 100%; }
.gantt-bar-label { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); font-size: 9px; font-weight: 700; color: rgba(0,0,0,0.6); white-space: nowrap; mix-blend-mode: multiply; }
.gantt-hoje { position: absolute; top: 0; bottom: 0; width: 2px; background: #f44336; opacity: 0.75; pointer-events: none; z-index: 2; }
.gantt-grid-line { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--border); opacity: 0.5; pointer-events: none; }

/* ===================== GRUPOS TÉCNICOS (3D PREMIUM) ===================== */
.tech-card-3d { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; display: flex; flex-direction: column; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer; box-shadow: var(--sh); }
.tech-card-3d:hover { transform: translateY(-6px) scale(1.02); box-shadow: var(--sh-lg); border-color: var(--pri); }
.tech-card-3d.active { border-color: var(--pri); box-shadow: 0 0 0 3px var(--pri-l); }
.tech-card-image { height: 160px; background-color: #fff; background-position: center; background-size: cover; background-repeat: no-repeat; position: relative; border-bottom: 1px solid var(--border); }
.tech-card-image::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 60%); }
.tech-card-title-overlay { position: absolute; bottom: 14px; left: 16px; right: 16px; color: #fff; z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; }
.tech-card-title { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
.tech-card-content { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.tech-card-metric { display: flex; justify-content: space-between; align-items: baseline; }
.tech-card-val { font-size: 26px; font-weight: 800; color: var(--text); line-height: 1; }
.tech-card-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.tech-card-stats { font-size: 11px; color: var(--muted); background: var(--surface-2); padding: 8px 12px; border-radius: 6px; display: flex; align-items: center; gap: 6px; border: 1px solid var(--border); }

/* ====================================================================
   PAINEL EXECUTIVO V2 — Hero, narrativa, destaques, sparkline
   ==================================================================== */
.exec-hero {
  position: relative;
  background: radial-gradient(ellipse at top right, #2a221c 0%, #1a1612 55%, #0f0c08 100%);
  color: #fff;
  border-radius: var(--r-lg);
  padding: 30px 36px 24px;
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(0, 1fr);
  gap: 36px;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(20,15,10,0.06), 0 12px 32px rgba(20,15,10,0.10);
}
.exec-hero::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--acc) 0%, oklch(0.72 0.18 60) 60%, transparent 100%);
}
.exec-hero::after {
  content: '';
  position: absolute; right: -120px; top: -80px;
  width: 360px; height: 360px;
  background: radial-gradient(circle, oklch(0.62 0.18 38 / 0.16) 0%, transparent 70%);
  pointer-events: none;
}
.hero-main { position: relative; z-index: 1; display: flex; flex-direction: column; min-width: 0; }
.hero-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.16em;
  text-transform: uppercase; color: rgba(255,255,255,0.5);
}
.hero-period {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600; color: var(--acc);
  background: oklch(0.62 0.18 38 / 0.14);
  padding: 3px 9px; border-radius: 12px;
  margin-left: 10px; letter-spacing: 0.04em;
}
.hero-value-row { display: flex; align-items: baseline; gap: 16px; margin-top: 14px; flex-wrap: wrap; }
.hero-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(56px, 8vw, 88px);
  font-weight: 700;
  letter-spacing: -0.05em;
  line-height: 0.95;
  font-variant-numeric: tabular-nums;
  color: #fff;
}
.hero-value .pp { font-size: 0.32em; color: rgba(255,255,255,0.4); letter-spacing: 0; margin-left: 6px; font-weight: 600; }

.hero-gap {
  display: flex; flex-direction: column;
  gap: 2px; padding-left: 22px; margin-left: 6px;
  border-left: 1px solid rgba(255,255,255,0.10);
  min-width: 130px;
}
.hero-gap-title {
  font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: rgba(255,255,255,0.4);
  margin-bottom: 4px;
}
.hero-gap-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 30px; font-weight: 700;
  letter-spacing: -0.03em; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.hero-gap-num.behind  { color: oklch(0.78 0.18 25); }
.hero-gap-num.ahead   { color: oklch(0.82 0.16 150); }
.hero-gap-num.ontrack { color: rgba(255,255,255,0.85); }
.hero-gap-direction {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: lowercase;
  margin-top: 4px;
  line-height: 1.2;
}
.hero-gap-direction.behind  { color: oklch(0.78 0.18 25); }
.hero-gap-direction.ahead   { color: oklch(0.82 0.16 150); }
.hero-gap-direction.ontrack { color: rgba(255,255,255,0.65); }
.hero-gap-lbl {
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0;
  margin-top: 4px;
  line-height: 1.3;
}

.hero-deltas {
  display: flex; flex-direction: column; gap: 4px; padding-bottom: 8px;
  border-left: 1px solid rgba(255,255,255,0.1);
  padding-left: 18px;
  min-width: 220px;
}
.hero-delta-title {
  font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: rgba(255,255,255,0.4);
  margin-bottom: 4px;
}
.hero-delta {
  display: grid;
  grid-template-columns: 14px auto 1fr;
  align-items: baseline;
  gap: 6px;
  white-space: nowrap;
  padding: 2px 0;
}
.hero-delta-arr { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; line-height: 1; }
.hero-delta-num { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
.hero-delta-lbl { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 0; text-transform: none; margin-left: 4px; }
.hero-delta.up { color: oklch(0.78 0.16 150); }
.hero-delta.warn { color: oklch(0.84 0.16 85); }
.hero-delta.down { color: oklch(0.72 0.18 25); }
.hero-delta.flat { color: rgba(255,255,255,0.45); }

.hero-spark {
  margin-top: 22px; height: 64px; position: relative;
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 10px;
}
.hero-spark-label {
  position: absolute; top: 12px; left: 0;
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: rgba(255,255,255,0.3);
}
.hero-spark canvas { display: block; }

.hero-side {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  border-left: 1px solid rgba(255,255,255,0.08);
  padding-left: 32px; min-width: 0;
}
.hero-narrative { flex: 1; min-height: 0; }
.narrative-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.16em;
  text-transform: uppercase; color: rgba(255,255,255,0.5);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.narrative-label::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--acc); box-shadow: 0 0 12px var(--acc);
}
.narrative-text { font-size: 14px; line-height: 1.65; color: rgba(255,255,255,0.85); }
.narrative-text strong { color: #fff; font-weight: 600; }
.narrative-text .nudge { color: var(--acc); font-weight: 700; }
.narrative-text .pos { color: oklch(0.82 0.16 150); font-weight: 600; }

.hero-ia {
  margin-top: 14px; padding: 12px 14px;
  background: linear-gradient(135deg, oklch(0.62 0.18 38 / 0.14) 0%, oklch(0.45 0.14 240 / 0.10) 100%);
  border-radius: 10px;
  border-left: 3px solid var(--acc);
  display: flex; gap: 11px; align-items: flex-start;
  font-size: 13px; line-height: 1.5;
  color: rgba(255,255,255,0.92);
  transition: opacity .25s;
}
.hero-ia.loading { opacity: 0.55; }
.hero-ia.disabled {
  background: rgba(255,255,255,0.04);
  border-left-color: rgba(255,255,255,0.15);
}
.hero-ia.disabled .hero-ia-icon {
  filter: grayscale(1) opacity(0.5);
}
.hero-ia.disabled .hero-ia-text {
  color: rgba(255,255,255,0.65);
}
.hero-ia-icon { font-size: 16px; flex-shrink: 0; line-height: 1.2; filter: drop-shadow(0 0 4px oklch(0.62 0.18 38 / 0.7)); }
.hero-ia-body { flex: 1; min-width: 0; }
.hero-ia-label { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--acc); display: block; margin-bottom: 4px; }
.hero-ia-text { font-size: 13px; line-height: 1.55; color: rgba(255,255,255,0.92); }
.hero-ia-refresh {
  background: transparent; border: none; cursor: pointer;
  color: rgba(255,255,255,0.4); font-size: 14px;
  padding: 2px 6px; border-radius: 4px;
  transition: all .15s; align-self: flex-start;
  font-family: inherit;
}
.hero-ia-refresh:hover { color: var(--acc); background: rgba(255,255,255,0.05); transform: rotate(180deg); }

.hero-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 18px; padding-top: 18px; margin-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.hero-stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px; font-weight: 700; letter-spacing: -0.03em;
  color: #fff; line-height: 1; font-variant-numeric: tabular-nums;
}
.hero-stat-num .small { font-size: 14px; color: rgba(255,255,255,0.4); font-weight: 500; letter-spacing: 0; }
.hero-stat-lbl {
  font-size: 10px; letter-spacing: 0.06em;
  text-transform: uppercase; color: rgba(255,255,255,0.5);
  margin-top: 6px; line-height: 1.4;
}
.hero-ritmo-ctrl { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 16px; }
.hero-ritmo-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-right: 2px; }
.hero-ritmo-btn { cursor: pointer; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.85); font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px; transition: all .15s; }
.hero-ritmo-btn:hover { border-color: rgba(255,255,255,0.5); }
.hero-ritmo-btn.on { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.85); color: #fff; }
.hero-stat-prazo { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; margin-top: 3px; }
.hero-stat-prazo.over { color: #ff9b8a; }
.hero-stat-prazo.under { color: #7fd99b; }
.hero-stat-prazo.on { color: rgba(255,255,255,0.7); }

/* ===== Exec secondary KPIs ===== */
.exec-kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
@media(max-width:900px){ .exec-kpi-grid { grid-template-columns: repeat(2,1fr); } }
@media(max-width:560px){ .exec-kpi-grid { grid-template-columns: 1fr; } }
.exec-kpi {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px;
  display: flex; flex-direction: column; gap: 4px;
  transition: border-color .15s, box-shadow .15s, transform .15s;
}
.exec-kpi:hover { border-color: var(--border-strong); box-shadow: var(--sh); }
.exec-kpi-lbl {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
  display: flex; align-items: center; gap: 6px;
}
.exec-kpi-lbl .badge-mini {
  background: var(--acc); color: #fff; font-size: 9px; font-weight: 700;
  padding: 1px 6px; border-radius: 10px; letter-spacing: 0.04em;
}
.exec-kpi-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 30px; font-weight: 700; letter-spacing: -0.03em;
  line-height: 1.05; color: var(--text); font-variant-numeric: tabular-nums;
  margin-top: 2px;
}
.exec-kpi-val .unit { font-size: 14px; color: var(--muted); font-weight: 500; letter-spacing: 0; margin-left: 4px; }
.exec-kpi-sub { font-size: 11px; color: var(--muted); line-height: 1.4; margin-top: 4px; }
.exec-kpi-sub strong { color: var(--text-2); font-weight: 600; }

/* ===== Row 2:1 ===== */
.exec-row-21 { display: grid; grid-template-columns: minmax(0, 2fr) minmax(0, 1fr); gap: 16px; }
@media (max-width: 1100px) { .exec-row-21 { grid-template-columns: 1fr; } }

/* ===== Destaques / Atenção ===== */
.exec-list { display: flex; flex-direction: column; padding: 4px 0; }
.exec-list-section {

/* ===== 3D AVENIDA ===== */

.scene-3d {
  position: relative;
  height: 340px;
  background:
    radial-gradient(ellipse at 50% 30%, oklch(0.62 0.18 38 / 0.10) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 80%, rgba(0,0,0,0.7) 0%, transparent 70%),
    linear-gradient(180deg, #0a0805 0%, #1a1612 50%, #0a0805 100%);
  overflow: hidden;
  perspective: 1400px;
  perspective-origin: 50% 30%;
}
.scene-3d::after {
  content: '';
  position: absolute;
  left: 0; right: 0; top: 30%;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, oklch(0.62 0.18 38 / 0.4) 50%, transparent 100%);
  box-shadow: 0 0 24px oklch(0.62 0.18 38 / 0.3);
  pointer-events: none;
}
.scene-3d-stage {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  transform-style: preserve-3d;
  animation: stage3dIntro 2.6s 0.15s cubic-bezier(.22,.7,.2,1) both;
}
@keyframes stage3dIntro {
  0%   { transform: rotateX(0deg)  rotateZ(0deg)  translateY(60px) scale(0.85); opacity: 0; }
  15%  { opacity: 1; }
  60%  { transform: rotateX(38deg) rotateZ(-4deg) translateY(0)    scale(1); }
  100% { transform: rotateX(52deg) rotateZ(-8deg) translateY(0)    scale(1);    opacity: 1; }
}
.road-3d {
  position: relative;
  width: 84%; height: 130px;
  transform-style: preserve-3d;
  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,0.28) 0 14px, transparent 14px 28px) 0 50% / 100% 1.5px no-repeat,
    linear-gradient(180deg, #1f1a14 0%, #15110d 100%);
  border-top: 1px solid rgba(255,255,255,0.18);
  border-bottom: 1px solid rgba(255,255,255,0.18);
  border-radius: 2px;
  box-shadow: inset 0 0 70px rgba(0,0,0,0.75), 0 4px 24px rgba(0,0,0,0.6);
}
.road-3d::before, .road-3d::after { content: ''; position: absolute; top: 0; bottom: 0; width: 60px; pointer-events: none; }
.road-3d::before { left: 0;  background: linear-gradient(90deg, #15110d 0%, transparent 100%); }
.road-3d::after  { right: 0; background: linear-gradient(-90deg, #15110d 0%, transparent 100%); }

.bar3d {
  position: absolute;
  width: 4px; margin-left: -2px;
  background: linear-gradient(180deg, oklch(0.82 0.18 50) 0%, oklch(0.62 0.18 38) 55%, oklch(0.42 0.16 38) 100%);
  border-radius: 1px;
  transform-origin: bottom center;
  transform: rotateX(-52deg);
  box-shadow: 0 0 8px oklch(0.62 0.18 38 / 0.5);
  animation: bar3dGrow 0.9s cubic-bezier(.34, 1.4, .64, 1) backwards;
}
.bar3d.dim { background: linear-gradient(180deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0.06) 100%); box-shadow: none; width: 3px; margin-left: -1.5px; }
.bar3d.cb { bottom: 72%; }
.bar3d.bc { bottom: 14%; }
.bar3d:hover { width: 6px; margin-left: -3px; background: linear-gradient(180deg, oklch(0.92 0.18 60) 0%, oklch(0.72 0.18 38) 100%); box-shadow: 0 0 14px oklch(0.72 0.18 38 / 0.8); z-index: 5; }
@keyframes bar3dGrow {
  from { transform: rotateX(-52deg) scaleY(0); opacity: 0; }
  to   { transform: rotateX(-52deg) scaleY(1); opacity: 1; }
}

.scene-lane-label {
  position: absolute;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.04em; color: rgba(255,255,255,0.45);

.scene-lane-label.bc { bottom: 18px; left: 50%; transform: translateX(-50%); }
.scene-lane-label .acc { color: var(--acc); }
@keyframes laneLabelFade {
  from { opacity: 0; transform: translate(-50%, -8px); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}
.scene-legend {

function getCSVField(row, fieldName) {
  if (!row) return '';
  if (row[fieldName] !== undefined) return row[fieldName];
  const lower = fieldName.toLowerCase();
  const key = Object.keys(row).find(k => k.toLowerCase() === lower);
  return key ? row[key] : '';
}

function getLocalISODate(d) {
  if (!d) return '';
  const pad = n => (n < 10 ? '0' : '') + n;
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
}

function parseCSV(text) {
  const lines = [];
  let current = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { current.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i+1] === '\n') i++;
        current.push(field); field = '';
        if (current.some(x => x.length > 0)) lines.push(current);
        current = [];
      } else field += c;
    }
  }
  if (field.length > 0 || current.length > 0) {
    current.push(field);
    if (current.some(x => x.length > 0)) lines.push(current);
  }
  if (lines.length === 0) return [];
  const headers = lines[0].map(h => h.trim());
  return lines.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = (row[i] || '').trim());
    return obj;
  });
}

async function fetchCSV(url) {
  // cache: 'no-store' + querystring únicos furam tanto o cache do navegador
  // quanto reduzem chance de pegar a cópia velha do CSV publicado do Google,
  // que causava serviços recém-lançados "aparecerem e sumirem" no refresh.
  const buster = '&t=' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  const res = await fetch(url + buster, { cache: 'no-store' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return parseCSV(await res.text());
}

function jsonp(url, params, retries = 2, retryDelay = 3000, onRetry = null) {
  function attempt() {
    return new Promise((resolve, reject) => {
      const cb = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
      const timeout = setTimeout(() => {
        cleanup();
        reject(new Error('Timeout (30s)'));
      }, 30000);

      function cleanup() {
        delete window[cb];
        const s = document.getElementById(cb);
        if (s) s.remove();
        clearTimeout(timeout);
      }

      window[cb] = (data) => {
        cleanup();
        resolve(data);
      };

      const qs = Object.entries({...params, callback: cb})
        .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
        .join('&');

      const script = document.createElement('script');
      script.id = cb;
      script.src = url + '?' + qs;
      script.onerror = () => {
        cleanup();
        reject(new Error('Falha de rede ou Apps Script offline'));
      };
      document.body.appendChild(script);
    });
  }

  function run(remaining) {
    return attempt().catch(err => {
      if (remaining > 0) {
        if (onRetry) onRetry(retries - remaining + 1, retries);
        return new Promise(r => setTimeout(r, retryDelay)).then(() => run(remaining - 1));
      }
      throw err;
    });
  }

  return run(retries);
}

// ====================================================================
// OUTBOX — fila de envio offline
// Guarda lançamentos que falharam por falta de internet e reenvia
// sozinho quando o sinal volta. O reenvio é seguro: o addBatchRDO do
// backend usa clientId pra não duplicar, e o RDO Diário grava por data.
// ====================================================================
const OUTBOX_KEY = 'teotonio_outbox_v1';
let _flushEmAndamento = false;

function ehErroDeRede(e) {
  // Classifica pela MENSAGEM do erro, não por navigator.onLine — essa
  // propriedade dá falso "offline" e fazia erros reais virarem "sem internet".
  const m = String((e && e.message) || e || '');
  return /rede|offline|Timeout|Falha de rede|Apps Script offline|Failed to fetch|NetworkError/i.test(m);
}

function outboxLer() {
  try { return JSON.parse(localStorage.getItem(OUTBOX_KEY) || '[]'); }
  catch(e) { return []; }
}

function outboxGravar(itens) {
  try { localStorage.setItem(OUTBOX_KEY, JSON.stringify(itens)); } catch(e) {}
}

function outboxAdicionar(item) {
  const itens = outboxLer();
  itens.push({
    id: 'o_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
    criadoEm: Date.now(),
    ...item
  });
  outboxGravar(itens);
  atualizarIndicadorOutbox();
}

function outboxRemover(id) {
  outboxGravar(outboxLer().filter(it => it.id !== id));
  atualizarIndicadorOutbox();
}

// Reenvia os itens da fila, um por um, na ordem. Para no primeiro erro de rede.
async function outboxFlush(manual = false) {
  if (_flushEmAndamento) return;
  const itens = outboxLer();
  if (itens.length === 0) return;
  // NÃO bloqueamos por navigator.onLine (dá falso "offline" e fazia o botão
  // "tentar agora" não responder). Tentamos enviar de verdade sempre.
  _flushEmAndamento = true;
  if (manual) toast('Enviando ' + itens.length + ' RDO' + (itens.length>1?'s':'') + ' guardado' + (itens.length>1?'s':'') + '…', 'info', 2500);
  let enviados = 0, falhouRede = false;
  try {
    for (const item of itens) {
      try {
        const result = await jsonp(CONFIG.appsScript, item.params, 1, 2000);
        if (!result.ok) throw new Error('servidor: ' + (result.error || 'erro'));
        outboxRemover(item.id);
        enviados++;
      } catch(e) {
        if (ehErroDeRede(e)) { falhouRede = true; break; } // segue offline — tenta tudo de novo depois
        // Erro do servidor: reenviar não vai resolver. Remove e avisa.
        outboxRemover(item.id);
        toast('Um RDO guardado não pôde ser enviado (' + (item.descricao || '') + '): ' + e.message, 'error', 0);
      }
    }
  } finally {
    _flushEmAndamento = false;
  }
  if (enviados > 0) {
    toast(`✓ ${enviados} RDO${enviados>1?'s':''} guardado${enviados>1?'s':''} enviado${enviados>1?'s':''} agora`, 'success', 4500);
    setTimeout(() => carregarTudo(), 1500);
  } else if (manual && falhouRede) {
    toast('Ainda sem conexão com o servidor. Vou tentar sozinho de novo em instantes.', 'info', 4000);
  }
  atualizarIndicadorOutbox();
}

// Descarta a fila offline (usado quando reenvios estão recriando duplicatas).
window.descartarOutbox = function(ev) {
  if (ev) ev.stopPropagation();
  const n = outboxLer().length;
  if (n === 0) return;
  if (!confirm(`Descartar ${n} lançamento(s) da fila de envio?\n\nUse isto se a fila estiver recriando duplicatas. Os dados já lançados na planilha NÃO são afetados.`)) return;
  outboxGravar([]);
  atualizarIndicadorOutbox();
  toast('Fila descartada. Os reenvios pararam.', 'success', 5000);
};

// Indicador flutuante fixo na tela — visível também no celular.
function atualizarIndicadorOutbox() {
  let el = document.getElementById('outboxIndicator');
  const n = outboxLer().length;
  if (n === 0) { if (el) el.style.display = 'none'; return; }
  if (!el) {
    el = document.createElement('div');
    el.id = 'outboxIndicator';
    el.onclick = () => outboxFlush(true);
    document.body.appendChild(el);
  }
  el.style.display = 'flex';
  el.innerHTML = `<span style="font-size:15px">📡</span><span style="flex:1">${n} RDO${n>1?'s':''} aguardando envio · toque para enviar</span>`
    + `<span onclick="descartarOutbox(event)" title="Descartar fila" style="margin-left:10px;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,.2);font-weight:700">✕</span>`;
}

function num(s) {
  if (s === null || s === undefined || s === '') return 0;
  const cleaned = String(s).replace(/\./g, '').replace(',', '.');
  const v = parseFloat(cleaned);
  return isNaN(v) ? parseFloat(s) || 0 : v;
}

function parseISODate(s) {
  if (!s) return null;
  if (s instanceof Date) return s;
  const str = String(s);
  if (str.includes('/')) {
    const p = str.split('/');
    return new Date(parseInt(p[2].slice(0,4)), parseInt(p[1])-1, parseInt(p[0]));
  }
  if (str.includes('-') && str.length >= 10) {
     const parts = str.slice(0,10).split('-');
     if (parts.length < 3) return null;
     return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  }
  return new Date(str);
}

function fmtData(iso) {
  if (!iso) return '';
  const d = parseISODate(iso);
  if (!d || isNaN(d)) return String(iso);
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getFullYear()).slice(2);
}

// ---- Calendário: dias úteis / feriados ------------------------------------
// Feriados NACIONAIS (fixos + móveis). Feriados MUNICIPAIS não entram aqui —
// variam por município da obra; confira o calendário local se precisar.
const FERIADOS_NACIONAIS = new Set([
  // 2025
  '2025-01-01','2025-03-03','2025-03-04','2025-04-18','2025-04-21','2025-05-01',
  '2025-06-19','2025-09-07','2025-10-12','2025-11-02','2025-11-15','2025-11-20','2025-12-25',
  // 2026
  '2026-01-01','2026-02-16','2026-02-17','2026-04-03','2026-04-21','2026-05-01',
  '2026-06-04','2026-09-07','2026-10-12','2026-11-02','2026-11-15','2026-11-20','2026-12-25'
]);

function ehFeriadoNacional(d) {
  return (d && !isNaN(d)) ? FERIADOS_NACIONAIS.has(getLocalISODate(d)) : false;
}

// Sábado conta como dia útil? (obra que trabalha aos sábados). Padrão: não.
function sabadoEhUtil() {
  return localStorage.getItem(CONFIG.ls.sabadoUtil) === '1';
}

// Dia útil = seg–sex (e sábado, se configurado) E não-feriado nacional.
// Domingo nunca conta.
function ehDiaUtil(d) {
  if (!d || isNaN(d)) return false;
  const dia = d.getDay();
  if (dia === 0) return false;                    // domingo nunca
  if (dia === 6 && !sabadoEhUtil()) return false; // sábado só se configurado
  return !ehFeriadoNacional(d);
}

// Para cada mês a avaliar, lista os dias úteis (até hoje) sem nenhum RDO em
// `datasComRDO`. `mesesParaAvaliar` (array 'YYYY-MM') permite cobrir TODOS os
// meses com dados, não só os que já têm RDO; se omitido, deriva dos próprios
// dados. Não cobra dias futuros. Retorna [{ mes:'2026-05', dias:[...] }].
function diasUteisSemRDO(datasComRDO, mesesParaAvaliar) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  let meses = (mesesParaAvaliar && mesesParaAvaliar.length) ? mesesParaAvaliar.slice() : null;
  if (!meses) {
    const s = new Set();
    datasComRDO.forEach(iso => { if (iso && iso.length >= 7) s.add(iso.slice(0,7)); });
    meses = [...s];
  }
  const resultado = [];
  [...meses].sort().forEach(mes => {
    const ano = parseInt(mes.slice(0,4), 10);
    const m   = parseInt(mes.slice(5,7), 10);
    const ultimoDia = new Date(ano, m, 0).getDate();
    const faltando = [];
    for (let dia = 1; dia <= ultimoDia; dia++) {
      const d = new Date(ano, m - 1, dia);
      if (d > hoje) break;            // não aponta dia futuro
      if (!ehDiaUtil(d)) continue;     // pula fim de semana / feriado
      const iso = getLocalISODate(d);
      if (!datasComRDO.has(iso)) faltando.push(iso);
    }
    if (faltando.length) resultado.push({ mes, dias: faltando });
  });
  return resultado;
}

function nomeMesAno(mes) {
  const MESES_PT = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return MESES_PT[parseInt(mes.slice(5,7),10)-1] + '/' + mes.slice(0,4);
}

function fmtNum(n, decimals = 2) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  return n.toLocaleString('pt-BR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtPct(n) {
  return (n * 100).toFixed(1).replace('.', ',') + '%';
}

function frenteSlug(f) {
  const s = (f || '').toString().trim();
  if (s.startsWith('Drenagem')) return 'Drenagem';
  if (s.startsWith('Demoli')) return 'Demoli';
  if (s.startsWith('Pav')) return 'Pav';
  if (s.startsWith('Vala')) return 'Vala';
  if (s.startsWith('Sinaliza')) return 'Sinaliza';
  if (s.startsWith('Via')) return 'Via';
  return 'default';
}

function toast(msg, type = 'info', durationMs = 3500) {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'i';
  // durationMs <= 0: toast fixo, só some quando o usuário fecha
  const fixo = durationMs <= 0;
  t.innerHTML = `<span style="font-weight:700">${icon}</span><span style="flex:1">${msg}</span>`
    + (fixo ? `<span class="toast-fechar" title="Fechar">✕</span>` : '');
  const fechar = () => {
    t.style.animation = 'slideIn .2s reverse';
    setTimeout(() => t.remove(), 200);
  };
  wrap.appendChild(t);
  if (fixo) {
    t.querySelector('.toast-fechar').addEventListener('click', fechar);
  } else {
    setTimeout(fechar, durationMs);
  }
}

function listarEstacas() {
  const out = [];
  for (let i = CONFIG.estacasCB.ini; i <= CONFIG.estacasCB.fim; i++) {
    out.push({ id: 'E' + i, num: i, sentido: 'CB' });
  }
  for (let i = CONFIG.estacasBC.ini; i <= CONFIG.estacasBC.fim; i++) {
    out.push({ id: 'E' + i, num: i, sentido: 'BC' });
  }
  return out;
}

async function callGeminiAPI(promptText) {
  const apiKey = (localStorage.getItem(GEMINI_KEY_LS) || '').trim();
  if (!apiKey) {
    // Sem prompt() — quem chama decide se mostra UI ou ignora
    const err = new Error('SEM_CHAVE_IA');
    err.code = 'SEM_CHAVE_IA';
    throw err;
  }

  const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey;

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: promptText }] }],
        generationConfig: { temperature: 0.2 }
      })
    });

    if (response.status === 400 || response.status === 401 || response.status === 403) {
      // Não remove automaticamente para o usuário não perder a chave por um erro pontual.
      // Só sinaliza para o caller mostrar a UI de reconfiguração.
      const err = new Error('CHAVE_INVALIDA');
      err.code = 'CHAVE_INVALIDA';
      throw err;
    }

    if (!response.ok) throw new Error('HTTP Error: ' + response.status);

    const data = await response.json();
    if (data.candidates && data.candidates.length > 0 && data.candidates[0].content.parts.length > 0) {
      let text = data.candidates[0].content.parts[0].text;
      return text.replace(/```html/g, '').replace(/```/g, '');
    } else {
      throw new Error('Formato de resposta inesperado.');
    }
  } catch (err) {
    if (err.code === 'SEM_CHAVE_IA' || err.code === 'CHAVE_INVALIDA') throw err;
    throw new Error('Falha ao comunicar com a IA: ' + err.message);
  }
}

function calcularAvancoPorPacote(rdos = STATE.rdoavanco, pacotes = STATE.pacotes) {
  const m = {};
  pacotes.forEach(p => {
    const id = getCSVField(p, 'ID');
    if (!id) return;
    m[id] = {
      pacote: p,
      qtdEstimada: num(getCSVField(p, 'Qtd Estimada')),
      qtdExecutada: 0,
      lancamentos: 0,
      ultimaData: null,
      porEstaca: {},
    };
  });
  
  rdos.forEach(r => {
    const pid = getCSVField(r, 'Pacote_ID') || getCSVField(r, 'Pacote_id');
    if (!pid || !m[pid]) return;
    const q = num(getCSVField(r, 'Quantidade'));
    m[pid].qtdExecutada += q;
    m[pid].lancamentos++;
    const d = parseISODate(getCSVField(r, 'Data'));
    if (d && (!m[pid].ultimaData || d > m[pid].ultimaData)) m[pid].ultimaData = d;
    
    const est = String(getCSVField(r, 'Local_Estaca') || '').toUpperCase().match(/E?\d{2,3}/g);
    if (est) {
      const qPorEstaca = q / est.length;
      est.forEach(e => {
        const ek = e.replace(/^E/, 'E') === 'E' ? 'E' + e.replace(/^E/, '').padStart(3, '0') : (e.startsWith('E') ? e : 'E' + e);
        m[pid].porEstaca[ek] = (m[pid].porEstaca[ek] || 0) + qPorEstaca;
      });
    }
  });
  Object.values(m).forEach(a => {
    a.pct = a.qtdEstimada > 0 ? Math.min(a.qtdExecutada / a.qtdEstimada, 1.0) : 0;
    a.pctRaw = a.qtdEstimada > 0 ? a.qtdExecutada / a.qtdEstimada : 0;
  });
  return m;
}

function calcularConsumoItens(avanco) {
  const out = {};
  Object.values(avanco).forEach(a => {
    if (a.qtdExecutada <= 0) return;
    const pid = getCSVField(a.pacote, 'ID');
    const coefs = STATE.coeficientes.filter(c => (getCSVField(c, 'Pacote ID') || getCSVField(c, 'Pacote_ID')) === pid);
    coefs.forEach(c => {
      const item = getCSVField(c, 'Item Contratual');
      if (!item) return;
      const desc = getCSVField(c, 'Descrição Item') || '';
      const coef = num(getCSVField(c, 'Coef'));
      const consumo = a.qtdExecutada * coef;
      if (!out[item]) {
        out[item] = {
          item, descricao: desc,
          unidadeItem: getCSVField(c, 'Unid Item') || '',
          consumido: 0, pacotes: []
        };
      }
      out[item].consumido += consumo;
      out[item].pacotes.push(`${getCSVField(a.pacote, 'Pacote')} × ${coef}`);
    });
  });
  return out;
}

window.runAIAnalysis = async function() {
  const btn = document.getElementById('btnRunAI');
  const output = document.getElementById('ai-output');
  const type = document.getElementById('aiAnalysisType').value;
  const days = parseInt(document.getElementById('aiContextDays').value, 10);
  
  if (!btn || !output) return;

  btn.disabled = true;
  btn.innerHTML = "A analisar os dados...";
  output.innerHTML = `<div style="text-align:center; padding: 40px;"><div class="loader-spinner"></div><p style="margin-top:10px; color:var(--muted)">A ler RDOs, calcular ritmos recentes e gerar conclusões...</p></div>`;

  try {
    // Determinar data limite para o contexto
    const limiteData = new Date();
    limiteData.setDate(limiteData.getDate() - days);
    limiteData.setHours(0,0,0,0);

    const av = calcularAvancoPorPacote();
    const pacotesAtivos = Object.values(av).filter(a => a.pct > 0 && a.pacote && getCSVField(a.pacote, 'Status') !== 'Histórico');
    
    // Filtrar RDOs dentro do contexto de dias selecionado
    const rdosRecentes = STATE.rdoavanco.filter(r => {
        const d = parseISODate(getCSVField(r, 'Data'));
        return d && d >= limiteData;
    });
    
    let contextData = `DADOS GERAIS DA OBRA (Atualizado a: ${new Date().toLocaleDateString('pt-PT')}):\n`;
    contextData += `Total de registos (RDOs) no histórico: ${STATE.rdoavanco.length}\n`;
    contextData += `RDOs registados nos últimos ${days} dias: ${rdosRecentes.length}\n\n`;
    
    contextData += `SITUAÇÃO DOS PACOTES EM ANDAMENTO:\n`;
    
    pacotesAtivos.forEach(a => {
      const f = getCSVField(a.pacote, 'Frente') || 'Desconhecida';
      const p = getCSVField(a.pacote, 'Pacote');
      const pct = (a.pct * 100).toFixed(1);
      const estimativa = num(getCSVField(a.pacote, 'Qtd Estimada'));
      const executada = a.qtdExecutada;
      const saldo = Math.max(0, estimativa - executada).toFixed(2);
      const unid = getCSVField(a.pacote, 'Unidade Física') || '';

      // Calcula produção específica deste pacote no período selecionado
      const rdosNestePacote = rdosRecentes.filter(r => (getCSVField(r, 'Pacote_ID') || getCSVField(r, 'Pacote_id')) === getCSVField(a.pacote, 'ID'));
      const producaoRecente = rdosNestePacote.reduce((acc, r) => acc + num(getCSVField(r, 'Quantidade')), 0);

      contextData += `- Frente: ${f} | Pacote: ${p} | Avanço Total: ${pct}% | Saldo a Executar: ${saldo} ${unid} | Produção últimos ${days} dias: ${producaoRecente.toFixed(2)} ${unid}\n`;
    });

    let prompt = "";
    if (type === 'completa') {
        prompt = `Analise os seguintes dados de avanço de obra de engenharia.\n\n${contextData}\n\nFornece um resumo executivo. Destaca as frentes com bom ritmo de produção nos últimos ${days} dias. Identifica gargalos (frentes que pararam ou abrandaram) e faz uma breve projeção matemática dos pacotes que precisam de acelerar o ritmo. Utiliza linguagem técnica de planeamento.`;
    } else if (type === 'projecoes') {
        prompt = `Foca-te ESTRITAMENTE EM PROJEÇÕES E PRAZOS. Lê os dados:\n\n${contextData}\n\nPara os pacotes mais críticos, calcula matematicamente o ritmo médio diário (Produção nos últimos ${days} dias a dividir por ${days}). Depois, estima quantos dias serão necessários para terminar o "Saldo a Executar" mantendo esse ritmo recente. Apresenta os resultados de forma clara, preferencialmente numa tabela.`;
    } else if (type === 'gargalos') {
        prompt = `Foca-te em GARGALOS E ALERTAS CRÍTICOS:\n\n${contextData}\n\nIdentifica rapidamente quais os pacotes que estão parados (produção = 0) ou com produção muito baixa nos últimos ${days} dias, apesar de estarem sinalizados em andamento. Sugere possíveis causas e que medidas a direção de obra deve tomar imediatamente para reverter os atrasos.`;
    } else if (type === 'eficiencia') {
        prompt = `Analisa a eficiência do avanço da obra no contexto dos últimos ${days} dias:\n\n${contextData}\n\nQuais foram os pacotes que mais alavancaram o avanço geral neste período? Compara o volume executado nos últimos ${days} dias com o avanço global do pacote para destacares onde a obra está a aplicar mais esforços atualmente.`;
    }
    
    prompt += "\n\nIMPORTANTE: Formate a sua resposta EXCLUSIVAMENTE em HTML estruturado (use <h3>, <h4>, <ul>, <li>, <p>, <strong>, <br>, etc.). NÃO use formatação Markdown (como ## ou **). Retorne APENAS o código HTML limpo, sem blocos de código (```html).";

    const analysisHTML = await callGeminiAPI(prompt);
    
    output.innerHTML = analysisHTML;
    toast('Relatório IA gerado com sucesso!', 'success');

    btn.innerHTML = "Gerar Relatório IA";
  }
};

const PROJETO_INICIO = new Date(2025, 6, 1);  // 01/07/2025
const PROJETO_FIM    = new Date(2026, 11, 31); // 31/12/2026

function fmtPctDelta(v, decimals = 2) {
  const pct = v * 100;
  const sign = pct > 0 ? '+' : pct < 0 ? '' : '';
  return sign + pct.toFixed(decimals).replace('.', ',') + ' p.p.';
}
function ymd(d) { return getLocalISODate(d); }

function calcCumulativoDia(rdosAtivos, pacotesAtivos, totalDiasEstimados) {
  const validPids = new Set(pacotesAtivos.map(p => getCSVField(p, 'ID')));
  const byDay = {};
  rdosAtivos.forEach(r => {
    const d = parseISODate(getCSVField(r, 'Data'));
    if (!d) return;
    const pid = getCSVField(r, 'Pacote_ID') || getCSVField(r, 'Pacote_id');
    if (!validPids.has(pid)) return;
    const prod = PRODUTIVIDADE_PADRAO[pid] || 1;
    const dias = num(getCSVField(r, 'Quantidade')) / (prod || 1);
    const contribPct = totalDiasEstimados > 0 ? dias / totalDiasEstimados : 0;
    const k = ymd(d);
    byDay[k] = (byDay[k] || 0) + contribPct;
  });
  const sortedDays = Object.keys(byDay).sort();
  const cum = {};
  let acc = 0;
  sortedDays.forEach(d => { acc += byDay[d]; cum[d] = acc; });
  return { byDay, cum, sortedDays, total: acc };
}

function pctAteDia(cum, sortedDays, dStr) {
  let v = 0;
  for (const d of sortedDays) {
    if (d <= dStr) v = cum[d]; else break;
  }
  return v;
}

function contarDiasUteis(fromDate, toDate) {
  // Conta dias de trabalho (exclui domingos) no intervalo (fromDate, toDate]
  let c = 0;
  const d = new Date(fromDate.getTime());
  while (d < toDate) {
    d.setDate(d.getDate() + 1);
    if (d.getDay() !== 0) c++;
  }
  return c;
}

function calcExecMetrics(rdosAtivos, pacotesAtivos, totalDiasEstimados, opts) {
  opts = opts || {};
  const janela = (opts.janela != null ? opts.janela : (STATE.execRitmo ? STATE.execRitmo.janela : 14)) || 14;
  const diasUteis = opts.diasUteis != null ? opts.diasUteis : (STATE.execRitmo ? !!STATE.execRitmo.diasUteis : false);

  const { cum, sortedDays, total } = calcCumulativoDia(rdosAtivos, pacotesAtivos, totalDiasEstimados);
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = ymd(today);
  const sparkPts = [];
  for (let i = 30; i >= 0; i--) {
    const day = new Date(today.getTime() - i * 86400000);
    sparkPts.push({ date: ymd(day), value: pctAteDia(cum, sortedDays, ymd(day)) });
  }
  const pct7d  = pctAteDia(cum, sortedDays, ymd(new Date(today.getTime() - 7*86400000)));
  const pct30d = pctAteDia(cum, sortedDays, ymd(new Date(today.getTime() - 30*86400000)));
  const currentToday = pctAteDia(cum, sortedDays, todayStr);
  const delta7d  = currentToday - pct7d;
  const delta30d = currentToday - pct30d;

  // Velocidade = avanço na janela escolhida / nº de dias-base (corridos ou úteis)
  const dInicioJanela = new Date(today.getTime() - janela*86400000);
  const pctJanela = pctAteDia(cum, sortedDays, ymd(dInicioJanela));
  const diasBase = diasUteis ? Math.max(1, contarDiasUteis(dInicioJanela, today)) : janela;
  const velocity = (currentToday - pctJanela) / diasBase;
  const remaining = Math.max(0, 1 - total);
  const daysToComplete = velocity > 0 ? Math.ceil(remaining / velocity) : null;

  // Data prevista de término + comparação com o prazo contratual (PROJETO_FIM)
  let dataPrevista = null, diasVsPrazo = null;
  if (daysToComplete !== null) {
    dataPrevista = diasUteis ? addWorkingDays(today, daysToComplete) : new Date(today.getTime() + daysToComplete*86400000);
    diasVsPrazo = Math.round((dataPrevista - PROJETO_FIM) / 86400000);
  }

  let rdos7d = 0, rdos30d = 0;
  rdosAtivos.forEach(r => {
    const d = parseISODate(getCSVField(r, 'Data'));
    if (!d) return;
    const diff = (today - d) / 86400000;
    if (diff <= 7 && diff >= 0) rdos7d++;
    if (diff <= 30 && diff >= 0) rdos30d++;
  });
  return { sparkPts, cumulative: cum, sortedDays, current: total, delta7d, delta30d, velocity, daysToComplete, dataPrevista, diasVsPrazo, janela, diasUteis, rdos7d, rdos30d };
}

function calcFrentesAnalise(rdosAtivos, pacotesAtivos, totalDiasEstimados) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d7 = today.getTime() - 7*86400000;
  const por = {};
  pacotesAtivos.forEach(p => {
    const f = getCSVField(p, 'Frente') || 'Outros';
    if (!por[f]) por[f] = { ult7d: 0, ultData: null, pacotes: 0, executou: false };
    por[f].pacotes++;
  });
  const validPids = new Set(pacotesAtivos.map(p => getCSVField(p, 'ID')));
  rdosAtivos.forEach(r => {
    const d = parseISODate(getCSVField(r, 'Data'));
    if (!d) return;
    const pid = getCSVField(r, 'Pacote_ID') || getCSVField(r, 'Pacote_id');
    if (!validPids.has(pid)) return;
    const pac = pacotesAtivos.find(p => getCSVField(p, 'ID') === pid);
    if (!pac) return;
    const f = getCSVField(pac, 'Frente') || 'Outros';
    if (!por[f]) por[f] = { ult7d: 0, ultData: null, pacotes: 0, executou: false };
    const prod = PRODUTIVIDADE_PADRAO[pid] || 1;
    const dias = num(getCSVField(r, 'Quantidade')) / (prod || 1);
    const contrib = totalDiasEstimados > 0 ? dias / totalDiasEstimados : 0;
    if (d.getTime() >= d7) por[f].ult7d += contrib;
    if (!por[f].ultData || d > por[f].ultData) por[f].ultData = d;
    por[f].executou = true;
  });
  const destaques = Object.entries(por)
    .filter(([, d]) => d.ult7d > 0)
    .sort((a,b) => b[1].ult7d - a[1].ult7d)
    .slice(0, 3)
    .map(([f, d]) => ({ frente: f, valor: d.ult7d, ultData: d.ultData }));
  const atencao = Object.entries(por)
    .map(([f, d]) => {
      const diasSemRDO = d.ultData ? Math.floor((today - d.ultData) / 86400000) : null;
      return { frente: f, dias: diasSemRDO, ultData: d.ultData, pacotes: d.pacotes };
    })
    .filter(x => x.dias === null || x.dias >= 7)
    .sort((a,b) => {
      if (a.dias === null && b.dias !== null) return -1;
      if (b.dias === null && a.dias !== null) return 1;
      return (b.dias || 0) - (a.dias || 0);
    })
    .slice(0, 3);
  return { destaques, atencao, total: Object.keys(por).length };
}

function gerarNarrativaSemana(metrics, fa, totalPac, iniciados) {
  const parts = [];
  if (metrics.delta7d > 0.0001) {
    const dPct = (metrics.delta7d * 100).toFixed(2).replace('.', ',');
    let frase = `Nesta semana a obra avançou <strong class="pos">+${dPct} p.p.</strong>`;
    if (fa.destaques[0]) frase += `, com <strong>${fa.destaques[0].frente}</strong> liderando o ritmo`;
    parts.push(frase + '.');
  } else if (metrics.delta7d <= 0.0001 && metrics.rdos7d > 0) {
    parts.push(`<strong>${metrics.rdos7d} RDOs</strong> registrados nos últimos 7 dias, com avanço marginal.`);
  } else {
    parts.push('<span class="nudge">Sem avanço ponderado</span> registrado nos últimos 7 dias.');
  }
  if (fa.atencao.length > 0) {
    const a = fa.atencao[0];
    if (a.dias === null) parts.push(`<span class="nudge">Atenção:</span> <strong>${a.frente}</strong> ainda sem lançamentos.`);
    else parts.push(`<span class="nudge">Atenção:</span> <strong>${a.frente}</strong> sem RDO há <strong>${a.dias} dias</strong>.`);
  }
  if (metrics.dataPrevista && metrics.velocity > 0) {
    const fmtDP = fmtData(metrics.dataPrevista);
    let frase = `Ritmo atual (${metrics.janela}d${metrics.diasUteis ? ', dias úteis' : ''}) projeta término em <strong>${fmtDP}</strong>`;
    if (metrics.diasVsPrazo != null) {
      if (metrics.diasVsPrazo > 0) frase += ` — <span class="nudge">${metrics.diasVsPrazo} dia${metrics.diasVsPrazo>1?'s':''} além do prazo</span>`;
      else if (metrics.diasVsPrazo < 0) frase += ` — <strong class="pos">${Math.abs(metrics.diasVsPrazo)} dia${Math.abs(metrics.diasVsPrazo)>1?'s':''} de folga</strong>`;
      else frase += ` — <strong>no limite do prazo</strong>`;
    }
    parts.push(frase + '.');
  }
  return parts.join(' ');
}

function calcCurvaPrevista(pacotesAtivos, totalDiasEstimados) {
  if (totalDiasEstimados <= 0) return { byDay: {}, cum: {}, sortedDays: [], total: 0 };
  let gNodes = {};
  try {
    loadGanttDados();
    const r = calcularGantt();
    gNodes = r && r.nodes ? r.nodes : {};
  } catch(e) { gNodes = {}; }
  const result = {};
  pacotesAtivos.forEach(p => {
    const pid = getCSVField(p, 'ID');
    if (!pid) return;
    const qtd = num(getCSVField(p, 'Qtd Estimada'));
    const prod = PRODUTIVIDADE_PADRAO[pid] || 1;
    const totalDiasEquiv = qtd / (prod || 1);
    const contribPct = totalDiasEquiv / totalDiasEstimados;
    let dIni, dFim;
    const n = gNodes[pid];
    if (n && (n.fromProject || n.fromSegmentos) && n.dataInicio && n.dataFim) {
      dIni = new Date(n.dataInicio.getTime());
      dFim = new Date(n.dataFim.getTime());
    } else {
      dIni = new Date(PROJETO_INICIO.getTime());
      dFim = new Date(PROJETO_FIM.getTime());
    }
    if (dFim < PROJETO_INICIO || dIni > PROJETO_FIM) return;
    if (dIni < PROJETO_INICIO) dIni = new Date(PROJETO_INICIO.getTime());
    if (dFim > PROJETO_FIM)    dFim = new Date(PROJETO_FIM.getTime());
    const dur = Math.max(1, Math.floor((dFim - dIni) / 86400000) + 1);
    const dailyPct = contribPct / dur;
    for (let t = dIni.getTime(); t <= dFim.getTime() + 1; t += 86400000) {
      const k = ymd(new Date(t));
      result[k] = (result[k] || 0) + dailyPct;
    }
  });
  const sortedDays = Object.keys(result).sort();
  const cum = {};
  let acc = 0;
  sortedDays.forEach(d => { acc += result[d]; cum[d] = acc; });
  return { byDay: result, cum, sortedDays, total: acc };
}

const IA_CACHE_KEY = 'teotonio_ia_rec_v1';
const IA_CACHE_TTL = 6 * 3600 * 1000;
function getIACached() {
  try {
    const raw = localStorage.getItem(IA_CACHE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || !obj.ts || !obj.text) return null;
    if (Date.now() - obj.ts > IA_CACHE_TTL) return null;
    return obj;
  } catch(e) { return null; }
}

async function carregarRecomendacaoIA(metrics, fa, totalPac, iniciados, gap, force = false) {
  const el = document.getElementById('heroIA');
  if (!el) return;
  const txtEl = el.querySelector('.hero-ia-text');
  if (!txtEl) return;

  // 1) Se não tem chave: NÃO chama a API, mostra CTA discreto
  if (!temChaveGemini()) {
    el.classList.remove('loading');
    el.classList.add('disabled');
    txtEl.innerHTML = 'IA desativada — <a onclick="abrirConfigIA()" style="color:var(--acc);font-weight:700;cursor:pointer;text-decoration:underline">configure sua chave</a> para gerar recomendações executivas semanais.';
    return;
  }

  // 2) Cache 6h
  if (!force) {
    const cached = getIACached();
    if (cached) {
      el.classList.remove('loading', 'disabled');
      txtEl.textContent = cached.text;
      return;
    }
  }

  el.classList.remove('disabled');
  el.classList.add('loading');
  txtEl.textContent = 'Analisando indicadores executivos…';

  const prompt = `Você é um engenheiro de planejamento sênior. Com base nos indicadores abaixo da obra de duplicação da Av. Senador Teotônio Vilela, escreva UMA recomendação executiva curta, acionável, no imperativo, em português, com NO MÁXIMO 28 palavras. Não use markdown, não use aspas, sem preâmbulo.

DADOS:
- Avanço ponderado realizado: ${(metrics.current * 100).toFixed(1)}%
- Gap vs plano hoje: ${(gap * 100).toFixed(1)} p.p. ${gap < 0 ? '(ATRASADO)' : gap > 0 ? '(ADIANTADO)' : '(NO PRAZO)'}
- Variação 7 dias: ${(metrics.delta7d * 100).toFixed(2)} p.p.
- Velocidade média 14d: ${(metrics.velocity * 100).toFixed(2)} p.p./dia
- Pacotes em execução: ${iniciados}/${totalPac}
- Frente que mais avançou: ${fa.destaques[0]?.frente || '—'}
- Frente em maior atenção: ${fa.atencao[0]?.frente || '—'}${fa.atencao[0]?.dias ? ' (sem RDO há '+fa.atencao[0].dias+' dias)' : ''}

Responda APENAS com a recomendação.`;

  try {
    const text = await callGeminiAPI(prompt);
    const cleaned = (text || '').replace(/^["'\s]+|["'\s]+$/g, '').replace(/\n+/g, ' ').trim();
    if (cleaned) {
      localStorage.setItem(IA_CACHE_KEY, JSON.stringify({ ts: Date.now(), text: cleaned }));
      el.classList.remove('loading');
      txtEl.textContent = cleaned;
    } else {
      throw new Error('Resposta vazia');
    }
  } catch(e) {
    el.classList.remove('loading');
    if (e && e.code === 'CHAVE_INVALIDA') {
      txtEl.innerHTML = 'Chave da IA inválida — <a onclick="abrirConfigIA()" style="color:var(--acc);font-weight:700;cursor:pointer;text-decoration:underline">reconfigurar</a>.';
    } else if (e && e.code === 'SEM_CHAVE_IA') {
      el.classList.add('disabled');
      txtEl.innerHTML = 'IA desativada — <a onclick="abrirConfigIA()" style="color:var(--acc);font-weight:700;cursor:pointer;text-decoration:underline">configure sua chave</a>.';
    } else {
      txtEl.innerHTML = 'IA indisponível agora — <a onclick="refreshIA()" style="color:var(--acc);font-weight:700;cursor:pointer;text-decoration:underline">tentar de novo</a>.';
    }
  }
}

function renderCalendarioHeatmap(rdosAtivos) {
  const today = new Date(); today.setHours(0,0,0,0);

  rdosAtivos.forEach(r => {
    const d = parseISODate(getCSVField(r, 'Data'));

    d.setHours(0,0,0,0);
    const diff = Math.floor((today - d) / 86400000);
    if (diff < 0 || diff >= dias) return;
    const k = ymd(d);
    counts[k] = (counts[k] || 0) + 1;
  });
  const startDate = new Date(today.getTime() - (dias - 1) * 86400000);
  startDate.setDate(startDate.getDate() - startDate.getDay());
  const cells = [];
  const cellCount = 13 * 7;
  for (let i = 0; i < cellCount; i++) {

function calcAvancoPorEstaca(rdosAtivos, pacotesAtivos) {
  const estacas = {};
  listarEstacas().forEach(e => {
    estacas[e.id] = { ...e, lancamentos: 0, qtd: 0, pacotes: new Set() };
  });
  const validPids = new Set(pacotesAtivos.map(p => getCSVField(p, 'ID')));
  rdosAtivos.forEach(r => {
    const pid = getCSVField(r, 'Pacote_ID') || getCSVField(r, 'Pacote_id');
    if (!validPids.has(pid)) return;
    const q = num(getCSVField(r, 'Quantidade'));
    const est = String(getCSVField(r, 'Local_Estaca') || '').toUpperCase().match(/E?\d{2,3}/g);
    if (!est) return;
    est.forEach(estStr => {
      const ek = estStr.startsWith('E') ? estStr : 'E' + estStr;
      if (!estacas[ek]) return;
      estacas[ek].lancamentos++;
      estacas[ek].qtd += q / est.length;
      estacas[ek].pacotes.add(pid);
    });
  });
  return estacas;
}
