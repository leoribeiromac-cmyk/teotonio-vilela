<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Teotônio Vilela — Controle Integrado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  /* Tema Canteiro - paleta terra/terracota */
  --bg:#f5f3ef;
  --bg-2:#eeebe5;
  --surface:#ffffff;
  --surface-2:#fafaf7;
  --border:#e4e0d8;
  --border-strong:#ccc8bf;
  --text:#1a1712;
  --text-2:#3a3530;
  --muted:#7a7570;
  --muted-2:#a09b94;
  
  /* Sidebar dark */
  --sidebar-bg:#1a1612;
  --sidebar-text:rgba(255,255,255,0.65);
  --sidebar-active:#ffffff;
  --sidebar-active-bg:rgba(255,255,255,0.09);
  --sidebar-hover-bg:rgba(255,255,255,0.05);
  --sidebar-border:rgba(255,255,255,0.09);
  
  /* Primário (azul profundo) - usado em barras, gráficos */
  --pri:oklch(0.45 0.14 240);
  --pri-l:oklch(0.95 0.03 240);
  --pri-d:oklch(0.38 0.14 240);
  
  /* Acento (terracota) - principal CTA, badges, destaques */
  --acc:oklch(0.62 0.18 38);
  --acc-l:oklch(0.96 0.04 38);
  --acc-d:oklch(0.48 0.18 38);
  
  --grn:oklch(0.62 0.16 150);
  --grn-l:oklch(0.95 0.04 150);
  --blu:oklch(0.58 0.18 250);
  --blu-l:oklch(0.95 0.04 250);
  --ylw:oklch(0.75 0.16 85);
  --ylw-l:oklch(0.97 0.04 85);
  --ylw-d:oklch(0.55 0.16 85);
  --red:oklch(0.58 0.2 20);
  --red-l:oklch(0.96 0.04 20);
  
  --r:12px;
  --r-sm:6px;
  --r-lg:16px;
  --sh:0 1px 3px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.08);
  --sh-lg:0 16px 40px rgba(0,0,0,.14);
  
  --anim-speed:1;
  --kpi-size:42px;
}

@keyframes pageEnter {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes staggerIn {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes cellPop {
  0% { opacity: 0; transform: scale(0); }
  60% { opacity: 1; transform: scale(1.08); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes barGrow {
  from { width: 0; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.25; }
}

.page-enter { animation: pageEnter calc(0.35s * var(--anim-speed)) cubic-bezier(0.2,0,0,1); }
.stagger-item { animation: staggerIn calc(0.4s * var(--anim-speed)) cubic-bezier(0.2,0,0,1) both; }

html,body{
  height:100%;
  font-family:'Space Grotesk',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  font-feature-settings:'ss01','ss02','cv11';
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',monospace}

#root{height:100%;display:flex;flex-direction:column}

/* ===================== LAYOUT ===================== */
.app{display:flex;height:100vh;min-height:0;overflow:hidden}

.sidebar{
  width:240px;flex-shrink:0;
  background:var(--sidebar-bg);
  border-right:1px solid var(--sidebar-border);
  display:flex;flex-direction:column;
  z-index:10;
  transition:transform calc(.3s * var(--anim-speed)) cubic-bezier(.2,0,0,1);
}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--sidebar-border);}
.badge-obra{
  display:inline-block;
  background:var(--acc);
  color:#fff;font-size:9px;font-weight:700;letter-spacing:.1em;
  padding:3px 8px;border-radius:4px;margin-bottom:10px;text-transform:uppercase;
}
.sidebar-logo h1{font-size:13px;font-weight:700;color:var(--sidebar-active);line-height:1.3;letter-spacing:-.01em;}
.sidebar-logo p{font-size:11px;color:var(--sidebar-text);margin-top:2px;line-height:1.4;}

.nav-group{padding:14px 0 6px}
.nav-label{
  font-size:9px;font-weight:700;letter-spacing:.12em;
  color:var(--sidebar-text);opacity:.45;padding:0 20px 6px;text-transform:uppercase;
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:9px 14px;margin:1px 12px;
  border-radius:8px;cursor:pointer;
  color:var(--sidebar-text);font-size:13px;font-weight:500;
  transition:background calc(.12s*var(--anim-speed)),color calc(.12s*var(--anim-speed));
  white-space:nowrap;user-select:none;
  position:relative;
}
.nav-item:hover{background:var(--sidebar-hover-bg);color:var(--sidebar-active);}
.nav-item.active{background:var(--sidebar-active-bg);color:var(--sidebar-active);font-weight:700;}
.nav-item.active::before{
  content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;background:var(--acc);border-radius:0 3px 3px 0;
}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-counter{
  background:rgba(255,255,255,.1);color:var(--sidebar-text);
  font-size:10px;font-weight:700;
  padding:1px 7px;border-radius:10px;margin-left:auto;
  transition:background calc(.15s*var(--anim-speed));
}
.nav-item.active .nav-counter{background:var(--acc);color:#fff}
.nav-divider{border:none;border-top:1px solid var(--sidebar-border);margin:10px 20px}

.sync-block{padding:12px 16px 16px;margin-top:auto;border-top:1px solid var(--sidebar-border);}
.sync-row{display:flex;align-items:center;gap:8px;padding:8px 0}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:.3s}
.sync-dot.ok{background:var(--grn);box-shadow:0 0 0 3px oklch(0.62 0.16 150 / .15)}
.sync-dot.loading{background:var(--ylw);animation:pulse 1.2s infinite}
.sync-dot.error{background:var(--red)}
.sync-dot.offline{background:var(--muted-2)}
.sync-text{font-size:10px;color:var(--sidebar-text);opacity:.7;line-height:1.4;}
.sync-text strong{color:var(--sidebar-active);opacity:1;font-weight:600;}
.btn-refresh{
  width:100%;padding:7px 10px;
  background:rgba(255,255,255,.06);border:1px solid var(--sidebar-border);color:var(--sidebar-text);
  border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.04em;
  cursor:pointer;transition:all calc(.15s * var(--anim-speed));font-family:inherit;
}
.btn-refresh:hover{background:rgba(255,255,255,.12);color:var(--sidebar-active);}

.mobile-menu-btn{display:none}
.sidebar-overlay{display:none}

/* ===================== MAIN ===================== */
.main{flex:1;overflow-y:auto;min-width:0;display:flex;flex-direction:column;background:var(--bg)}

.topbar{
  padding:0 28px;height:60px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:14px;position:sticky;top:0;z-index:5;
}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:-.01em;line-height:1.2}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:2px}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:7px;
  font-size:13px;font-weight:500;cursor:pointer;
  border:none;transition:all .15s;font-family:inherit;
  white-space:nowrap;
}
.btn-primary{background:var(--pri);color:#fff}
.btn-primary:hover{background:var(--pri-d);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg);border-color:var(--border-strong)}
.btn-ghost{background:transparent;color:var(--muted);border:none;padding:8px 10px}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-acc{background:var(--acc);color:#fff}
.btn-acc:hover{background:var(--acc-d);transform:translateY(-1px)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-lg{padding:11px 20px;font-size:14px}

.page{flex:1;padding:24px 28px;display:flex;flex-direction:column;gap:18px;max-width:1600px;width:100%;margin:0 auto}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.card-header{
  padding:16px 22px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.card-title{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.card-title-sub{font-size:12px;color:var(--muted);font-weight:400;margin-top:3px;text-transform:none;letter-spacing:0;color:var(--text);}
.card-body{padding:18px 22px}
.card-body.compact{padding:12px 18px}
.card-body.flush{padding:0}

/* ===================== KPI ===================== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}
.kpi-card{
  position:relative;overflow:hidden;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:18px 20px;display:flex;flex-direction:column;gap:6px;
  transition:transform calc(.2s*var(--anim-speed)),box-shadow calc(.2s*var(--anim-speed)),border-color calc(.2s*var(--anim-speed));
}
.kpi-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--pri),var(--pri-d));
  transform:scaleX(0);transform-origin:left;
  transition:transform calc(.4s * var(--anim-speed)) cubic-bezier(.2,0,0,1);
}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md);border-color:var(--border-strong);}
.kpi-card:hover::after{transform:scaleX(1);}
.kpi-card.kpi-acc::after{background:linear-gradient(90deg,var(--acc),var(--acc-d));}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
.kpi-value{font-size:var(--kpi-size,42px);font-weight:700;letter-spacing:-.04em;line-height:1.05;font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace;color:var(--text);}
.kpi-value-small{font-size:.45em;color:var(--muted);font-weight:500;letter-spacing:0;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;}
.kpi-trend{font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.kpi-trend.up{color:var(--grn)}
.kpi-trend.warn{color:var(--ylw-d)}
.kpi-trend.down{color:var(--red)}
.kpi-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.kpi-bar{height:100%;border-radius:2px;transition:width .6s ease}

/* Special hero KPI */
.kpi-hero{
  grid-column:span 2;
  background:var(--sidebar-bg);
  color:#fff;border:none;
}
.kpi-hero::after{background:linear-gradient(90deg,var(--acc),oklch(0.72 0.18 60));}
.kpi-hero .kpi-label{color:rgba(255,255,255,.5)}
.kpi-hero .kpi-value{color:#fff;font-size:calc(var(--kpi-size,42px) * 1.1);}
.kpi-hero .kpi-value-small{color:rgba(255,255,255,.5);}
.kpi-hero .kpi-sub{color:rgba(255,255,255,.65)}
@media(max-width:600px){.kpi-hero{grid-column:span 1}}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:900px){
  .grid-2{grid-template-columns:1fr}
  .grid-3{grid-template-columns:1fr}
}

/* ===================== TABLE ===================== */
table.t{width:100%;border-collapse:collapse;font-size:13px}
table.t th{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  color:var(--muted);padding:10px 14px;text-align:left;
  border-bottom:1px solid var(--border);background:var(--surface-2);
  position:sticky;top:0;
}
table.t td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px}
table.t tr:last-child td{border-bottom:none}
table.t tr:hover td{background:var(--bg)}
table.t tr.summary td{background:var(--pri-l);font-weight:600;color:var(--pri);font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:8px 14px}
.t-num{font-variant-numeric:tabular-nums;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px}
.t-mono{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}

/* ===================== PILLS / TAGS ===================== */
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.01em}
.pill-grn{background:var(--grn-l);color:var(--grn)}
.pill-ylw{background:var(--ylw-l);color:var(--ylw-d)}
.pill-red{background:var(--red-l);color:var(--red)}
.pill-blu{background:var(--blu-l);color:var(--blu)}
.pill-acc{background:var(--acc-l);color:var(--acc-d)}
.pill-pri{background:var(--pri-l);color:var(--pri)}

/* Frente tags */
.f-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.02em;text-transform:uppercase}
.f-Drenagem{background:#dceefb;color:#1a5276}
.f-Demoli, .f-demolicao{background:#fadbd8;color:#922b21}
.f-Via{background:#fdebd0;color:#935116}
.f-Pav{background:#d6dbdf;color:#2c3e50}
.f-Vala{background:#fcf3cf;color:#7d6608}
.f-Sinaliza{background:#d5f5e3;color:#196f3d}

.prog-bar-wrap{width:100%;min-width:60px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.prog-bar{height:100%;border-radius:3px;transition:width .6s ease}
.prog-bar.zero{background:var(--muted-2)}
.prog-bar.parcial{background:var(--ylw)}
.prog-bar.completo{background:var(--grn)}
.prog-bar.atrasado{background:var(--red)}

/* ===================== HEATMAP ===================== */
.heatmap-wrap{overflow-x:auto;padding-bottom:8px}
.heatmap{display:grid;gap:2px;font-size:9px;font-family:'JetBrains Mono',monospace}
.hm-cell{
  min-height:24px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;cursor:default;
  transition:transform calc(.15s * var(--anim-speed)),box-shadow calc(.15s * var(--anim-speed));
  animation:cellPop calc(.3s * var(--anim-speed)) cubic-bezier(.2,0,0,1) both;
}
.hm-cell:hover{transform:scale(1.2);z-index:2;box-shadow:var(--sh-md)}
.hm-row-label{
  font-size:10px;font-weight:600;color:var(--muted);
  padding:0 8px 0 4px;display:flex;align-items:center;justify-content:flex-end;
  white-space:nowrap;
}
.hm-col-label{
  font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;
  text-align:center;padding:2px 0;
  writing-mode:vertical-rl;transform:rotate(180deg);
}

/* ===================== FORM ===================== */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.form-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--muted);text-transform:uppercase}
.field input,.field select,.field textarea{
  padding:9px 12px;border:1px solid var(--border);border-radius:7px;
  font-size:14px;background:var(--surface);font-family:inherit;color:var(--text);
  transition:.15s;width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-l);
}
.field input.invalid,.field select.invalid{border-color:var(--red)}
.field-error{font-size:11px;color:var(--red);font-weight:500}
.field-hint{font-size:11px;color:var(--muted);margin-top:-2px}

.btn-toggle-group{display:flex;gap:0;border:1px solid var(--border);border-radius:7px;overflow:hidden;width:fit-content}
.btn-toggle{
  padding:7px 14px;background:transparent;border:none;font-size:13px;
  font-family:inherit;color:var(--muted);cursor:pointer;font-weight:500;
  border-right:1px solid var(--border);transition:.15s;
}
.btn-toggle:last-child{border-right:none}
.btn-toggle.active{background:var(--pri);color:#fff;font-weight:600}
.btn-toggle:hover:not(.active){background:var(--bg);color:var(--text)}

.servico-row{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;margin-bottom:10px;
  position:relative;
}
.servico-row .row-num{
  position:absolute;top:-8px;left:14px;
  background:var(--pri);color:#fff;font-size:10px;font-weight:700;letter-spacing:.05em;
  padding:2px 8px;border-radius:10px;
}
.servico-row .btn-remove{
  position:absolute;top:10px;right:10px;
  background:transparent;border:none;color:var(--muted);cursor:pointer;
  font-size:18px;padding:2px 8px;border-radius:4px;
}
.servico-row .btn-remove:hover{background:var(--red-l);color:var(--red)}
.btn-add-servico{
  width:100%;padding:11px;
  background:transparent;border:1.5px dashed var(--border-strong);
  border-radius:var(--r);font-size:13px;font-weight:500;color:var(--muted);
  cursor:pointer;font-family:inherit;transition:.15s;
}
.btn-add-servico:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-l)}

/* ===================== TOAST ===================== */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  background:var(--surface);border:1px solid var(--border);
  padding:12px 18px;border-radius:var(--r);box-shadow:var(--sh-lg);
  font-size:13px;display:flex;align-items:center;gap:10px;
  pointer-events:auto;animation:slideIn .25s cubic-bezier(.2,0,0,1);
  max-width:420px;
}
.toast.success{border-left:4px solid var(--grn)}
.toast.error{border-left:4px solid var(--red)}
.toast.info{border-left:4px solid var(--blu)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===================== EMPTY / LOADING ===================== */
.empty{padding:60px 20px;text-align:center;color:var(--muted)}
.empty-icon{font-size:42px;margin-bottom:12px;opacity:.5}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.empty-sub{font-size:12px;color:var(--muted);max-width:380px;margin:0 auto}

.loading{padding:80px 20px;text-align:center}
.spinner{
  display:inline-block;width:32px;height:32px;
  border:3px solid var(--border);border-top-color:var(--pri);
  border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===================== MOBILE ===================== */
@media(max-width:768px){
  .mobile-menu-btn{
    display:flex;align-items:center;justify-content:center;
    background:transparent;border:none;color:var(--text);
    font-size:22px;cursor:pointer;padding:6px 10px;
    margin-right:-4px;
  }
  .sidebar{
    position:fixed;left:0;top:0;height:100%;
    transform:translateX(-100%);box-shadow:var(--sh-lg);
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{
    display:block;position:fixed;inset:0;
    background:rgba(0,0,0,.4);z-index:9;
    opacity:0;pointer-events:none;transition:.25s;
  }
  .sidebar-overlay.open{opacity:1;pointer-events:auto}
  .page{padding:14px}
  .topbar{padding:12px 16px}
  .topbar-title{font-size:15px}
  .card-body{padding:14px 16px}
  .kpi-card{padding:14px}
  .kpi-value{font-size:22px}
  .kpi-hero .kpi-value{font-size:30px}
}

/* Botões para remover items custom */
.btn-remove-custom{
  position:absolute;top:0;right:-2px;
  width:20px;height:20px;border-radius:50%;
  background:transparent;border:none;color:var(--red);
  cursor:pointer;font-size:18px;font-weight:700;line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.btn-remove-custom:hover{background:var(--red);color:#fff;}

.btn-remove-custom-row{
  position:absolute;top:50%;right:6px;transform:translateY(-50%);
  width:18px;height:18px;border-radius:50%;
  background:transparent;border:none;color:var(--red);
  cursor:pointer;font-size:16px;font-weight:700;line-height:1;

// ====================================================================
// UTILITIES
// ====================================================================
function parseCSV(text) {
  const lines = [];
  let current = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { current.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i+1] === '\n') i++;
        current.push(field); field = '';
        if (current.some(x => x.length > 0)) lines.push(current);
        current = [];
      } else field += c;
    }
  }
  if (field.length > 0 || current.length > 0) {
    current.push(field);
    if (current.some(x => x.length > 0)) lines.push(current);
  }
  if (lines.length === 0) return [];
  const headers = lines[0].map(h => h.trim());
  return lines.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = (row[i] || '').trim());
    return obj;
  });
}

async function fetchCSV(url) {
  const res = await fetch(url + '&t=' + Date.now());
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return parseCSV(await res.text());
}

// JSONP request para Apps Script (evita CORS)
function jsonp(url, params) {
  return new Promise((resolve, reject) => {
    const cb = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout (15s)'));
    }, 15000);
    
    function cleanup() {
      delete window[cb];
      const s = document.getElementById(cb);
      if (s) s.remove();
      clearTimeout(timeout);
    }
    
    window[cb] = (data) => {
      cleanup();
      resolve(data);
    };
    
    const qs = Object.entries({...params, callback: cb})
      .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
      .join('&');
    
    const script = document.createElement('script');
    script.id = cb;
    script.src = url + '?' + qs;
    script.onerror = () => {
      cleanup();
      reject(new Error('Falha de rede ou Apps Script offline'));
    };
    document.body.appendChild(script);
  });
}

function num(s) {
  if (s === null || s === undefined || s === '') return 0;
  const cleaned = String(s).replace(/\./g, '').replace(',', '.');
  const v = parseFloat(cleaned);
  return isNaN(v) ? parseFloat(s) || 0 : v;
}

function parseISODate(s) {
  if (!s) return null;
  if (s instanceof Date) return s;
  const str = String(s);
  // Se vier com barras (ex: 25/12/2026)
  if (str.includes('/')) {
    const p = str.split('/');
    return new Date(parseInt(p[2].slice(0,4)), parseInt(p[1])-1, parseInt(p[0]));
  }
  // Corrige o bug do fuso horário forçando a extração local
  if (str.includes('-') && str.length >= 10) {
     const parts = str.slice(0,10).split('-');
     return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  }
  return new Date(str);
}

function fmtData(iso) {
  if (!iso) return '';
  const d = parseISODate(iso);
  if (!d || isNaN(d)) return String(iso);
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getFullYear()).slice(2);
}


function fmtNum(n, decimals = 2) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  return n.toLocaleString('pt-BR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtPct(n) {
  return (n * 100).toFixed(1).replace('.', ',') + '%';
}

function frenteSlug(f) {
  const s = (f || '').toString().trim();
  if (s.startsWith('Drenagem')) return 'Drenagem';
  if (s.startsWith('Demoli')) return 'Demoli';
  if (s.startsWith('Pav')) return 'Pav';
  if (s.startsWith('Vala')) return 'Vala';
  if (s.startsWith('Sinaliza')) return 'Sinaliza';
  if (s.startsWith('Via')) return 'Via';
  return 'default';
}

function toast(msg, type = 'info', durationMs = 3500) {
  const wrap = document.getElementById('toastWrap');

  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'i';

  wrap.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'slideIn .2s reverse';

}

function calcularAvancoPorPacote() {
  const m = {};
  STATE.pacotes.forEach(p => {
    const id = p['ID'];
    if (!id) return;
    m[id] = {
      pacote: p,
      qtdEstimada: num(p['Qtd Estimada']),
      qtdExecutada: 0,
      lancamentos: 0,
      ultimaData: null,
      porEstaca: {},  // { 'E105': qtd, 'E106': qtd, ... }
    };
  });
  STATE.rdoavanco.forEach(r => {
    const pid = r['Pacote_ID'] || r['Pacote_id'];
    if (!pid || !m[pid]) return;
    const q = num(r['Quantidade']);
    m[pid].qtdExecutada += q;
    m[pid].lancamentos++;
    const d = parseISODate(r['Data']);
    if (d && (!m[pid].ultimaData || d > m[pid].ultimaData)) m[pid].ultimaData = d;
    
    // Mapeamento estaca → quantidade
    const est = (r['Local_Estaca'] || '').toUpperCase().match(/E?\d{2,3}/g);
    if (est) {
      const qPorEstaca = q / est.length;
      est.forEach(e => {
        const ek = e.replace(/^E/, 'E') === 'E' ? 'E' + e.replace(/^E/, '').padStart(3, '0') : (e.startsWith('E') ? e : 'E' + e);
        m[pid].porEstaca[ek] = (m[pid].porEstaca[ek] || 0) + qPorEstaca;
      });
    }
  });
  Object.values(m).forEach(a => {
    a.pct = a.qtdEstimada > 0 ? Math.min(a.qtdExecutada / a.qtdEstimada, 1.0) : 0;
    a.pctRaw = a.qtdEstimada > 0 ? a.qtdExecutada / a.qtdEstimada : 0;
  });
  return m;
}

function calcularConsumoItens(avanco) {
  const out = {};
  Object.values(avanco).forEach(a => {
    if (a.qtdExecutada <= 0) return;
    const pid = a.pacote['ID'];
    const coefs = STATE.coeficientes.filter(c => (c['Pacote ID'] || c['Pacote_ID']) === pid);
    coefs.forEach(c => {
      const item = c['Item Contratual'];
      if (!item) return;
      const desc = c['Descrição Item'] || '';
      const coef = num(c['Coef']);
      const consumo = a.qtdExecutada * coef;
      if (!out[item]) {
        out[item] = {
          item, descricao: desc,
          unidadeItem: c['Unid Item'] || '',
          consumido: 0, pacotes: []
        };
      }
      out[item].consumido += consumo;
      out[item].pacotes.push(`${a.pacote['Pacote']} × ${coef}`);
    });
  });
  return out;
}

function listarEstacas() {
  const out = [];
  for (let i = CONFIG.estacasCB.ini; i <= CONFIG.estacasCB.fim; i++) {
    out.push({ id: 'E' + i, num: i, sentido: 'CB' });
  }
  for (let i = CONFIG.estacasBC.ini; i <= CONFIG.estacasBC.fim; i++) {
    out.push({ id: 'E' + i, num: i, sentido: 'BC' });
  }
  return out;
}

function renderExecutivo() {
  const av = calcularAvancoPorPacote();
  const pacotes = Object.values(av).filter(a => a.pacote && a.pacote['Status'] !== 'Histórico');
  
  const totalPac = pacotes.length;
  const iniciados = pacotes.filter(a => a.qtdExecutada > 0).length;
  const concluidos = pacotes.filter(a => a.pct >= 0.999).length;
  const totalRDOs = STATE.rdoavanco.length;
  
  // % físico ponderado pela qtd estimada (peso real, não média simples)
  const totalEstim = pacotes.reduce((s,a) => s + a.qtdEstimada, 0);
  const pctPond = totalEstim > 0 ?
    pacotes.reduce((s,a) => s + a.pct * a.qtdEstimada, 0) / totalEstim : 0;
  
  // Avanço por frente (ponderado também)
  const porFrente = {};
  pacotes.forEach(a => {
    const f = a.pacote['Frente'] || 'Outros';
    if (!porFrente[f]) porFrente[f] = { items: [], totalEstim: 0, totalExec: 0 };
    porFrente[f].items.push(a);
    porFrente[f].totalEstim += a.qtdEstimada;
    porFrente[f].totalExec += a.qtdExecutada;
  });
  Object.values(porFrente).forEach(f => {
    f.pctPond = f.totalEstim > 0 ? f.totalExec / f.totalEstim : 0;
  });
  
  // Top pacotes ativos
  const ativosOrdenados = pacotes
    .filter(a => a.qtdExecutada > 0)
    .sort((a,b) => (b.ultimaData || 0) - (a.ultimaData || 0))
    .slice(0, 8);
  
  // Curva S (acumulado por dia)
  const rdosOrdenados = [...STATE.rdoavanco]
    .map(r => ({ data: parseISODate(r['Data']), pid: r['Pacote_ID'], qtd: num(r['Quantidade']) }))
    .filter(r => r.data && r.pid)
    .sort((a,b) => a.data - b.data);
  
  return `

      <div class="kpi-card kpi-hero stagger-item" style="animation-delay:.05s">
        <div class="kpi-label">AVANÇO FÍSICO GERAL · PONDERADO</div>

        <div class="kpi-sub">${totalRDOs} registros de serviço · ${iniciados} de ${totalPac} pacotes iniciados</div>
        <div class="kpi-bar-wrap" style="background:rgba(255,255,255,.15);margin-top:10px">
          <div class="kpi-bar" style="background:#fff;width:${pctPond*100}%"></div>
        </div>
      </div>
      <div class="kpi-card kpi-acc stagger-item" style="animation-delay:.1s">
        <div class="kpi-label">Pacotes</div>
        <div class="kpi-value">${iniciados}<span style="color:var(--muted);font-size:18px">/${totalPac}</span></div>
        <div class="kpi-sub">${concluidos} concluídos</div>
        <div class="kpi-bar-wrap"><div class="kpi-bar" style="background:var(--pri);width:${iniciados/totalPac*100}%"></div></div>
      </div>
      <div class="kpi-card stagger-item" style="animation-delay:.15s">
        <div class="kpi-label">RDOs Lançados</div>
        <div class="kpi-value">${totalRDOs}</div>
        <div class="kpi-sub">${rdosOrdenados.length > 0 ? `Último: ${fmtData(rdosOrdenados[rdosOrdenados.length-1].data)}` : 'nenhum lançamento'}</div>

function renderHeatmap(av) {
  const estacas = listarEstacas();
  // pegar pacotes que têm pelo menos 1 lançamento ou todos os ativos
  const pacotesAtivos = Object.values(av).filter(a => a.pacote && a.pacote['Status'] !== 'Histórico')
    .filter(a => a.qtdExecutada > 0 || true) // mostra todos pra dar mapa contextual
    .slice(0, 15); // limitar pra não poluir
  
  if (pacotesAtivos.length === 0) {
    return '<div class="empty"><div class="empty-icon">▦</div><div class="empty-title">Mapa vazio</div><div class="empty-sub">Lance RDOs com estaca preenchida pra ver o mapa se construir</div></div>';
  }
  
  // Estaca máxima por pacote pra normalizar cor
  const maxPorPac = {};
  pacotesAtivos.forEach(a => {
    maxPorPac[a.pacote['ID']] = Math.max(0, ...Object.values(a.porEstaca));
  });
  
  // Quebrar em 2 grupos: CB (99-141) e BC (201-244)
  const cb = estacas.filter(e => e.sentido === 'CB');
  const bc = estacas.filter(e => e.sentido === 'BC');
  
  function blocoHeatmap(lista, label) {
    if (lista.length === 0) return '';
    const colTemplate = `200px repeat(${lista.length}, minmax(28px, 1fr))`;
    return `
      <div style="margin-bottom:18px">
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">${label}</div>
        <div class="heatmap" style="grid-template-columns:${colTemplate}">
          <div class="hm-row-label" style="visibility:hidden">.</div>
          ${lista.map(e => `<div class="hm-col-label">${e.id}</div>`).join('')}
          ${pacotesAtivos.map(a => {
            const max = maxPorPac[a.pacote['ID']] || 1;
            return `
              <div class="hm-row-label">${a.pacote['Pacote']}</div>
              ${lista.map(e => {
                const v = a.porEstaca[e.id] || 0;
                const intensity = max > 0 ? Math.min(v / max, 1) : 0;
                const bg = v > 0 ?
                  `background:oklch(${0.95 - intensity * 0.45} 0.18 38)` :
                  `background:var(--bg)`;
                const color = intensity > 0.5 ? '#fff' : 'var(--muted)';
                const title = `${e.id} · ${a.pacote['Pacote']}: ${fmtNum(v, 1)} ${a.pacote['Unidade Física']||''}`;
                return `<div class="hm-cell" style="${bg};color:${color}" title="${title}">${v > 0 ? fmtNum(v, 0) : ''}</div>`;
              }).join('')}
            `;
          }).join('')}
        </div>
      </div>
    `;
  }
  
  return `
    <div class="heatmap-wrap">
      ${blocoHeatmap(cb, `Sentido Centro→Bairro · E${CONFIG.estacasCB.ini}–E${CONFIG.estacasCB.fim}`)}
      ${blocoHeatmap(bc, `Sentido Bairro→Centro · E${CONFIG.estacasBC.ini}–E${CONFIG.estacasBC.fim}`)}
    </div>
  `;
}

// Estado local para salvar as simulações de prazo e produtividade
let PLAN_DADOS = null;

function loadPlanDados() {
  if (PLAN_DADOS) return PLAN_DADOS;
  try {
    const raw = localStorage.getItem('teotonio_plan_reverso_v1');
    if (raw) PLAN_DADOS = JSON.parse(raw);
    else PLAN_DADOS = {};
  } catch(e) { PLAN_DADOS = {}; }
  return PLAN_DADOS;
}

function salvarPlanDados() {
  try { localStorage.setItem('teotonio_plan_reverso_v1', JSON.stringify(PLAN_DADOS)); } catch(e) {}
}

// Atualiza o valor digitado pelo engenheiro e recalcula
window.atualizarPlan = function(pacoteId, campo, valor) {
  if (!PLAN_DADOS) loadPlanDados();
  if (!PLAN_DADOS[pacoteId]) PLAN_DADOS[pacoteId] = { prod: '', dataFim: '' };
  PLAN_DADOS[pacoteId][campo] = valor;
  salvarPlanDados();
  render(); // Re-renderiza a tela para mostrar o cálculo atualizado
};

// Função que volta os dias no calendário (descontando domingos)
function calcularDataInicioReversa(dataFimStr, diasDuracao) {
  if (!dataFimStr || diasDuracao <= 0) return null;
  const dataFim = parseISODate(dataFimStr);
  if (!dataFim || isNaN(dataFim)) return null;

  let d = new Date(dataFim.getTime());
  // Se a duração é 1 dia, começa e termina no mesmo dia
  let diasRestantes = Math.ceil(diasDuracao) - 1; 
  if (diasRestantes < 0) diasRestantes = 0;

  while (diasRestantes > 0) {
    d.setDate(d.getDate() - 1);
    // Pula Domingo (0)
    if (d.getDay() !== 0) {
      diasRestantes--;
    }
  }
  return d;
}

function renderCronograma() {
  loadPlanDados();
  
  // Puxa o avanço real já calculado no seu sistema pelos RDOs
  const av = calcularAvancoPorPacote();
  
  // Pegar todos os pacotes ativos
  const pacotesAtivos = STATE.pacotes.filter(p => p['Status'] !== 'Histórico' && p['ID']);
  
  // Agrupar por frente
  const porFrente = {};
  pacotesAtivos.forEach(p => {
    const f = p['Frente'] || 'Outros';
    if (!porFrente[f]) porFrente[f] = [];
    porFrente[f].push(p);
  });

  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  return `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Motor de Planejamento Reverso</div>
          <div class="card-title-sub">Defina o término alvo e a produtividade. O sistema calcula quando você precisa iniciar o SALDO RESTANTE (descontando domingos).</div>
        </div>
      </div>
      <div class="card-body flush" style="overflow-x:auto">
        <table class="t" style="min-width: 900px;">
          <thead>
            <tr>
              <th style="width: 25%">Pacote / Serviço</th>
              <th class="t-num" style="text-align: right; width: 10%">Saldo a Executar</th>
              <th style="width: 15%">Término Alvo</th>
              <th style="width: 15%">Produtividade/dia</th>
              <th class="t-num" style="text-align: center; width: 10%">Duração (Saldo)</th>
              <th style="width: 25%">Data Início Necessária</th>
            </tr>
          </thead>
          <tbody>
            ${Object.entries(porFrente).map(([frente, pacotes]) => `
              <tr class="summary"><td colspan="6">${frente}</td></tr>
              ${pacotes.map(p => {
                const pid = p['ID'];
                const plan = PLAN_DADOS[pid] || { prod: '', dataFim: '' };
                
                // Busca os dados de avanço real
                const avancoPacote = av[pid];
                const qtdTotal = num(p['Qtd Estimada']);
                const qtdExecutada = avancoPacote ? avancoPacote.qtdExecutada : 0;
                
                // Calcula o saldo (garante que não fique negativo)
                const saldo = Math.max(0, qtdTotal - qtdExecutada); 
                
                const unid = p['Unidade Física'] || '';
                
                let duracaoDias = 0;
                let dataInicioStr = '<span style="color:var(--muted)">Aguardando dados...</span>';
                let alertClass = '';

                // Se o saldo for zero, já terminou
                if (saldo === 0) {
                     dataInicioStr = '<span style="color:var(--grn); font-weight:bold;">100% Concluído</span>';
                } else if (plan.prod > 0 && plan.dataFim) {
                  // O cálculo de dias é feito em cima do que FALTA FAZER
                  duracaoDias = saldo / plan.prod;
                  const dataInicio = calcularDataInicioReversa(plan.dataFim, duracaoDias);
                  
                  if (dataInicio) {
                    const strFormatada = fmtData(dataInicio);
                    // Compara com o dia de hoje pra ver se a tarefa já devia ter começado
                    if (dataInicio < hoje) {
                      alertClass = 'color: var(--red); font-weight: bold;';
                      dataInicioStr = '⚠️ ' + strFormatada + ' (Atrasado!)';
                    } else {
                      alertClass = 'color: var(--blu); font-weight: bold;';
                      dataInicioStr = '📅 ' + strFormatada;
                    }
                  }
                }

                return `
                  <tr>
                    <td>
                        <strong>${p['Pacote']}</strong>
                        <div style="font-size: 10px; color: var(--muted); margin-top: 2px;">Total: ${fmtNum(qtdTotal)} | Executado: ${fmtNum(qtdExecutada)}</div>
                    </td>
                    <td class="t-num" style="color: ${saldo > 0 ? 'var(--text)' : 'var(--grn)'}; font-weight: 600; text-align: right;">
                        ${fmtNum(saldo)} ${unid}
                    </td>
                    <td>
                      ${saldo > 0 ? `<input type="date" style="padding: 4px 8px; font-size: 12px; border: 1px solid var(--border); border-radius: 4px;" 
                             value="${plan.dataFim}" 
                             onchange="atualizarPlan('${pid}', 'dataFim', this.value)">` : '—'}
                    </td>
                    <td>
                      ${saldo > 0 ? `<div style="display:flex; align-items:center; gap: 4px;">
                        <input type="number" style="width: 70px; padding: 4px 8px; font-size: 12px; border: 1px solid var(--border); border-radius: 4px;" 
                               placeholder="Ex: 40" value="${plan.prod}" 
                               onkeyup="if(event.key==='Enter') atualizarPlan('${pid}', 'prod', this.value)"
                               onblur="atualizarPlan('${pid}', 'prod', this.value)">
                        <span style="font-size: 11px; color: var(--muted);">${unid}/dia</span>
                      </div>` : '—'}
                    </td>
                    <td class="t-num" style="text-align: center;">
                      ${duracaoDias > 0 ? Math.ceil(duracaoDias) + ' dias' : '—'}
                    </td>
                    <td style="font-size: 13px; ${alertClass}">
                      ${dataInicioStr}
                    </td>
                  </tr>
                `;
              }).join('')}
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

                  total += parseInt(r[c+'_Diurno']) || 0;
                  total += parseInt(r[c+'_Noturno']) || 0;
                });
                const climaResumo = [r['Clima_Manha'], r['Clima_Tarde'], r['Clima_Noite']].filter(Boolean).join(' · ');
                return `
                  <tr>
                    <td class="t-mono">${r['ID']||''}</td>
                    <td>${fmtData(r['Data'])}</td>
                    <td style="font-size:12px">${r['Encarregado']||''}</td>
                    <td style="font-size:12px">${r['Apontador']||''}</td>
                    <td style="font-size:11px;color:var(--muted)">${climaResumo}</td>
                    <td class="t-num">${total}</td>
                    <td>${r['Tem_Turno_Noturno']==='Sim'?'<span class="pill pill-blu">Sim</span>':'<span class="pill pill-ylw">Não</span>'}</td>
                    <td><button class="btn btn-sm btn-primary" onclick='gerarPDFDiario(${JSON.stringify(r['Data']).replace(/'/g,"&#39;")})'>📄 PDF</button></td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>`
        }
      </div>
    </div>
  `;
}

function loadDraft() {
  try {
    const raw = localStorage.getItem(CONFIG.ls.rdoDraft);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveDraft(draft) {
  try { localStorage.setItem(CONFIG.ls.rdoDraft, JSON.stringify(draft)); } catch(e) {}
}

function clearDraft() {
  try { localStorage.removeItem(CONFIG.ls.rdoDraft); } catch(e) {}
}

function defaultDraft() {
  const apontador = localStorage.getItem(CONFIG.ls.apontador) || '';
  return {
    data: new Date().toISOString().split('T')[0],
    turno: 'Diurno',
    apontador,
    observacaoGeral: '',

      { frente: '', pacoteId: '', sentido: 'CB', estacaIni: '', estacaFim: '', quantidade: '', equipe: '', observacao: '' }

}

function attachRDOForm() {
  // Bind inputs do cabeçalho
  document.querySelectorAll('[data-draft]').forEach(el => {
    el.oninput = el.onchange = () => {
      STATE.draft[el.dataset.draft] = el.value;
      if (el.dataset.draft === 'apontador') {
        try { localStorage.setItem(CONFIG.ls.apontador, el.value); } catch(e) {}
      }
      saveDraft(STATE.draft);
    };
  });
  
  // Bind inputs dos serviços (delegação)
  document.getElementById('servicosList').addEventListener('input', svcInputHandler);
  document.getElementById('servicosList').addEventListener('change', svcInputHandler);
}

function svcInputHandler(ev) {
  const el = ev.target;
  if (!el.dataset.svc) return;
  const idx = parseInt(el.dataset.svc);
  const field = el.dataset.field;
  STATE.draft.servicos[idx][field] = el.value;
  
  // Se mudou frente, limpa pacote e re-renderiza
  if (field === 'frente') {
    STATE.draft.servicos[idx].pacoteId = '';
    rerenderServicoRow(idx);
  }
  // Se mudou pacote, atualiza unidade exibida
  if (field === 'pacoteId') {
    rerenderServicoRow(idx);
  }
  // Se mudou sentido, limpa as estacas e re-renderiza
  if (field === 'sentido') {
    STATE.draft.servicos[idx].estacaIni = '';
    STATE.draft.servicos[idx].estacaFim = '';
    rerenderServicoRow(idx);
  }
  saveDraft(STATE.draft);
}

function rerenderServicoRow(idx) {
  const frentes = [...new Set(STATE.pacotes
    .filter(p => p['Status'] !== 'Histórico' && p['Frente'])
    .map(p => p['Frente']))].sort();
  const html = renderServicoRow(STATE.draft.servicos[idx], idx, frentes);
  const old = document.querySelector(`.servico-row[data-idx="${idx}"]`);
  if (old) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    old.replaceWith(tmp.firstElementChild);
  }
}

function setTurno(t) {
  STATE.draft.turno = t;
  saveDraft(STATE.draft);
  render();
}

function adicionarServico() {
  // Herda sentido do último serviço pra acelerar lançamento
  const ultimo = STATE.draft.servicos[STATE.draft.servicos.length - 1];
  STATE.draft.servicos.push({
    frente: '', pacoteId: '',
    sentido: ultimo ? ultimo.sentido : 'CB',
    estacaIni: '', estacaFim: '',
    quantidade: '', equipe: '', observacao: ''
  });
  saveDraft(STATE.draft);
  render();
}

function removerServico(idx) {
  STATE.draft.servicos.splice(idx, 1);
  if (STATE.draft.servicos.length === 0) {
    STATE.draft.servicos.push({ frente: '', pacoteId: '', quantidade: '', equipe: '', observacao: '' });
  }
  saveDraft(STATE.draft);
  render();
}

function resetDraft() {
  if (!confirm('Limpar todos os dados desse RDO? Não tem como desfazer.')) return;
  clearDraft();
  STATE.draft = defaultDraft();
  render();
}

function validarRDO(d) {
  const erros = [];
  if (!d.data) erros.push('Data é obrigatória');
  if (!d.apontador.trim()) erros.push('Apontador é obrigatório');
  
  const servicosValidos = d.servicos.filter(s => s.pacoteId && num(s.quantidade) > 0);
  if (servicosValidos.length === 0) {
    erros.push('Adicione pelo menos 1 serviço com pacote e quantidade > 0');
    return erros;
  }
  // Cada serviço precisa ter suas estacas
  for (let i = 0; i < d.servicos.length; i++) {
    const s = d.servicos[i];
    if (s.pacoteId && num(s.quantidade) > 0) {
      if (!s.estacaIni || !s.estacaFim) {
        erros.push(`Serviço ${i+1}: estaca início e fim obrigatórias`);
        break;
      }
    }
  }
  return erros;
}

async function salvarRDO() {
  const d = STATE.draft;
  const erros = validarRDO(d);
  if (erros.length > 0) {
    toast(erros.join(' · '), 'error', 5000);
    return;
  }
  
  const btn = document.getElementById('btnSalvarRDO');
  const btnTxtOriginal = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ Salvando…';
  
  // Montar batch — cada serviço usa SUAS PRÓPRIAS estacas
  const batch = d.servicos
    .filter(s => s.pacoteId && num(s.quantidade) > 0)
    .map(s => {
      const p = STATE.pacotes.find(pp => pp['ID'] === s.pacoteId);
      const obsCompleta = [d.observacaoGeral, s.observacao].filter(x => x && x.trim()).join(' · ');
      // Estaca específica deste serviço
      let localEstaca = '';
      if (s.estacaIni && s.estacaFim) localEstaca = `${s.estacaIni} a ${s.estacaFim} (${s.sentido||'CB'})`;
      else if (s.estacaIni) localEstaca = `${s.estacaIni} (${s.sentido||'CB'})`;
      return {
        data: d.data,
        turno: d.turno || 'Diurno',
        pacote_id: s.pacoteId,
        pacote_nome: p ? p['Pacote'] : '',
        quantidade: num(s.quantidade),
        unidade: p ? (p['Unidade Física']||'') : '',
        local_estaca: localEstaca,
        equipe: s.equipe,
        subcontratado: s.equipe,
        efetivo_total: 0,
        equipamentos: '',
        clima: '',
        paralisado_motivo: '',
        foto_link: '',
        observacao: obsCompleta,
        apontador: d.apontador
      };
    });
  
  try {
    const result = await jsonp(CONFIG.appsScript, {
      action: 'addBatchRDO',
      batch: JSON.stringify(batch)
    });
    
    if (!result.ok) throw new Error(result.error || 'Erro desconhecido');
    
    toast(`✓ ${batch.length} serviço${batch.length>1?'s':''} salvo${batch.length>1?'s':''} (${d.turno})`, 'success', 4000);
    
    clearDraft();
    STATE.draft = {
      ...defaultDraft(),
      apontador: d.apontador,
      sentido: d.sentido,
      turno: d.turno,
    };
    
    // Forçar refresh dos dados (vai aparecer em ~5min depois da republicação)
    setTimeout(() => carregarTudo(), 800);
    
    // Voltar pra tela executiva
    HISTORICO_TAB = 'servicos';
    setTimeout(() => navigate('historico'), 600);
    
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = btnTxtOriginal;
    toast('Falha ao salvar: ' + e.message, 'error', 6000);
  }
}

  let equipJson = {};

  try { equipJson = JSON.parse(sheetRow['Equipamentos_JSON'] || '{}'); } catch(e) {}
  
  const d = defaultDiarioV4(data);
  d.clima_manha = sheetRow['Clima_Manha'] || 'Bom';
  d.clima_tarde = sheetRow['Clima_Tarde'] || 'Bom';
  d.clima_noite = sheetRow['Clima_Noite'] || 'Bom';
  
  d.diurno.apontador = sheetRow['Apontador_Diurno'] || '';
  d.diurno.efetivo = efetivoJson.padrao_diurno || {};
  d.diurno.equipamentos = equipJson.padrao_diurno || {};
  d.diurno.customIndireto = efetivoJson.customIndireto_diurno || [];
  d.diurno.customDireto = efetivoJson.customDireto_diurno || [];
  d.diurno.customEquip = equipJson.custom_diurno || [];
  d.diurno.visitas = sheetRow['Visitas_Diurno'] || sheetRow['Visitas'] || '';
  d.diurno.ocorrencias = sheetRow['Ocorrencias_Diurno'] || '';
  d.diurno.observacoes = sheetRow['Obs_Diurno'] || '';
  d.diurno.preenchido = !!d.diurno.apontador;
  
  d.noturno.apontador = sheetRow['Apontador_Noturno'] || '';
  d.noturno.efetivo = efetivoJson.padrao_noturno || {};
  d.noturno.equipamentos = equipJson.padrao_noturno || {};
  d.noturno.customIndireto = efetivoJson.customIndireto_noturno || [];
  d.noturno.customDireto = efetivoJson.customDireto_noturno || [];
  d.noturno.customEquip = equipJson.custom_noturno || [];
  d.noturno.visitas = sheetRow['Visitas_Noturno'] || '';
  d.noturno.ocorrencias = sheetRow['Ocorrencias_Noturno'] || '';
  d.noturno.observacoes = sheetRow['Obs_Noturno'] || '';
  d.noturno.preenchido = !!d.noturno.apontador;
  
  return d;
}

function attachRDODiarioV4Form() {
  // Data picker (na tela de seletor)
  const dataInput = document.querySelector('[data-diario4-data]');
  if (dataInput) {
    dataInput.onchange = () => {
      const novaData = dataInput.value;
      // Recarregar do estado correspondente à nova data
      DIARIO_V4 = carregarDiarioDaSheet(novaData) || loadDiarioV4(novaData) || defaultDiarioV4(novaData);
      render();
    };
  }
  
  // Inputs do formulário do turno
  if (!DIARIO_TURNO_ATIVO) return;
  const t = DIARIO_TURNO_ATIVO;
  const td = DIARIO_V4[t];
  
  document.querySelectorAll('[data-diario4]').forEach(el => {
    el.oninput = el.onchange = () => {
      td[el.dataset.diario4] = el.value;
      saveDiarioV4(DIARIO_V4);
    };
  });
  
  document.querySelectorAll('[data-diario4-clima]').forEach(el => {
    el.onchange = () => {
      DIARIO_V4[el.dataset.diario4Clima] = el.value;
      saveDiarioV4(DIARIO_V4);
    };
  });
  
  document.querySelectorAll('[data-efet4]').forEach(el => {
    el.oninput = () => {
      td.efetivo[el.dataset.efet4] = el.value;
      saveDiarioV4(DIARIO_V4);
    };
  });
  
  document.querySelectorAll('[data-equip4]').forEach(el => {
    el.oninput = () => {
      td.equipamentos[el.dataset.equip4] = el.value;
      saveDiarioV4(DIARIO_V4);
    };
  });
  
  document.querySelectorAll('[data-equipcustom4]').forEach(el => {
    el.oninput = () => {
      const idx = parseInt(el.dataset.equipcustom4);
      td.customEquip[idx].qtd = el.value;
      saveDiarioV4(DIARIO_V4);
    };
  });
  
  document.querySelectorAll('[data-customfun4]').forEach(el => {
    el.oninput = () => {
      const [prefix, idx, field] = el.dataset.customfun4.split('|');
      const list = prefix === 'indireto' ? td.customIndireto : td.customDireto;
      list[parseInt(idx)][field] = el.value;
      saveDiarioV4(DIARIO_V4);
    };
  });
}

function selecionarTurnoV4(turno) {
  DIARIO_TURNO_ATIVO = turno;
  render();
}

function voltarSeletorTurnoV4() {
  DIARIO_TURNO_ATIVO = null;
  render();
}

function resetTurnoV4() {
  if (!confirm('Limpar todos os dados do turno ' + DIARIO_TURNO_ATIVO.toUpperCase() + '?')) return;
  DIARIO_V4[DIARIO_TURNO_ATIVO] = defaultDiarioV4(DIARIO_V4.data)[DIARIO_TURNO_ATIVO];
  saveDiarioV4(DIARIO_V4);
  render();
}

function adicionarFuncaoCustomV4(prefix) {
  const td = DIARIO_V4[DIARIO_TURNO_ATIVO];
  const list = prefix === 'indireto' ? td.customIndireto : td.customDireto;
  list.push({ label: '', qtd: '' });
  saveDiarioV4(DIARIO_V4);
  render();
}

function removerFuncaoCustomV4(prefix, idx) {
  const td = DIARIO_V4[DIARIO_TURNO_ATIVO];
  const list = prefix === 'indireto' ? td.customIndireto : td.customDireto;
  list.splice(idx, 1);
  saveDiarioV4(DIARIO_V4);
  render();
}

function adicionarEquipCustomV4() {
  const label = prompt('Nome do equipamento personalizado:');
  if (!label || !label.trim()) return;
  DIARIO_V4[DIARIO_TURNO_ATIVO].customEquip.push({ label: label.trim(), qtd: '' });
  saveDiarioV4(DIARIO_V4);
  render();
}

function removerEquipCustomV4(idx) {
  DIARIO_V4[DIARIO_TURNO_ATIVO].customEquip.splice(idx, 1);
  saveDiarioV4(DIARIO_V4);
  render();
}

async function salvarDiarioV4() {
  const d = DIARIO_V4;
  const t = DIARIO_TURNO_ATIVO;
  const td = d[t];
  
  if (!td.apontador || !td.apontador.trim()) {
    toast('Apontador obrigatório pra salvar', 'error'); return;
  }
  
  const btn = document.getElementById('btnSalvarDiarioV4');
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ Salvando…';
  
  // Marca o turno como preenchido
  td.preenchido = true;
  saveDiarioV4(d);
  
  // Verifica se já existe RDO Diário pra esta data na Sheet
  const existe = (STATE.rdodiario || []).some(r => {
    const rd = String(r['Data']);
    return rd === d.data || (parseISODate(rd) && parseISODate(rd).toISOString().split('T')[0] === d.data);
  });
  
  // Construir JSON unificado (combinando os 2 turnos do estado local)
  const efetivoJSON = {
    padrao_diurno: d.diurno.efetivo || {},
    padrao_noturno: d.noturno.efetivo || {},
    customIndireto_diurno: (d.diurno.customIndireto || []).filter(f => f.label && f.label.trim()),
    customDireto_diurno: (d.diurno.customDireto || []).filter(f => f.label && f.label.trim()),
    customIndireto_noturno: (d.noturno.customIndireto || []).filter(f => f.label && f.label.trim()),
    customDireto_noturno: (d.noturno.customDireto || []).filter(f => f.label && f.label.trim()),
  };
  const equipJSON = {
    padrao_diurno: d.diurno.equipamentos || {},
    padrao_noturno: d.noturno.equipamentos || {},
    custom_diurno: (d.diurno.customEquip || []).filter(e => e.label && e.label.trim()),
    custom_noturno: (d.noturno.customEquip || []).filter(e => e.label && e.label.trim()),
  };
  
  const params = {
    action: existe ? 'updateRDODiario' : 'addRDODiario',
    data: d.data,
    apontador_diurno: d.diurno.apontador || '',
    apontador_noturno: d.noturno.apontador || '',
    encarregado: '', // descontinuado
    clima_manha: d.clima_manha || '',
    clima_tarde: d.clima_tarde || '',
    clima_noite: d.clima_noite || '',
    visitas: [d.diurno.visitas, d.noturno.visitas].filter(x=>x).join(' / ') || '',
    ocorrencias: [d.diurno.ocorrencias, d.noturno.ocorrencias].filter(x=>x).join(' / ') || '',
    observacoes_gerais: [d.diurno.observacoes, d.noturno.observacoes].filter(x=>x).join(' / ') || '',
    tem_turno_noturno: (d.diurno.preenchido && d.noturno.preenchido) ? 'true' : 'false',
    efetivo_json: JSON.stringify(efetivoJSON),
    equipamentos_json: JSON.stringify(equipJSON),
  };
  
  try {
    const result = await jsonp(CONFIG.appsScript, params);
    if (!result.ok) throw new Error(result.error || 'Erro');
    toast(`✓ Turno ${t.toUpperCase()} salvo`, 'success', 4000);
    setTimeout(() => carregarTudo(), 800);
    btn.disabled = false;
    btn.innerHTML = original;
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = original;
    toast('Falha: ' + e.message, 'error', 6000);
  }
}

// ====================================================================
// PDF DO RDO DIÁRIO OFICIAL — Layout SP-Obras com 3 logos
// ====================================================================
function gerarPDFDiario(data) {
  // Buscar dados do RDO Diário (preferir Sheets, senão usar DIARIO_V4 local)
  const fromSheet = (STATE.rdodiario || []).find(r => {
    const rd = String(r['Data']);
    return rd === data || (parseISODate(rd) && parseISODate(rd).toISOString().split('T')[0] === data);
  });
  
  let d;
  if (fromSheet) {
    let efetJson = {}, equipJson = {};
    try { efetJson = JSON.parse(fromSheet['Efetivo_JSON'] || '{}'); } catch(e) {}
    try { equipJson = JSON.parse(fromSheet['Equipamentos_JSON'] || '{}'); } catch(e) {}
    d = {
      data: data,
      sheetId: fromSheet['ID'],
      apontador_diurno: fromSheet['Apontador_Diurno'] || '',
      apontador_noturno: fromSheet['Apontador_Noturno'] || '',
      clima_manha: fromSheet['Clima_Manha'] || '',
      clima_tarde: fromSheet['Clima_Tarde'] || '',
      clima_noite: fromSheet['Clima_Noite'] || '',
      visitas: fromSheet['Visitas'] || '',
      ocorrencias: fromSheet['Ocorrencias'] || '',
      observacoes_gerais: fromSheet['Observacoes_Gerais'] || '',
      efetivo_diurno: efetJson.padrao_diurno || {},
      efetivo_noturno: efetJson.padrao_noturno || {},
      equipamentos_diurno: equipJson.padrao_diurno || {},
      equipamentos_noturno: equipJson.padrao_noturno || {},
      customIndireto_diurno: efetJson.customIndireto_diurno || [],
      customIndireto_noturno: efetJson.customIndireto_noturno || [],
      customDireto_diurno: efetJson.customDireto_diurno || [],
      customDireto_noturno: efetJson.customDireto_noturno || [],
      customEquip_diurno: equipJson.custom_diurno || [],
      customEquip_noturno: equipJson.custom_noturno || [],
    };
  } else if (typeof DIARIO_V4 !== 'undefined' && DIARIO_V4 && DIARIO_V4.data === data) {
    const v4 = DIARIO_V4;
    d = {
      data: data,
      sheetId: '',
      apontador_diurno: v4.diurno.apontador || '',
      apontador_noturno: v4.noturno.apontador || '',
      clima_manha: v4.clima_manha, clima_tarde: v4.clima_tarde, clima_noite: v4.clima_noite,
      visitas: [v4.diurno.visitas, v4.noturno.visitas].filter(x=>x).join(' / ') || '',
      ocorrencias: [v4.diurno.ocorrencias, v4.noturno.ocorrencias].filter(x=>x).join(' / ') || '',
      observacoes_gerais: [v4.diurno.observacoes, v4.noturno.observacoes].filter(x=>x).join(' / ') || '',
      efetivo_diurno: v4.diurno.efetivo || {},
      efetivo_noturno: v4.noturno.efetivo || {},
      equipamentos_diurno: v4.diurno.equipamentos || {},
      equipamentos_noturno: v4.noturno.equipamentos || {},
      customIndireto_diurno: v4.diurno.customIndireto || [],
      customIndireto_noturno: v4.noturno.customIndireto || [],
      customDireto_diurno: v4.diurno.customDireto || [],
      customDireto_noturno: v4.noturno.customDireto || [],
      customEquip_diurno: v4.diurno.customEquip || [],
      customEquip_noturno: v4.noturno.customEquip || [],
    };
  } else {
    d = null;
  }
  if (!d) { toast('Não encontrei o RDO Diário pra gerar PDF', 'error'); return; }
  
  const servicosDiurnos = STATE.rdoavanco.filter(r => {
    const rd = parseISODate(r['Data']);
    if (!rd) return false;
    return rd.toISOString().split('T')[0] === data && (r['Turno']||'Diurno') === 'Diurno';
  });
  const servicosNoturnos = STATE.rdoavanco.filter(r => {
    const rd = parseISODate(r['Data']);
    if (!rd) return false;
    return rd.toISOString().split('T')[0] === data && r['Turno'] === 'Noturno';
  });
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const PW = 210, PH = 297, ML = 8, MT = 5, TW = 194;
  
  const NAV = [30, 58, 95];
  const LB = [210, 225, 242];
  const LG = [249, 249, 249];
  const W = [255, 255, 255];
  const RED = [192, 50, 45];
  const YB = [255, 253, 215];
  const DG = [80, 80, 80];
  const BD = [165, 165, 165];
  const ORANGE = [212, 168, 16];
  const BLUE = [50, 100, 150];
  
  function sf(sz, st, col) {
    doc.setFontSize(sz);
    doc.setFont('helvetica', st || 'normal');
    doc.setTextColor(...(col || [0, 0, 0]));
  }
  function rf(x, y, w, h, fl, sk, lw) {
    doc.setLineWidth(lw || 0.15);
    if (fl && sk) { doc.setFillColor(...fl); doc.setDrawColor(...sk); doc.rect(x, y, w, h, 'FD'); }
    else if (fl) { doc.setFillColor(...fl); doc.rect(x, y, w, h, 'F'); }
    else if (sk) { doc.setDrawColor(...sk); doc.rect(x, y, w, h, 'S'); }
  }
  function ln(x1, y1, x2, y2, c, lw) {
    doc.setDrawColor(...(c || [180, 180, 180]));
    doc.setLineWidth(lw || 0.15);
    doc.line(x1, y1, x2, y2);
  }
  function tx(t, x, y, opt) { doc.text(String(t || ''), x, y, opt || {}); }
  
  const df = new Date(data + 'T12:00:00').toLocaleDateString('pt-BR');
  const dd = new Date(data + 'T12:00:00');
  const diaSemanaIdx = [6, 0, 1, 2, 3, 4, 5][dd.getDay()];
  
  let y = MT;
  
  // Cabeçalho 22mm
  rf(ML, y, TW, 22, W, NAV, 0.5);
  try { doc.addImage('data:image/png;base64,' + RDO_LOGO_L1, 'PNG', ML + 1, y + 1, 20, 20); } catch(e) {}
  try { doc.addImage('data:image/png;base64,' + RDO_LOGO_L2, 'PNG', ML + 22, y + 1, 24, 20); } catch(e) {}
  try { doc.addImage('data:image/png;base64,' + RDO_LOGO_L3, 'PNG', ML + TW - 28, y + 1, 26, 20); } catch(e) {}
  
  const cxL = ML + 47, cxR = ML + TW - 29, cxW = cxR - cxL, cxMid = cxL + cxW / 2;
  sf(9.5, 'bold', NAV);
  tx('RELATÓRIO DIÁRIO DE OBRA', cxMid, y + 7.5, { align: 'center' });
  sf(6.5, 'normal', DG);
  tx('Consórcio Viário Teotônio Vilela  |  Duplicação Viária — Av. Sen. Teotônio Vilela, SP', cxMid, y + 13, { align: 'center' });
  sf(4.5, 'normal', DG);
  const respTx = 'Início: 09/05/2024  |  Prazo: 669 dias  |  Resp: Roberto V. França (2620250486954) / Paulo E. Façanha (2620250483859) / Adriano L. Pedroso (2620251795809)';
  const respLines = doc.splitTextToSize(respTx, cxW - 2);
  doc.text(respLines.slice(0, 2), cxMid, y + 17.5, { align: 'center' });
  y += 22;
  
  // Objeto 10mm
  rf(ML, y, TW, 10, LB, BD);
  sf(5, 'bold', NAV); tx('OBJETO', ML + 2, y + 3.5);
  sf(5, 'normal', [0, 0, 0]);
  const obj = 'CONTRATAÇÃO DE EMPRESA OU CONSÓRCIO DE EMPRESAS ESPECIALIZADAS EM ENGENHARIA PARA A EXECUÇÃO DE OBRAS E SERVIÇOS DE DUPLICAÇÃO VIÁRIA DA AVENIDA SENADOR TEOTÔNIO VILELA, NO TRECHO COM INÍCIO PRÓXIMO A RUA JOSÉ NICOLAU DE LIMA ATÉ AS PROXIMIDADES DA RUA SATÉLITE ARIEL, NA REGIÃO SUL DA CIDADE DE SÃO PAULO';
  const objL = doc.splitTextToSize(obj, TW - 4);
  doc.text(objL.slice(0, 2), ML + 2, y + 6.5);
  y += 10;
  
  // Local/Data/Nº/Prazo
  const nrRDO = (d.sheetId) ? String(d.sheetId).replace(/^D0*/, '') || '1' : '—';
  const H3 = 6;
  rf(ML, y, TW * 0.55, H3, LB, BD); sf(5, 'bold', NAV); tx('LOCAL', ML + 2, y + H3 * 0.72);
  rf(ML + TW * 0.55, y, TW * 0.22, H3, LB, BD); sf(5, 'bold', NAV); tx('DATA', ML + TW * 0.55 + TW * 0.11, y + H3 * 0.72, { align: 'center' });
  rf(ML + TW * 0.77, y, TW * 0.12, H3, LB, BD); sf(5, 'bold', NAV); tx('NÚMERO', ML + TW * 0.77 + TW * 0.06, y + H3 * 0.72, { align: 'center' });
  rf(ML + TW * 0.89, y, TW * 0.11, H3, LB, BD); sf(5, 'bold', NAV); tx('PRAZO(dias)', ML + TW * 0.89 + TW * 0.055, y + H3 * 0.72, { align: 'center' });
  y += H3;
  rf(ML, y, TW * 0.55, H3, W, BD); sf(5.5, 'normal', [0, 0, 0]);
  tx('Av. Sen. Teotônio Vilela (Rua José Nicolau — Rua Satélite Ariel)', ML + 2, y + H3 * 0.72);
  rf(ML + TW * 0.55, y, TW * 0.22, H3, W, BD); sf(7, 'bold', NAV); tx(df, ML + TW * 0.55 + TW * 0.11, y + H3 * 0.72, { align: 'center' });
  rf(ML + TW * 0.77, y, TW * 0.12, H3, W, BD); sf(7, 'bold', NAV); tx(nrRDO, ML + TW * 0.77 + TW * 0.06, y + H3 * 0.72, { align: 'center' });
  rf(ML + TW * 0.89, y, TW * 0.11, H3, W, BD); sf(6, 'bold', NAV); tx('669', ML + TW * 0.89 + TW * 0.055, y + H3 * 0.72, { align: 'center' });
  y += H3;
  
  // Dia/Jornada/Clima
  const JH = 5;
  const dCW = TW * 0.038, jW = TW * 0.25, cW = TW - 7 * dCW - jW;
  const jcw = jW / 4, ccw = cW / 4;
  
  rf(ML, y, 7 * dCW, JH, LB, BD); sf(5, 'bold', NAV); tx('DIA DA SEMANA', ML + 7 * dCW / 2, y + JH * 0.72, { align: 'center' });
  rf(ML + 7 * dCW, y, jW, JH, LB, BD); sf(5, 'bold', NAV); tx('JORNADA', ML + 7 * dCW + jW / 2, y + JH * 0.72, { align: 'center' });
  rf(ML + 7 * dCW + jW, y, cW, JH, LB, BD); sf(5, 'bold', NAV); tx('CONDIÇÕES CLIMÁTICAS', ML + 7 * dCW + jW + cW / 2, y + JH * 0.72, { align: 'center' });
  y += JH;
  ['S', 'T', 'Q', 'Q', 'S', 'S', 'D'].forEach((dl, i) => {
    const on = i === diaSemanaIdx;
    rf(ML + i * dCW, y, dCW, JH, on ? NAV : W, BD);
    sf(6, on ? 'bold' : 'normal', on ? W : [0, 0, 0]);
    tx(dl, ML + (i + 0.5) * dCW, y + JH * 0.72, { align: 'center' });
  });
  ['Início', '', 'Térm.', ''].forEach((lbl, i) => {
    rf(ML + 7 * dCW + i * jcw, y, jcw, JH, W, BD);
    sf(5, 'bold', NAV); tx(lbl, ML + 7 * dCW + (i + 0.5) * jcw, y + 2, { align: 'center' });
  });
  const climaPrincipal = (d.clima_manha || 'Bom').toLowerCase();
  let climaKey = 'bom';
  if (climaPrincipal.includes('chuv')) climaKey = 'chu';
  else if (climaPrincipal.includes('garoa') || climaPrincipal.includes('encober')) climaKey = 'reg';
  ['Bom', 'Regular', 'Chuva', ''].forEach((lbl, i) => {
    const cKey = ['bom', 'reg', 'chu', ''][i];
    const on = cKey && cKey === climaKey;
    rf(ML + 7 * dCW + jW + i * ccw, y, ccw, JH, on ? [235, 245, 255] : W, BD);
    sf(5, 'bold', on ? NAV : DG);
    tx(lbl, ML + 7 * dCW + jW + (i + 0.5) * ccw, y + 2, { align: 'center' });
    if (on) { sf(7, 'bold', NAV); tx('✓', ML + 7 * dCW + jW + (i + 0.5) * ccw, y + JH * 0.78, { align: 'center' }); }
  });
  y += JH + 2;
  
  // ════════════════════════════
  // EFETIVO (Diurno + Noturno)
  // ════════════════════════════
  rf(ML, y, TW, 5, NAV); sf(6.5, 'bold', W); tx('EFETIVO — Apontador Diurno: ' + (d.apontador_diurno || '—') + '  |  Noturno: ' + (d.apontador_noturno || '—'), ML + 2, y + 3.3); y += 5;
  
  const CD = 60, CN = 12, CT = 12, CO = TW - CD - 4 * CN - CT;
  const EH = 3.4;
  rf(ML, y, CD, EH * 1.5, LB, BD); sf(5.5, 'bold', NAV); tx('FUNÇÃO', ML + 2, y + EH);
  rf(ML + CD, y, CN * 2, EH * 1.5, LB, BD); sf(5.5, 'bold', NAV); tx('DIURNO', ML + CD + CN, y + EH, { align: 'center' });
  rf(ML + CD + CN * 2, y, CN * 2, EH * 1.5, LB, BD); sf(5.5, 'bold', NAV); tx('NOTURNO', ML + CD + CN * 3, y + EH, { align: 'center' });
  rf(ML + CD + CN * 4, y, CT, EH * 1.5, LB, BD); sf(5.5, 'bold', NAV); tx('TOT.', ML + CD + CN * 4 + CT / 2, y + EH, { align: 'center' });
  rf(ML + CD + CN * 4 + CT, y, CO, EH * 1.5, LB, BD); sf(5.5, 'bold', NAV); tx('OBSERVAÇÕES', ML + CD + CN * 4 + CT + 2, y + EH);
  y += EH * 1.5;
  
  rf(ML, y, CD, EH, LB, BD);
  ['Direto', 'Indireto', 'Direto', 'Indireto'].forEach((l, i) => {
    rf(ML + CD + i * CN, y, CN, EH, LB, BD); sf(4.5, 'bold', NAV);
    tx(l, ML + CD + (i + 0.5) * CN, y + EH * 0.72, { align: 'center' });
  });
  rf(ML + CD + 4 * CN, y, CT, EH, LB, BD);
  rf(ML + CD + 4 * CN + CT, y, CO, EH, LB, BD);
  y += EH;
  
  const todasCats = [
    ...CATEGORIAS_INDIRETO.map(c => ({...c, tipo: 'indireto'})),
    ...CATEGORIAS_DIRETO.map(c => ({...c, tipo: 'direto'})),
  ];
  
  // Filtra categorias com valor
  let categorias = todasCats.filter(c => {
    const diu = parseInt(d.efetivo_diurno[c.key]) || 0;
    const not = parseInt(d.efetivo_noturno[c.key]) || 0;
    return (diu + not) > 0;
  });
  
  // Adicionar customs
  (d.customIndireto_diurno || []).forEach(f => {
    const diu = parseInt(f.qtd) || 0;
    if (f.label && diu > 0) categorias.push({ key: '__cid_' + f.label, label: f.label + ' ✱', tipo: 'indireto', _customDiu: diu, _customNot: 0 });
  });
  (d.customIndireto_noturno || []).forEach(f => {
    const not = parseInt(f.qtd) || 0;
    if (f.label && not > 0) {
      const exist = categorias.find(c => c.label === f.label + ' ✱');
      if (exist) exist._customNot = not;
      else categorias.push({ key: '__cin_' + f.label, label: f.label + ' ✱', tipo: 'indireto', _customDiu: 0, _customNot: not });
    }
  });
  (d.customDireto_diurno || []).forEach(f => {
    const diu = parseInt(f.qtd) || 0;
    if (f.label && diu > 0) categorias.push({ key: '__cdd_' + f.label, label: f.label + ' ✱', tipo: 'direto', _customDiu: diu, _customNot: 0 });
  });
  (d.customDireto_noturno || []).forEach(f => {
    const not = parseInt(f.qtd) || 0;
    if (f.label && not > 0) {
      const exist = categorias.find(c => c.label === f.label + ' ✱' && c.tipo === 'direto');
      if (exist) exist._customNot = not;
      else categorias.push({ key: '__cdn_' + f.label, label: f.label + ' ✱', tipo: 'direto', _customDiu: 0, _customNot: not });
    }
  });
  
  // Min 12 linhas pra ocupar página
  if (categorias.length < 12) {
    const placeholders = todasCats.filter(c => !categorias.some(ec => ec.key === c.key)).slice(0, 12 - categorias.length);
    categorias = [...categorias, ...placeholders];
  }
  categorias = categorias.slice(0, 14);
  
  let tcd = 0, tci = 0, ttd = 0, tti = 0;
  categorias.forEach((cat, i) => {
    let diu, not;
    if (cat._customDiu !== undefined) {
      diu = cat._customDiu; not = cat._customNot;
    } else {
      diu = parseInt(d.efetivo_diurno[cat.key]) || 0;
      not = parseInt(d.efetivo_noturno[cat.key]) || 0;
    }
    const cd = cat.tipo === 'direto' ? diu : 0;
    const ci = cat.tipo === 'indireto' ? diu : 0;
    const td = cat.tipo === 'direto' ? not : 0;
    const ti = cat.tipo === 'indireto' ? not : 0;
    const tot = cd + ci + td + ti;
    tcd += cd; tci += ci; ttd += td; tti += ti;
    
    const bg = i % 2 === 0 ? W : LG;
    rf(ML, y, CD, EH, bg, BD); sf(5.5, 'normal', [0, 0, 0]); tx(cat.label, ML + 1.5, y + EH * 0.72);
    [cd, ci, td, ti].forEach((v, j) => {
      rf(ML + CD + j * CN, y, CN, EH, bg, BD);
      if (v > 0) { sf(6, 'bold', NAV); tx(String(v), ML + CD + (j + 0.5) * CN, y + EH * 0.72, { align: 'center' }); }
    });
    rf(ML + CD + 4 * CN, y, CT, EH, tot > 0 ? [220, 235, 255] : bg, BD);
    if (tot > 0) { sf(6.5, 'bold', NAV); tx(String(tot), ML + CD + 4 * CN + CT / 2, y + EH * 0.72, { align: 'center' }); }
    rf(ML + CD + 4 * CN + CT, y, CO, EH, bg, BD);
    y += EH;
  });
  
  const gtV = tcd + tci + ttd + tti;
  const TEH = 4;
  rf(ML, y, CD, TEH, NAV); sf(6, 'bold', W); tx('TOTAL EFETIVO', ML + 2, y + TEH * 0.68);
  [tcd, tci, ttd, tti].forEach((v, j) => {
    rf(ML + CD + j * CN, y, CN, TEH, NAV); sf(6.5, 'bold', W);
    tx(String(v), ML + CD + (j + 0.5) * CN, y + TEH * 0.68, { align: 'center' });
  });
  rf(ML + CD + 4 * CN, y, CT, TEH, RED); sf(7.5, 'bold', W);
  tx(String(gtV), ML + CD + 4 * CN + CT / 2, y + TEH * 0.68, { align: 'center' });
  rf(ML + CD + 4 * CN + CT, y, CO, TEH, NAV);
  y += TEH + 2;
  
  // ════════════════════════════
  // EQUIPAMENTOS (Diurno + Noturno)
  // ════════════════════════════
  rf(ML, y, TW, 5, NAV); sf(6.5, 'bold', W); tx('EQUIPAMENTOS', ML + 2, y + 3.3); y += 5;
  
  const EqCD = 80, EqCN = 18;
  rf(ML, y, EqCD, EH * 1.5, LB, BD); sf(5.5, 'bold', NAV); tx('EQUIPAMENTO', ML + 2, y + EH);
  rf(ML + EqCD, y, EqCN, EH * 1.5, LB, BD); sf(5.5, 'bold', NAV); tx('DIURNO', ML + EqCD + EqCN/2, y + EH, { align: 'center' });
  rf(ML + EqCD + EqCN, y, EqCN, EH * 1.5, LB, BD); sf(5.5, 'bold', NAV); tx('NOTURNO', ML + EqCD + EqCN + EqCN/2, y + EH, { align: 'center' });
  rf(ML + EqCD + EqCN*2, y, CT, EH * 1.5, LB, BD); sf(5.5, 'bold', NAV); tx('TOT.', ML + EqCD + EqCN*2 + CT/2, y + EH, { align: 'center' });
  const EqObs = TW - EqCD - EqCN*2 - CT;
  rf(ML + EqCD + EqCN*2 + CT, y, EqObs, EH * 1.5, LB, BD); sf(5.5, 'bold', NAV); tx('OBSERVAÇÕES', ML + EqCD + EqCN*2 + CT + 2, y + EH);
  y += EH * 1.5;
  
  // Filtrar equipamentos com valor
  let equipamentos = CATEGORIAS_EQUIP_PADRAO.filter(eq => {
    const diu = parseInt(d.equipamentos_diurno[eq.key]) || 0;
    const not = parseInt(d.equipamentos_noturno[eq.key]) || 0;
    return (diu + not) > 0;
  });
  
  // Customs
  (d.customEquip_diurno || []).forEach(eq => {
    const diu = parseInt(eq.qtd) || 0;
    if (eq.label && diu > 0) equipamentos.push({ key: '__eqd_' + eq.label, label: eq.label + ' ✱', _customDiu: diu, _customNot: 0 });
  });
  (d.customEquip_noturno || []).forEach(eq => {
    const not = parseInt(eq.qtd) || 0;
    if (eq.label && not > 0) {
      const exist = equipamentos.find(e => e.label === eq.label + ' ✱');
      if (exist) exist._customNot = not;
      else equipamentos.push({ key: '__eqn_' + eq.label, label: eq.label + ' ✱', _customDiu: 0, _customNot: not });
    }
  });
  
  // Min 6 linhas pra ocupar
  if (equipamentos.length < 6) {
    const placeholders = CATEGORIAS_EQUIP_PADRAO.filter(eq => !equipamentos.some(e => e.key === eq.key)).slice(0, 6 - equipamentos.length);
    equipamentos = [...equipamentos, ...placeholders];
  }
  equipamentos = equipamentos.slice(0, 8);
  
  let tEqDiu = 0, tEqNot = 0;
  equipamentos.forEach((eq, i) => {
    let diu, not;
    if (eq._customDiu !== undefined) { diu = eq._customDiu; not = eq._customNot; }
    else {
      diu = parseInt(d.equipamentos_diurno[eq.key]) || 0;
      not = parseInt(d.equipamentos_noturno[eq.key]) || 0;
    }
    const tot = diu + not;
    tEqDiu += diu; tEqNot += not;
    
    const bg = i % 2 === 0 ? W : LG;
    rf(ML, y, EqCD, EH, bg, BD); sf(5.5, 'normal', [0, 0, 0]); tx(eq.label, ML + 1.5, y + EH * 0.72);
    rf(ML + EqCD, y, EqCN, EH, bg, BD);
    if (diu > 0) { sf(6, 'bold', NAV); tx(String(diu), ML + EqCD + EqCN/2, y + EH * 0.72, { align: 'center' }); }
    rf(ML + EqCD + EqCN, y, EqCN, EH, bg, BD);
    if (not > 0) { sf(6, 'bold', NAV); tx(String(not), ML + EqCD + EqCN + EqCN/2, y + EH * 0.72, { align: 'center' }); }
    rf(ML + EqCD + EqCN*2, y, CT, EH, tot > 0 ? [220, 235, 255] : bg, BD);
    if (tot > 0) { sf(6.5, 'bold', NAV); tx(String(tot), ML + EqCD + EqCN*2 + CT/2, y + EH * 0.72, { align: 'center' }); }
    rf(ML + EqCD + EqCN*2 + CT, y, EqObs, EH, bg, BD);
    y += EH;
  });
  
  // Total equipamentos
  const tEqTotal = tEqDiu + tEqNot;
  rf(ML, y, EqCD, TEH, NAV); sf(6, 'bold', W); tx('TOTAL EQUIPAMENTOS', ML + 2, y + TEH * 0.68);
  rf(ML + EqCD, y, EqCN, TEH, NAV); sf(6.5, 'bold', W); tx(String(tEqDiu), ML + EqCD + EqCN/2, y + TEH * 0.68, { align: 'center' });
  rf(ML + EqCD + EqCN, y, EqCN, TEH, NAV); sf(6.5, 'bold', W); tx(String(tEqNot), ML + EqCD + EqCN + EqCN/2, y + TEH * 0.68, { align: 'center' });
  rf(ML + EqCD + EqCN*2, y, CT, TEH, RED); sf(7.5, 'bold', W); tx(String(tEqTotal), ML + EqCD + EqCN*2 + CT/2, y + TEH * 0.68, { align: 'center' });
  rf(ML + EqCD + EqCN*2 + CT, y, EqObs, TEH, NAV);
  y += TEH + 2;
  
  // ════════════════════════════
  // SERVIÇOS DIURNOS + NOTURNOS
  // ════════════════════════════
  function renderServicosBlock(titulo, lista, corBlock) {
    rf(ML, y, TW, 4.5, corBlock); sf(6.5, 'bold', W); tx(titulo, ML + 2, y + 3); y += 4.5;
    const SH = 4;
    const wPac = TW * 0.60, wLoc = TW * 0.15, wQtd = TW * 0.08, wUn = TW * 0.05, wEq = TW * 0.12;
    const xPac = ML, xLoc = xPac + wPac, xQtd = xLoc + wLoc, xUn = xQtd + wQtd, xEq = xUn + wUn;
    
    rf(xPac, y, wPac, SH, LB, BD); sf(5, 'bold', NAV); tx('FRENTE / PACOTE', xPac + 2, y + SH * 0.72);
    rf(xLoc, y, wLoc, SH, LB, BD); sf(5, 'bold', NAV); tx('LOCAL', xLoc + 2, y + SH * 0.72);
    rf(xQtd, y, wQtd, SH, LB, BD); sf(5, 'bold', NAV); tx('QTD', xQtd + wQtd / 2, y + SH * 0.72, { align: 'center' });
    rf(xUn, y, wUn, SH, LB, BD); sf(5, 'bold', NAV); tx('UN', xUn + wUn / 2, y + SH * 0.72, { align: 'center' });
    rf(xEq, y, wEq, SH, LB, BD); sf(5, 'bold', NAV); tx('EQUIPE', xEq + 2, y + SH * 0.72);
    y += SH;
    
    if (lista.length === 0) {
      rf(xPac, y, TW, SH, [253, 246, 230], BD);
      sf(5.5, 'italic', [140, 90, 30]);
      tx('— sem serviços neste turno —', xPac + TW / 2, y + SH * 0.72, { align: 'center' });
      y += SH;
    } else {
      lista.forEach((s, i) => {
        const bg = i % 2 === 0 ? W : LG;
        const pacote = STATE.pacotes.find(pp => pp['ID'] === s['Pacote_ID']);
        const frente = pacote ? (pacote['Frente'] || '') : '';
        rf(xPac, y, wPac, SH, bg, BD); sf(5.5, 'normal', [0, 0, 0]);
        const txtPacote = (frente ? frente + ' · ' : '') + (s['Pacote_Nome'] || '');
        const linhasPac = doc.splitTextToSize(txtPacote, wPac - 3);
        if (linhasPac.length === 1) tx(linhasPac[0], xPac + 1.5, y + SH * 0.72);
        else { sf(4.8, 'normal', [0, 0, 0]); tx(linhasPac[0], xPac + 1.5, y + SH * 0.45); tx(linhasPac[1] || '', xPac + 1.5, y + SH * 0.85); }
        rf(xLoc, y, wLoc, SH, bg, BD); sf(5.5, 'normal', [40, 40, 40]); tx(String(s['Local_Estaca'] || ''), xLoc + 1.5, y + SH * 0.72);
        rf(xQtd, y, wQtd, SH, bg, BD); sf(5.5, 'bold', NAV); tx(fmtNum(num(s['Quantidade'])), xQtd + wQtd - 2, y + SH * 0.72, { align: 'right' });
        rf(xUn, y, wUn, SH, bg, BD); sf(5, 'normal', DG); tx(s['Unidade'] || '', xUn + wUn / 2, y + SH * 0.72, { align: 'center' });
        rf(xEq, y, wEq, SH, bg, BD); sf(5, 'normal', [0, 0, 0]);
        const txtEq = String(s['Equipe'] || s['Subcontratado'] || '');
        const linhasEq = doc.splitTextToSize(txtEq, wEq - 2);
        tx(linhasEq[0] || '', xEq + 1.5, y + SH * 0.72);
        y += SH;
      });
    }
    y += 2;
  }
  
  if (y < PH - 90) {
    renderServicosBlock('SERVIÇOS DIURNOS', servicosDiurnos, ORANGE);
    renderServicosBlock('SERVIÇOS NOTURNOS', servicosNoturnos, BLUE);
  }
  
  // Observações
  const yMaxBeforeAssin = PH - 32;
  rf(ML, y, TW, 4.5, NAV); sf(6.5, 'bold', W); tx('OBSERVAÇÕES GERAIS', ML + 2, y + 3); y += 4.5;
  const hw = (TW - 3) / 2;
  rf(ML, y, hw, 3.5, LB, BD); sf(4.5, 'bold', NAV); tx('OBSERVAÇÕES CVTV', ML + 2, y + 2.5);
  rf(ML + hw + 3, y, hw, 3.5, LB, BD); sf(4.5, 'bold', NAV); tx('CLIENTE / FISCALIZAÇÃO', ML + hw + 5, y + 2.5);
  y += 3.5;
  const obsCVTV = [d.observacoes_gerais, d.ocorrencias].filter(x => x && x.trim()).join(' · ') || '—';
  const obsCli = d.visitas || '—';
  const cvL = doc.splitTextToSize(obsCVTV, hw - 3);
  const clL = doc.splitTextToSize(obsCli, hw - 3);
  const obsBlockH = Math.max(15, yMaxBeforeAssin - y - 2);
  rf(ML, y, hw, obsBlockH, YB, [190, 170, 0]); sf(5.5, 'normal', [0, 0, 0]);
  doc.text(cvL.slice(0, Math.floor(obsBlockH / 3.5)), ML + 2, y + 3);
  rf(ML + hw + 3, y, hw, obsBlockH, [240, 255, 242], [0, 140, 70]); sf(5.5, 'normal', [0, 0, 0]);
  doc.text(clL.slice(0, Math.floor(obsBlockH / 3.5)), ML + hw + 5, y + 3);
  y += obsBlockH + 1;
  
  // Assinaturas
  rf(ML, y, TW, 4, NAV); sf(6, 'bold', W); tx('ASSINATURAS', ML + 2, y + 2.8); y += 4;
  const sw = (TW - 4) / 2;
  rf(ML, y, sw, 14, W, BD);
  sf(5, 'bold', DG); tx('ENGENHEIRO CONSÓRCIO TEOTÔNIO VILELA', ML + 2, y + 4);
  ln(ML + 3, y + 10.5, ML + sw - 3, y + 10.5, [120, 120, 120], 0.3);
  sf(5, 'normal', DG); tx(df, ML + sw / 2, y + 13, { align: 'center' });
  rf(ML + sw + 4, y, sw, 14, W, BD);
  sf(5, 'bold', DG); tx('CLIENTE / FISCALIZAÇÃO (SP OBRAS)', ML + sw + 6, y + 4);
  ln(ML + sw + 7, y + 10.5, ML + 2 * sw + 1, y + 10.5, [120, 120, 120], 0.3);
  sf(5, 'normal', DG); tx(df, ML + sw + 4 + sw / 2, y + 13, { align: 'center' });
  y += 14;
  
  // Rodapé
  const fy = PH - 8;
  ln(ML, fy - 1, ML + TW, fy - 1, NAV, 0.4);
  sf(5, 'normal', DG);
  tx('Consórcio Viário Teotônio Vilela  |  RDO Nº ' + nrRDO + '  |  Data: ' + df, PW / 2, fy + 2, { align: 'center' });
  tx('Av. Senador Teotônio Vilela, São Paulo – SP  |  Duplicação Viária', PW / 2, fy + 5.5, { align: 'center' });
  
  const fname = 'RDO_' + data.replace(/-/g, '_') + '.pdf';
  doc.save(fname);
  toast('PDF gerado: ' + fname, 'success');
}

// ====================================================================
// PDF INTERNO — Visual, pra mandar no grupo (sem logos formais)
// ====================================================================
function gerarPDFInterno(data, turnoFocus) {
  // Tornando a função à prova de falhas: se o botão não enviou o turno, ela mesma descobre qual tela está aberta
  const focus = turnoFocus || (typeof DIARIO_TURNO_ATIVO !== 'undefined' ? DIARIO_TURNO_ATIVO : null);

  const fromSheet = (STATE.rdodiario || []).find(r => {
    const rd = String(r['Data']);
    return rd === data || (parseISODate(rd) && parseISODate(rd).toISOString().split('T')[0] === data);
  });

  let d;
